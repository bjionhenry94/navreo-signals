<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Today · Navreo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="navreo.css">
<style>
/* ── Today: Google-minimal insight feed ─────────────────── */
.today{max-width:1060px; margin:0 auto; padding:0 8px 120px;}
#widgets{display:grid; grid-template-columns:1fr 1fr; column-gap:64px;}
#widgets .w.wide{grid-column:1 / -1;}
@media (max-width:920px){ #widgets{grid-template-columns:1fr;} }
.today-top{display:flex; flex-direction:column; align-items:center; text-align:center; padding:72px 0 64px;}
.today-top .date{font-family:var(--font-mono); font-size:11px; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--brown-400); margin-bottom:10px;}
.today-top h1{font-size:26px; margin:0; text-wrap:balance;}
.today-top .count{margin-top:12px; font-size:13px; color:var(--ink-3);}
.today-top .count b{color:var(--orange); font-weight:600;}

.w{padding:44px 0 48px; border-top:1px solid var(--line);}
.w .tag{font-family:var(--font-mono); font-size:10px; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--brown-400); display:block; margin-bottom:20px;}
.w .num-xl{font-family:var(--font-display); font-weight:400; font-size:84px; line-height:0.9;
  letter-spacing:-0.035em; font-variant-numeric:tabular-nums;}
.w .num-lg{font-family:var(--font-display); font-weight:400; font-size:44px; line-height:1;
  letter-spacing:-0.02em; font-variant-numeric:tabular-nums;}
.w .caption{font-size:15px; color:var(--ink-2); max-width:46ch; margin:16px 0 0; text-wrap:balance;}
.w .caption b{color:var(--ink); font-weight:600;}
.w .act{display:flex; align-items:flex-start; gap:10px; margin-top:18px;
  font-size:14px; font-weight:600; color:var(--ink); max-width:52ch;}
.w .act .arrow{color:var(--orange); font-family:var(--font-display); flex:none; line-height:1.4;}
.w .row{display:flex; align-items:flex-end; gap:24px; flex-wrap:wrap;}
.w .row .graphic{flex:1; min-width:220px;}
.today-foot{margin-top:48px; text-align:center; font-size:11.5px; color:var(--brown-400); line-height:1.8;}
.today-foot .mono{font-size:10px; letter-spacing:0.12em; text-transform:uppercase;}
</style>
</head>
<body>
<div class="app">
  <div id="rail"></div>
  <main class="main">
    <div class="today">
      <div class="today-top">
        <div class="date" id="today-date"></div>
        <h1>While you were away, your leads kept talking.</h1>
        <div class="count"><b id="today-n"></b> <span>things worth acting on today · never the same twice</span></div>
      </div>
      <div id="widgets"></div>
      <div class="today-foot">
        <span class="mono">Insight engine · v2</span><br>
        One number · one line · one action. Tomorrow's are new.
      </div>
    </div>
  </main>
</div>
<script src="shell.js"></script>
<script>
document.getElementById("rail").outerHTML = renderRail("dashboard");

/* ── Today's insights. A daily job can replace this via /api/insights;
      the embedded set is the fallback so the page never renders empty. ── */
const FALLBACK = {
  date: "Friday 11 July",
  widgets: [
    { tag: "Unanswered · conversion", type: "fraction",
      data: { num: 48, of: 83, ofLabel: "of 83 positives since 1 July", color: "var(--orange)" },
      caption: "<b>48 warm replies, no answer from us.</b> Twelve asked for a meeting.",
      act: "Clear those 12 today." },
    { tag: "Hidden pipeline · conversion", type: "fraction",
      data: { num: 64, of: 89, ofLabel: "", color: "var(--ink)", small: true },
      caption: "<b>72% of &quot;wrong person&quot; replies name the right one.</b>",
      act: "New thread: “your colleague suggested I ask you.”" },
    { tag: "Timing · conversion", type: "pulse24",
      data: { values: [8,5,3,4,3,9,7,15,14,15,7,6,10,80,60,38,32,26,18,18,16,10,12,6],
              utc: true, hotFrom: 13, hotTo: 16 },
      caption: "<b>Half of all positives arrive between {{hotStart}} and {{hotEnd}} {{tz}}.</b>",
      act: "Hold a daily {{hotStart}} {{tz}} reply block." },
    { tag: "Hidden pipeline · conversion", type: "ring",
      data: { num: 209, of: 544 },
      caption: "<b>209 out-of-office replies name a return date.</b> A free follow-up calendar.",
      act: "Queue a touch for the day after each return." },
    { tag: "Deliverability · risk", type: "barsDanger",
      data: { headline: "4.1%", bars: [4.1, 3.8, 4.0, 3.3, 3.1], danger: 2, book: 1.0, max: 4.5 },
      caption: "<b>StoreLead lists bounce at 3–4%</b> — double the danger line. They’re burning Amplifyy’s domains.",
      act: "Verify before send. Pause the Apparel pair." },
  ],
};

const R = {
  fraction(d) {
    const pct = Math.round(100 * d.num / d.of);
    const numCls = d.small ? "num-lg" : "num-xl";
    const denom = d.small ? `<span style="color:var(--brown-400); font-size:24px;"> / ${d.of}</span>` : "";
    const fill = d.small ? "var(--brown-400)" : d.color;
    return `<div class="row">
      <div><div class="${numCls}" style="color:${d.color}">${d.num}${denom}</div></div>
      <div class="graphic" style="align-self:center;">
        <svg viewBox="0 0 300 30" width="100%">
          <rect x="0" y="12" width="300" height="9" rx="4.5" fill="#F0EDE9"/>
          <rect x="0" y="12" width="${Math.round(3 * pct)}" height="9" rx="4.5" fill="${fill}"/>
          ${d.ofLabel ? `<text x="298" y="7" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" fill="#A89684">${d.ofLabel}</text>` : ""}
        </svg>
      </div>
    </div>`;
  },
  pulse24(d, w) {
    /* Data hours are UTC when d.utc — rotate into the browser's local
       timezone and label times with the zone name (user rule). */
    const off = d.utc ? Math.round(-new Date().getTimezoneOffset() / 60) : 0;
    const loc = (h) => ((h + off) % 24 + 24) % 24;           // UTC hour → local hour
    const vals = new Array(24);
    d.values.forEach((v, h) => { vals[loc(h)] = v; });
    const hotSet = new Set(), midSet = new Set();
    for (let h = d.hotFrom; h <= d.hotTo; h++) hotSet.add(loc(h));
    for (let h = d.hotTo + 1; h <= d.hotTo + 3; h++) midSet.add(loc(h));
    const fmtH = (h) => { const x = ((h % 24) + 24) % 24; return (x % 12 || 12) + (x < 12 ? "am" : "pm"); };
    const tzName = (Intl.DateTimeFormat(undefined, { timeZoneName: "short" })
      .formatToParts(new Date()).find((p) => p.type === "timeZoneName") || {}).value || "";
    if (w) w.subs = { "{{hotStart}}": fmtH(loc(d.hotFrom)), "{{hotEnd}}": fmtH(loc(d.hotTo) + 1),
                      "{{peak}}": fmtH(loc(d.hotFrom)), "{{tz}}": tzName };
    const max = Math.max(...vals), W = 560, H = 96, bw = 16, gap = 23;
    const bars = vals.map((v, i) => {
      const h = Math.max(2.5, (v / max) * 72), y = 84 - h;
      const fill = hotSet.has(i) ? "#FF4D00" : midSet.has(i) ? "#C0B0A0" : "#E8D7C4";
      const op = hotSet.has(i) && v < max * 0.6 ? ' opacity="0.65"' : "";
      return `<rect x="${2 + i * gap}" y="${y.toFixed(1)}" width="${bw}" height="${h.toFixed(1)}" rx="3" fill="${fill}"${op}/>`;
    }).join("");
    const peakIdx = vals.indexOf(max);
    const peakX = Math.min(W - 30, Math.max(30, 2 + peakIdx * gap + 8));
    return `<svg viewBox="0 0 ${W} ${H}" width="100%">
      ${bars}
      <text x="${peakX}" y="8" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="10" fill="#A83100">${fmtH(peakIdx)} ${tzName}</text>
      <text x="2" y="95" font-family="JetBrains Mono,monospace" font-size="9" fill="#C0B0A0">MIDNIGHT</text>
      <text x="${2 + 12 * gap}" y="95" font-family="JetBrains Mono,monospace" font-size="9" fill="#C0B0A0">NOON</text>
      <text x="${W - 13}" y="95" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="9" fill="#C0B0A0">11PM</text>
    </svg>`;
  },
  ring(d) {
    const C = 2 * Math.PI * 50, frac = d.num / d.of;
    return `<div class="row" style="align-items:center;">
      <svg viewBox="0 0 120 120" width="118" height="118" style="flex:none;">
        <circle cx="60" cy="60" r="50" fill="none" stroke="#F0EDE9" stroke-width="11"/>
        <circle cx="60" cy="60" r="50" fill="none" stroke="#FF4D00" stroke-width="11"
          stroke-dasharray="${(C * frac).toFixed(1)} ${(C * (1 - frac)).toFixed(1)}"
          stroke-linecap="round" transform="rotate(-90 60 60)"/>
        <text x="60" y="68" text-anchor="middle" font-family="Acid Grotesk,DM Sans,sans-serif" font-size="24" fill="#14110E">${d.num}</text>
      </svg>
      <div style="flex:1; min-width:220px;" class="ring-caption"></div>
    </div>`;
  },
  barsDanger(d) {
    const px = (v) => (v / d.max) * 72;
    const bars = d.bars.map((v, i) => {
      const h = px(v);
      return `<rect x="${8 + i * 40}" y="${(72 - h).toFixed(1)}" width="30" height="${h.toFixed(1)}" rx="3" fill="#C2371F" opacity="${(1 - i * 0.15).toFixed(2)}"/>`;
    }).join("");
    const dy = 72 - px(d.danger), bh = px(d.book);
    return `<div class="row" style="align-items:flex-end;">
      <div><div class="num-xl" style="color:var(--red)">${d.headline}</div></div>
      <div class="graphic">
        <svg viewBox="0 0 300 78" width="100%">
          <line x1="0" y1="${dy}" x2="300" y2="${dy}" stroke="#C2371F" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>
          <text x="298" y="${dy - 6}" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="9" fill="#C2371F">${d.danger}% DANGER LINE</text>
          ${bars}
          <rect x="238" y="${(72 - bh).toFixed(1)}" width="30" height="${bh.toFixed(1)}" rx="3" fill="#C0B0A0"/>
          <text x="253" y="${(72 - bh - 6).toFixed(1)}" text-anchor="middle" font-family="JetBrains Mono,monospace" font-size="9" fill="#6B6055">BOOK ~${d.book}%</text>
        </svg>
      </div>
    </div>`;
  },
};

function renderToday(payload) {
  document.getElementById("today-date").textContent = payload.date;
  document.getElementById("today-n").textContent = payload.widgets.length;
  document.getElementById("widgets").innerHTML = payload.widgets.map((w) => {
    const graphic = R[w.type] ? R[w.type](w.data, w) : "";
    const sub = (s) => Object.entries(w.subs || {}).reduce((t, [k, v]) => t.split(k).join(v), s);
    const cap = `<p class="caption">${sub(w.caption)}</p>`;
    return `<div class="w${w.wide || w.type === "pulse24" ? " wide" : ""}">
      <span class="tag">${w.tag}</span>
      ${w.type === "ring" ? graphic.replace('class="ring-caption"></div>', `class="ring-caption">${cap.replace('class="caption"', 'class="caption" style="margin:0;"')}</div>`) : graphic + cap}
      <div class="act"><span class="arrow">→</span><span>${sub(w.act)}</span></div>
    </div>`;
  }).join("");
}

(async () => {
  let payload = FALLBACK;
  try {
    const r = await fetch("/api/insights");
    if (r.ok) { const j = await r.json(); if (j && j.widgets && j.widgets.length) payload = j; }
  } catch (e) { /* fall back to embedded */ }
  renderToday(payload);
})();
</script>
</body>
</html>

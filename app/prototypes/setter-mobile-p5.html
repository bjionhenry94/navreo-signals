<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Setter Mobile P5 — One-thumb cockpit</title>
<style>
@font-face { font-family: "Acid Grotesk"; src: url("../fonts/AcidGrotesk-Normal.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
:root {
  --orange:#FF4D00; --orange-600:#DB4100; --orange-700:#A83100; --orange-100:#FFE4D6;
  --ink:#14110E; --ink-2:#3A332C; --ink-3:#6B6055; --brown-300:#C0B0A0; --brown-400:#A89684;
  --cream:#F9F0E7; --cream-50:#FCF7F1; --bg:#FFFFFF; --bg-sunken:#F7F7F6; --card:#FFFFFF;
  --line:#ECECEA; --line-2:#DDDDDA;
  --green:#2E7D5B; --green-bg:#E2F1E9; --green-line:#C4E2D3;
  --amber:#8F6600; --amber-bg:#F8EAC4; --amber-line:#EBD79E;
  --font-sans:"DM Sans","Helvetica Neue",system-ui,sans-serif;
  --font-display:"Acid Grotesk","DM Sans",sans-serif;
  --radius:12px; --focus:0 0 0 3px rgba(255,77,0,.32);
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  font-family:var(--font-sans); background:var(--bg); color:var(--ink);
  line-height:1.45; letter-spacing:-0.015em; -webkit-font-smoothing:antialiased;
  max-width:480px; margin:0 auto; height:100dvh; overflow:hidden; position:relative;
}
button { font-family:var(--font-sans); cursor:pointer; }
.proto-banner {
  text-align:center; font-size:11px; color:var(--ink-3);
  padding:6px 12px; border-bottom:1px solid var(--line); background:var(--bg-sunken);
}
.screen { position:absolute; inset:0; top:29px; display:none; flex-direction:column; overflow:hidden; background:var(--bg); }
.screen.on { display:flex; }

/* ── List screen ── */
.list-head { padding:16px 18px 0; }
.lh-title { font-family:var(--font-display); font-weight:400; font-size:24px; letter-spacing:-0.03em; }
/* Status lenses (owner ask): same pills as the desktop setter, live counts. */
.fpills {
  display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch;
  padding:10px 18px 6px; scrollbar-width:none;
}
.fpills::-webkit-scrollbar { display:none; }
.fpill {
  flex-shrink:0; min-height:40px; padding:0 14px; border-radius:999px;
  border:1px solid var(--line-2); background:var(--card); color:var(--ink-2);
  font:600 12.5px var(--font-sans); display:inline-flex; align-items:center; gap:6px;
}
.fpill b { font-weight:700; font-variant-numeric:tabular-nums; color:var(--ink-3); }
.fpill.on { background:var(--ink); border-color:var(--ink); color:var(--cream-50); }
.fpill.on b { color:var(--cream-50); opacity:.75; }
.list-scroll { flex:1; overflow-y:auto; padding-bottom:calc(20px + env(safe-area-inset-bottom)); }
.row { padding:12px 18px; border-bottom:1px solid var(--line); cursor:pointer; min-height:64px; }
.row:active { background:var(--bg-sunken); }
.row-1 { display:flex; align-items:center; gap:7px; }
.row-name { font-size:13.5px; font-weight:600; }
.row-time { margin-left:auto; font-size:11px; color:var(--ink-3); flex-shrink:0; }
.row-snip { font-size:12.5px; color:var(--ink-2); margin-top:2px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.row-pills { display:flex; gap:6px; margin-top:6px; flex-wrap:wrap; }
.pill {
  display:inline-flex; align-items:center; font-size:10.5px; font-weight:600;
  padding:2px 8px; border-radius:999px; background:var(--bg-sunken); color:var(--ink-2); border:1px solid var(--line);
}
.pill.noagent { background:transparent; border-style:dashed; color:var(--ink-3); }
.pill.auto { background:var(--green-bg); border-color:var(--green-line); color:#195C3F; }
.pill.donepill { background:var(--green-bg); border-color:var(--green-line); color:#195C3F; }
.pill.dismissedpill { background:var(--bg-sunken); border-color:var(--line-2); color:var(--ink-3); }
.empty-inline { padding:50px 30px; text-align:center; }
.empty-inline .big { font-family:var(--font-display); font-size:24px; letter-spacing:-0.03em; }
.empty-inline .sub { font-size:13px; color:var(--ink-3); margin-top:5px; }

/* ── Detail screen ── */
.det-head { display:flex; align-items:center; gap:8px; padding:10px 14px 4px; flex-shrink:0; }
.back-btn { min-width:44px; min-height:44px; border:none; background:none; color:var(--ink-2); font-size:22px; text-align:left; }
.det-k { font-size:12.5px; color:var(--ink-3); margin-left:auto; font-variant-numeric:tabular-nums; }
.det-scroll { flex:1; overflow-y:auto; padding:2px 18px 16px; }
.det-lead { margin-bottom:10px; }
.dl-name { font-size:17px; font-weight:600; }
.dl-role { font-size:12.5px; color:var(--ink-2); margin-top:1px; }
.dl-pills { display:flex; gap:6px; margin-top:7px; flex-wrap:wrap; }
.tmsg { margin-bottom:8px; padding:9px 12px; border-radius:8px; background:var(--bg-sunken); }
.tmsg.latest { background:var(--card); border:1px solid var(--line); border-left:3px solid var(--ink); }
.tmsg .tm-head { font-size:11px; font-weight:600; color:var(--ink-3); margin-bottom:3px; }
.tmsg .tm-body { font-size:12.5px; color:var(--ink-2); line-height:1.5; white-space:pre-wrap; }
.tmsg.latest .tm-body { font-size:14.5px; color:var(--ink); }
.draft-card { border:1px solid var(--line-2); border-radius:12px; margin-top:10px; overflow:hidden; }
.dc-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-3); padding:10px 14px 0; display:flex; align-items:center; }
/* Panel fix (Yuki): Redraft lives on the draft it rewrites, not in the send row. */
.dc-redraft {
  margin-left:auto; min-height:32px; padding:0 12px; border-radius:999px;
  border:1px solid var(--line-2); background:var(--card); color:var(--ink-2);
  font:600 11px var(--font-sans); text-transform:none; letter-spacing:0;
}
.dc-redraft:active { background:var(--bg-sunken); }
.dc-body { font-size:13.5px; line-height:1.55; padding:7px 14px 12px; white-space:pre-wrap; }
.dc-edit { display:none; padding:7px 14px 12px; }
.dc-edit textarea {
  width:100%; min-height:150px; border:1px solid var(--line-2); border-radius:8px; padding:10px 11px;
  font:400 13.5px/1.55 var(--font-sans); color:var(--ink); resize:vertical;
}
.dc-edit textarea:focus { outline:none; box-shadow:var(--focus); }
.learn-row { display:none; margin-top:8px; }
.learn-row label { display:flex; gap:8px; align-items:flex-start; font-size:12px; font-weight:500; color:var(--ink-2); cursor:pointer; }
.learn-row input { margin-top:2px; width:16px; height:16px; }
.learn-row .hint { font-size:11px; color:var(--ink-3); margin-top:3px; line-height:1.45; }
.sent-strip { display:none; margin-top:10px; border:1px solid var(--green-line); background:var(--green-bg); color:#195C3F; border-radius:10px; padding:9px 12px; font-size:12.5px; font-weight:600; }
.sent-strip.on { display:block; }
.sent-strip.neutral { border-color:var(--line); background:var(--bg-sunken); color:var(--ink-2); }

/* ── The cockpit ── */
.cockpit {
  flex-shrink:0; border-top:1px solid var(--line); background:var(--bg);
  padding:8px 12px calc(12px + env(safe-area-inset-bottom)); position:relative;
}
.cp-context {
  font-size:11px; font-weight:600; color:var(--ink-3); text-align:center;
  margin-bottom:6px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}
.fu-launcher {
  width:100%; min-height:44px; border-radius:11px; border:1px dashed var(--line-2);
  background:var(--bg-sunken); color:var(--ink-2); font-size:12.5px; font-weight:600;
  display:flex; align-items:center; justify-content:center; gap:6px; margin-bottom:8px;
}
.fu-launcher.picked { border-style:solid; border-color:var(--ink); background:var(--card); color:var(--ink); }
.cockpit-verbs { display:flex; gap:7px; }
.cv {
  min-height:50px; border-radius:11px; border:1px solid var(--line-2); background:var(--card);
  color:var(--ink-2); font-size:12.5px; font-weight:600; padding:0 10px;
}
.cv:active { background:var(--bg-sunken); }
.cv.quiet { border-color:transparent; color:var(--ink-3); }
.cv.approve {
  flex:1; background:var(--ink); border-color:var(--ink); color:var(--cream-50);
  font-size:14px; position:relative; overflow:hidden;
}
.cv.approve[data-locked="1"] { opacity:.5; }
.cv.approve .fill {
  position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--orange);
  z-index:0;
}
.cv.approve .lbl { position:relative; z-index:1; }
/* Panel fix (Sam): a plain tap gets a LOUD response - the button shakes. */
@keyframes holdshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.cv.approve.shake { animation:holdshake .3s ease 2; }
.cockpit-hint { font-size:11px; color:var(--ink-3); text-align:center; margin-top:6px; min-height:14px; transition:color .15s; }
.cockpit-hint.loud { color:var(--orange-700); font-weight:700; }
.cockpit-hint .why { border-bottom:1px dotted var(--ink-3); position:relative; cursor:help; }
.cockpit-hint .why .tip {
  display:none; position:absolute; bottom:18px; left:50%; transform:translateX(-50%); width:230px; background:var(--ink);
  color:var(--cream-50); font-size:11.5px; line-height:1.5; padding:9px 11px; border-radius:8px; z-index:20; text-align:left;
}
.cockpit-hint .why:active .tip, .cockpit-hint .why:hover .tip { display:block; }
/* gate mini-sheet rises above the cockpit */
.gate-mini {
  position:absolute; left:10px; right:10px; bottom:calc(100% + 6px);
  background:var(--card); border:1px solid var(--line); border-radius:14px;
  box-shadow:0 10px 30px rgba(20,17,14,.16); padding:12px 14px;
  display:none;
}
.gate-mini.on { display:block; }
.gm-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-3); margin-bottom:9px; }
.gm-chips { display:flex; gap:8px; flex-wrap:wrap; }
.gchip {
  min-height:44px; padding:0 15px; border-radius:999px; border:1px solid var(--line-2);
  background:var(--card); color:var(--ink-2); font-size:13px; font-weight:600;
}
.gchip.none { border-style:dashed; }
.gchip.sel { background:var(--orange); border-color:var(--orange); color:#fff; }

/* toasts */
.toast {
  position:fixed; left:50%; transform:translateX(-50%) translateY(12px); bottom:calc(140px + env(safe-area-inset-bottom));
  z-index:60; width:min(440px,92vw); background:var(--card); border:1px solid var(--line); border-radius:12px;
  box-shadow:0 10px 30px rgba(20,17,14,.18); padding:12px 14px; opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s;
}
.toast.on { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
.toast .t-head { font-size:12.5px; font-weight:600; }
.toast .t-rule { font-size:12.5px; color:var(--ink-2); margin:4px 0 9px; line-height:1.5; }
.toast .t-actions { display:flex; gap:8px; }
.toast .tbtn { min-height:38px; font-size:12.5px; border-radius:10px; border:1px solid var(--line-2); background:var(--card); color:var(--ink-2); padding:0 12px; font-weight:600; }
.note-toast {
  /* Sits a band above the button toasts so it can never bury Undo/Keep. */
  position:fixed; left:50%; transform:translateX(-50%); bottom:calc(230px + env(safe-area-inset-bottom));
  background:var(--ink); color:var(--cream-50); font-size:12.5px; font-weight:500;
  padding:9px 16px; border-radius:999px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:60;
}
.note-toast.on { opacity:1; }
</style>
</head>
<body>
<div class="proto-banner">Prototype P5 · One-thumb cockpit · mock data — nothing sends</div>

<!-- List -->
<div class="screen on" id="listScreen">
  <div class="list-head">
    <div class="lh-title">Appointment Setter</div>
  </div>
  <div class="fpills" id="fpills"></div>
  <div class="list-scroll" id="listScroll"></div>
</div>

<!-- Detail -->
<div class="screen" id="detScreen">
  <div class="det-head">
    <button class="back-btn" id="backBtn" type="button" aria-label="Back">&#8249;</button>
    <span class="det-k" id="detK"></span>
  </div>
  <div class="det-scroll" id="detScroll"></div>
  <div class="cockpit" id="cockpit">
    <div class="gate-mini" id="gateMini">
      <div class="gm-label">Follow-up after this send</div>
      <div class="gm-chips" id="gmChips"></div>
    </div>
    <div class="cp-context" id="cpContext"></div>
    <button class="fu-launcher" id="fuLauncher" type="button">Follow-up: pick</button>
    <div class="cockpit-verbs">
      <button class="cv quiet" id="dismissBtn" type="button" title="Removes it from this queue only. Nothing is sent and the lead stays in Smartlead.">Dismiss</button>
      <button class="cv" id="editBtn" type="button">Edit</button>
      <button class="cv approve" id="approveBtn" type="button" data-locked="1"><span class="fill" id="approveFill"></span><span class="lbl" id="approveLbl">Approve</span></button>
    </div>
    <div class="cockpit-hint" id="cockpitHint"></div>
  </div>
</div>

<div class="toast" id="lessonToast">
  <div class="t-head">The agent learned from your edit</div>
  <div class="t-rule" id="lessonRule"></div>
  <div class="t-actions">
    <button class="tbtn" id="lessonUndoBtn" type="button">Undo - forget this</button>
    <button class="tbtn" id="lessonOkBtn" type="button">Keep it</button>
  </div>
</div>
<div class="toast" id="dismissToast">
  <div class="t-head">Dismissed</div>
  <div class="t-rule">Removed from this queue only. Nothing was sent and the lead stays in Smartlead.</div>
  <div class="t-actions">
    <button class="tbtn" id="dismissUndoBtn" type="button">Undo</button>
    <button class="tbtn" id="dismissOkBtn" type="button">OK</button>
  </div>
</div>
<div class="note-toast" id="noteToast"></div>

<script>
"use strict";
const REPLIES = [
 {id:"r1", name:"Sarah Mitchell", title:"COO", company:"Meridian Fabrication", email:"sarah@meridianfab.co.uk",
  campaign:"Sihl — UK Manufacturers", agent:"Sihl Setter", intent:"Wants to book a call", status:"needs_review", age:"4m",
  reply:"This sounds interesting. We've been burned by agencies before but the buyer-intro angle is different. How does next Tuesday look for a quick call?",
  thread:[{who:"us", head:"You · 3 days ago", body:"Hi Sarah — quick one: are you open to intros to buyers actively sourcing UK fabrication right now? We line up 2-3 qualified buyer conversations a month for firms like Meridian. Worth a look?"},
          {who:"them", head:"Sarah · 4 minutes ago", body:"This sounds interesting. We've been burned by agencies before but the buyer-intro angle is different. How does next Tuesday look for a quick call?"}],
  draft:"Hi Sarah,\n\nTuesday works well — I have 10:30 or 2:15 free. Grab whichever suits here: cal.navreo.ai/sihl\n\nAnd fair point on agencies — this is why we only get paid on booked buyer conversations, not activity.\n\nBest,\nJames",
  subseq:["Booked-call nurture","Pricing follow-up","Resource drip"]},
 {id:"r2", name:"David Okafor", title:"Founder", company:"Brightpath Logistics", email:"david@brightpathlog.com",
  campaign:"Sihl — UK Manufacturers", agent:"Sihl Setter", intent:"Asking about pricing", status:"needs_review", age:"18m",
  reply:"What does this cost roughly? We're comparing a couple of options this quarter.",
  thread:[{who:"us", head:"You · 5 days ago", body:"Hi David — are you open to intros to buyers actively sourcing logistics partners? We line up qualified buyer conversations for firms like Brightpath."},
          {who:"them", head:"David · 18 minutes ago", body:"What does this cost roughly? We're comparing a couple of options this quarter."}],
  draft:"Hi David,\n\nStraight answer: from £1,800/mo, and we only invoice on delivered buyer conversations — if none land, you pay nothing that month.\n\nHappy to walk you through it in 15 minutes if you're comparing options: cal.navreo.ai/sihl\n\nBest,\nJames",
  subseq:["Pricing follow-up","Booked-call nurture","Resource drip"]},
 {id:"r3", name:"Priya Nair", title:"VP Sales", company:"Cobalt Systems", email:"priya@cobaltsystems.io",
  campaign:"Navreo — Dev Agencies UK", agent:"Navreo Setter", intent:"Wants the resource", status:"needs_review", age:"41m",
  reply:"Sure, send it over.",
  thread:[{who:"us", head:"You · 2 days ago", body:"Hi Priya — we mapped the 214 UK companies actively hiring sales roles that fit Cobalt's ICP. Want the list?"},
          {who:"them", head:"Priya · 41 minutes ago", body:"Sure, send it over."}],
  draft:"Hi Priya,\n\nHere it is: navreo.ai/r/cobalt-hiring-map\n\nThe 30 with a Director+ sales hire open are flagged in column B — those tend to reply fastest. If you want us to run the outreach on the top tier, that's exactly what we do.\n\nBest,\nLilly",
  subseq:["Resource drip","Booked-call nurture"]},
 {id:"r4", name:"Marcus Webb", title:"MD", company:"Atlas Joinery", email:"marcus@atlasjoinery.co.uk",
  campaign:"Sihl — UK Manufacturers", agent:"Sihl Setter", intent:"Has a question", status:"needs_review", age:"1h",
  reply:"How is this different from just hiring an SDR ourselves?",
  thread:[{who:"us", head:"You · 6 days ago", body:"Hi Marcus — quick one: open to intros to buyers actively sourcing joinery and fit-out partners? We line up qualified buyer conversations for firms like Atlas."},
          {who:"them", head:"Marcus · 5 days ago", body:"Maybe. Who else have you done this for?"},
          {who:"us", head:"You · 5 days ago", body:"Mostly UK manufacturers — Sihl is the closest example, we book their buyer calls month in month out. Happy to share how it works."},
          {who:"them", head:"Marcus · 1 hour ago", body:"How is this different from just hiring an SDR ourselves?"}],
  draft:"Hi Marcus,\n\nAn SDR costs ~£45k loaded and takes 6 months to ramp. We turn on a working system in 2 weeks — list, copy, sending, replies — and you only pay on booked buyer conversations.\n\nIf the maths interests you, 15 minutes covers it: cal.navreo.ai/sihl\n\nBest,\nJames",
  subseq:["Booked-call nurture","Pricing follow-up","Resource drip"]},
 {id:"r5", name:"Elena Vasquez", title:"Director", company:"Northgate Consulting", email:"elena@northgateconsult.com",
  campaign:"Navreo — Dev Agencies UK", agent:"Navreo Setter", intent:"Not interested", status:"needs_review", age:"2h",
  reply:"Not for us right now, thanks.",
  thread:[{who:"us", head:"You · 4 days ago", body:"Hi Elena — we help consultancies keep a steady pipeline of qualified buyer conversations. Open to a look?"},
          {who:"them", head:"Elena · 2 hours ago", body:"Not for us right now, thanks."}],
  draft:"Hi Elena,\n\nUnderstood — thanks for letting me know. If pipeline becomes a priority later in the year, the door's open.\n\nBest,\nLilly",
  subseq:["Resource drip"]},
 {id:"r6", name:"Tom Hardwick", title:"Ops Director", company:"Ferrous Engineering", email:"tom@ferrouseng.co.uk",
  campaign:"KRG — Midlands Industrial", agent:null, intent:"Wants to book a call", status:"needs_review", age:"3h",
  reply:"Yes — can you do Thursday afternoon?",
  thread:[{who:"us", head:"You · 1 day ago", body:"Hi Tom — are you open to intros to buyers sourcing precision engineering right now? We line up qualified buyer conversations for firms like Ferrous."},
          {who:"them", head:"Tom · 3 hours ago", body:"Yes — can you do Thursday afternoon?"}],
  draft:"Hi Tom,\n\nThursday afternoon works — 2:00 or 3:30. Pick whichever suits: cal.navreo.ai/krg\n\nSpeak then,\nSam",
  subseq:["Booked-call nurture","Pricing follow-up"]},
 {id:"r7", name:"Jenny Lau", title:"Head of Growth", company:"Parkside Digital", email:"jenny@parksidedigital.co.uk",
  campaign:"Navreo — Dev Agencies UK", agent:"Navreo Setter", intent:"Wants the resource", status:"auto_sent", age:"5h", sentMeta:"Sent automatically · 12 minutes after their reply",
  reply:"Sounds useful — send the breakdown.",
  thread:[{who:"us", head:"You · 3 days ago", body:"Hi Jenny — we mapped the exact outbound campaigns we'd run for Parkside. Want the breakdown?"},
          {who:"them", head:"Jenny · 5 hours ago", body:"Sounds useful — send the breakdown."},
          {who:"us", head:"Navreo Setter (auto) · 5 hours ago", body:"Hi Jenny,\n\nHere's the breakdown: navreo.ai/r/parkside\n\nIt maps three campaigns with the exact copy we'd use. If you want the top one live within two weeks, that's what we do.\n\nBest,\nLilly"}],
  draft:null, subseq:[]}
];

/* Status lenses (owner ask): Needs review / Sent / Auto-sent / Dismissed / All. */
const LENSES = [
  { key: "needs_review", label: "Needs review" },
  { key: "sent", label: "Sent" },
  { key: "auto_sent", label: "Auto-sent" },
  { key: "dismissed", label: "Dismissed" },
  { key: "", label: "All" },
];
let lens = "needs_review";
let cur = null, gateChoice = null, edited = false, learnOn = true;
let advTimer = null;

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const $ = id => document.getElementById(id);
const rowsFor = k => k ? REPLIES.filter(r => r.status === k) : REPLIES.slice();
function note(msg) { const el = $("noteToast"); el.textContent = msg; el.classList.add("on"); setTimeout(() => el.classList.remove("on"), 1700); }

function renderPills() {
  $("fpills").innerHTML = LENSES.map(p => {
    const n = p.key ? rowsFor(p.key).length : REPLIES.length;
    return `<button class="fpill ${lens === p.key ? "on" : ""}" data-key="${p.key}" type="button">${p.label} <b>${n}</b></button>`;
  }).join("");
  $("fpills").querySelectorAll(".fpill").forEach(btn => {
    btn.addEventListener("click", () => { lens = btn.getAttribute("data-key"); renderList(); });
  });
}

/* ── List ── */
function statusPillHtml(r) {
  if (r.status === "auto_sent") return `<span class="pill auto">Auto-sent</span>`;
  if (r.status === "sent") return `<span class="pill donepill">Sent</span>`;
  if (r.status === "dismissed") return `<span class="pill dismissedpill">Dismissed</span>`;
  return "";
}
function renderList() {
  renderPills();
  const wrap = $("listScroll");
  wrap.innerHTML = "";
  const rows = rowsFor(lens);
  if (!rows.length) {
    const sent = rowsFor("sent").length, auto = rowsFor("auto_sent").length, dis = rowsFor("dismissed").length;
    wrap.innerHTML = lens === "needs_review"
      ? `<div class="empty-inline"><div class="big">Queue clear.</div><div class="sub">${sent} sent by you · ${auto} auto-sent · ${dis} dismissed.</div></div>`
      : `<div class="empty-inline"><div class="sub">Nothing here yet.</div></div>`;
    return;
  }
  rows.forEach(r => {
    const snip = r.status === "sent" && r._finalText ? `You: ${r._finalText.split("\n")[0]}`
      : r.status === "auto_sent" ? r.thread[r.thread.length-1].body.split("\n")[0]
      : r.reply;
    const el = document.createElement("div");
    el.className = "row";
    el.innerHTML = `
      <div class="row-1"><span class="row-name">${esc(r.name)}</span>
        ${r.agent ? `<span class="pill">${esc(r.agent)}</span>` : `<span class="pill noagent">No agent</span>`}
        ${statusPillHtml(r)}
        <span class="row-time">${esc(r.age)}</span></div>
      <div class="row-snip">${esc(snip)}</div>
      <div class="row-pills"><span class="pill">${esc(r.intent)}</span><span class="pill">${esc(r.campaign)}</span></div>`;
    el.addEventListener("click", () => openDetail(r));
    wrap.appendChild(el);
  });
}

/* ── Detail ── */
function openDetail(r) {
  cur = r; gateChoice = null; edited = false; learnOn = true;
  const actionable = r.status === "needs_review";
  const q = rowsFor("needs_review");
  const k = q.indexOf(r);
  $("detK").textContent = actionable ? `${k + 1} of ${q.length}`
    : (r.status === "auto_sent" ? "Auto-sent" : r.status === "sent" ? "Sent" : "Dismissed");
  const stripHtml = r.status === "sent" ? `<div class="sent-strip on">${esc(r._sentNote || "Sent by you · just now")}</div>`
    : r.status === "auto_sent" ? `<div class="sent-strip on">${esc(r.sentMeta)}</div>`
    : r.status === "dismissed" ? `<div class="sent-strip on neutral">Dismissed — nothing was sent; the lead stays in Smartlead.</div>`
    : `<div class="sent-strip" id="sentStrip"></div>`;
  const sentTextBlock = (r.status === "sent" && r._finalText) ? `
    <div class="draft-card"><div class="dc-label">Your reply</div><div class="dc-body">${esc(r._finalText)}</div></div>` : "";
  $("detScroll").innerHTML = `
    <div class="det-lead">
      <div class="dl-name">${esc(r.name)}</div>
      <div class="dl-role">${esc(r.title)} @ ${esc(r.company)}</div>
      <div class="dl-pills">
        <span class="pill">${esc(r.campaign)}</span>
        ${r.agent ? `<span class="pill">${esc(r.agent)}</span>` : `<span class="pill noagent">No agent</span>`}
        <span class="pill">${esc(r.intent)}</span>
      </div>
    </div>
    ${r.thread.map((m, i) => `
      <div class="tmsg ${(actionable && i === r.thread.length - 1) ? "latest" : ""}">
        <div class="tm-head">${esc(m.head)}</div><div class="tm-body">${esc(m.body)}</div>
      </div>`).join("")}
    ${actionable ? `
    <div class="draft-card">
      <div class="dc-label">Draft · ${esc(r.agent || "No agent")}<button class="dc-redraft" id="redraftBtn" type="button">Redraft</button></div>
      <div class="dc-body" id="dcBody">${esc(r.draft)}</div>
      <div class="dc-edit" id="dcEdit">
        <textarea id="dcTa"></textarea>
        <div class="learn-row" id="learnRow">
          <label><input type="checkbox" id="learnChk" checked>
            <span>Learn from this edit
              <div class="hint">Your rewrite becomes a standing rule for every future reply. Untick to keep it one-off.</div>
            </span>
          </label>
        </div>
      </div>
    </div>` : sentTextBlock}
    ${stripHtml}`;
  $("cockpit").style.display = actionable ? "block" : "none";
  if (actionable) resetCockpit(r);
  $("listScreen").classList.remove("on");
  $("detScreen").classList.add("on");
}

function resetCockpit(r) {
  // Panel fix (Dee): the client/campaign is restated INSIDE the cockpit, so it's
  // visible the instant the thumb is on Approve, however far the header scrolled.
  $("cpContext").textContent = `${r.name} · ${r.campaign}`;
  $("fuLauncher").textContent = "Follow-up: pick";
  $("fuLauncher").classList.remove("picked");
  // Panel fix (Rachel): the chips are on screen from the start - no reveal
  // tap. Picking one collapses them; the launcher reopens them.
  $("gateMini").classList.add("on");
  $("approveBtn").setAttribute("data-locked", "1");
  $("approveLbl").textContent = "Approve";
  setFill(0);
  $("cockpitHint").classList.remove("loud");
  $("cockpitHint").innerHTML = `Pick a follow-up track first <span class="why">(why?<span class="tip">Every approved reply needs an explicit follow-up decision - even "None" - so leads can't quietly fall through the cracks after a send.</span>)</span>`;
  $("gmChips").innerHTML = r.subseq.map(n => `<button class="gchip" data-name="${esc(n)}" type="button">${esc(n)}</button>`).join("")
    + `<button class="gchip none" data-name="" type="button">None</button>`;
  $("gmChips").querySelectorAll(".gchip").forEach(ch => {
    ch.addEventListener("click", () => {
      $("gmChips").querySelectorAll(".gchip").forEach(c => c.classList.remove("sel"));
      ch.classList.add("sel");
      const name = ch.getAttribute("data-name");
      gateChoice = name ? {choice:"push", name} : {choice:"none"};
      $("fuLauncher").textContent = name ? `Follow-up: ${name}` : "Follow-up: none";
      $("fuLauncher").classList.add("picked");
      $("approveBtn").removeAttribute("data-locked");
      $("approveLbl").textContent = name ? `Approve + ${name}` : "Approve — no follow-up";
      $("cockpitHint").classList.remove("loud");
      $("cockpitHint").textContent = "Hold Approve to send";
      setTimeout(() => $("gateMini").classList.remove("on"), 160);
    });
  });
}

$("fuLauncher").addEventListener("click", () => $("gateMini").classList.toggle("on"));

$("editBtn").addEventListener("click", () => {
  if (!cur || cur.status !== "needs_review") return;
  const body = $("dcBody"), wrap = $("dcEdit");
  if (!body || body.style.display === "none") return;
  body.style.display = "none"; wrap.style.display = "block";
  // Panel fix (Dee/Sam): editing starts from whatever text is on screen -
  // a redraft survives into edit mode instead of silently reverting.
  const ta = $("dcTa"); ta.value = cur._redraft || cur.draft; ta.focus();
  ta.addEventListener("input", () => {
    if (ta.value !== cur.draft) { edited = true; $("learnRow").style.display = "block"; }
  });
});

// Delegated: the Redraft button renders inside the draft card per reply.
document.addEventListener("click", e => {
  if (!e.target.closest || !e.target.closest("#redraftBtn")) return;
  if (!cur || cur.status !== "needs_review") return;
  const alt = cur.draft.replace(/^Hi /, "Hello ").replace("Best,", "Speak soon,");
  const body = $("dcBody"); const ta = $("dcTa");
  if (body && body.style.display !== "none") { body.textContent = alt; }
  else if (ta) { ta.value = alt; }
  cur._redraft = alt;
  note("Redrafted - a fresh variant from the same brain");
});

let lastDismissedP5 = null, dismissTimerP5 = null;
$("dismissBtn").addEventListener("click", () => {
  if (!cur || cur.status !== "needs_review") return;
  cur.status = "dismissed";        // optimistic: instant
  lastDismissedP5 = cur;
  // Consistency with P1/P3/P4 (panel: Marco/Dee/Rachel/Sam): a 5s Undo.
  $("dismissToast").classList.add("on");
  if (dismissTimerP5) clearTimeout(dismissTimerP5);
  dismissTimerP5 = setTimeout(() => $("dismissToast").classList.remove("on"), 5000);
  backToList();
});
$("dismissUndoBtn").addEventListener("click", () => {
  $("dismissToast").classList.remove("on");
  if (lastDismissedP5) { lastDismissedP5.status = "needs_review"; lastDismissedP5 = null; renderList(); note("Restored"); }
});
$("dismissOkBtn").addEventListener("click", () => $("dismissToast").classList.remove("on"));

/* Hold-to-send (panel-tuned): 450ms, and an early release DECAYS the fill
   instead of dumping it - press again quickly and you resume from where it
   was, so a jostled thumb doesn't pay the full price again (Marco's fix).
   A plain tap gets a loud response: the button shakes and the hint flares
   (Sam's fix). */
/* No requestAnimationFrame here: rAF stalls in throttled/unfocused panes.
   The fill animates via CSS width transitions; completion is a setTimeout. */
const HOLD_MS = 450;
let fillPct = 0;               // 0..1, tracked by timestamps
let holdTimer = null, holdStart = 0, holdBase = 0, holdFired = false;
let holdX0 = null, holdY0 = null;   // start point, for the drift veto
function setFill(p) {
  fillPct = Math.max(0, Math.min(1, p));
  const f = $("approveFill");
  f.style.transition = "none";
  f.style.width = (fillPct * 100) + "%";
}
function currentFillPct() {
  return holdTimer ? Math.min(1, holdBase + (Date.now() - holdStart) / HOLD_MS) : fillPct;
}
function startHold(e) {
  if (!cur || cur.status !== "needs_review") return;
  if ($("approveBtn").hasAttribute("data-locked")) {
    $("gateMini").classList.add("on");
    note("Pick a follow-up track first");
    return;
  }
  e.preventDefault();
  if (e.touches && e.touches[0]) { holdX0 = e.touches[0].clientX; holdY0 = e.touches[0].clientY; }
  else { holdX0 = null; holdY0 = null; }
  holdFired = false; holdStart = Date.now(); holdBase = fillPct;
  const remaining = Math.max(0, (1 - holdBase) * HOLD_MS);
  const fill = $("approveFill");
  fill.style.transition = `width ${remaining}ms linear`;
  fill.style.width = "100%";
  holdTimer = setTimeout(() => { holdFired = true; holdTimer = null; fillPct = 0; fireApprove(); }, remaining);
}
/* Drift veto (panel fix: Rachel/Dee/Sam) - a touch that slides past 12px is
   a jostle/pocket-brush, not a deliberate hold: hard-cancel to ZERO (no decay
   resume) so accidental contacts can't bank partial progress toward a send. */
function holdDrift(e) {
  if (!holdTimer || holdX0 == null || !e.touches || !e.touches[0]) return;
  const dx = e.touches[0].clientX - holdX0, dy = e.touches[0].clientY - holdY0;
  if (Math.hypot(dx, dy) > 12) {
    clearTimeout(holdTimer); holdTimer = null;
    setFill(0);
    const hint = $("cockpitHint");
    hint.textContent = "Hold still to send"; hint.classList.add("loud");
    setTimeout(() => hint.classList.remove("loud"), 1200);
  }
}
function cancelHold() {
  if (!holdTimer) return;
  fillPct = currentFillPct();
  clearTimeout(holdTimer); holdTimer = null;
  if (holdFired) return;
  const heldMs = Date.now() - holdStart;
  if (heldMs < 250 && holdBase === 0) {
    // Loud "this needs a hold" response for a plain tap (panel fix: Sam).
    const btn = $("approveBtn");
    btn.classList.remove("shake"); void btn.offsetWidth; btn.classList.add("shake");
    const hint = $("cockpitHint");
    hint.textContent = "Hold to send";
    hint.classList.add("loud");
    setTimeout(() => hint.classList.remove("loud"), 1200);
  }
  // Early release DECAYS instead of dumping (panel fix: Marco) - re-press
  // within the decay resumes from wherever the fill is.
  const fill = $("approveFill");
  fill.style.transition = "width 600ms ease-out";
  fill.style.width = "0%";
  const decayStart = Date.now(), decayFrom = fillPct;
  const decayTick = setInterval(() => {
    if (holdTimer) { clearInterval(decayTick); return; }   // re-pressed
    fillPct = Math.max(0, decayFrom * (1 - (Date.now() - decayStart) / 600));
    if (fillPct <= 0) clearInterval(decayTick);
  }, 50);
}
$("approveBtn").addEventListener("touchstart", startHold, {passive:false});
$("approveBtn").addEventListener("touchmove", holdDrift, {passive:true});
$("approveBtn").addEventListener("touchend", cancelHold);
$("approveBtn").addEventListener("touchcancel", cancelHold);
$("approveBtn").addEventListener("mousedown", startHold);
$("approveBtn").addEventListener("mouseup", cancelHold);
$("approveBtn").addEventListener("mouseleave", cancelHold);

function fireApprove() {
  const r = cur; if (!r || !gateChoice) return;
  setFill(0);
  const ta = $("dcTa");
  const finalText = (edited && ta) ? ta.value : (r._redraft || r.draft);
  const wasEdited = edited && finalText !== r.draft;
  const learnChk = $("learnChk");
  const keepLesson = wasEdited && (!learnChk || learnChk.checked);
  const track = gateChoice.choice === "push" ? gateChoice.name : null;
  r.status = "sent";
  r._finalText = finalText;
  r._sentNote = `Sent by you · just now${track ? ` · ${track}` : " · No follow-up"}`;
  const strip = $("sentStrip");
  if (strip) { strip.textContent = `Sent to ${r.name.split(" ")[0]} · ${track || "No follow-up"}`; strip.classList.add("on"); }
  if (keepLesson) {
    $("lessonRule").textContent = `Learned: ${finalText.length < r.draft.length ? "Keep replies shorter and more direct" : "Prefer the wording you rewrote for this kind of reply"}. This now applies to every future reply from this agent.`;
    $("lessonToast").classList.add("on");
  }
  // Panel fix (Yuki): the advance is announced and cancellable - Back keeps
  // you where you are; nothing moves silently.
  const next = rowsFor("needs_review")[0];
  if (next) {
    note(`Next: ${next.name} — tap Back to stay`);
    advTimer = setTimeout(() => { advTimer = null; openDetail(next); }, 1600);
  } else {
    advTimer = setTimeout(() => { advTimer = null; backToList(); }, 1100);
  }
}

function backToList() {
  if (advTimer) { clearTimeout(advTimer); advTimer = null; }
  $("detScreen").classList.remove("on");
  $("listScreen").classList.add("on");
  renderList();
}
$("backBtn").addEventListener("click", backToList);
$("lessonUndoBtn").addEventListener("click", () => {
  $("lessonToast").classList.remove("on");
  note("Undone - the agent kept nothing from that edit");
});
$("lessonOkBtn").addEventListener("click", () => $("lessonToast").classList.remove("on"));

renderList();
</script>
</body>
</html>

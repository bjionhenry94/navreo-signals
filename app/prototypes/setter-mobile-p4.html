<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Setter Mobile P4 — Notification-first</title>
<style>
@font-face { font-family: "Acid Grotesk"; src: url("../fonts/AcidGrotesk-Normal.otf") format("opentype"); font-weight: 400; font-style: normal; font-display: swap; }
:root {
  --orange:#FF4D00; --orange-600:#DB4100; --orange-700:#A83100; --orange-100:#FFE4D6;
  --ink:#14110E; --ink-2:#3A332C; --ink-3:#6B6055; --brown-300:#C0B0A0; --brown-400:#A89684;
  --cream:#F9F0E7; --cream-50:#FCF7F1; --bg:#FFFFFF; --bg-sunken:#F7F7F6; --card:#FFFFFF;
  --line:#ECECEA; --line-2:#DDDDDA;
  --green:#2E7D5B; --green-bg:#E2F1E9; --green-line:#C4E2D3;
  --amber:#8F6600; --amber-bg:#F8EAC4; --amber-line:#EBD79E;
  --font-sans:"DM Sans","Helvetica Neue",system-ui,sans-serif;
  --font-display:"Acid Grotesk","DM Sans",sans-serif;
  --radius:12px; --focus:0 0 0 3px rgba(255,77,0,.32);
}
* { box-sizing:border-box; margin:0; padding:0; }
html,body { height:100%; }
body {
  font-family:var(--font-sans); background:var(--bg); color:var(--ink);
  line-height:1.45; letter-spacing:-0.015em; -webkit-font-smoothing:antialiased;
  max-width:480px; margin:0 auto; height:100dvh; overflow:hidden; position:relative;
}
button { font-family:var(--font-sans); cursor:pointer; }
.proto-banner {
  text-align:center; font-size:11px; color:var(--ink-3);
  padding:6px 12px; border-bottom:1px solid var(--line); background:var(--bg-sunken);
}
.screen { position:absolute; inset:0; top:29px; display:none; flex-direction:column; overflow:hidden; background:var(--bg); }
.screen.on { display:flex; }

/* ── Screen 1: the stack ── */
.stack-head { padding:18px 20px 0; }
.sh-waiting { font-family:var(--font-display); font-weight:400; font-size:30px; letter-spacing:-0.03em; }
/* Status lenses (owner ask): same pills as the desktop setter, live counts. */
.fpills {
  display:flex; gap:8px; overflow-x:auto; -webkit-overflow-scrolling:touch;
  padding:10px 20px 6px; scrollbar-width:none;
}
.fpills::-webkit-scrollbar { display:none; }
.fpill {
  flex-shrink:0; min-height:40px; padding:0 14px; border-radius:999px;
  border:1px solid var(--line-2); background:var(--card); color:var(--ink-2);
  font:600 12.5px var(--font-sans); display:inline-flex; align-items:center; gap:6px;
}
.fpill b { font-weight:700; font-variant-numeric:tabular-nums; color:var(--ink-3); }
.fpill.on { background:var(--ink); border-color:var(--ink); color:var(--cream-50); }
.fpill.on b { color:var(--cream-50); opacity:.75; }
.stack-scroll { flex:1; overflow-y:auto; padding:6px 14px calc(20px + env(safe-area-inset-bottom)); }
.push-card {
  border:1px solid var(--line); border-radius:14px; background:var(--card);
  padding:12px 14px; margin-bottom:10px; cursor:pointer;
  box-shadow:0 2px 10px rgba(20,17,14,.05);
}
.push-card:active { background:var(--bg-sunken); }
.pc-top { display:flex; align-items:center; gap:8px; margin-bottom:7px; }
.pc-glyph {
  width:22px; height:22px; border-radius:6px; background:var(--ink); color:var(--cream);
  font-family:var(--font-display); font-size:13px; display:flex; align-items:center; justify-content:center;
}
.pc-app { font-size:11.5px; font-weight:600; color:var(--ink-3); }
.pc-age { margin-left:auto; font-size:11px; color:var(--ink-3); }
.pc-line { font-size:14px; font-weight:600; }
.pc-line .intent { color:var(--orange-700); }
.pc-preview { font-size:12.5px; color:var(--ink-2); margin-top:3px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.pc-meta { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
.pill {
  display:inline-flex; align-items:center; font-size:10.5px; font-weight:600;
  padding:2px 8px; border-radius:999px; background:var(--bg-sunken); color:var(--ink-2); border:1px solid var(--line);
}
.pill.noagent { background:transparent; border-style:dashed; color:var(--ink-3); }
.receipt {
  border:1px solid var(--green-line); background:var(--green-bg); border-radius:14px;
  padding:12px 14px; margin-bottom:10px; cursor:pointer;
}
.receipt.neutral { border-color:var(--line); background:var(--bg-sunken); }
.receipt .r-head { font-size:12.5px; font-weight:600; color:#195C3F; }
.receipt.neutral .r-head { color:var(--ink-2); }
.receipt .r-sub { font-size:11.5px; color:var(--ink-2); margin-top:2px; }
.receipt .r-body { display:none; margin-top:8px; font-size:12px; color:var(--ink-2); white-space:pre-wrap; line-height:1.5; }
.receipt.open .r-body { display:block; }
.allcaught { text-align:center; padding:46px 30px 16px; }
.ac-big { font-family:var(--font-display); font-size:26px; letter-spacing:-0.03em; }
.ac-sub { font-size:13px; color:var(--ink-3); margin-top:6px; }

/* ── Screen 2: the approve-card ── */
.ac-head { display:flex; align-items:center; gap:10px; padding:12px 16px 6px; }
.back-btn {
  min-width:44px; min-height:44px; border:none; background:none; color:var(--ink-2);
  font-size:22px; display:flex; align-items:center; justify-content:flex-start;
}
.ac-waiting { font-size:12.5px; color:var(--ink-3); margin-left:auto; }
.ac-scroll { flex:1; overflow-y:auto; padding:2px 18px 12px; }
.ac-lead { margin-bottom:10px; }
.ac-name { font-size:18px; font-weight:600; }
.ac-role { font-size:12.5px; color:var(--ink-2); margin-top:1px; }
.ac-pills { display:flex; gap:6px; margin-top:7px; flex-wrap:wrap; }
.status-strip {
  border:1px solid var(--green-line); background:var(--green-bg); color:#195C3F;
  border-radius:10px; padding:9px 12px; font-size:12.5px; font-weight:600; margin-bottom:10px;
}
.status-strip.neutral { border-color:var(--line); background:var(--bg-sunken); color:var(--ink-2); }
.their-reply {
  border:1px solid var(--line); border-left:3px solid var(--ink); border-radius:10px;
  padding:12px 14px; margin-bottom:8px;
}
.tr-head { font-size:11.5px; font-weight:600; color:var(--ink-3); margin-bottom:4px; }
.tr-body { font-size:16px; line-height:1.5; }
.thread-x summary { list-style:none; font-size:12.5px; color:var(--ink-3); padding:7px 2px; min-height:36px; display:flex; align-items:center; gap:6px; cursor:pointer; }
.thread-x summary::-webkit-details-marker { display:none; }
.thread-x .chev { font-size:10px; transition:transform .2s; }
.thread-x[open] .chev { transform:rotate(180deg); }
.tmsg { margin-bottom:8px; padding:8px 11px; border-radius:8px; background:var(--bg-sunken); }
.tmsg .tm-head { font-size:11px; font-weight:600; color:var(--ink-3); margin-bottom:3px; }
.tmsg .tm-body { font-size:12.5px; color:var(--ink-2); line-height:1.5; white-space:pre-wrap; }
.draft-card { border:1px solid var(--line-2); border-radius:12px; margin-top:8px; overflow:hidden; }
.dc-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-3); padding:10px 14px 0; }
.dc-body { font-size:13.5px; line-height:1.55; padding:7px 14px 12px; white-space:pre-wrap; }
.dc-edit { display:none; padding:7px 14px 12px; }
.dc-edit textarea {
  width:100%; min-height:150px; border:1px solid var(--line-2); border-radius:8px; padding:10px 11px;
  font:400 13.5px/1.55 var(--font-sans); color:var(--ink); resize:vertical;
}
.dc-edit textarea:focus { outline:none; box-shadow:var(--focus); }
.learn-row { display:none; margin-top:8px; }
.learn-row label { display:flex; gap:8px; align-items:flex-start; font-size:12px; font-weight:500; color:var(--ink-2); cursor:pointer; }
.learn-row input { margin-top:2px; width:16px; height:16px; }
.learn-row .hint { font-size:11px; color:var(--ink-3); margin-top:3px; line-height:1.45; }

/* gate row — ALWAYS visible on the approve-card (panel fix: no hidden reveal) */
.gate-wrap { margin-top:12px; }
.gw-label { font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:.05em; color:var(--ink-3); margin-bottom:8px; }
.gw-chips { display:flex; gap:8px; flex-wrap:wrap; }
.gchip {
  min-height:44px; padding:0 15px; border-radius:999px; border:1px solid var(--line-2);
  background:var(--card); color:var(--ink-2); font-size:13px; font-weight:600;
}
.gchip.none { border-style:dashed; }
.gchip.sel { background:var(--orange); border-color:var(--orange); color:#fff; }
.gw-hint { font-size:12px; color:var(--ink-3); margin-top:8px; }
.gw-hint .why { border-bottom:1px dotted var(--ink-3); position:relative; cursor:help; }
.gw-hint .why .tip {
  display:none; position:absolute; bottom:20px; left:0; width:230px; background:var(--ink);
  color:var(--cream-50); font-size:11.5px; line-height:1.5; padding:9px 11px; border-radius:8px; z-index:20;
}
.gw-hint .why:active .tip, .gw-hint .why:hover .tip { display:block; }

/* the three verbs */
.verbs { flex-shrink:0; padding:10px 18px calc(14px + env(safe-area-inset-bottom)); border-top:1px solid var(--line); background:var(--bg); }
.verb {
  width:100%; min-height:52px; border-radius:12px; font-size:15px; font-weight:600;
  border:1px solid var(--line-2); background:var(--card); color:var(--ink-2); margin-bottom:8px;
}
.verb:active { background:var(--bg-sunken); }
.verb.primary { background:var(--ink); border-color:var(--ink); color:var(--cream-50); position:relative; overflow:hidden; }
.verb.primary:active { background:#000; }
.verb.primary[disabled] { opacity:.45; }
.verb.primary .vfill { position:absolute; left:0; top:0; bottom:0; width:0%; background:var(--orange); z-index:0; }
.verb.primary .vlbl { position:relative; z-index:1; }
@keyframes holdshake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
.verb.primary.shake { animation:holdshake .3s ease 2; }
.send-hint { text-align:center; font-size:11px; color:var(--ink-3); min-height:15px; margin:-2px 0 6px; transition:color .15s; }
.send-hint.loud { color:var(--orange-700); font-weight:700; }
.stay-quiet {
  width:100%; min-height:40px; border:none; background:none; color:var(--ink-3);
  font-size:12.5px; text-decoration:underline; text-underline-offset:2px; margin-top:6px;
}
.dismiss-quiet {
  width:100%; min-height:44px; border:none; background:none; color:var(--ink-3);
  font-size:12.5px; text-decoration:underline; text-underline-offset:2px;
}
.dismiss-sub { text-align:center; font-size:10.5px; color:var(--brown-400); margin-top:2px; }

/* sent confirmation */
.confirm {
  position:absolute; inset:0; background:var(--bg); z-index:30; display:none;
  align-items:center; justify-content:center; flex-direction:column; gap:12px; text-align:center; padding:0 30px;
}
.confirm.on { display:flex; }
.cf-check { width:52px; height:52px; border-radius:50%; background:var(--green-bg); position:relative; }
.cf-check::after {
  content:""; position:absolute; left:17px; top:13px; width:13px; height:23px;
  border:solid var(--green); border-width:0 3px 3px 0; transform:rotate(45deg);
}
.cf-line { font-size:16px; font-weight:600; }
.cf-sub { font-size:12.5px; color:var(--ink-3); }
.toast {
  position:fixed; left:50%; transform:translateX(-50%) translateY(12px); bottom:calc(20px + env(safe-area-inset-bottom));
  z-index:60; width:min(440px,92vw); background:var(--card); border:1px solid var(--line); border-radius:12px;
  box-shadow:0 10px 30px rgba(20,17,14,.18); padding:12px 14px; opacity:0; pointer-events:none;
  transition:opacity .2s, transform .2s;
}
.toast.on { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
.toast .t-head { font-size:12.5px; font-weight:600; }
.toast .t-rule { font-size:12.5px; color:var(--ink-2); margin:4px 0 9px; line-height:1.5; }
.toast .t-actions { display:flex; gap:8px; }
.toast .tbtn { min-height:38px; font-size:12.5px; border-radius:10px; border:1px solid var(--line-2); background:var(--card); color:var(--ink-2); padding:0 12px; font-weight:600; }
.note-toast {
  /* Sits a band above the button toasts so it can never bury Undo/Keep. */
  position:fixed; left:50%; transform:translateX(-50%); bottom:calc(110px + env(safe-area-inset-bottom));
  background:var(--ink); color:var(--cream-50); font-size:12.5px; font-weight:500;
  padding:9px 16px; border-radius:999px; opacity:0; pointer-events:none; transition:opacity .2s; z-index:60;
}
.note-toast.on { opacity:1; }
</style>
</head>
<body>
<div class="proto-banner">Prototype P4 · Notification-first · mock data — nothing sends</div>

<!-- Screen 1: the stack -->
<div class="screen on" id="stackScreen">
  <div class="stack-head">
    <div class="sh-waiting" id="waitingCount"></div>
  </div>
  <div class="fpills" id="fpills"></div>
  <div class="stack-scroll" id="stackScroll"></div>
</div>

<!-- Screen 2: the approve-card -->
<div class="screen" id="cardScreen">
  <div class="ac-head">
    <button class="back-btn" id="backBtn" type="button" aria-label="Back">&#8249;</button>
    <span class="ac-waiting" id="moreWaiting"></span>
  </div>
  <div class="ac-scroll" id="cardBody"></div>
  <div class="verbs" id="verbs"></div>
  <div class="confirm" id="confirm">
    <div class="cf-check"></div>
    <div class="cf-line" id="cfLine"></div>
    <div class="cf-sub" id="cfSub"></div>
    <button class="verb primary" id="cfNextBtn" type="button" style="max-width:280px"><span class="vlbl" id="cfNextLbl">Next reply</span></button>
    <button class="stay-quiet" id="cfStayBtn" type="button" style="max-width:280px">Stay here</button>
  </div>
</div>

<div class="toast" id="dismissToast">
  <div class="t-head">Dismissed</div>
  <div class="t-rule">Removed from this queue only. Nothing was sent and the lead stays in Smartlead.</div>
  <div class="t-actions">
    <button class="tbtn" id="dismissUndoBtn" type="button">Undo</button>
    <button class="tbtn" id="dismissOkBtn" type="button">OK</button>
  </div>
</div>
<div class="toast" id="lessonToast">
  <div class="t-head">The agent learned from your edit</div>
  <div class="t-rule" id="lessonRule"></div>
  <div class="t-actions">
    <button class="tbtn" id="lessonUndoBtn" type="button">Undo - forget this</button>
    <button class="tbtn" id="lessonOkBtn" type="button">Keep it</button>
  </div>
</div>
<div class="note-toast" id="noteToast"></div>

<script>
"use strict";
const REPLIES = [
 {id:"r1", name:"Sarah Mitchell", title:"COO", company:"Meridian Fabrication", email:"sarah@meridianfab.co.uk",

 {id:"r3", name:"Priya Nair", title:"VP Sales", company:"Cobalt Systems", email:"priya@cobaltsystems.io",

  reply:"Yes — can you do Thursday afternoon?",
  thread:[{who:"us", head:"You · 1 day ago", body:"Hi Tom — are you open to intros to buyers sourcing precision engineering right now? We line up qualified buyer conversations for firms like Ferrous."},
          {who:"them", head:"Tom · 3 hours ago", body:"Yes — can you do Thursday afternoon?"}],
  draft:"Hi Tom,\n\nThursday afternoon works — 2:00 or 3:30. Pick whichever suits: cal.navreo.ai/krg\n\nSpeak then,\nSam",
  subseq:["Booked-call nurture","Pricing follow-up"]},
 {id:"r7", name:"Jenny Lau", title:"Head of Growth", company:"Parkside Digital", email:"jenny@parksidedigital.co.uk",
  campaign:"Navreo — Dev Agencies UK", agent:"Navreo Setter", intent:"Wants the resource", status:"auto_sent", age:"5h", sentMeta:"Sent automatically · 12 minutes after their reply",
  reply:"Sounds useful — send the breakdown.",
  thread:[{who:"us", head:"You · 3 days ago", body:"Hi Jenny — we mapped the exact outbound campaigns we'd run for Parkside. Want the breakdown?"},
          {who:"them", head:"Jenny · 5 hours ago", body:"Sounds useful — send the breakdown."},
          {who:"us", head:"Navreo Setter (auto) · 5 hours ago", body:"Hi Jenny,\n\nHere's the breakdown: navreo.ai/r/parkside\n\nIt maps three campaigns with the exact copy we'd use. If you want the top one live within two weeks, that's what we do.\n\nBest,\nLilly"}],
  draft:null, subseq:[]}
];

/* Status lenses (owner ask): Needs review / Sent / Auto-sent / Dismissed / All. */
const LENSES = [
  { key: "needs_review", label: "Needs review" },
  { key: "sent", label: "Sent" },
  { key: "auto_sent", label: "Auto-sent" },
  { key: "dismissed", label: "Dismissed" },
  { key: "", label: "All" },
];
let lens = "needs_review";
let cur = null;
let gateChoice = null, edited = false, learnOn = true;
let lastDismissed = null, dismissTimer = null, cfTimer = null;

const esc = s => String(s == null ? "" : s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const $ = id => document.getElementById(id);
const rowsFor = k => k ? REPLIES.filter(r => r.status === k) : REPLIES.slice();
function note(msg) { const el = $("noteToast"); el.textContent = msg; el.classList.add("on"); setTimeout(() => el.classList.remove("on"), 1600); }

function renderPills() {
  $("fpills").innerHTML = LENSES.map(p => {
    const n = p.key ? rowsFor(p.key).length : REPLIES.length;
    return `<button class="fpill ${lens === p.key ? "on" : ""}" data-key="${p.key}" type="button">${p.label} <b>${n}</b></button>`;
  }).join("");
  $("fpills").querySelectorAll(".fpill").forEach(btn => {
    btn.addEventListener("click", () => { lens = btn.getAttribute("data-key"); renderStack(); });
  });
}

/* ── Screen 1 ── */
function pushCardHtml(r) {
  return `
    <div class="pc-top"><div class="pc-glyph">N</div><div class="pc-app">Navreo Setter</div><div class="pc-age">${esc(r.age)}</div></div>
    <div class="pc-line">${esc(r.name)} replied — <span class="intent">${esc(r.intent)}</span></div>
    <div class="pc-preview">${esc(r.reply)}</div>
    <div class="pc-meta"><span class="pill">${esc(r.campaign)}</span>${r.agent ? `<span class="pill">${esc(r.agent)}</span>` : `<span class="pill noagent">No agent</span>`}</div>`;
}
function receiptHtml(r) {
  if (r.status === "sent") return `
    <div class="r-head">Sent to ${esc(r.name)}, ${esc(r.company)}</div>
    <div class="r-sub">${esc(r._sentNote || "Sent by you · just now")} · tap to view</div>
    <div class="r-body">${esc(r._finalText || "")}</div>`;
  if (r.status === "auto_sent") return `
    <div class="r-head">Handled for you — ${esc(r.name)}, ${esc(r.company)}</div>
    <div class="r-sub">${esc(r.sentMeta)} · tap to view</div>
    <div class="r-body">${esc(r.thread[r.thread.length-1].body)}</div>`;
  return `
    <div class="r-head">Dismissed — ${esc(r.name)}, ${esc(r.company)}</div>
    <div class="r-sub">Nothing was sent; the lead stays in Smartlead.</div>
    <div class="r-body">${esc(r.reply)}</div>`;
}
function renderStack() {
  const nr = rowsFor("needs_review").length;
  $("waitingCount").textContent = nr ? `${nr} waiting` : "All caught up.";
  renderPills();
  const wrap = $("stackScroll");
  wrap.innerHTML = "";
  const rows = rowsFor(lens);
  if (!rows.length) {
    const done = document.createElement("div");
    done.className = "allcaught";
    done.innerHTML = lens === "needs_review"
      ? `<div class="ac-big">All caught up.</div><div class="ac-sub">Every waiting reply is handled. New ones will land here.</div>`
      : `<div class="ac-sub">Nothing here yet.</div>`;
    wrap.appendChild(done);
    return;
  }
  rows.forEach(r => {
    const el = document.createElement("div");
    if (r.status === "needs_review") {
      el.className = "push-card";
      el.innerHTML = pushCardHtml(r);
      el.addEventListener("click", () => openCard(r));
    } else {
      el.className = "receipt" + (r.status === "dismissed" ? " neutral" : "");
      el.innerHTML = receiptHtml(r);
      el.addEventListener("click", () => el.classList.toggle("open"));
    }
    wrap.appendChild(el);
  });
}

/* ── Screen 2 ── */
function openCard(r) {
  cur = r; gateChoice = null; edited = false; learnOn = true;
  $("moreWaiting").textContent = `${rowsFor("needs_review").length - 1} more waiting`;
  const lastThem = r.thread.filter(m => m.who === "them").slice(-1)[0];
  // Panel fixes: thread OPEN by default; gate chips ALWAYS visible (no hidden reveal).
  $("cardBody").innerHTML = `
    <div class="ac-lead">
      <div class="ac-name">${esc(r.name)}</div>
      <div class="ac-role">${esc(r.title)} @ ${esc(r.company)}</div>
      <div class="ac-pills">
        <span class="pill">${esc(r.campaign)}</span>
        ${r.agent ? `<span class="pill">${esc(r.agent)}</span>` : `<span class="pill noagent">No agent</span>`}
      </div>
    </div>
    <div class="their-reply">
      <div class="tr-head">${esc(lastThem.head)}</div>
      <div class="tr-body">${esc(r.reply)}</div>
    </div>
    <details class="thread-x" open>
      <summary><span class="chev">&#9662;</span> Thread (${r.thread.length})</summary>
      <div>${r.thread.map(m => `<div class="tmsg"><div class="tm-head">${esc(m.head)}</div><div class="tm-body">${esc(m.body)}</div></div>`).join("")}</div>
    </details>
    <div class="draft-card">
      <div class="dc-label">Draft · ${esc(r.agent || "No agent")}</div>
      <div class="dc-body" id="dcBody">${esc(r.draft)}</div>
      <div class="dc-edit" id="dcEdit">
        <textarea id="dcTa"></textarea>
        <div class="learn-row" id="learnRow">
          <label><input type="checkbox" id="learnChk" checked>
            <span>Learn from this edit
              <div class="hint">Your rewrite becomes a standing rule for every future reply. Untick to keep it one-off.</div>
            </span>
          </label>
        </div>
      </div>
    </div>
    <div class="gate-wrap">
      <div class="gw-label">Follow-up after this send</div>
      <div class="gw-chips" id="gwChips">${r.subseq.map(n => `<button class="gchip" data-name="${esc(n)}" type="button">${esc(n)}</button>`).join("")}<button class="gchip none" data-name="" type="button">None</button></div>
      <div class="gw-hint" id="gwHint">Pick a follow-up track first
        <span class="why">(why?<span class="tip">Every approved reply needs an explicit follow-up decision - even "None" - so leads can't quietly fall through the cracks after a send.</span>)</span>
      </div>
    </div>`;
  $("verbs").innerHTML = `
    <button class="verb primary" id="sendBtn" type="button" disabled><span class="vfill" id="sendFill"></span><span class="vlbl" id="sendLbl">Send</span></button>
    <div class="send-hint" id="sendHint"></div>
    <button class="verb" id="editBtn" type="button">Edit</button>
    <button class="verb" id="laterBtn" type="button">Later</button>
    <button class="dismiss-quiet" id="dismissBtn" type="button">Dismiss</button>
    <div class="dismiss-sub">Removes it from this queue only. Nothing is sent and the lead stays in Smartlead.</div>`;
  $("confirm").classList.remove("on");
  wireCard(r);
  $("stackScreen").classList.remove("on");
  $("cardScreen").classList.add("on");
}

function wireCard(r) {
  $("gwChips").querySelectorAll(".gchip").forEach(ch => {
    ch.addEventListener("click", () => {
      $("gwChips").querySelectorAll(".gchip").forEach(c => c.classList.remove("sel"));
      ch.classList.add("sel");
      const name = ch.getAttribute("data-name");
      gateChoice = name ? {choice:"push", name} : {choice:"none"};
      const btn = $("sendBtn");
      btn.disabled = false;
      $("sendLbl").textContent = name ? `Send + ${name}` : "Send — no follow-up";
      $("gwHint").style.display = "none";
      $("sendHint").textContent = "Hold to send";   // the gesture is announced, not discovered
    });
  });
  $("editBtn").addEventListener("click", () => {
    $("dcBody").style.display = "none";
    $("dcEdit").style.display = "block";
    const ta = $("dcTa"); ta.value = r.draft; ta.focus();
    ta.addEventListener("input", () => {
      if (ta.value !== r.draft) { edited = true; $("learnRow").style.display = "block"; }
    });
  });
  // Panel fixes (Sam/Yuki): 450ms press-and-hold with a visible fill, a
  // movement veto (a touch that drifts >12px cancels - a pocketing brush
  // can't ride it out), and a loud shake + hint flare on a too-short press.
  let holdT = null, holdOk = false, holdStartAt = 0, touchX0 = null, touchY0 = null;
  const HOLD_MS = 450;
  const startHold = e => {
    if (!gateChoice || $("sendBtn").disabled) return;
    e.preventDefault();
    if (e.touches && e.touches[0]) { touchX0 = e.touches[0].clientX; touchY0 = e.touches[0].clientY; }
    holdOk = false; holdStartAt = Date.now();
    const fill = $("sendFill");
    fill.style.transition = `width ${HOLD_MS}ms linear`;
    fill.style.width = "100%";
    holdT = setTimeout(() => { holdOk = true; holdT = null; doSend(r); }, HOLD_MS);
  };
  const cancelHold = () => {
    if (!holdT) return;
    clearTimeout(holdT); holdT = null;
    if (holdOk) return;
    if (Date.now() - holdStartAt < 250) {
      const btn = $("sendBtn");
      btn.classList.remove("shake"); void btn.offsetWidth; btn.classList.add("shake");
      const hint = $("sendHint");
      hint.textContent = "Hold to send";
      hint.classList.add("loud");
      setTimeout(() => hint.classList.remove("loud"), 1200);
    }
    const fill = $("sendFill");
    fill.style.transition = "width 150ms ease";
    fill.style.width = "0%";
  };
  const driftCheck = e => {
    if (!holdT || touchX0 == null || !e.touches || !e.touches[0]) return;
    const dx = e.touches[0].clientX - touchX0, dy = e.touches[0].clientY - touchY0;
    if (Math.hypot(dx, dy) > 12) cancelHold();
  };
  $("sendBtn").addEventListener("touchstart", startHold, {passive:false});
  $("sendBtn").addEventListener("touchmove", driftCheck, {passive:true});
  $("sendBtn").addEventListener("touchend", cancelHold);
  $("sendBtn").addEventListener("touchcancel", cancelHold);
  $("sendBtn").addEventListener("mousedown", startHold);
  $("sendBtn").addEventListener("mouseup", cancelHold);
  $("sendBtn").addEventListener("mouseleave", cancelHold);
  $("laterBtn").addEventListener("click", () => {
    const i = REPLIES.indexOf(r);
    if (i > -1) { REPLIES.push(REPLIES.splice(i, 1)[0]); }   // to the bottom of the stack
    backToStack();
    note("Moved to the bottom of the stack");
  });
  $("dismissBtn").addEventListener("click", () => {
    r.status = "dismissed";        // optimistic: instant
    lastDismissed = r;
    // Panel fix (Dee): the dismiss is recoverable for a few seconds.
    $("dismissToast").classList.add("on");
    if (dismissTimer) clearTimeout(dismissTimer);
    dismissTimer = setTimeout(() => $("dismissToast").classList.remove("on"), 5000);
    backToStack();
  });
}

function doSend(r) {
  const ta = $("dcTa");
  const finalText = (edited && ta) ? ta.value : r.draft;
  const wasEdited = edited && finalText !== r.draft;
  const learnChk = $("learnChk");
  const keepLesson = wasEdited && learnOn && (!learnChk || learnChk.checked);
  const track = gateChoice.choice === "push" ? gateChoice.name : null;
  $("cfLine").textContent = `Sent to ${r.name.split(" ")[0]}`;
  $("cfSub").textContent = track ? `Follow-up: ${track}` : "No follow-up";
  $("confirm").classList.add("on");
  r.status = "sent";
  r._finalText = finalText;
  r._sentNote = `Sent by you · just now${track ? ` · ${track}` : " · No follow-up"}`;
  if (keepLesson) {
    $("lessonRule").textContent = `Learned: ${finalText.length < r.draft.length ? "Keep replies shorter and more direct" : "Prefer the wording you rewrote for this kind of reply"}. This now applies to every future reply from this agent.`;
    $("lessonToast").classList.add("on");
  }
  // Panel resolution (Rachel vs Yuki): the advance is AUTOMATIC for burst
  // speed, but announced with a visible countdown and a one-tap Stay that
  // cancels it - the app never moves on silently or uncancellably.
  const remaining = rowsFor("needs_review").length;
  const goNext = () => {
    if (cfTimer) { clearTimeout(cfTimer); cfTimer = null; }
    const next = rowsFor("needs_review")[0];
    if (next) openCard(next); else backToStack();
  };
  const nextBtn = $("cfNextBtn"), stayBtn = $("cfStayBtn");
  const freshNext = nextBtn.cloneNode(true);
  nextBtn.parentNode.replaceChild(freshNext, nextBtn);
  const freshStay = stayBtn.cloneNode(true);
  stayBtn.parentNode.replaceChild(freshStay, stayBtn);
  freshNext.addEventListener("click", goNext);
  if (remaining) {
    let secs = 2;
    $("cfNextLbl").textContent = `Next reply (${remaining} waiting) · auto in ${secs}s`;
    freshStay.style.display = "";
    const tick = () => {
      secs -= 1;
      if (secs <= 0) { goNext(); return; }
      $("cfNextLbl").textContent = `Next reply (${remaining} waiting) · auto in ${secs}s`;
      cfTimer = setTimeout(tick, 1000);
    };
    cfTimer = setTimeout(tick, 1000);
    freshStay.addEventListener("click", () => {
      if (cfTimer) { clearTimeout(cfTimer); cfTimer = null; }
      $("cfNextLbl").textContent = `Next reply (${remaining} waiting)`;
      freshStay.style.display = "none";
    });
  } else {
    $("cfNextLbl").textContent = "Back to the stack";
    freshStay.style.display = "none";
  }
}

function backToStack() {
  if (cfTimer) { clearTimeout(cfTimer); cfTimer = null; }
  $("cardScreen").classList.remove("on");
  $("stackScreen").classList.add("on");
  renderStack();
}
$("backBtn").addEventListener("click", backToStack);
$("dismissUndoBtn").addEventListener("click", () => {
  $("dismissToast").classList.remove("on");
  if (lastDismissed) { lastDismissed.status = "needs_review"; lastDismissed = null; renderStack(); note("Restored"); }
});
$("dismissOkBtn").addEventListener("click", () => $("dismissToast").classList.remove("on"));
$("lessonUndoBtn").addEventListener("click", () => {
  $("lessonToast").classList.remove("on");
  note("Undone - the agent kept nothing from that edit");
});
$("lessonOkBtn").addEventListener("click", () => $("lessonToast").classList.remove("on"));

renderStack();
</script>
</body>
</html>

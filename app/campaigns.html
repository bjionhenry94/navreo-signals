<script>
(function () {
  "use strict";

  /* ---------- tiny utils ---------- */
  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }
  function fmtInt(n) {
    if (n == null || isNaN(n)) return "-";
    return Number(n).toLocaleString("en-GB");
  }
  function pct(num, den, dp) {
    if (!den || num == null) return null;
    var v = num / den * 100;
    var p = Math.pow(10, dp);
    return (Math.round(v * p) / p).toFixed(dp).replace(/\.0+$/, "").replace(/(\.\d*[1-9])0+$/, "$1");
  }
  function localStamp(iso) {
    if (!iso) return "unknown";
    try {
      var d = new Date(iso);
      return new Intl.DateTimeFormat(undefined, {
        day: "numeric", month: "short", hour: "2-digit", minute: "2-digit", timeZoneName: "short"
      }).format(d);
    } catch (e) { return iso; }
  }
  function getJSON(url) {
    return fetch(url, { credentials: "same-origin" }).then(function (r) {
      if (r.status === 401) { window.location.href = "/app/login.html?next=" + encodeURIComponent("/app/campaigns.html"); throw new Error("auth"); }
      if (!r.ok) throw new Error("http " + r.status);
      return r.json();
    });
  }
  /* ---------- state ---------- */
  var STATE = {
    insights: null,      // /api/cockpit/insights payload
    scorecard: null,     // /api/campaign-scorecard payload
    campaigns: [],       // joined rows
    byId: {},
    detail: {},          // id -> campaign-detail payload
    seqcopy: {},         // id -> live sequence copy payload
    messaging: {},       // id -> messaging payload
    platformLeads: {},   // id -> leads page payload
    perf: null,
    liveStatus: {},      // id -> {status, completion, completed, total} straight from Smartlead
    liveCheckedAt: null, // ISO stamp of the live check
    liveLoading: false,
    liveError: false,
    view: { tier: "all", status: "all", sort: "default", preset: "all", client: "all", q: "" }  // current list controls
  };
  /* -- certified insight-card grammar (23 Jul 2026, panel 8.4): every card =
        hero number + its OWN chart + one insight line + one act line + why?
        expander. The chart is picked by the shape of the data; when no shape
        can be read from the payload, a full magnitude bar still renders so a
        card is NEVER chartless. -- */
  function nvzNums(text) {
    return (String(text || "").match(/\d[\d,]*(?:\.\d+)?/g) || []).map(function (t) {
      return parseFloat(t.replace(/,/g, ""));
    });
  }
  function nvzViz(r) {
    var p = r.payload || {};
    var s = p.stats || {};
    var tag = p.tag === "fine" ? "green" : (p.tag === "decide" || p.tag === "decision") ? "red" : "amber";
    var barTone = tag === "red" ? "var(--danger)" : tag === "green" ? "var(--success)" : "var(--warning)";
    var nums = nvzNums(p.bold);
    var hero = null, chart = "", cap = "", title = "", simpleAct = "";
    var key = r.insight_key || "";
    if (key === "weekly-pulse" && (s.pos_last_week != null || nums.length >= 2)) {
      /* stats when the payload carries them, else read "88 to 58" from the text */
      var lastW = s.pos_last_week != null ? s.pos_last_week : nums[0];
      var thisW = s.pos_this_week != null ? s.pos_this_week : nums[1];
      var mx = Math.max(lastW, thisW, 1);
      hero = fmtInt(thisW) + (thisW < lastW ? "<small>&darr;</small>" : "");
      chart = '<div class="nvz-vbars">' +
        '<span style="height:' + Math.round(100 * lastW / mx) + '%"></span>' +
        '<span class="is-hot" style="height:' + Math.round(100 * thisW / mx) + '%"></span></div>';
      cap = fmtInt(lastW) + " &rarr; " + fmtInt(thisW) + " this week";
      title = "We got " + fmtInt(thisW) + " good replies this week, down from " + fmtInt(lastW) + " last week.";
      simpleAct = "Watch the failing offers.";
    } else if (key === "kill-threshold") {
      hero = nums.length ? fmtInt(nums[0]) + "<small>+</small>" : "&mdash;";
      chart = '<div class="nvz-gauge"><span class="gfill" style="width:100%"></span><span class="gthr" style="left:40%"></span></div>';
      cap = "emails per good reply";
      title = "Two campaigns need " + (nums.length ? fmtInt(nums[0]) : "2,500") + "+ emails to get one good reply. That is way too many.";
      simpleAct = "Pivot or close both.";
    } else if (key === "stuck-variants" || key === "dist-bug") {
      var share = (String(p.bold || "").match(/(\d+)\s*%/) || [])[1];
      var unset = nums.length > 1 ? Math.min(9, Math.round(nums[nums.length - 1])) : 4;
      /* charts carry NO text (Bjion rule, 24 Jul) - the red outline alone marks the broken cell */
      var cells = '<span class="is-stuck"></span>';
      for (var ci = 0; ci < unset; ci++) cells += "<span></span>";
      hero = "0";
      chart = '<div class="nvz-cells">' + cells + "</div>";
      cap = share ? ("1 broken &middot; " + unset + " unset") : "set up, not sending";
      title = share ? ("One email version should send " + share + "% of emails but has sent none.") : "One email version is set up but never sends.";
      simpleAct = "Fix the splits in Smartlead.";
    } else if (key === "whole-offer-failures") {
      var vols = nvzNums((p.bold || "") + " " + (p.note || "")).filter(function (n) { return n >= 100; }).slice(0, 6);
      /* the grand total ("22,419 sends") reads first and would render as a
         bar dwarfing the per-offer bars - drop it when it ≈ the sum of the rest */
      if (vols.length > 2) {
        var rest = vols.slice(1).reduce(function (a, b) { return a + b; }, 0);
        if (vols[0] >= rest * 0.9) vols = vols.slice(1);
      }
      if (vols.length < 2) vols = [5, 4, 3, 2, 1];
      var vmx = Math.max.apply(null, vols);
      hero = '0';
      chart = '<div class="nvz-hbars">' + vols.map(function (v) {
        return '<span style="width:' + Math.max(8, Math.round(100 * v / vmx)) + '%"></span>';
      }).join("") + "</div>";
      cap = "0 replies from " + vols.length + " offers";
      var _tot0 = nvzNums(p.bold)[0];
      title = vols.length + " offers sent " + (_tot0 ? fmtInt(_tot0) : "thousands of") + " emails and got zero good replies.";
      simpleAct = "Approve the rewrite briefs.";
    } else if (key === "book-verdict") {
      var small = nums.filter(function (n) { return n > 0 && n < 20; });
      hero = nums.length ? fmtInt(nums[0]) : "&mdash;";
      var _needs = small.reduce(function (a, b) { return a + b; }, 0);
      if (/\bone\b/i.test(String(p.bold || ""))) _needs += 1; /* "one split is broken" - written as a word */
      title = fmtInt(nums[0] || 0) + " good replies this week" + (nums[1] ? ", down from " + fmtInt(nums[1]) + " last week" : "") + ". " + (_needs ? _needs + " campaigns need help." : "");
      simpleAct = "Work the list top down.";
      if (small.length >= 2) {
        var reds = Math.min(9, Math.round(small[0])), ambs = Math.min(9, small.slice(1).reduce(function (a, b) { return a + b; }, 0) + (/\bone\b/i.test(String(p.bold || "")) ? 1 : 0));
        var dots = "";
        for (var di = 0; di < reds; di++) dots += '<span class="is-red"></span>';
        for (var dj = 0; dj < ambs; dj++) dots += '<span class="is-amber"></span>';
        chart = '<div class="nvz-dots">' + dots + "</div>";
        cap = "each square needs help";
      }
    } else if (key === "unanswered-positives" && nums.length >= 2) {
      /* first number = the waiting total, LAST number = the meeting subset
         ("46 positives from the last 30 days ... 14 are meeting requests")
         - a middle "30 days" must not win. */
      var tot = nums[0], part = Math.min(nums[nums.length - 1], nums[0]);
      hero = fmtInt(part);
      chart = '<div class="nvz-seg"><span style="width:' + Math.round(100 * part / tot) + '%;background:var(--nav-orange)"></span></div>';
      cap = fmtInt(part) + " of " + fmtInt(tot) + " are meetings";
      title = fmtInt(tot) + " people are waiting for a reply from us. " + fmtInt(part) + " of them want a meeting.";
      simpleAct = "Clear the " + fmtInt(part) + " meetings today.";
    } else if (nums.length >= 2 && /\bof\b|\/|out of/.test(String(p.bold || ""))) {
      var t2 = Math.max(nums[0], nums[1]), p2 = Math.min(nums[0], nums[1]);
      hero = fmtInt(p2);
      chart = '<div class="nvz-seg"><span style="width:' + Math.round(100 * p2 / Math.max(t2, 1)) + '%;background:' + barTone + '"></span></div>';
      cap = fmtInt(p2) + " of " + fmtInt(t2);
    }
    if (hero == null) hero = nums.length ? fmtInt(nums[0]) : "&bull;";
    if (!chart) {
      /* never chartless: magnitude bar in the tag tone */
      chart = '<div class="nvz-seg"><span style="width:100%;background:' + barTone + '"></span></div>';
      cap = cap || (tag === "red" ? "needs a decision" : tag === "green" ? "healthy" : "keep watching");
    }
    return { heroHtml: '<span class="nvz-hero is-' + tag + '">' + hero + "</span>", chartHtml: chart, cap: cap, title: title, simpleAct: simpleAct };
  }
  function nvzCard(r, kindLabel) {
    var p = r.payload || {};
    var v = nvzViz(r);
    /* plain-English rewritten title (never truncated) when the key is known;
       unknown keys keep Lilly's full sentence. The original sentence, the flag
       name, and the owner all live behind why? - nothing is lost. */
    var title = v.title || String(p.bold || "");
    var whyBits = [];
    whyBits.push('<p class="footnote-line">' + esc(kindLabel) + " &middot; owner: " + esc(p.owner || "Lilly") + "</p>");
    if (v.title && p.bold) whyBits.push('<p class="footnote-line">' + esc(p.bold) + "</p>");
    if (v.simpleAct && p.act) whyBits.push('<p class="footnote-line">' + esc(p.act) + "</p>");
    if (p.note) whyBits.push('<p class="footnote-line">' + esc(p.note) + "</p>");
    if (p.source) whyBits.push('<p class="footnote-line">Source: ' + esc(p.source) + "</p>");
    return '<div class="book-widget book-widget--compact">' +
      '<div class="nvz">' + v.heroHtml + '<div class="nvz-chart">' + v.chartHtml +
      (v.cap ? '<div class="nvz-cap">' + v.cap + "</div>" : "") + "</div></div>" +
      (title ? '<p class="book-line">' + esc(title) + "</p>" : "") +
      ((v.simpleAct || p.act) ? '<p class="action-payoff">' + esc(String(v.simpleAct || p.act).replace(/^\s*(?:\u2192|->)\s*/, "")) + "</p>" : "") +
      '<details class="nvz-why"><summary></summary>' + whyBits.join("") + "</details>" +
      "</div>";
  }
  var TAG_META = {
    decision: { tier: "decision", pill: "Needs a decision", pillClass: "v-red", badge: "badge--red" },
    watch:    { tier: "watch",    pill: "Watch",            pillClass: "v-amber", badge: "badge--amber" },
    fine:     { tier: "fine",     pill: "Fine",             pillClass: "v-green", badge: "badge--green" }
  };
  TAG_META.decide = TAG_META.decision;
  var KIND_LABEL = {
    "dist-bug": "split not set", "variant-fix": "version fix", "kill-threshold": "kill line",
    "list-audit": "list audit", "stuck-variants": "stuck splits", "unanswered-positives": "waiting on a human",
    "weekly-pulse": "weekly pulse", "book-verdict": "book verdict", "whole-offer-failures": "dead offers"
  };
  var LEGACY_SLUGS = [
    ["reconnectarnic", /reconnect.*arnic|arnic.*reconnect/i],
    ["manufacturers", /manufactur/i],
    ["freight", /freight|3pl/i],
    ["amplifyy", /amplifyy/i],
    ["arnic", /arnic/i],
    ["consulting", /consult/i],
    ["latka", /latka/i],
    ["distributors", /distribut/i],
    ["wholesalers", /wholesal/i]
  ];

  /* ---------- boot ---------- */
  function boot() {
    document.getElementById("lw-error").hidden = true;
    Promise.all([
      getJSON("/api/cockpit/insights"),
      getJSON("/api/campaign-scorecard")
    ]).then(function (res) {
      STATE.insights = res[0];
      STATE.scorecard = res[1];
      if (!STATE.insights || STATE.insights.degraded) throw new Error("insights degraded");
      join();
      renderList();
      document.getElementById("list-loading").hidden = true;
      document.getElementById("list-root").hidden = false;
      route();
      loadPerf(0);
      loadLiveStatus();
    }).catch(function (e) {
      if (String(e.message) === "auth") return;
      document.getElementById("list-loading").hidden = true;
      var b = document.getElementById("lw-error");
      b.hidden = false;
      document.getElementById("lw-error-text").textContent =
        "Live data is unavailable right now (" + e.message + "). Nothing here is cached or made up: retry, or tell Lilly in chat.";
    });
  }
  document.getElementById("lw-retry").addEventListener("click", boot);

  /* ---------- join cache + scorecard ---------- */
  function join() {
    var ins = STATE.insights.insights || [];
    var sc = (STATE.scorecard || {}).campaigns || {};
    var meetings = STATE.insights.meetings_by_campaign || {};
    var byScope = {};
    ins.forEach(function (r) {
      if (!r || !r.scope) return;
      (byScope[r.scope] = byScope[r.scope] || []).push(r);
    });
    var campaigns = [];
    STATE.midSync = 0;
    Object.keys(byScope).forEach(function (scope) {
      if (scope === "book") return;
      var rows = byScope[scope];
      var verdict = null;
      rows.forEach(function (r) { if (r.insight_key === "verdict") verdict = r; });
      var vp = (verdict && verdict.payload) || {};
      var s = sc[scope] || null;
      var vs = vp.stats || {};
      /* mid-sync guard: the daily scorecard sync briefly writes zeros while it
         refills. A zero row that the crunch KNOWS sent thousands is mid-sync,
         not truth: fall back to the crunch snapshot and say so. */
      if (s && (s.sent || 0) === 0 && (vs.sent || 0) > 0) { s = null; STATE.midSync = (STATE.midSync || 0) + 1; }
      var stats = {
        leads: s ? s.total : vs.leads,
        sent: s ? s.sent : vs.sent,
        replied: s ? s.replied : null,
        positives: s ? s.positives : vs.pos,
        bounced: s ? s.bounced : null,
        meetings: (meetings[scope] != null) ? meetings[scope] : 0,
        completion: (vs.completion != null) ? vs.completion : null,
        source: s ? "scorecard" : "crunch"
      };
      var tag = vp.tag || "watch";
      var meta = TAG_META[tag] || TAG_META.watch;
      var others = rows.filter(function (r) { return r.insight_key !== "verdict"; });
      /* numbers moved since the crunch wrote the prose? mark the prose */
      var drifted = !!(s && vs.sent != null && s.sent != null &&
        (Math.abs(s.sent - vs.sent) / Math.max(1, s.sent) > 0.005 ||
         (vs.pos != null && s.positives != null && s.positives !== vs.pos)));
      campaigns.push({
        id: scope,
        name: vp.campaign_name || (s && s.name) || ("Campaign " + scope),
        slStatus: (s && s.status) || "",
        tag: tag, tier: meta.tier,
        pill: vp.pill || meta.pill,
        pillClass: meta.pillClass,
        teaser: vp.bold || "",
        note: vp.note || "",
        drifted: drifted,
        act: vp.act || "",
        owner: vp.owner || "",
        smartleadUrl: vp.smartlead_url || ("https://app.smartlead.ai/app/email-campaign/" + scope + "/analytics"),
        stats: stats,
        insights: rows,
        others: others
      });
    });
    campaigns.forEach(function (c) {
      var st = c.stats;
      c.ratio = (st.positives > 0 && st.sent) ? Math.round(st.sent / st.positives) : null;
      c.sortKey = (st.positives === 0 || st.positives == null) ? (1e12 + (st.sent || 0)) : c.ratio;
      c.client = clientOf(c);
    });
    var tierOrder = { decision: 0, watch: 1, fine: 2 };
    campaigns.sort(function (a, b) {
      if (tierOrder[a.tier] !== tierOrder[b.tier]) return tierOrder[a.tier] - tierOrder[b.tier];
      return (b.sortKey || 0) - (a.sortKey || 0);
    });
    STATE.campaigns = campaigns;
    STATE.byId = {};
    campaigns.forEach(function (c) { STATE.byId[c.id] = c; });
    STATE.book = (byScope.book || []).map(function (r) { return r; });
  }

  /* ---------- ready-made views ----------
     Each chip filters AND sorts in one tap, so the old tier chips + completion
     sort collapse into one row. "all" keeps the priority-grouped triage view
     (needs a decision → watch → fine); the rest are flat metric sorts. */
  var PRESETS = {
    all:       { label: "All Priorities", note: "Everything by priority: needs a decision, then watch, then fine." },
    meetings:  { label: "Most meetings",     key: "meetings",  note: "Every campaign, best meeting-getters on top." },
    positives: { label: "Most positives",    key: "positives", note: "Every campaign, most positive replies on top." },
    efficient: { label: "Most efficient",    key: "sendsmtg", asc: true, note: "Fewest emails needed per meeting booked." },
    remaining: { label: "Most left to send", key: "remaining", note: "Most people still to be contacted, biggest first." },
    biggest:   { label: "Biggest lists",     key: "leads",     note: "Every campaign by total lead count." }
  };
  var PRESET_ORDER = ["all", "meetings", "positives", "efficient", "remaining", "biggest"];
  function presetMetric(c, key) {
    var s = c.stats || {};
    switch (key) {
      case "meetings":  return s.meetings || 0;
      case "positives": return s.positives || 0;
      case "leads":     return s.leads || 0;
      // people still to contact: leads minus those already started (~sent ÷ 2 emails each)
      case "remaining": return Math.max(0, (s.leads || 0) - Math.round((s.sent || 0) / 2));
      // emails burnt per meeting booked — lower is better; no meetings sinks to the bottom
      case "sendsmtg":  return (s.meetings > 0) ? (s.sent || 0) / s.meetings : Infinity;
      default: return 0;
    }
  }

  /* Client a campaign belongs to. There is no client field — it lives in the
     name, so we strip any Recontact/Reconnect prefix and take the leading token
     before the first delimiter (| – / or a spaced hyphen). Names like
     "Reconnect 2.0: Amplifyy - ..." → "Amplifyy", "Navreo | Distributors" →
     "Navreo", "Arnic – Sales Leaders" → "Arnic". */
  function clientOf(c) {
    var n = String(c.name || "").replace(/^\s*(new\s+)?(recontact|reconnect)\b[^:]*:\s*/i, "");
    n = n.split(/\s*\|\s*|\s*–\s*|\s+-\s+|\s*\/\s*/)[0].trim();
    if (!n) n = String(c.name || "").trim().split(/\s+/)[0] || "Other";
    return n;
  }

  /* ---------- list view ---------- */
  function renderList() {
    var root = document.getElementById("list-root");
    var cs = STATE.campaigns;
    var clientList = cs.map(function (c) { return c.client; })
      .filter(function (v, i, a) { return v && a.indexOf(v) === i; })
      .sort(function (a, b) { return a.localeCompare(b); });
    var nDecide = cs.filter(function (c) { return c.tier === "decision"; }).length;
    var nWatch = cs.filter(function (c) { return c.tier === "watch"; }).length;
    var nFine = cs.filter(function (c) { return c.tier === "fine"; }).length;
    var crunchAt = STATE.insights.generated_at;
    var statsAt = STATE.insights.stats_updated_at;

    var h = [];
    h.push('<h1 class="sr-only">Campaigns</h1>');

    /* perf chart card */
    h.push('<div class="perfx-card" id="perfx-card" hidden>' +
      '<div class="perfx-head"><span class="perfx-title">Performance, whole fleet</span>' +
      '<div class="live-meta live-meta--perf" id="live-meta"><span class="live-dot" id="live-dot"></span><span id="live-meta-text">Checking Smartlead live&hellip;</span>' +
      '<button type="button" class="live-refresh" id="live-refresh-btn" title="Re-check live status now" hidden>Refresh</button></div>' +
      '<div class="perfx-toggle" role="group" aria-label="Window">' +
      '<button type="button" data-days="7">7d</button>' +
      '<button type="button" data-days="30" class="is-active">30d</button>' +
      '<button type="button" data-days="90">90d</button></div></div>' +
      '<div class="perfx-grid" id="perfx-grid"></div></div>');

    /* "Across the book" moved to the Fleet health audit (deliverability) page,
       just under its tabs — owner request. The book rows are still fetched into
       STATE.book (harmless) but no longer rendered here. */

    /* filter bar — search + live status (checked against Smartlead, not the cache) */
    h.push('<nav class="filter-bar" aria-label="Filter campaigns">' +
      '<div class="search-wrap"><svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
      '<input type="search" class="search-input" id="cockpit-search" placeholder="Search a campaign or client&hellip;" aria-label="Search campaigns"></div>' +
      '<span class="filter-bar-spacer"></span>' +
      '<label class="status-picker"><span class="status-picker-label">Client</span>' +
      '<select class="status-select" id="client-select" aria-label="Filter by client">' +
      '<option value="all">All clients</option>' +
      clientList.map(function (cl) {
        return '<option value="' + esc(cl) + '"' + (STATE.view.client === cl ? " selected" : "") + ">" + esc(cl) + "</option>";
      }).join("") +
      '</select></label>' +
      '<label class="status-picker"><span class="status-picker-label">Status</span>' +
      '<select class="status-select" id="status-select" aria-label="Filter by live campaign status">' +
      '<option value="all">All statuses</option>' +
      '<option value="active">Active</option>' +
      '<option value="paused">Paused</option>' +
      '<option value="completed">Completed</option>' +
      '<option value="drafted">Draft</option>' +
      '<option value="archived">Archived</option>' +
      '</select></label></nav>');

    /* view bar — ready-made views: each one filters AND sorts in one tap */
    h.push('<div class="live-bar view-bar" id="live-bar">' +
      '<div class="view-chips" id="view-chips" role="group" aria-label="Choose a view">' +
      PRESET_ORDER.map(function (k) {
        var p = PRESETS[k];
        var on = k === "all";
        return '<button type="button" class="filter-chip view-chip' + (on ? " is-active" : "") +
          '" data-preset="' + k + '" aria-pressed="' + on + '" title="' + esc(p.note) + '">' + esc(p.label) + "</button>";
      }).join("") +
      "</div></div>");

    h.push('<p class="section-caption" id="search-count" hidden></p>');
    h.push('<div class="sr-only" role="status" aria-live="polite" id="rows-live-region"></div>');
    h.push('<div class="rows-empty-state" id="rows-empty-state" hidden><p id="rows-empty-text">No campaigns match that filter in this view.</p><button type="button" id="clear-filters-btn">Clear filters</button></div>');

    /* rows — filled by renderRows() so live status/completion controls can reshape it */
    h.push('<section aria-label="Campaigns"><div class="campaign-rows" id="campaign-rows"></div></section>');

    /* footer */
    h.push('<p class="footer-fine">Every number on this page comes from the live Supabase cache and the daily Smartlead sync. ' +
      "Verdicts and teasers are written by Lilly on the morning crunch; the app only renders them. " +
      "The stat columns are always campaign lifetime; a teaser that names its own window (for example since relaunch, after a sequence re-save reset the counters) is a different counter, not a contradiction. " +
      "Ring = share of sending capacity used (sent &divide; (leads &times; 2)). Sends/positive under 1,500 is healthy; bounce above 2% is the bar. " +
      "Meetings count people, not emails: every lead with a Call Booked or Meeting Request reply in the archive, once each, however many times the thread went back and forth. Its own counter, not a Smartlead column.</p>");
    h.push('<p class="footer-updated">Verdicts crunched ' + esc(localStamp(crunchAt)) + " &middot; numbers synced " + esc(localStamp(statsAt)) + " &middot; refreshed on every /lilly-optimiser run." +
      (STATE.midSync ? " <strong>Smartlead sync in progress: " + STATE.midSync + " row" + (STATE.midSync === 1 ? "" : "s") + " showing the morning-crunch snapshot until it finishes.</strong>" : "") + "</p>");

    root.innerHTML = h.join("");
    renderRows();
    renderLiveMeta();
    attachListHandlers();
    applyPerfVisibility();
    applyTheme(currentTheme());
  }

  /* live status bucket for a campaign from the LIVE Smartlead check */
  function liveBucket(id) {
    var ls = STATE.liveStatus && STATE.liveStatus[id];
    if (!ls || !ls.status) return "unknown";
    var s = String(ls.status).toUpperCase();
    if (s.indexOf("COMPLET") !== -1) return "completed";
    if (s.indexOf("ARCHIV") !== -1) return "archived";
    if (s.indexOf("DRAFT") !== -1) return "drafted";
    if (s.indexOf("PAUS") !== -1 || s.indexOf("STOP") !== -1) return "paused";
    if (s.indexOf("ACTIVE") !== -1 || s.indexOf("START") !== -1 || s.indexOf("RUNNING") !== -1) return "active";
    return "other";
  }
  function liveCompletion(id) {
    var ls = STATE.liveStatus && STATE.liveStatus[id];
    return (ls && ls.completion != null) ? ls.completion : null;
  }

  /* Build #campaign-rows honouring the current tier filter, live-status filter,
     search, and completion sort. Rows are plain <a> — no per-row JS — so a full
     innerHTML rebuild on every control change is safe. */
  function renderRows() {
    var container = document.getElementById("campaign-rows");
    if (!container) return;
    var v = STATE.view;
    var q = (v.q || "").toLowerCase().trim();
    var cs = STATE.campaigns || [];
    var visible = cs.filter(function (c) {
      if (!(v.tier === "all" || c.tier === v.tier)) return false;
      if (!(v.client === "all" || c.client === v.client)) return false;
      if (!(v.status === "all" || liveBucket(c.id) === v.status)) return false;
      if (q) {
        var hay = (c.name + " " + c.pill + " " + c.tier + " " + (c.client || "")).toLowerCase();
        if (hay.indexOf(q) === -1) return false;
      }
      return true;
    });
    var preset = PRESETS[v.preset] || PRESETS.all;
    var flat = (v.preset !== "all") || (v.status !== "all");
    var h = [];
    if (v.preset !== "all" && preset.key) {
      visible = visible.slice().sort(function (a, b) {
        var va = presetMetric(a, preset.key), vb = presetMetric(b, preset.key);
        return preset.asc ? (va - vb) : (vb - va);   // asc for "fewest emails per meeting"
      });
    }
    if (flat) {
      visible.forEach(function (c) { h.push(rowHTML(c)); });
    } else {
      var tiers = [["decision", "Needs a decision"], ["watch", "Watch"], ["fine", "Fine"]];
      tiers.forEach(function (t) {
        var group = visible.filter(function (c) { return c.tier === t[0]; });
        if (!group.length) return;
        h.push('<div class="section-label rows-tier-label" data-tier-label="' + t[0] + '">' + t[1] + ' <span class="tnum">(' + group.length + ")</span></div>");
        group.forEach(function (c) { h.push(rowHTML(c)); });
      });
    }
    container.innerHTML = h.join("");
    var STATUS_LABEL = { active: "Active", paused: "Paused", completed: "Completed", archived: "Archived", drafted: "Draft" };
    var empty = document.getElementById("rows-empty-state");
    if (empty) empty.hidden = visible.length > 0;
    var emptyTxt = document.getElementById("rows-empty-text");
    if (emptyTxt && !visible.length) {
      emptyTxt.textContent = (v.status !== "all")
        ? "No " + (STATUS_LABEL[v.status] || v.status) + " campaigns" + (q ? " match that search" : " right now") + "."
        : (q ? "No campaigns match that search in this view." : "No campaigns in this view.");
    }
    var scLine = document.getElementById("search-count");
    if (scLine) {
      if (q || v.status !== "all") {
        var lbl = (v.status !== "all") ? (STATUS_LABEL[v.status] || v.status) + " " : "";
        scLine.textContent = visible.length + " " + lbl + "campaign" + (visible.length === 1 ? "" : "s") + " shown";
        scLine.hidden = false;
      } else { scLine.hidden = true; }
    }
    var live = document.getElementById("rows-live-region");
    if (live) live.textContent = visible.length + " campaign" + (visible.length === 1 ? "" : "s") + " shown" +
      (v.preset !== "all" ? ", " + (PRESETS[v.preset] || {}).label : "");
  }

  /* Live-check meta line + per-status counts */
  function renderLiveMeta() {
    var dot = document.getElementById("live-dot");
    var txt = document.getElementById("live-meta-text");
    var refresh = document.getElementById("live-refresh-btn");
    if (!txt) return;
    if (STATE.liveLoading) {
      if (dot) dot.className = "live-dot is-loading";
      txt.textContent = "Checking Smartlead live… (up to ~30s)";
      if (refresh) refresh.hidden = true;
    } else if (STATE.liveError) {
      if (dot) dot.className = "live-dot is-error";
      txt.textContent = "Live check unavailable — showing cached status";
      if (refresh) refresh.hidden = false;
    } else if (STATE.liveCheckedAt) {
      if (dot) dot.className = "live-dot is-ok";
      txt.textContent = "Live from Smartlead · checked " + localStamp(STATE.liveCheckedAt);
      if (refresh) refresh.hidden = false;
    } else {
      if (dot) dot.className = "live-dot";
      txt.textContent = "";
    }
    // per-status counts + enable/disable on the Status dropdown options
    var counts = { active: 0, paused: 0, completed: 0, archived: 0, drafted: 0 };
    (STATE.campaigns || []).forEach(function (c) {
      var b = liveBucket(c.id);
      if (counts[b] != null) counts[b]++;
    });
    // The Status picker only makes sense once the live check has landed — disable
    // the whole picker until then so a pick can't show a false empty. Once landed,
    // a status with a zero live count is disabled (unless it's the one selected),
    // and its live count shows in the option label.
    var pending = !STATE.liveCheckedAt;
    var sel = document.getElementById("status-select");
    if (sel) {
      sel.disabled = pending;
      var LBL = { active: "Active", paused: "Paused", completed: "Completed", archived: "Archived", drafted: "Draft" };
      Array.prototype.forEach.call(sel.options, function (opt) {
        var k = opt.value;
        if (k === "all") return;
        opt.textContent = LBL[k] + (STATE.liveCheckedAt ? " (" + counts[k] + ")" : "");
        opt.disabled = !pending && counts[k] === 0 && STATE.view.status !== k;
      });
    }
  }

  /* Fetch LIVE status + completion for every visible campaign, then repaint. */
  function loadLiveStatus() {
    var ids = (STATE.campaigns || []).map(function (c) { return c.id; })
      .filter(function (id) { return /^\d+$/.test(String(id)); });
    if (!ids.length) return;
    STATE.liveLoading = true; STATE.liveError = false;
    renderLiveMeta();
    getJSON("/api/cockpit/live-status?ids=" + encodeURIComponent(ids.join(",")))
      .then(function (r) {
        STATE.liveLoading = false;
        STATE.liveStatus = (r && r.campaigns) || {};
        STATE.liveCheckedAt = (r && r.checked_at) || new Date().toISOString();
        STATE.liveError = !r || !r.campaigns || Object.keys(STATE.liveStatus).length === 0;
        renderLiveMeta();
        renderRows();
      })
      .catch(function () {
        STATE.liveLoading = false; STATE.liveError = true;
        renderLiveMeta();
      });
  }

  /* Subtitle status bit: LIVE status + completion% when the live check has
     landed, else the cached scorecard status. A live chip carries a dot. */
  function rowStatusBit(c) {
    var ls = STATE.liveStatus && STATE.liveStatus[c.id];
    if (ls && ls.status) {
      return ' &middot; <span class="row-live"><span class="row-live-dot"></span>' +
        esc(String(ls.status).toLowerCase()) + "</span>";
    }
    return c.slStatus ? " &middot; " + esc(String(c.slStatus).toLowerCase()) : "";
  }

  function rowHTML(c) {
    var st = c.stats;
    var ringPct = (st.leads && st.sent != null) ? Math.min(100, Math.round(st.sent / (st.leads * 2) * 100)) : null;
    var replyPct = pct(st.replied, st.sent, 2);
    var bouncePct = pct(st.bounced, st.sent, 1);
    var search = (c.name + " " + c.pill + " " + c.tier).toLowerCase();
    var badges = "";
    var seen = {};
    c.others.forEach(function (r) {
      var lbl = KIND_LABEL[r.insight_key] || r.insight_key;
      if (seen[lbl]) return; seen[lbl] = 1;
      var tg = (r.payload || {}).tag || "watch";
      var cls = (TAG_META[tg] || TAG_META.watch).badge;
      badges += '<span class="badge ' + cls + '">' + esc(lbl) + "</span>";
    });
    /* "Review N" badge: N = optimiser actions for this campaign, already in
       memory on c.insights (no fetch). Clicking it expands the inline optim
       panel (a sibling of the row link, so its own clicks never navigate);
       clicking anywhere else on the row opens the campaign page as before. */
    var nOpt = campaignActs(c).length;
    var reviewBadge = nOpt > 0
      ? '<span class="review-badge" role="button" tabindex="0" data-review="' + esc(c.id) + '" aria-controls="optim-c' + esc(c.id) + '" aria-expanded="false" aria-label="Review ' + nOpt + ' optimisation' + (nOpt === 1 ? "" : "s") + ' for this campaign">Review <b class="tnum">' + nOpt + "</b>" + REVIEW_CARET + "</span>"
      : '<span class="review-badge review-badge--clear" aria-hidden="true">All clear</span>';
    return '<div class="campaign-row" id="row-c' + esc(c.id) + '" data-tier="' + c.tier + '" data-search="' + esc(search) + '">' +
      '<a class="row-summary" href="#/c/' + esc(c.id) + '" aria-label="' + esc(c.name) + ". " + esc(c.pill) + '. Open the campaign page.">' +
      '<span class="ring-wrap">' +
      (ringPct != null
        ? '<span class="ring tnum" style="--pct:' + ringPct + '" title="sent &divide; (leads &times; 2)"><span class="ring-hole">' + ringPct + "%</span></span>"
        : '<span class="ring ring--unknown tnum" title="no lead count reported"><span class="ring-hole">?</span></span>') +
      '</span>' +
      '<span class="row-id"><span class="row-name">' + esc(c.name) + '</span><span class="row-subtitle">Navreo' + rowStatusBit(c) + "</span></span>" +
      '<span class="stat stat--leads"><span class="stat-num tnum">' + fmtInt(st.leads) + '</span><span class="stat-label">Leads</span></span>' +
      '<span class="stat stat--sent"><span class="stat-num tnum">' + fmtInt(st.sent) + '</span><span class="stat-label">Emails sent</span></span>' +
      '<span class="stat stat--reply"><span class="stat-num tnum">' + (st.replied != null ? fmtInt(st.replied) + (replyPct != null ? " (" + replyPct + "%)" : "") : "-") + '</span><span class="stat-label">Replies</span></span>' +
      '<span class="stat stat--positives"><span class="stat-num tnum">' + fmtInt(st.positives) + '</span><span class="stat-label">Positives</span></span>' +
      '<span class="stat stat--sendspos"><span class="stat-num tnum" title="Sends per warm lead. Under 1,500 is healthy.">' + (c.ratio ? "1 per " + fmtInt(c.ratio) : "-") + '</span><span class="stat-label">Sends/positive</span></span>' +
      '<span class="stat stat--bounce"><span class="stat-num tnum">' + (bouncePct != null ? bouncePct + "%" : "-") + '</span><span class="stat-label">Bounce rate</span></span>' +
      '<span class="stat stat--meetings"><span class="stat-num tnum">' + fmtInt(st.meetings != null ? st.meetings : 0) + '</span><span class="stat-label">Meetings</span></span>' +
      reviewBadge +
      '<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>' +

      "</a>" +

  /* ---------- perf chart ---------- */
  function perfHasData(p) {
    if (!p || !(p.days || []).length) return false;
    var any = false;
    ["sent", "leads_added", "positives"].forEach(function (k) {
      (p[k] || []).forEach(function (v) { if (v != null) any = true; });

  }
  function loadPerf(attempt) {
    getJSON("/api/perf-daily?days=90").then(function (p) {
      if (!perfHasData(p)) {
        /* the endpoint returns null series when a read fails: retry once, then
           keep the card hidden rather than draw an empty (never fake) chart */
        if (attempt < 2) setTimeout(function () { loadPerf(attempt + 1); }, 2500);
        return;
      }
      STATE.perf = p;
      drawPerf(30);
      attachPerfToggle();
    }).catch(function () {
      if (attempt < 2) setTimeout(function () { loadPerf(attempt + 1); }, 2500);
    });
  }
  function applyPerfVisibility() {
    var card = document.getElementById("perfx-card");
    if (card && perfHasData(STATE.perf)) card.hidden = false;

  function attachPerfToggle() {
    var card = document.getElementById("perfx-card");
    if (!card) return;
    applyPerfVisibility();
    card.querySelectorAll(".perfx-toggle button").forEach(function (b) {
      b.addEventListener("click", function () {

        b.classList.add("is-active");

  /* One continuous (jagged, day-by-day) trend line in the house KPI style: a
     missing day connects straight across, a dashed reference line marks the
     window average, and a coloured endpoint dot sits on the latest real point. */
  function perfSpark(vals, color) {
    var W = 300, H = 48, PADX = 5, PADY = 7, i;
    var nums = [];
    for (i = 0; i < vals.length; i++) if (vals[i] != null) nums.push(vals[i]);
    if (nums.length < 2) return '<div style="height:' + H + 'px"></div>';
    var mean = 0; for (i = 0; i < nums.length; i++) mean += nums[i]; mean /= nums.length;
    var lo = Math.min.apply(null, nums), hi = Math.max.apply(null, nums);
    lo = Math.min(lo, mean); hi = Math.max(hi, mean);
    if (hi === lo) hi = lo + 1;
    var n = vals.length;
    function x(i) { return PADX + (n <= 1 ? 0 : i / (n - 1) * (W - PADX * 2)); }
    function y(v) { return H - PADY - ((v - lo) / (hi - lo)) * (H - PADY * 2); }
    var path = "", last = null;
    for (i = 0; i < n; i++) {
      if (vals[i] == null) continue;
      var px = x(i), py = y(vals[i]);
      path += (last ? "L" : "M") + px.toFixed(1) + "," + py.toFixed(1) + " ";
      last = { x: px, y: py };
    }
    if (!path || !last) return '<div style="height:' + H + 'px"></div>';
    var ty = y(mean).toFixed(1);
    // stroke colour is set in CSS (.perfx-line / .perfx-thr) — var() is NOT valid
    // inside an SVG presentation attribute, so an attribute stroke would vanish.
    var thresh = '<line class="perfx-thr" x1="' + PADX + '" y1="' + ty + '" x2="' + (W - PADX).toFixed(1) + '" y2="' + ty +
      '" stroke-width="1.5" stroke-dasharray="5,4" vector-effect="non-scaling-stroke"/>';
    var dot = '<circle cx="' + last.x.toFixed(1) + '" cy="' + last.y.toFixed(1) + '" r="4" fill="' + color + '"/>';
    return '<svg viewBox="0 0 ' + W + " " + H + '" preserveAspectRatio="none" aria-hidden="true">' + thresh +
      '<path class="perfx-line" d="' + path.replace(/\s+$/, "") + '" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke"/>' + dot + '</svg>';
  }
  /* "▲/▼ N vs last week" chip — last 7 CALENDAR days vs the 7 before, windowed
     by the actual dates (the series is weekdays-only, so slot counting would
     silently span 1.4 weeks). Counts sum, rate/ratio average. good ("up"/"down")
     sets the colour direction; null = neutral. */
  function perfDelta(vals, kind, good, days) {
    var n = vals.length, i;
    if (!n || !days || days.length !== n) return "";
    function ts(d) { return new Date(d + "T00:00:00Z").getTime(); }
    var endT = ts(days[n - 1]), WK = 7 * 86400000;
    var cur = [], prev = [];
    for (i = 0; i < n; i++) {
      if (vals[i] == null) continue;
      var t = ts(days[i]);
      if (t > endT - WK) cur.push(vals[i]);
      else if (t > endT - 2 * WK) prev.push(vals[i]);
    }
    if (!cur.length || !prev.length) return "";
    function agg(a) { var s = 0, j; for (j = 0; j < a.length; j++) s += a[j]; return kind === "count" ? s : s / a.length; }
    var delta = agg(cur) - agg(prev);
    var rounded = kind === "count" ? Math.round(delta) : Math.round(delta * 10) / 10;
    var arrow = rounded > 0 ? "▲" : (rounded < 0 ? "▼" : "–");
    var cls = "flat";
    if (good && rounded !== 0) cls = ((good === "up") === (rounded > 0)) ? "up" : "down";
    var abs = Math.abs(rounded);
    var num = kind === "count" ? fmtInt(abs) : (kind === "rate" ? abs.toFixed(1) + "pt" : fmtInt(Math.round(abs)));
    return '<div class="perfx-delta ' + cls + '">' + arrow + " " + num + " vs last week</div>";
  }
  /* Four boxes, one per stat, each with its own trend line. Replaces the old
     five-line chart. Counts = window totals, reply rate = latest non-null fleet
     point, emails-per-positive = sum(sent)/sum(positives). Nothing is estimated. */
  function drawPerf(days) {
    var p = STATE.perf;
    var grid = document.getElementById("perfx-grid");
    if (!p || !grid) return;
    var n = (p.days || []).length;
    var k = Math.min(days, n);
    var idx0 = n - k;
    function slice(a) { return (a || []).slice(idx0); }
    function sum(a) { var s = null, i; for (i = 0; i < a.length; i++) if (a[i] != null) s = (s || 0) + a[i]; return s; }
    function last(a) { var i; for (i = a.length - 1; i >= 0; i--) if (a[i] != null) return a[i]; return null; }
    var sent = slice(p.sent), rr = slice(p.reply_rate), pos = slice(p.positives), mtg = slice(p.meetings);
    var perPos = [], i;
    for (i = 0; i < sent.length; i++) {
      perPos.push((sent[i] != null && pos[i] != null && pos[i] > 0) ? sent[i] / pos[i] : null);
    }
    var totalSent = sum(sent), totalPos = sum(pos), totalMtg = sum(mtg), lastRr = last(rr);
    var ratioHero = (totalSent != null && totalPos != null && totalPos > 0) ? "1 : " + fmtInt(Math.round(totalSent / totalPos)) : "—";
    var winDays = (p.days || []).slice(idx0);
    var boxes = [
      { name: "Emails sent", hero: totalSent == null ? "—" : fmtInt(totalSent), color: "#1971C2", vals: sent, kind: "count", good: null },
      { name: "Reply rate", hero: lastRr == null ? "—" : lastRr + "%", color: "#2F9E44", vals: rr, kind: "rate", good: "up" },
      { name: "Emails per positive", hero: ratioHero, color: "#7048E8", vals: perPos, kind: "ratio", good: "down" },
      { name: "Meetings booked", hero: totalMtg == null ? "—" : fmtInt(totalMtg), color: "#E8590C", vals: mtg, kind: "count", good: "up" }
    ];
    var out = "";
    boxes.forEach(function (b, bi) {
      out += '<div class="perfx-box">' +
        '<div class="perfx-lab">' + esc(b.name) + "</div>" +
        '<div class="perfx-num tnum">' + b.hero + "</div>" +
        '<div class="perfx-spark" data-box="' + bi + '">' + perfSpark(b.vals, b.color) + "</div>" +
        perfDelta(b.vals, b.kind, b.good, winDays) + "</div>";
    });
    grid.innerHTML = out;
    attachPerfTips(grid, boxes, winDays);
  }
  /* Hover tooltip: cursor x maps back to a day index; shows that day's date and

  function perfTipEl() {
    var t = document.getElementById("perfx-tip");

  function perfTipFmt(kind, v) {
    if (v == null) return "no data";
    if (kind === "rate") return (Math.round(v * 100) / 100) + "%";
    if (kind === "ratio") return "1 : " + fmtInt(Math.round(v));
    return fmtInt(v);

  function attachPerfTips(grid, boxes, days) {
    var tip = perfTipEl();
    grid.querySelectorAll(".perfx-spark").forEach(function (sp) {
      var b = boxes[parseInt(sp.getAttribute("data-box"), 10)];
      if (!b) return;
      sp.addEventListener("mousemove", function (e) {
        var rect = sp.getBoundingClientRect();
        if (!rect.width || !days.length) return;
        var frac = (e.clientX - rect.left) / rect.width;
        var i = Math.round(frac * (days.length - 1));
        if (i < 0) i = 0; if (i > days.length - 1) i = days.length - 1;
        tip.innerHTML = '<div class="tip-day">' + esc(days[i] || "") + "</div>" +
          '<div class="tip-val">' + esc(b.name) + ": " + perfTipFmt(b.kind, b.vals[i]) + "</div>";
        tip.hidden = false;
        var tw = tip.offsetWidth, th = tip.offsetHeight;
        var tx = e.clientX + 12, ty = rect.top - th - 8;
        if (tx + tw > window.innerWidth - 8) tx = e.clientX - tw - 12;
        if (ty < 8) ty = rect.bottom + 8;
        tip.style.left = tx + "px"; tip.style.top = ty + "px";
      });
      sp.addEventListener("mouseleave", function () { tip.hidden = true; });
    });
  }

            var delay = (seq.step_delays || [])[i];

    var fetchIt = function (isRetry) {
      getJSON("/api/cockpit/campaign-detail?id=" + encodeURIComponent(id)).then(function (d) {

           SPA's lifetime — render it, but refetch next visit + retry once */
        if (d && !d.degraded) STATE.detail[id] = d;
        else if (!isRetry) setTimeout(function () { if (!STATE.detail[id]) fetchIt(true); }, 7000);
        apply(d);
      }).catch(function () {
        if (!isRetry) setTimeout(function () { if (!STATE.detail[id]) fetchIt(true); }, 7000);
        var lt = document.getElementById("leads-tiles");
        if (lt) lt.innerHTML = '<p class="card-subtitle">The contact record could not be loaded right now. Retry from the browser, nothing is cached wrong.</p>';

  function hydrateMessaging(c) {
    var id = c.id;
    var apply = function (m) {
      var root = document.getElementById("messaging-root");
      if (!root) return;
      if (!m || m.degraded || !(m.versions || []).length) {
        /* honest fallback: daily mirror */
        var fb = (STATE.detail[id] || {}).versions || [];
        if (fb.length) {
          root.innerHTML = versionTableHTML(fb.map(function (v) {
            return { step: v.step, label: v.label, sent: v.sent, replies: v.replies, positives: v.positives };
          }), "Smartlead is unreachable right now; this table is the daily platform mirror (snapshot " + esc(fb[0].snapshot || "") + ").");
        } else {
          root.innerHTML = '<p class="card-subtitle">No version stats available: Smartlead is unreachable and no daily mirror exists for this campaign yet.</p>';
        }
        return;
      }
      root.innerHTML = versionTableHTML(m.versions, m.note, m.meetings);
    };
    if (STATE.messaging[id]) { apply(STATE.messaging[id]); return; }
    var fetchIt = function (isRetry) {
      getJSON("/api/cockpit/messaging?id=" + encodeURIComponent(id)).then(function (m) {
        var healthy = m && !m.degraded && (m.versions || []).length;
        /* only a HEALTHY payload may stick for the SPA's lifetime — caching a
           mid-deploy failure was how the tab stayed empty until a hard reload */
        if (healthy) STATE.messaging[id] = m;
        else if (!isRetry) setTimeout(function () { if (!STATE.messaging[id]) fetchIt(true); }, 7000);
        apply(m);
      }).catch(function () {
        if (!isRetry) setTimeout(function () { if (!STATE.messaging[id]) fetchIt(true); }, 7000);
        apply(null);
      });
    };
    fetchIt(false);
  }

  function resolveSpin(text) {
    /* {a|b|c} -> a, innermost-first until stable, so the copy reads like the
       email a lead receives. {{merge_tags}} have no pipe and never match. */
    var t = text || "", prev;
    do {
      prev = t;
      t = t.replace(/\{([^{}|]*(?:\|[^{}]*)+)\}/g, function (_, opts) { return opts.split("|")[0]; });
    } while (t !== prev);
    return t;
  }

  function seqRichText(text) {
    /* escape, then mark {{merge_tags}} / %signature% / spintax-date tags,
       then paragraphs: blank line = new <p>, single break = <br> */
    var marked = esc(text || "").replace(/\{\{[^}]+\}\}|%signature%/g, function (m) {
      return '<span class="mergetag">' + m + "</span>";
    });
    return marked.split(/\n\s*\n/).map(function (para) {
      return "<p>" + para.replace(/\n/g, "<br>") + "</p>";
    }).join("");
  }

  function sequenceCopyHTML(sc) {
    var steps = sc.steps || [];
    var parts = [];
    steps.forEach(function (s, si) {
      var stepNo = s.step != null ? s.step : "?";
      var variants = s.variants || [];
      var pills = "";
      if (variants.length > 1) {
        pills = '<div class="seq-version-pills" aria-label="Email ' + esc(stepNo) + ' versions">' +
          variants.map(function (v, vi) {
            return '<button type="button" class="seq-pill' + (vi === 0 ? " is-active" : "") + '" data-step="' + esc(stepNo) + '" data-version="' + esc(v.label || "?") + '" aria-pressed="' + (vi === 0 ? "true" : "false") + '">' + esc(v.label || "?") + "</button>";
          }).join("") + "</div>";
      }
      var panels = variants.map(function (v, vi) {
        var subj = v.subject
          ? '<span class="seq-subject-text">' + seqRichText(resolveSpin(v.subject)) .replace(/^<p>|<\/p>$/g, "") + "</span>"
          : '<span class="seq-subject-text seq-subject-none">(no subject, reply in thread)</span>';
        return '<div class="seq-version-panel" data-step="' + esc(stepNo) + '" data-version="' + esc(v.label || "?") + '"' + (vi === 0 ? "" : " hidden") + ">" +
          '<p class="seq-subject"><strong>Subject:</strong> ' + subj + "</p>" +
          '<div class="seq-body-scroll">' + seqRichText(resolveSpin(v.body)) + "</div></div>";
      }).join("");
      parts.push('<div class="seq-step"><div class="seq-step-header"><span class="seq-step-title">Email ' + esc(stepNo) + "</span>" + pills + "</div>" +
        '<div class="seq-body">' + panels + "</div></div>");
      var next = steps[si + 1];
      if (next && next.delay_days != null)
        parts.push('<div class="seq-connector">Wait ' + esc(next.delay_days) + " day" + (next.delay_days === 1 ? "" : "s") + "</div>");
    });
    return '<p class="card-subtitle">Read-only mirror of what\'s live in Smartlead: steps, wait gaps, subjects and bodies. Click a version pill to see its copy. Spun lines are shown as one clean rendering.</p>' +
      '<div class="seq-rail">' + parts.join("") + "</div>";
  }

  function hydrateSequenceCopy(c) {
    var id = c.id;
    var apply = function (sc) {
      var root = document.getElementById("sequence-root");
      if (!root || !sc || sc.degraded || !(sc.steps || []).length) return; /* structure rail stays as the honest fallback */
      root.innerHTML = sequenceCopyHTML(sc);
      /* version pills swap the shown subject+body within their step */
      root.querySelectorAll(".seq-pill").forEach(function (pill) {
        pill.addEventListener("click", function () {
          var step = pill.closest(".seq-step");
          if (!step) return;
          var version = pill.getAttribute("data-version");
          step.querySelectorAll(".seq-pill").forEach(function (p) {
            var on = p === pill;
            p.classList.toggle("is-active", on);
            p.setAttribute("aria-pressed", on ? "true" : "false");
          });
          step.querySelectorAll(".seq-version-panel").forEach(function (panel) {
            panel.hidden = panel.getAttribute("data-version") !== version;
          });
        });
      });
    };
    if (STATE.seqcopy[id]) { apply(STATE.seqcopy[id]); return; }
    var fetchIt = function (isRetry) {
      getJSON("/api/cockpit/sequence-copy?id=" + encodeURIComponent(id)).then(function (sc) {
        var healthy = sc && !sc.degraded && (sc.steps || []).length;
        if (healthy) STATE.seqcopy[id] = sc;
        else if (!isRetry) setTimeout(function () { if (!STATE.seqcopy[id]) fetchIt(true); }, 7000);
        apply(sc);
      }).catch(function () {
        if (!isRetry) setTimeout(function () { if (!STATE.seqcopy[id]) fetchIt(true); }, 7000);
      });
    };
    fetchIt(false);
  }

  function versionTableHTML(versions, note, meetings) {
    /* meetings land on the email STEP, never the version (Smartlead cannot
       attribute a booking to a variant) — so the count renders once, on the
       step's first row, and other rows of that step show a dot. */
    var hasMeet = !!(meetings && meetings.by_step);
    var seenStep = {};
    var rows = versions.map(function (v) {
      var ratio = (v.positives > 0 && v.sent) ? "1 per " + fmtInt(Math.round(v.sent / v.positives)) : '-<span class="ring-caption"> ' + (v.sent < 300 ? "early" : "no positives") + "</span>";
      var label = v.inline ? "inline" : (v.label || "?");
      var meetCell = "";
      if (hasMeet) {
        var stepKey = v.step != null ? String(v.step) : "?";
        if (!seenStep[stepKey]) {
          seenStep[stepKey] = true;
          meetCell = '<td class="tnum" data-label="Meetings">' + fmtInt(meetings.by_step[stepKey] || 0) + "</td>";
        } else {
          meetCell = '<td class="tnum" data-label="Meetings"><span class="ring-caption">&middot;</span></td>';
        }
      }
      return "<tr>" +
        "<td data-label=\"Email\">Email " + esc(v.step != null ? v.step : "?") + "</td>" +
        "<td data-label=\"Version\">" + esc(label) + "</td>" +
        '<td class="tnum" data-label="Sent">' + fmtInt(v.sent) + "</td>" +
        '<td class="tnum" data-label="Replies">' + fmtInt(v.replies) + "</td>" +
        '<td class="tnum" data-label="Positives">' + fmtInt(v.positives) + "</td>" +
        '<td class="tnum" data-label="1 per">' + ratio + "</td>" + meetCell + "</tr>";
    }).join("");
    var meetNote = "";
    if (hasMeet) {
      meetNote = fmtInt(meetings.total || 0) + " meeting" + (meetings.total === 1 ? "" : "s") + " on this campaign — one per person, however many replies the thread produced, so this column always adds up to the overview tile. Meetings belong to the email step, not the version.";
      if (meetings.unattributed > 0) meetNote += " " + fmtInt(meetings.unattributed) + " of them " + (meetings.unattributed === 1 ? "is" : "are") + " not tied to a step yet (the replies arrived without step info).";
    }
    return '<div class="leads-table-wrap"><table class="leads-table version-perf-table">' +
      "<thead><tr><th>Email</th><th>Version</th><th>Sent</th><th>Replies</th><th>Positives</th><th>1 per</th>" + (hasMeet ? "<th>Meetings</th>" : "") + "</tr></thead>" +
      "<tbody>" + rows + "</tbody></table></div>" +
      (meetNote ? '<p class="sample-footer">' + esc(meetNote) + "</p>" : "") +
      (note ? '<p class="sample-footer">' + esc(note) + "</p>" : "");
  }

  /* ---------- router ---------- */
  var listScrollY = 0;

  /* The scorecard has no names — patch the ghost's title in from the unified
     mirror once it arrives (fetched lazily, once per session). */
  function fillGhostName(c) {
    if (!STATE.unifiedP) STATE.unifiedP = getJSON("/api/campaigns-unified").catch(function () { return null; });
    STATE.unifiedP.then(function (u) {
      var row = ((u && u.rows) || []).find(function (r) { return r.key === "camp-sl-" + c.id; });

  function route() {
    var hash = window.location.hash || "#/";
    /* top-level page tab: #/optimisations shows the embedded Priority Report;
       every other hash is the campaigns side (list or detail). Handled before
       the campaign matcher so the unknown-hash fallback never eats it. */
    var optim = hash === "#/optimisations";
    document.getElementById("ptab-campaigns").classList.toggle("is-active", !optim);
    document.getElementById("ptab-optim").classList.toggle("is-active", optim);
    var viewOptim = document.getElementById("view-optim");
    if (optim) {
      var vl = document.getElementById("view-list");
      if (!vl.hidden) listScrollY = window.scrollY || 0;
      vl.hidden = true;
      document.getElementById("view-campaign").hidden = true;
      var fr = document.getElementById("optim-frame");
      if (!fr.getAttribute("src")) fr.src = "notifications.html?embed=1";
      viewOptim.hidden = false;
      document.title = "Optimisations · Navreo";
      window.scrollTo(0, 0);
      return;
    }
    viewOptim.hidden = true;
    var m = hash.match(/^#\/c\/(\d+)(?:\/(messaging|leads|sources))?$/);
    var viewList = document.getElementById("view-list");
    var viewCamp = document.getElementById("view-campaign");
    if (!m) {
      /* legacy slug support */
      var lm = hash.match(/^#\/([a-z]+)(?:\/(messaging|leads|sources))?$/);
      if (lm && lm[1] !== "") {
        var slug = lm[1];
        var hit = null;
        LEGACY_SLUGS.some(function (pair) {
          if (pair[0] === slug) {
            STATE.campaigns.some(function (c) { if (pair[1].test(c.name)) { hit = c; return true; } return false; });
            return true;
          }
          return false;
        });
        if (hit) { window.location.replace("#/c/" + hit.id + (lm[2] ? "/" + lm[2] : "")); return; }
      }
      if (hash !== "#/" && hash !== "" && hash !== "#") { window.location.replace("#/"); return; }
      viewCamp.hidden = true;
      document.getElementById("page-root").innerHTML = "";
      viewList.hidden = false;
      document.title = "The cockpit · Navreo daily briefing";
      window.scrollTo(0, listScrollY);
      return;
    }
    var id = m[1], tab = m[2] || "overview";
    var c = STATE.byId[id] || ghostRow(id);
    if (!c) {
      viewCamp.hidden = true; viewList.hidden = false;
      window.location.hash = "#/";
      return;
    }
    if (!viewList.hidden) listScrollY = window.scrollY || 0;
    viewList.hidden = true;
    viewCamp.hidden = false;
    var pr = document.getElementById("page-root");
    var current = pr.firstElementChild && pr.firstElementChild.getAttribute("data-cid");
    if (current !== String(id)) {
      pr.innerHTML = campaignPageHTML(c, tab);
      attachPageHandlers(c);
      hydrateDetail(c);
      hydrateDraftSources(c);
      if (c.ghost) fillGhostName(c);
    } else {
      /* just switch tab */
      pr.querySelectorAll(".tab-panel").forEach(function (p) { p.hidden = p.getAttribute("data-tab") !== tab; });
      pr.querySelectorAll(".campaign-tab").forEach(function (t) { t.classList.toggle("is-active", t.getAttribute("data-tab") === tab); });
    }
    if (tab === "messaging") { hydrateMessaging(c); hydrateSequenceCopy(c); }
    if (tab === "leads") { hydrateDetail(c); hydratePlatformLeads(c); }
    document.title = c.name + " · The cockpit";
    window.scrollTo(0, 0);
  }
  window.addEventListener("hashchange", route);

  /* The embedded report grows the iframe to its content height so the cockpit
     keeps the single page scrollbar (no scroll-within-scroll). Same-origin, so
     the frame's document is readable. Sized by a poll, NOT ResizeObserver:
     RO/rAF delivery rides the rendering pipeline and is throttled to silence
     in embedded webviews (verified live — zero deliveries even on real body
     growth), while timers keep running. The poll only works while the tab is
     visible and only writes when the height actually changed. */
  (function () {
    var fr = document.getElementById("optim-frame");
    function fit() {
      try {
        var d = fr.contentDocument;
        if (!d || !d.documentElement) return;
        var h = Math.max(d.documentElement.scrollHeight, 480);
        if (fr.offsetHeight !== h) fr.style.height = h + "px";
      } catch (e) { /* frame not ready */ }
    }
    fr.addEventListener("load", fit);
    setInterval(function () {
      if (!document.getElementById("view-optim").hidden) fit();
    }, 700);
  })();

  /* ---------- handlers ---------- */
  function attachListHandlers() {
    var root = document.getElementById("list-root");
    var viewNote = document.getElementById("view-note");
    /* ready-made views — each chip filters + sorts in one tap */
    root.querySelectorAll(".view-chip").forEach(function (b) {
      b.addEventListener("click", function () {
        root.querySelectorAll(".view-chip").forEach(function (x) { x.classList.remove("is-active"); x.setAttribute("aria-pressed", "false"); });
        b.classList.add("is-active"); b.setAttribute("aria-pressed", "true");
        var k = b.getAttribute("data-preset");
        STATE.view.preset = k;
        if (viewNote) viewNote.textContent = (PRESETS[k] || {}).note || "";
        renderRows();
      });
    });
    /* client dropdown */
    var clientSel = document.getElementById("client-select");
    if (clientSel) clientSel.addEventListener("change", function () {
      STATE.view.client = clientSel.value;
      renderRows();
    });
    /* live status dropdown */
    var statusSel = document.getElementById("status-select");
    if (statusSel) statusSel.addEventListener("change", function () {
      STATE.view.status = statusSel.value;
      renderRows();
    });
    /* live refresh */
    var refreshBtn = document.getElementById("live-refresh-btn");
    if (refreshBtn) refreshBtn.addEventListener("click", function () {
      STATE.liveCheckedAt = null; loadLiveStatus();
    });
    /* search */
    document.getElementById("cockpit-search").addEventListener("input", function () {
      STATE.view.q = document.getElementById("cockpit-search").value || "";
      renderRows();
    });
    var clearBtn = document.getElementById("clear-filters-btn");
    if (clearBtn) clearBtn.addEventListener("click", function () {
      document.getElementById("cockpit-search").value = "";
      STATE.view.q = ""; STATE.view.tier = "all"; STATE.view.status = "all"; STATE.view.preset = "all"; STATE.view.client = "all";
      var sel = document.getElementById("status-select"); if (sel) sel.value = "all";
      var csel = document.getElementById("client-select"); if (csel) csel.value = "all";
      root.querySelectorAll(".view-chip").forEach(function (x) { var a = x.getAttribute("data-preset") === "all"; x.classList.toggle("is-active", a); x.setAttribute("aria-pressed", a.toString()); });
      if (viewNote) viewNote.textContent = (PRESETS.all || {}).note || "";
      renderRows();
    });
    /* Inline "Review N" optimiser panels. Delegated on the rows container (which
       is rebuilt via innerHTML on every filter/search change) so one binding
       survives all rebuilds. The badge lives inside the row link, so we swallow
       its click (preventDefault + stopPropagation) to stop the row navigating;
       every other click on the row still opens the campaign page as before. */
    var rowsC = document.getElementById("campaign-rows");
    if (rowsC && !rowsC.getAttribute("data-optim-bound")) {
      rowsC.setAttribute("data-optim-bound", "1");
      var toggleReview = function (badge) {
        var id = badge.getAttribute("data-review");
        var panel = document.getElementById("optim-c" + id);
        if (!panel) return;
        var willOpen = panel.hidden;
        panel.hidden = !willOpen;
        badge.setAttribute("aria-expanded", willOpen ? "true" : "false");
        if (willOpen) {
          var cs = STATE.campaigns || [], c = null;
          for (var i = 0; i < cs.length; i++) { if (String(cs[i].id) === String(id)) { c = cs[i]; break; } }
          if (c) openRowOptim(c, panel);
        }
      };
      rowsC.addEventListener("click", function (e) {
        var badge = e.target.closest && e.target.closest(".review-badge");
        if (!badge) return;
        e.preventDefault(); e.stopPropagation();
        toggleReview(badge);
      });
      rowsC.addEventListener("keydown", function (e) {
        if (e.key !== "Enter" && e.key !== " " && e.key !== "Spacebar") return;
        var badge = e.target.closest && e.target.closest(".review-badge");
        if (!badge) return;
        e.preventDefault(); e.stopPropagation();
        toggleReview(badge);
      });
    }
    attachThemeToggles(root);
  }

  /* ---------- shared optimiser-action wiring ----------
     Used by BOTH the campaign page's "Suggested actions" and the list's inline
     "Review N" panels, so the two surfaces behave identically and share one
     assignment fetch + one in-memory ASSIGN map (a click on either surface is
     reflected everywhere). "Fix inside of Claude" opens a fresh Claude chat with
     the prompt pre-filled; the state buttons stay TEAM-SHARED via
     /api/cockpit/assignments (one owner per action, reconciled server-side). */
  var ACT_ASSIGN = {};   // action_key -> { state, assigned_to }
  var ACT_ME = null;     // this viewer's login email, for "you own it" labelling
  var ACT_LOADED = false;
  function actAssigneeName(email) {
    if (!email) return "";
    var local = String(email).split("@")[0];
    var parts = local.split(/[._-]+/).filter(Boolean).map(function (w) {
      return w.charAt(0).toUpperCase() + w.slice(1);
    });
    return parts.join(" ") || String(email);
  }
  function actStateVerb(state) { return state === "ack" ? "In progress" : state === "done" ? "Completed" : "Dismissed"; }
  function actApplyCard(card) {
    var key = card.getAttribute("data-action-key");
    var rec = ACT_ASSIGN[key] || {};
    var state = rec.state || "";
    var mine = rec.assigned_to && ACT_ME && rec.assigned_to.toLowerCase() === ACT_ME.toLowerCase();
    var who = mine ? "you" : actAssigneeName(rec.assigned_to);
    var DEFAULT_LABEL = { ack: "Assign to me", done: "Mark as completed", dismiss: "Dismiss" };
    card.querySelectorAll(".action-state-btn").forEach(function (x) {
      x.classList.remove("is-active", "is-acked", "is-done-state");
      x.setAttribute("aria-pressed", "false");
      var d = x.getAttribute("data-act");
      if (DEFAULT_LABEL[d]) x.textContent = DEFAULT_LABEL[d];
    });
    var dr = card.querySelector(".action-dismissed-row");
    var body = card.querySelector(".action-body");
    var tag = card.querySelector(".assignee-tag");
    if (state === "dismiss") {
      if (dr) { dr.hidden = false; var s = dr.querySelector("span"); if (s && s.childNodes[0]) s.childNodes[0].nodeValue = (who ? "Dismissed by " + who : "Dismissed") + " · "; }
      if (body) body.style.opacity = "0.45";
    } else {
      if (dr) dr.hidden = true;
      if (body) body.style.opacity = "";
    }
    var btn = state && state !== "dismiss" ? card.querySelector('.action-state-btn[data-act="' + state + '"]') : null;
    if (btn) {
      btn.classList.add("is-active");
      btn.classList.add(state === "ack" ? "is-acked" : "is-done-state");
      btn.setAttribute("aria-pressed", "true");
      btn.textContent = (state === "ack" ? "In progress" : "Completed") + (who ? " · " + who : "");
    }
    if (tag) {
      if ((state === "ack" || state === "done") && who) { tag.hidden = false; tag.textContent = actStateVerb(state) + " · " + who; }
      else { tag.hidden = true; tag.textContent = ""; }
    }
  }
  function actLoadOnce(cb) {
    if (ACT_LOADED) { cb(); return; }
    Promise.all([
      getJSON("/api/cockpit/assignments").catch(function () { return {}; }),
      getJSON("/api/auth/me").catch(function () { return {}; })
    ]).then(function (res) {
      ACT_ASSIGN = (res[0] && res[0].assignments) || {};
      ACT_ME = (res[1] && res[1].email) || null;
      ACT_LOADED = true;
      cb();
    });
  }
  function wireActionCards(root) {
    /* "Fix inside of Claude" — opens the Claude DESKTOP app (claude:// deep
       link), prompt pre-filled; deliberately no web fallback. stopPropagation
       so a card living inside a row link never navigates. */
    root.querySelectorAll(".copy-prompt").forEach(function (b) {
      if (b.getAttribute("data-fix-bound")) return;
      b.setAttribute("data-fix-bound", "1");
      b.addEventListener("click", function (e) {
        e.preventDefault(); e.stopPropagation();
        var txt = b.getAttribute("data-prompt") || "";
        try { window.location.href = "claude://new?q=" + encodeURIComponent(txt); } catch (_e) {}
      });
    });
    actLoadOnce(function () { root.querySelectorAll(".action-card").forEach(actApplyCard); });
    root.querySelectorAll(".action-card").forEach(function (card) {
      if (card.getAttribute("data-act-bound")) return;
      card.setAttribute("data-act-bound", "1");
      var key = card.getAttribute("data-action-key");
      var parts = (key || "").split("::");
      var cid = parts[0], ik = parts.slice(1).join("::");
      card.querySelectorAll(".action-state-btn, .action-undo-btn").forEach(function (b) {
        b.addEventListener("click", function (e) {
          e.preventDefault(); e.stopPropagation();
          var act = b.getAttribute("data-act");
          var cur = (ACT_ASSIGN[key] || {}).state || "";
          var next = (act === "undo" || cur === act) ? "clear" : act;
          var prev = ACT_ASSIGN[key];
          if (next === "clear") delete ACT_ASSIGN[key];
          else ACT_ASSIGN[key] = { state: next, assigned_to: ACT_ME };
          actApplyCard(card);
          fetch("/api/cockpit/assignments", {
            method: "POST", credentials: "same-origin",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action_key: key, campaign_id: cid, insight_key: ik, state: next })
          }).then(function (r) { return r.json(); }).then(function (out) {
            if (!out || out.ok === false) throw new Error((out && out.message) || "save failed");
            if (next === "clear") delete ACT_ASSIGN[key];
            else ACT_ASSIGN[key] = { state: out.state, assigned_to: out.assigned_to };
            actApplyCard(card);
          }).catch(function () {
            if (prev) ACT_ASSIGN[key] = prev; else delete ACT_ASSIGN[key];
            actApplyCard(card);
          });
        });
      });
    });
  }

  /* Populate a row's inline "Review N" panel from the campaign's in-memory
     acts (no fetch), then wire it with the shared handler. Idempotent. */
  function openRowOptim(c, panel) {
    if (panel.getAttribute("data-loaded")) return;
    panel.setAttribute("data-loaded", "1");
    var acts = campaignActs(c);
    if (!acts.length) {
      panel.innerHTML = '<p class="row-optim-empty">Nothing to review right now — this campaign is healthy.</p>';
      return;
    }
    var h = ['<div class="actions-section">'];
    acts.forEach(function (r, i) { h.push(actionCardHTML(c, r, i)); });
    h.push("</div>");
    panel.innerHTML = h.join("");
    wireActionCards(panel);
  }

  function attachPageHandlers(c) {
    var pr = document.getElementById("page-root");
    attachThemeToggles(pr);
    applyTheme(currentTheme());
    wireActionCards(pr);
  }

  /* ---------- theme ---------- */
  var THEME_KEY = "cockpit-theme";
  function currentTheme() {
    return document.documentElement.getAttribute("data-nav-theme") === "dark" ? "dark" : "light";
  }
  function applyTheme(theme) {
    document.documentElement.setAttribute("data-nav-theme", theme);
    document.querySelectorAll(".theme-toggle").forEach(function (b) {
      b.setAttribute("aria-pressed", theme === "dark" ? "true" : "false");
      var lbl = b.querySelector(".theme-toggle-label");
      if (lbl) lbl.textContent = theme === "dark" ? "Light" : "Dark";
    });
  }
  function initTheme() {
    var saved = null;
    try { saved = window.localStorage.getItem(THEME_KEY); } catch (e) {}
    var prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
    applyTheme(saved || (prefersDark ? "dark" : "light"));
  }
  function attachThemeToggles(scope) {
    (scope || document).querySelectorAll(".theme-toggle").forEach(function (b) {
      if (b.getAttribute("data-bound")) return;
      b.setAttribute("data-bound", "1");
      b.addEventListener("click", function () {
        var cur = currentTheme() === "dark" ? "light" : "dark";
        try { window.localStorage.setItem(THEME_KEY, cur); } catch (e) {}
        applyTheme(cur);
      });
    });
  }

  /* the shared rail (shell.js) has no theme control of its own — the cockpit
     is the only dark-mode-aware page, so its toggle mounts into the rail
     bottom here, below the Settings cog */
  function mountRailThemeToggle() {
    var rail = document.querySelector(".rail");
    if (!rail || rail.querySelector(".theme-toggle")) return;
    var tmp = document.createElement("div");
    tmp.innerHTML = themeToggleHTML();
    var btn = tmp.firstElementChild;
    btn.className += " theme-toggle--icon";
    rail.appendChild(btn);
    attachThemeToggles(rail);
  }

  mountRailThemeToggle();
  initTheme();
  boot();
})();
</script>

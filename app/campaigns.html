        <tr><th></th><th>Signal</th><th style="text-align:right;cursor:pointer" title="Estimated decision makers a month of daily pulls reaches. Click to sort." onclick="wiz._sortBySize=!wiz._sortBySize;drawWiz()">Decision-makers / month ${wiz._sortBySize ? "↓" : ""}</th></tr>
        ${rows.map((r, ri) => {
          const meta = MECH_META[r.mechanism] || ["signal", r.mechanism, ""];
          const ice = r.icebreaker || meta[2] || "";
          const biggest = !r.estimated && r.dms === Math.max(...rows.filter((x) => !x.estimated).map((x) => x.dms || 0));
          const on = wiz.sources.includes(r.id);
          return `<tr class="click ${on ? "sel" : ""}" title="${esc(r.signal || "")}" onclick="wizToggle('sources','${r.id}')">
            <td style="width:54px"><span style="display:inline-flex;align-items:center;gap:7px"><span class="wizck ${on ? "on" : ""}" aria-hidden="true">${on ? "✓" : ""}</span><span class="ictile" style="width:26px;height:26px">${ic8(meta[0])}</span></span></td>
            <td><div style="font-weight:600">${esc(r.idea)}${on ? ' <span class="pill g" style="background:var(--orange);color:#fff">✓ selected</span>' : ""}${r.id === (strat.rows || [])[0]?.id ? ' <span class="pill g" title="Best balance of fit, timing and reach">recommended</span>' : ""}</div>
              ${ice ? `<div class="small" style="color:var(--ink-2);font-style:italic;margin-top:2px">"${esc(ice)}"</div>` : ""}</td>
            <td style="text-align:right">${r.estimated ? `<span class="muted small">${r.mechanism === "engagement" ? "tracked live" : "sized on first run"}</span>` : `${r.approx ? "≈ " : ""}<b>${fmt(r.dms)}</b>${r.approx ? ' <span class="muted small" title="An estimate - the daily pull counts the real people">estimated</span>' : ""}${biggest ? ' <span class="pill n" title="Biggest list, usually colder">largest</span>' : ""}`}</td>
          </tr>`;
        }).join("")}
      </table>
      <div class="small muted" style="margin-top:8px;text-align:center">Ideas with fewer than 10 reachable people are hidden automatically${(strat.too_small || 0) ? ` (${strat.too_small} hidden this run)` : ""}${(strat.too_broad || 0) ? ` · ${strat.too_broad} idea${strat.too_broad > 1 ? "s" : ""} excluded for being too broad (over 10,000 people/month)` : ""}.</div>`;
  }

  else if (wiz.step === 6) {
    const engOnly = wiz.sources.length && wiz.sources.every((k) => ((wiz.strat?.rows || []).find((r) => r.id === k) || {}).mechanism === "engagement");
    body.innerHTML = `
      <h2>Check the plan.</h2>
      <div class="lead">Save it for later, or preview the first leads now (that runs one live search).</div>
      <div style="max-width:560px;margin:0 auto">
        <div class="sumrow"><span class="k">Client</span><span>${esc(wiz.client?.name || "–")}</span></div>
        ${engOnly ? `
        <div class="sumrow"><span class="k">Whose LinkedIn</span><span>You add the profile links right after saving - that's the next screen.</span></div>` : `
        <div class="sumrow"><span class="k">Who we email</span><span>${wiz.titles.map(esc).join(", ") || "–"}</span></div>
        <div class="sumrow"><span class="k">Companies</span><span>${esc(wiz.keywords) || wiz.industries.map(esc).join(", ") || "–"}</span></div>
        <div class="sumrow"><span class="k">Size</span><span>${wiz.sizes.join(", ")} employees</span></div>
        <div class="sumrow"><span class="k">Locations</span><span>${wiz.geos.map(esc).join(", ")}</span></div>
        <div class="sumrow"><span class="k">Named accounts</span><span>${wiz.domains.map(esc).join(", ") || "None"}</span></div>`}
        <div class="sumrow"><span class="k">Excluded</span><span>${wiz.excludes.map(esc).join(", ") || "Previously contacted only"}</span></div>
        <div class="sumrow"><span class="k">Openers</span><span style="flex:1">${wiz.sources.map((k) => {
          const row = (wiz.strat?.rows || []).find((r) => r.id === k);
          if (!row) return "";
          return `<div style="margin-bottom:6px"><div class="small muted">${esc(row.idea)}</div>
            <input id="ck-ice-${row.id}" value="${esc(row.icebreaker || (MECH_META[row.mechanism] || [])[2] || "")}"
              style="width:100%;border:1px solid var(--line-2);border-radius:8px;padding:6px 10px;font:italic 400 12px var(--font-sans);color:var(--ink-2);background:transparent"></div>`;
        }).join("")}</span></div>
        <div class="sumrow"><span class="k">Angles</span><span>${wiz.sources.map((k) => {
                    const row = (wiz.strat?.rows || []).find((r) => r.id === k);
          if (!row) return k;
          return row.dms != null ? `${row.idea} (${row.approx ? "≈" : ""}${fmt(row.dms)} people)` : row.idea;
        }).join(", ") || "–"}</span></div>
      </div>
      <div style="text-align:center;margin-top:18px">
        <button class="btn primary" onclick="saveWizCampaign(null)">💾 Save campaign - run it later</button>
        <div class="small muted" style="margin-top:6px">Nothing runs and nothing is spent until you pull leads.</div>
      </div>`;
  }

  else if (wiz.step === 7) {
    const r = wiz.result;
    if (!r) { body.innerHTML = `<h2>Searching for leads matching the ICP…</h2><div class="lead">Matching real people against roles, companies and locations.</div><div class="empty" style="padding:36px 0">${ic8("search", "xl")}</div>`; next.disabled = true; return; }
    if (!r.ok) {
      const msg = /error_code|NO_RESULTS|\{/.test(r.message || "")
        ? "No one matches these filters right now. Try fewer filters - more locations, more company sizes, or a broader company type."
        : (r.message || "Try widening the audience");
      body.innerHTML = `<h2>No one matched just now.</h2>
      <div class="lead">${esc(msg)}</div>
      <div style="text-align:center;margin-top:18px;display:flex;gap:10px;justify-content:center">
        <button class="btn" onclick="wiz.step=4;wiz.result=null;drawWiz()">← Widen the targeting</button>
        <button class="btn primary" onclick="saveWizCampaign(null)">💾 Save it anyway - the daily run keeps looking</button>
      </div>
      <div class="small muted" style="text-align:center;margin-top:6px">Nothing is lost either way - your whole setup is kept.</div>`;

    }
    const kept = (r.sample || []).filter((_, i) => !wiz.rejected[i]).length;
    body.innerHTML = `
      <h2>Here are the first opportunities we identified.</h2>
      <div class="lead"><b>${fmt(r.total_people)}</b> people match · the campaign works through all of them · ${esc(r.cost)}</div>
      ${(r.sample || []).map((p, i) => `
        <div class="lead-row ${wiz.rejected[i] ? "rejected" : ""}">
          <div class="ini">${esc((p.name || "?").split(" ").map((w) => w[0]).slice(0, 2).join(""))}</div>
          <div style="flex:1;min-width:0">
            <div class="nm">${p.linkedin ? `<a href="${esc(p.linkedin)}" target="_blank">${esc(p.name)}</a>` : esc(p.name)} <span class="tt">· ${esc(p.title)}</span></div>
            <div class="cc">
              ${p.named_account ? '<span class="fchip" style="background:var(--orange-100);color:var(--orange-700)">named account</span>' : ""}
              <span class="fchip">${esc(p.company)}</span>
              ${p.industry ? `<span class="fchip">${esc(p.industry)}</span>` : ""}
              ${p.size ? `<span class="fchip">${esc(String(p.size))} people</span>` : ""}
              ${p.country ? `<span class="fchip">${esc(p.country)}</span>` : ""}
              ${p.linkedin ? `<a class="fchip" href="${esc(p.linkedin)}" target="_blank" style="color:var(--orange-700);text-decoration:none">LinkedIn ↗</a>` : ""}
              ${p.domain ? `<a class="fchip" href="https://${esc(p.domain)}" target="_blank" style="color:var(--orange-700);text-decoration:none">Website ↗</a>` : ""}
              ${sigHref(p) ? `<a class="fchip" href="${esc(sigHref(p))}" target="_blank" title="${esc(sigTitle(p))}" style="color:var(--orange-700);text-decoration:none">View signal ↗</a>` : ""}
            </div>
          </div>
          <button class="btn sm" onclick="wiz.rejected[${i}]=!wiz.rejected[${i}];drawWiz()">${wiz.rejected[i] ? "Undo" : "✕ Reject"}</button>
        </div>`).join("")}
      <div class="small muted" style="margin-top:8px">${kept} kept · rejects teach the qualifier what off-brief looks like</div>`;
  }

const DIRECT_SRC_TYPE = { hiring: "hiring", engagement: "engagement", company_filter: "companies", lookalike: "lookalike" };
const DIRECT_LABEL = { hiring: "Hiring signal", engagement: "Engagement signal",
  company_filter: "Company filter", lookalike: "Lookalike companies" };

function directRoute(mech) {
  // defer campaign creation until the source wizard is completed (user rule):
  // no campaign row is written on cancel/back-out. openSourceWizard runs against
  // a "__pending__" campaign; ensureCampaign() creates it the moment we save.
  wiz.mechanism = mech;
  const dmTitles = [...(wiz.titles || [])];  // client-ICP DMs, resolved at pickClient
  const pending = {
    name: `${wiz.client?.name || "New"} · ${(wiz.goal || "").trim().slice(0, 48) || DIRECT_LABEL[mech]}`,
    client_id: wiz.client?.id || null, goal: wiz.goal || "",
    icp: { titles: wiz.titles, industries: wiz.industries, keywords: wiz.keywords, sizes: wiz.sizes, geos: wiz.geos },
    paused: true,
  };
  const clientId = wiz.client?.id || null;
  closeWizard();
  const srcType = DIRECT_SRC_TYPE[mech] || "companies";
  openSourceWizard(srcType, "__pending__");
  sw._pendingCampaign = pending;
  sw._clientId = clientId;
  // Pre-fill the required "Who we email" field. The async suggest inside
  // openSourceWizard keys off campaign_id="__pending__", which has no ICP to
  // resolve, so it left the field blank — every tester stalled on it. Seed it
  // from the client's ICP DMs now (already in wiz.titles), or a sensible
  // Director+ default so it is never empty on arrival.
  if (srcType === "hiring" && !sw.dm_titles) {
    sw.dm_titles = (dmTitles.length ? dmTitles : ["Founder", "CEO", "VP of Sales", "Head of Sales"]).join(", ");
    sw._touched = { ...(sw._touched || {}), dm_titles: true };  // don't let the async suggest wipe it
    if (sw.step === 1) drawSrc();
  }
  protoNote("Set up the signal - the campaign is created when you save it");
}

async function wizNext() {
  if (wiz.step === 2) { wizStartIdeas(); return; }  // step 2 is click-driven; Next = start ideas
  if (wiz.step === 3 && !wiz.titles.length) { protoNote("Pick at least one title"); return; }
  if (wiz.step === 4 && wiz.mode !== "direct" && !wiz.strat && !wiz._stratLoading) loadStrategyMap();  // prefetch for AI mode only - direct re-runs once the mechanism is confirmed
  if (wiz.step === 5 && !wiz.sources.length) { protoNote("Pick at least one angle"); return; }

  if (wiz.step < 6) { wiz.step++; drawWiz(); return; }

  if (wiz.step === 6) {
    wiz.sources.forEach((k) => {
      const row = (wiz.strat?.rows || []).find((r) => r.id === k);
      const el = document.getElementById("ck-ice-" + k);
      if (row && el) row.icebreaker = el.value;
    });
    wiz.step = 7; wiz.result = null; wiz.rejected = {}; drawWiz();
    const payload = {
      titles: wiz.titles,
      keywords: wiz.keywords.trim() ? [wiz.keywords.trim()] : [],
      industries: wiz.keywords.trim() ? [] : wiz.industries,
      headcount: wiz.sizes,
      countries: wiz.geos,
      exclude_keywords: wiz.excludes,
      domains: wiz.domains,
    };
    wiz.result = await fetchJsonRetry("/api/preview/people", payload);
    drawWiz(); return;
  }

  await saveWizCampaign((wiz.result?.sample || []).filter((_, i) => !wiz.rejected[i]));
}

// kept === null means "save for later" from step 6: no preview search ran, nothing spent
async function saveWizCampaign(kept) {
  if (wiz._saving) return;
  wiz._saving = true;
  if (wiz.step === 6) {  // capture any opener edits made on the summary
    wiz.sources.forEach((k) => {
      const row = (wiz.strat?.rows || []).find((r) => r.id === k);
      const el = document.getElementById("ck-ice-" + k);
      if (row && el) row.icebreaker = el.value;
    });
  }
  const chosen = wiz.sources.map((k) => (wiz.strat?.rows || []).find((r) => r.id === k)).filter(Boolean)
    .map((r) => ({ mechanism: r.mechanism, idea: r.idea, params: r.params || {}, dms: r.dms ?? null, icebreaker: r.icebreaker || "" }));
  const topAngle = chosen[0]?.idea || "Campaign";
  const saveResp = await (await fetch("/api/campaign-drafts", { method: "POST", body: JSON.stringify({
    name: `${wiz.client?.name || "New"} · ${topAngle} · ${(wiz.keywords || wiz.industries[0] || "audience").slice(0, 32)}`,
    client_id: wiz.client?.id || null,
    goal: wiz.goal || "",
    icp: { titles: wiz.titles, industries: wiz.industries, keywords: wiz.keywords, sizes: wiz.sizes, geos: wiz.geos, excludes: wiz.excludes, domains: wiz.domains },
    sources: chosen,
    strategy: wiz.strat?.rows || null,
    total_matched: wiz.result?.total_people || 0,
    preview_kept: kept || [],
    paused: kept === null,  // "run it later" means exactly that - saved paused, nothing moves until resumed
  }) })).json();
  const createdSources = [];
  for (const src of chosen) {
    const resp = await (await fetch("/api/sources", { method: "POST", body: JSON.stringify({
      type: src.mechanism, mechanism: src.mechanism, name: src.idea,
      campaign_id: saveResp.id, icebreaker: src.icebreaker || "",
      titles: wiz.titles, params: src.params || {},
      config: { keywords: wiz.keywords, industries: wiz.industries, headcount: wiz.sizes, countries: wiz.geos },
      total: src.dms,
    }) })).json();
    createdSources.push({ mechanism: src.mechanism, idea: src.idea, id: resp.id });
  }
  if (wiz.client?.id) {
    fetch("/api/clients", { method: "POST", body: JSON.stringify({ id: wiz.client.id,
      icp: { titles: wiz.titles, keywords: wiz.keywords, industries: wiz.industries, sizes: wiz.sizes, geos: wiz.geos } }) }).catch(() => {});
  }
  closeWizard();
  DB.campaignDrafts = null;
  location.hash = saveResp.id;
  // engagement sources need their own questions (profiles to monitor, topics,
  // copy mode) - hand straight off to the engagement wizard in edit mode
  const engSrc = createdSources.find((s) => s.mechanism === "engagement" && s.id);
  if (engSrc) {
    const engRow = chosen.find((s) => s.mechanism === "engagement") || {};
    protoNote("Draft saved - now tell us whose LinkedIn to watch");
    setTimeout(() => openSourceWizard("engagement", saveResp.id, {
      id: engSrc.id, name: engSrc.idea, titles: wiz.titles,
      config: { countries: [], headcount: wiz.sizes,
        engagement: { include_topics: ((engRow.params || {}).keywords || []).slice(0, 6) } },  // topics from THIS campaign's goal, not generic seeds
    }), 500);
  } else {
    protoNote(kept === null ? "Saved and paused - nothing runs or spends until you switch it to ● Running" : "Draft saved - here it is, pull prospects when ready");
  }
}

/* source wizard: create the deferred (pending) campaign the moment we save a source */
async function ensureCampaign() {
  if (sw.campaignId === "__pending__") {
    const pc = sw._pendingCampaign || { name: "New campaign", paused: true };
    const r = await (await fetch("/api/campaign-drafts", { method: "POST", body: JSON.stringify({ ...pc, sources: [] }) })).json();
    if (!r || !r.ok) { protoNote((r && r.message) || "Couldn't create the campaign"); return false; }
    sw.campaignId = r.id; DB.campaignDrafts = null;
    return true;
  }
  // Adding a source to a platform campaign the tool hasn't adopted yet
  // (camp-sl-*/camp-hr-* with no draft doc). Materialise its doc now — idempotent
  // server-side on the platform-keyed id — so the source has a real campaign to
  // attach to and the campaign becomes fully managed here.
  if (/^camp-(sl|hr)-/.test(String(sw.campaignId))) {
    const drafts = DB.campaignDrafts || [];
    const has = Array.isArray(drafts) && drafts.some((d) => d.id === sw.campaignId);
    if (!has) {
      const doc = window._externalDc && window._externalDc.id === sw.campaignId
        ? { id: sw.campaignId, name: window._externalDc.name, destination: window._externalDc.destination, paused: false }
        : { id: sw.campaignId, name: sw.campaignId, paused: false };
      const r = await (await fetch("/api/campaign-drafts", { method: "POST", body: JSON.stringify({ ...doc, sources: [] }) })).json();
      if (!r || !r.ok) { protoNote((r && r.message) || "Couldn't set up this campaign in the tool"); return false; }
      DB.campaignDrafts = null;
    }
  }
  return true;
}

function parseEngUrls(text) {
  const lines = (text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
  const valid = [], bad = [];
  for (const l of lines) {
    const clean = l.replace(/\?.*$/, "").replace(/\/+$/, "");
    if (/^https?:\/\/(www\.)?linkedin\.com\/(in|company)\/[^/]+$/i.test(clean)) {
      if (!valid.includes(clean)) valid.push(clean);
    } else bad.push(l);
  }
  return { valid, bad };
}
function swUrlHint() {
  const el = document.getElementById("sw-url-hint");
  if (!el) return;
  const { valid, bad } = parseEngUrls(document.getElementById("sw-urls").value);
  el.textContent = `${valid.length} profile${valid.length === 1 ? "" : "s"} to monitor` +
    (bad.length ? ` · ${bad.length} line${bad.length === 1 ? "" : "s"} not a LinkedIn profile URL` : "");
}

function openSourceWizard(type, campaignId, editSrc) {
  sw = { type, campaignId, step: 1, hc: ["11-20", "21-50", "51-100", "101-200"], geo: ["United States", "United Kingdom"], tier: "T2", result: null, csv: null, industries: [] };
  if (type === "engagement") {
    Object.assign(sw, {
      urls: "", inc: [...ENG_INCLUDE_SEED], avd: [...ENG_AVOID_SEED], wild: "", avoid_companies: [],
      geo: [...ENG_COUNTRIES], dm_titles: ENG_TITLE_SEED, avoid_rules: "",
      copy_ref: true, leads_per_day: 25,
    });
    if (editSrc) {  // finish-setup / edit an existing source (e.g. created by the campaign wizard)
      const eng = (editSrc.config || {}).engagement || {};
      const cfg = editSrc.config || {};
      Object.assign(sw, {
        editId: editSrc.id, name: editSrc.name,
        urls: (eng.linkedin_urls || []).join("\n"),
        inc: eng.include_topics?.length ? [...eng.include_topics] : sw.inc,
        avd: eng.avoid_topics?.length ? [...eng.avoid_topics] : sw.avd,
        wild: eng.wildcard || "",
        avoid_companies: eng.avoid_companies?.length ? [...eng.avoid_companies] : [],
        dm_titles: (eng.engager_titles || editSrc.titles || []).join(", ") || sw.dm_titles,
        geo: cfg.countries?.length ? [...cfg.countries] : sw.geo,
        hc: cfg.headcount?.length ? [...cfg.headcount] : sw.hc,
        avoid_rules: eng.avoid_rules || "",
        copy_ref: eng.copy_reference !== false,
        leads_per_day: eng.leads_per_day || 25,
      });
    }
  } else if (editSrc) {  // ✎ Edit targeting for hiring / companies / lookalike: prefill from the source, edit in place
    const cfg = { ...(editSrc.config || {}), ...(editSrc.params || {}) };
    sw.editId = editSrc.id;
    sw.name = editSrc.name;
    if (cfg.countries?.length) sw.geo = [...cfg.countries];
    if (cfg.headcount?.length) sw.hc = [...cfg.headcount];
    if (cfg.tier) sw.tier = cfg.tier;
    sw._touched = {};
    if (type === "hiring") {
      const jt = cfg.job_titles?.length ? cfg.job_titles : (typeof cfg.titles === "string" ? cfg.titles.split(",") : []);
      sw.titles = jt.map((x) => String(x).trim()).filter(Boolean).join(", ");
      sw.dm_titles = (cfg.dm_titles?.length ? cfg.dm_titles : (editSrc.titles || [])).join(", ");
      sw.negatives = (cfg.negative_keywords || []).join(", ");
      sw.industries = Array.isArray(cfg.industry_or) ? [...cfg.industry_or] : [];  // prefill the industry filter (AI-idea path or a prior edit)
      sw.leads_per_day = cfg.leads_per_day || 20;
      sw._touched = { titles: true, dm_titles: true };
    } else if (type === "companies") {
      sw.keywords = typeof cfg.keywords === "string" ? cfg.keywords : (cfg.keywords || []).join(", ");
      sw._touched = { keywords: true };
    } else if (type === "lookalike") {
      sw.icp = cfg.icp || cfg.icp_text || "";

  }
  srcwiz.classList.add("on");
  drawSrc();
  if (type === "hiring" && !editSrc) { sw.titles = sw.titles || "Head of Sales, VP Sales"; prefillHiringRoles(campaignId); }  // async, redraws when found
  if (type === "companies" && !sw.keywords && !editSrc) prefillSuggest("keywords", "keywords");
  if (type === "lookalike" && !sw.icp && !editSrc) prefillSuggest("icp", "icp_text");
  if (type === "engagement" && !editSrc) prefillEngagement(campaignId);
}

/* seed the include-topic list from the client's offer - static seed stays as fallback */
async function prefillEngagement(campaignId) {
  try {
    const [drafts, clients] = await Promise.all([
      (DB.campaignDrafts && DB.campaignDrafts.length) ? DB.campaignDrafts : (await fetch("/api/campaign-drafts")).json(),

    ]);

    const cl = (clients || []).find((c) => c.id === dc.client_id) || {};
    sw._client = cl;
    const t = ((dc.icp || {}).titles || []).length ? dc.icp.titles : ((cl.icp || {}).titles || []);
    if (t.length) sw.dm_titles = t.join(", ");
    const kw = (dc.icp || {}).keywords || (cl.icp || {}).keywords || "";
    if (typeof kw === "string" && kw.trim() && !sw.inc.includes(kw.trim())) sw.inc.push(kw.trim());
    if (sw.step === 1) drawSrc();
  } catch {}
}

async function prefillDmTitles(campaignId) {

/* auto-suggest both role lists from the client's ICP - user edits always win */

      if (!(sw._touched || {}).dm_titles && (r.dm_titles || []).length) sw.dm_titles = r.dm_titles.join(", ");

/* removable role chips backed by the comma-string sw fields the rest of the wizard reads */
function roleList(field) { return (sw[field] || "").split(",").map((t) => t.trim()).filter(Boolean); }
function roleChipRow(field, placeholder) {
  const full = roleList(field).length >= 40;
  return `<div class="chips-center" style="justify-content:flex-start;max-width:520px;margin:4px 0 0">
    ${roleList(field).map((o, i) => `<span class="chip on" title="Click to remove" onclick="roleChipDel('${field}',${i})">${esc(o)}</span>`).join("")}
    <span class="addchip"><input id="add-${field}" placeholder="${esc(placeholder)}"
      onkeydown="if(event.key==='Enter'){event.preventDefault();roleChipAdd('${field}')}"><button class="plus" title="Add" onclick="roleChipAdd('${field}')">+</button></span>
    <button class="btn sm" onclick="roleGenMore('${field}')" ${sw._genbusy || full ? "disabled" : ""}
      title="${full ? "That's plenty - remove a few before adding more" : (roleList(field).length ? "Suggests 10 more like the ones you've picked" : "Suggests 10 to get you started - then it matches what you keep")}">${sw._genbusy === field ? "🪄 Thinking…" : "🪄 Generate more"}</button></div>`;
}

/* POST /api/role-suggest with a hard timeout so a slow model can never lock
   the wizard - always resolves or throws within ~35s */
async function suggestFetch(body) {
  if (sw._clientId && body && !body.client_id) body.client_id = sw._clientId;  // pre-creation wizard: no campaign yet
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 35000);
  try {
    const res = await fetch("/api/role-suggest", { method: "POST", body: JSON.stringify(body), signal: ctrl.signal });
    return await res.json();
  } finally { clearTimeout(t); }
}

/* append ~10 fresh suggestions to one field - current chips + everything this
   client ever declined are the exclusion set, kept history steers the flavour */
const FIELD_FB = { titles: "trigger", dm_titles: "dm", keywords: "keywords", inc: "topics", negatives: "exclusions" };
async function roleGenMore(field) {
  if (sw._genbusy) return;
  sw._genbusy = field;
  sw._touched = { ...(sw._touched || {}), [field]: true };  // a manual generate counts as a touch, so a late auto-fill can't clobber it
  drawSrc();
  try {
    const d = sw._declined || {};
    const isRoles = field === "titles" || field === "dm_titles";
    const body = isRoles
      ? { campaign_id: sw.campaignId, count: 10,
          exclude_trigger: roleList("titles"), exclude_dm: roleList("dm_titles"),
          declined_trigger: d.titles || [], declined_dm: d.dm_titles || [] }
      : { campaign_id: sw.campaignId, count: 10, kind: FIELD_FB[field],
          exclude: field === "inc" ? [...sw.inc, ...sw.avd] : roleList(field),
          declined: d[field] || [] };
    const r = await suggestFetch(body);
    if (r.ok === false) protoNote(`Couldn't generate: ${r.message || "try again in a moment"}`);
    else {
      const cur = field === "inc" ? [...sw.inc] : roleList(field);
      const have = new Set(cur.map((t) => t.toLowerCase()));
      for (const t of (isRoles ? (field === "titles" ? r.trigger_roles : r.dm_titles) : r.suggestions) || []) {
        if (!have.has(t.toLowerCase()) && cur.length < 40) { cur.push(t); have.add(t.toLowerCase()); }
      }
      if (field === "inc") sw.inc = cur; else sw[field] = cur.join(", ");
    }
  } catch (e) { protoNote(e.name === "AbortError" ? "That took too long - try again" : "Couldn't generate right now - try again in a moment"); }
  sw._genbusy = null;
  if (sw.step === 1) drawSrc();
}

/* fire-and-forget feedback so suggestions learn per client */
function roleFeedback(body) {
  try { fetch("/api/role-feedback", { method: "POST", body: JSON.stringify({ campaign_id: sw.campaignId, ...body }) }); } catch {}
}

/* auto-fill a non-hiring ideation field on wizard open - user edits always win */
async function prefillSuggest(field, kind) {
  sw._suggesting = true;
  if (sw.step === 1) drawSrc();
  try {
    const r = await suggestFetch({ campaign_id: sw.campaignId, kind, count: kind === "icp_text" ? 1 : 6 });
    if (r.ok !== false && sw.step === 1 && (r.suggestions || []).length) {
      sw._basedOn = r.based_on;
      if (field === "keywords" && !(sw._touched || {}).keywords) sw.keywords = r.suggestions.join(", ");
      if (field === "icp" && !(sw.icp || "").trim()) sw.icp = r.suggestions[0];
    }
  } catch {}
  sw._suggesting = false;
  if (sw.step === 1) drawSrc();
}

/* lookalike: rewrite the ideal-company description - the one being replaced is a decline */
async function icpRewrite() {
  if (sw._genbusy) return;
  const el = document.getElementById("sw-icp");
  if (el) sw.icp = el.value;  // capture any manual edits first
  const old = (sw.icp || "").trim();
  sw._genbusy = "icp"; drawSrc();
  try {
    sw._declined = sw._declined || {};
    if (old) { (sw._declined.icp = sw._declined.icp || []).push(old); roleFeedback({ declined_icp: [old] }); }
    const r = await suggestFetch({ campaign_id: sw.campaignId, kind: "icp_text", count: 1,
      exclude: old ? [old] : [], declined: sw._declined.icp || [] });
    if (r.ok === false) protoNote(`Couldn't write one: ${r.message || "try again in a moment"}`);
    else if ((r.suggestions || []).length) { sw.icp = r.suggestions[0]; sw._basedOn = r.based_on; }
  } catch (e) { protoNote(e.name === "AbortError" ? "That took too long - try again" : "Couldn't write one right now - try again in a moment"); }
  sw._genbusy = null;
  if (sw.step === 1) drawSrc();
}
function roleChipDel(field, i) {
  const a = roleList(field);
  const gone = a.splice(i, 1)[0];
  sw[field] = a.join(", "); sw._touched = { ...(sw._touched || {}), [field]: true };
  sw._declined = sw._declined || {}; (sw._declined[field] = sw._declined[field] || []).push(gone);
  roleFeedback({ ["declined_" + FIELD_FB[field]]: [gone] });
  drawSrc();
}
function roleChipAdd(field) {
  const el = document.getElementById("add-" + field);
  const v = (el && el.value || "").trim();
  if (!v) return;
  const a = roleList(field);
  if (!a.some((x) => x.toLowerCase() === v.toLowerCase())) a.push(v);
  sw[field] = a.join(", "); sw._touched = { ...(sw._touched || {}), [field]: true }; drawSrc();
}
function srcBack() {  // step back through the wizard (targeting ⇆ preview ⇆ name); only close from the first step
  hideNote();
  if (sw && sw.step > 1) { sw.step -= 1; drawSrc(); return; }
  srcwiz.classList.remove("on");
}
function toggleIn(arr, v) { const i = arr.indexOf(v); i >= 0 ? arr.splice(i, 1) : arr.push(v); drawSrc(); }

}

  if (sw.type === "engagement") {
    const first = (sw.eng_urls || [])[0] || "";
    const slug = first.split("/").slice(-1)[0] || "profiles";
    const extra = (sw.eng_urls || []).length - 1;
    return `Engagers of ${slug}${extra > 0 ? ` +${extra}` : ""}`;
  }
  if (sw.type === "hiring") return `Hiring: ${(sw.titles || "sales roles").split(",")[0].trim()}`;
  if (sw.type === "companies") return `Filter: ${sw.keywords || "companies"}`;
  if (sw.type === "lookalike") return `Lookalikes: ${(sw.icp || "").slice(0, 40) || "ideal companies"}`;
  return `CSV: ${sw.csv?.filename || "upload"}`;
}

function swWarn(msg) {
  // validation the user can actually SEE: inline, on EVERY step (footer hint is
  // always present; the URL hint is used too when we're on the engagement step)
  const foot = document.getElementById("sw-hint");
  if (foot) { foot.textContent = "⚠ " + msg; }
  const h = document.getElementById("sw-url-hint");
  if (h) { h.textContent = "⚠ " + msg; h.style.color = "var(--orange-700)"; h.scrollIntoView({ block: "center" }); }
  protoNote(msg);
}

async function engSavePartial() {
  // save the watch-list half-finished: everything except (possibly) the URLs
  sw.urls = document.getElementById("sw-urls")?.value ?? sw.urls;
  sw.wild = (document.getElementById("sw-wild")?.value || sw.wild || "").trim();
  sw.dm_titles = document.getElementById("sw-dm")?.value ?? sw.dm_titles;
  sw.avoid_rules = (document.getElementById("sw-avrules")?.value || sw.avoid_rules || "").trim();
  sw.leads_per_day = parseInt(document.getElementById("sw-lpd")?.value, 10) || sw.leads_per_day || 25;
  const u = parseEngUrls(sw.urls);
  if (u.bad.length) { swWarn(`${u.bad.length} line${u.bad.length === 1 ? " isn't" : "s aren't"} a LinkedIn profile URL - fix or remove before saving: ${u.bad[0].slice(0, 60)}`); return; }
  sw.eng_urls = u.valid;
  const csvList = (s) => (s || "").split(",").map((t) => t.trim()).filter(Boolean);
  const engConfig = {
    engagement: {
      ...(((window._drafts || []).find((x) => x.id === sw.editId) || {}).config?.engagement || {}),
      linkedin_urls: sw.eng_urls,
      include_topics: sw.inc, avoid_topics: sw.avd, wildcard: sw.wild, avoid_companies: sw.avoid_companies || [],
      engager_titles: csvList(sw.dm_titles), avoid_rules: sw.avoid_rules,
      copy_reference: !!sw.copy_ref, leads_per_day: sw.leads_per_day,
    },
    countries: sw.geo, headcount: sw.hc, leads_per_day: sw.leads_per_day,
  };
  if (!sw.editId && !(await ensureCampaign())) return;
  const r = sw.editId
    ? await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify({ id: sw.editId, name: sw.name || undefined, titles: csvList(sw.dm_titles), config: engConfig }) })).json()
    : await (await fetch("/api/sources", { method: "POST", body: JSON.stringify({ type: "engagement", mechanism: "engagement", name: sw.name || "LinkedIn engagement watch-list", campaign_id: sw.campaignId, titles: csvList(sw.dm_titles), config: engConfig }) })).json();
  if (r && r.ok === false) { protoNote(r.message || "Couldn't save"); return; }
  srcwiz.classList.remove("on");
  protoNote(sw.eng_urls.length
    ? "Saved - press ▶ Start monitoring whenever you want it live"
    : "Saved without profiles - add them any time with ✎ Edit profiles; nothing runs until then");
  if (document.getElementById("draftlist")) renderDrafts(sw.campaignId); else renderDraftCampaign(sw.campaignId);
}

async function srcNext() {
  if (sw.step === 1) {
    if (sw.type === "csv") {
      const f = document.getElementById("sw-file").files[0];
      if (!f) { protoNote("Choose a file first"); return; }
      const text = await f.text();
      const sep = text.includes("\t") ? "\t" : ",";
      const lines = text.split(/\r?\n/).filter((l) => l.trim());
      const header = lines[0].split(sep).map((h) => h.replace(/^"|"$/g, "").trim());
      const rows = lines.slice(1, 9).map((l) => l.split(sep).map((v) => v.replace(/^"|"$/g, "").trim()));
      sw.csv = { filename: f.name, rows: lines.length - 1, header };
      sw.result = { ok: true, cost: "parsed locally", total_companies: lines.length - 1,
        sample: rows.map((cells) => ({ name: cells[0], size: "", industry: "", country: "" })) };
      sw.step = 2; drawSrc(); return;
    }
    if (sw.type === "engagement") {
      sw.urls = document.getElementById("sw-urls").value;
      sw.wild = document.getElementById("sw-wild")?.value.trim() || sw.wild || "";
      sw.avoid_rules = document.getElementById("sw-avrules").value.trim();
      sw.leads_per_day = parseInt(document.getElementById("sw-lpd").value, 10) || 25;
      const u = parseEngUrls(sw.urls);
      if (!u.valid.length) { swWarn("Add at least one LinkedIn profile URL (linkedin.com/in/… or linkedin.com/company/…) - or use “💾 Save for later” in the footer and add them later"); return; }
      if (u.bad.length) { swWarn(`${u.bad.length} line${u.bad.length === 1 ? " isn't" : "s aren't"} a LinkedIn profile URL - fix or remove: ${u.bad[0].slice(0, 60)}`); return; }
      if (!sw.inc.length && !sw.wild.trim()) { swWarn("Keep at least one topic that counts - it's what posts are scored against"); return; }
      if (!(sw.dm_titles || "").trim()) { swWarn("Who counts as a warm lead is required - add at least one role"); return; }
      roleFeedback({ kept_dm: roleList("dm_titles"), kept_topics: sw.inc });  // what survived pruning = positive signal
      sw.eng_urls = u.valid;
      sw.result = { ok: true };
      sw.step = 2; drawSrc(); return;
    }
    sw.titles = document.getElementById("sw-titles")?.value || sw.titles;
    sw.dm_titles = document.getElementById("sw-dm")?.value ?? sw.dm_titles;
    sw.negatives = document.getElementById("sw-neg")?.value ?? sw.negatives;
    sw.leads_per_day = parseInt(document.getElementById("sw-lpd")?.value, 10) || sw.leads_per_day || 20;
    sw.keywords = document.getElementById("sw-keywords")?.value || sw.keywords;
    sw.icp = document.getElementById("sw-icp")?.value || sw.icp;
    if (sw.type === "hiring" && !(sw.dm_titles || "").trim()) { swWarn("Who we email is required - add at least one decision-maker role"); return; }
    if (sw.type === "hiring") roleFeedback({ kept_trigger: roleList("titles"), kept_dm: roleList("dm_titles") });  // what survived pruning = positive signal
    if (sw.type === "companies" && !(sw.keywords || "").trim()) { swWarn("Describe the buyer type first"); return; }
    if (sw.type === "lookalike" && !(sw.icp || "").trim()) { swWarn("Describe the companies first"); return; }
    sw.step = 2; sw.result = null; drawSrc();
    const payload = sw.type === "hiring"
      ? { job_titles: (sw.titles || "").split(",").map((t) => t.trim()).filter(Boolean), countries: sw.geo.map((g) => CC[g] || g), min_emp: 11, max_emp: 500, days: 30,
          dm_count: (sw.dm_titles || "").split(",").map((t) => t.trim()).filter(Boolean).length,
          dm_titles: (sw.dm_titles || "").split(",").map((t) => t.trim()).filter(Boolean),
          industries: sw.industries || [],
          source_id: sw.editId,  // editing an existing source → size the preview from its own kept-lead history
          country_names: sw.geo }
      : sw.type === "companies"
        ? { keywords: roleList("keywords"), headcount: sw.hc, countries: sw.geo }
        : { icp_text: sw.icp, tier: sw.tier, headcount: sw.hc, countries: sw.geo };
    if (sw.type === "companies") roleFeedback({ kept_keywords: roleList("keywords") });
    if (sw.type === "lookalike" && (sw.icp || "").trim()) roleFeedback({ kept_icp: [sw.icp.trim()] });
    try {
      const r = await fetch(`/api/preview/${sw.type}`, { method: "POST", body: JSON.stringify(payload) });
      sw.result = await r.json();
    } catch (e) { sw.result = await fetchJsonRetry(`/api/preview/${sw.type}`, payload); }
    drawSrc();
  } else if (sw.step === 2) {
    sw.step = 3; drawSrc();
  } else {
    sw.name = document.getElementById("sw-name").value;
    const csvList = (s) => (s || "").split(",").map((t) => t.trim()).filter(Boolean);
    if (!(sw.name || "").trim()) { swWarn("Give the source a name so you can find it later"); return; }
    if (sw.type === "hiring" && !csvList(sw.dm_titles).length) { swWarn("Who we email is required - go back and add decision-maker roles"); return; }
    if (!sw.editId && !(await ensureCampaign())) return;
    const engConfig = sw.type === "engagement" ? {
      engagement: {
        ...(((window._drafts || []).find((x) => x.id === sw.editId) || {}).config?.engagement || {}),  // keep trigify ids on edit
        linkedin_urls: sw.eng_urls,
        include_topics: sw.inc, avoid_topics: sw.avd, wildcard: sw.wild, avoid_companies: sw.avoid_companies || [],
        engager_titles: csvList(sw.dm_titles), avoid_rules: sw.avoid_rules,
        copy_reference: !!sw.copy_ref, leads_per_day: sw.leads_per_day || 25,
      },
      countries: sw.geo, headcount: sw.hc, leads_per_day: sw.leads_per_day || 25,
    } : null;
    if (sw.editId) {  // ✎ Edit targeting / finish-setup: update the existing source instead of creating a twin
      // Non-engagement edits write targeting into params (wins the {config, params} merge the
      // pull reads, and leaves config.keywords/industries/precision patterns untouched).
      const body = sw.type === "engagement"
        ? { id: sw.editId, name: sw.name, titles: csvList(sw.dm_titles), config: engConfig }
        : sw.type === "hiring"
          ? { id: sw.editId, name: sw.name, titles: csvList(sw.dm_titles), params: {
              job_titles: csvList(sw.titles), dm_titles: csvList(sw.dm_titles),
              negative_keywords: csvList(sw.negatives), leads_per_day: sw.leads_per_day || 20,
              industry_or: sw.industries || [],  // always write it: [] here overrides any AI-set config.industry_or, so clearing the filter takes effect
              countries: sw.geo, headcount: sw.hc, days: 30 } }
          : sw.type === "companies"
            ? { id: sw.editId, name: sw.name, params: { keywords: sw.keywords, countries: sw.geo, headcount: sw.hc } }
            : { id: sw.editId, name: sw.name, params: { icp: sw.icp, tier: sw.tier, countries: sw.geo, headcount: sw.hc } };
      const restore2 = busyBtn(document.getElementById("src-next"), "Saving…");
      if (restore2 === null) return;  // save already in flight — swallow the double-click
      let r2;
      try { r2 = await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify(body) })).json(); }
      catch { r2 = { ok: false, message: "Couldn't reach the server - try again" }; }
      restore2();
      if (r2.ok === false) { protoNote(r2.message || "Couldn't save the source"); return; }
      srcwiz.classList.remove("on");
      protoNote(sw.type === "engagement"
        ? 'Saved - removed profiles stop being watched automatically; if you added new ones, hit "▶ Start monitoring" to watch them'
        : 'Targeting saved ✓ - hit "Find people again" to pull with the new settings.');
      renderDrafts(sw.campaignId);
      return;
    }
    const restore = busyBtn(document.getElementById("src-next"), "Saving…");
    if (restore === null) return;  // save already in flight — swallow the double-click
    let r;
    try { r = await (await fetch("/api/sources", { method: "POST", body: JSON.stringify({
      type: sw.type, name: sw.name, campaign_id: sw.campaignId,
      total: sw.result?.total_prospects || sw.result?.total_companies || null,
      titles: (sw.type === "hiring" || sw.type === "engagement") ? csvList(sw.dm_titles) : undefined,
      config: sw.type === "engagement" ? engConfig
        : { titles: sw.titles, job_titles: sw.type === "hiring" ? csvList(sw.titles) : undefined,
        negative_keywords: sw.type === "hiring" ? csvList(sw.negatives) : undefined,
        leads_per_day: sw.type === "hiring" ? (sw.leads_per_day || 20) : undefined,
        industry_or: sw.type === "hiring" && (sw.industries || []).length ? sw.industries : undefined,
        keywords: sw.keywords, icp: sw.icp, tier: sw.tier, headcount: sw.hc, countries: sw.geo, days: 30, csv: sw.csv },
    }) })).json(); }
    catch { r = { ok: false, message: "Couldn't reach the server - try again" }; }
    restore();
    if (!r.ok) { protoNote(r.message || "Couldn't save the source"); return; }
    srcwiz.classList.remove("on");
    hideNote();
    DB.campaignDrafts = null;  // invalidate so the list/detail re-fetches with the new campaign + counts
    protoNote("Source saved as draft");
    // land the user on the new campaign (matches "Save for later"); if already there, re-render it.
    if (location.hash.slice(1) !== String(sw.campaignId)) location.hash = sw.campaignId;
    else if (document.getElementById("draftlist")) renderDrafts(sw.campaignId); else renderDraftCampaign(sw.campaignId);
  }
}

/* Launch gate — opening it counts as a recorded check run */
function openQAGate(id) {
  const c = (DB.campaigns || []).find((x) => x.id === id);
  const d = DB.campaign_details?.[String(id)];
  qagate.classList.add("on");
  const body = document.getElementById("qagate-body");
  if (!d) { body.innerHTML = '<div class="empty">Not in the snapshot detail set</div>'; return; }
  const checks = computeChecks(c, d);
  const icon = { pass: '<span class="pill g">PASS</span>', warn: '<span class="pill a">WARN</span>', fail: '<span class="pill r">FAIL</span>' };
  body.innerHTML = checks.map(([lvl, t, dsc]) => `
    <div class="qa-row">${icon[lvl]}<div><div class="t">${esc(t)}</div><div class="d">${esc(dsc)}</div></div></div>`).join("");
  fetch("/api/qa-history", { method: "POST", body: JSON.stringify({
    campaign_id: id,
    checks: checks.map(([level, title, detail]) => ({ level, title, detail })),
    fails: checks.filter((x) => x[0] === "fail").length,
    warns: checks.filter((x) => x[0] === "warn").length,
  }) }).catch(() => {});
}

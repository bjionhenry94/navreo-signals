/* Signal-velocity line chart: new people found per day, one line per source + a bold "All" line.
   Buckets whatever lead rows we have by pulled_at date. Degrades to dots when there's only one day. */
function velocityChart(rows, srcs) {
  const days = {};  // "YYYY-MM-DD" -> { [sid]: count, __all: count }
  // Cap the range to the last 30 days (matches the homepage performance graph's
  // window) — anything older drops off so the chart tracks recent velocity.
  const cutoff = new Date(Date.now() - 29 * 864e5).toISOString().slice(0, 10);
  (rows || []).forEach((r) => {
    const d = String(r.pulled_at || "").slice(0, 10);
    if (!d || d < cutoff) return;
    const sid = r._sid == null ? "unknown" : r._sid;
    const bucket = (days[d] = days[d] || {});
    bucket[sid] = (bucket[sid] || 0) + 1;
    bucket.__all = (bucket.__all || 0) + 1;
  });
  const dates = Object.keys(days).sort();
  if (!dates.length) return '<div class="small muted" style="padding:16px 0">No signals yet - the velocity graph builds as daily pulls come in.</div>';
  const srcList = (srcs || []).filter((s) => days[dates[dates.length - 1]] && dates.some((d) => days[d][s.id]));
  const palette = ["#E8590C", "#1971C2", "#2F9E44", "#9C36B5", "#F08C00", "#0C8599", "#C2255C"];
  const series = [{ name: "All", color: "#111", width: 2.5, vals: dates.map((d) => days[d].__all || 0) }];
  srcList.forEach((s, i) => series.push({ name: s.name, color: palette[i % palette.length], width: 1.5, vals: dates.map((d) => days[d][s.id] || 0) }));
  const W = 640, H = 190, padL = 30, padR = 12, padT = 12, padB = 26;
  const maxV = Math.max(1, ...dates.map((d) => days[d].__all || 0));
  const x = (i) => dates.length === 1 ? (padL + (W - padL - padR) / 2) : padL + i * (W - padL - padR) / (dates.length - 1);
  const y = (v) => padT + (1 - v / maxV) * (H - padT - padB);
  const grid = [0, 0.5, 1].map((f) => { const v = maxV * f; const yy = y(v); return `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W - padR}" y2="${yy.toFixed(1)}" stroke="var(--line)" stroke-width="1"/><text x="${padL - 6}" y="${(yy + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--ink-3)">${Math.round(v)}</text>`; }).join("");
  const drawLine = (s) => {
    if (s.vals.length === 1) return `<circle cx="${x(0).toFixed(1)}" cy="${y(s.vals[0]).toFixed(1)}" r="4" fill="${s.color}"/>`;
    const pts = s.vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    return `<polyline fill="none" stroke="${s.color}" stroke-width="${s.width}" points="${pts}" stroke-linejoin="round" stroke-linecap="round"/>`;
  };
  const xlab = (i) => `<text x="${x(i).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="9" fill="var(--ink-3)">${esc(dates[i].slice(5))}</text>`;
  const xticks = dates.length === 1 ? xlab(0) : [xlab(0), xlab(dates.length - 1)].join("");
  const legend = series.map((s) => `<span style="display:inline-flex;align-items:center;gap:5px;margin-right:12px;font-size:11px;color:var(--ink-2)"><span style="width:14px;height:0;border-top:${s.width >= 2 ? "3" : "2"}px solid ${s.color};display:inline-block"></span>${esc(String(s.name).length > 34 ? String(s.name).slice(0, 33) + "…" : s.name)}</span>`).join("");
  const svg = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-width:${W}px;display:block">${grid}${xticks}${series.map(drawLine).join("")}</svg>`;
  const chart = chartWrap(svg, {
    W, H, padT, padB, maxV,
    xs: dates.map((_, i) => +x(i).toFixed(1)),
    labels: dates.map((d) => d.slice(5)),
    series: series.map((s) => ({ name: s.name, color: s.color, vals: s.vals })),
    suffix: "",
  });
  return `${chart}
    <div style="margin-top:8px;display:flex;flex-wrap:wrap;row-gap:4px">${legend}</div>
    ${dates.length === 1 ? '<div class="small muted" style="margin-top:6px">One day of data so far - the lines fill in as the daily run keeps pulling.</div>' : ""}`;
}

/* Cross-campaign activity chart for the list page: named daily lines (Found / Sent).
   `dates` = sorted YYYY-MM-DD list, `series` = [{name, color, vals[]}] aligned to dates. */
function activityChart(dates, series) {

  const x = (i) => dates.length === 1 ? (padL + (W - padL - padR) / 2) : padL + i * (W - padL - padR) / (dates.length - 1);

  const drawLine = (s) => {
    if (s.vals.length === 1) return `<circle cx="${x(0).toFixed(1)}" cy="${y(s.vals[0]).toFixed(1)}" r="4" fill="${s.color}"/>`;
    const pts = s.vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    return `<polyline fill="none" stroke="${s.color}" stroke-width="${s.width || 2}" points="${pts}" stroke-linejoin="round" stroke-linecap="round"/>`;
  };

  const xticks = dates.length === 1 ? xlab(0) : [xlab(0), xlab(dates.length - 1)].join("");

  const svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:210px;display:block">${grid}${xticks}${series.map(drawLine).join("")}</svg>`;

}

/* Homepage performance graph: ONE multi-line chart of per-day sent (left axis,
   count) + reply rate + bounce rate (right axis, %). Data comes straight from
   /api/perf-daily (the Supabase data layer) — a null datapoint is a GAP in the
   line, never a fabricated zero, and a series with no data in the window stays
   as a labelled absent line in the legend. */
function perfChart(pd) {
  const dates = pd.days || [];
  if (!dates.length) return '<div class="small muted" style="padding:16px 0">No performance data yet.</div>';
  const W = 640, H = 190, padL = 34, padR = 38, padT = 12, padB = 26;
  const sentVals = pd.sent || [], rrVals = pd.reply_rate || [], brVals = pd.bounce_rate || [];
  const maxSent = Math.max(1, ...sentVals.filter((v) => v != null));
  const rateMaxRaw = Math.max(...rrVals.filter((v) => v != null), ...brVals.filter((v) => v != null), 0);
  const maxRate = rateMaxRaw > 0 ? Math.max(0.5, Math.ceil(rateMaxRaw * 2) / 2) : 1;
  const x = (i) => dates.length === 1 ? (padL + (W - padL - padR) / 2) : padL + i * (W - padL - padR) / (dates.length - 1);
  const y = (v) => padT + (1 - v / maxSent) * (H - padT - padB);
  // rates are drawn against the RIGHT axis: scale into the left-axis space so
  // one y() works for line drawing and the shared tooltip dot positioning
  const rateScaled = (arr) => arr.map((v) => v == null ? null : v / maxRate * maxSent);
  const series = [
    { name: "Emails sent", color: "#1971C2", width: 2.5, vals: sentVals, disp: sentVals, axis: "left" },
    { name: "Reply rate (%)", color: "#2F9E44", width: 2, vals: rateScaled(rrVals), disp: rrVals, axis: "right" },
    { name: "Bounce rate (%)", color: "#E8590C", width: 2, vals: rateScaled(brVals), disp: brVals, axis: "right" },
  ];
  const grid = [0, 0.5, 1].map((f) => { const yy = y(maxSent * f); return `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W - padR}" y2="${yy.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`
    + `<text x="${padL - 6}" y="${(yy + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--ink-3)">${Math.round(maxSent * f)}</text>`
    + `<text x="${W - padR + 6}" y="${(yy + 3).toFixed(1)}" text-anchor="start" font-size="9" fill="var(--ink-3)">${(maxRate * f).toFixed(1)}%</text>`; }).join("");
  // null-aware: draw each contiguous non-null run as its own segment, so a
  // missing day is a visible gap (a lone point renders as a dot)
  const drawLine = (s) => {
    const segs = []; let run = [];
    s.vals.forEach((v, i) => {
      if (v == null) { if (run.length) segs.push(run); run = []; }
      else run.push([x(i), y(v)]);
    });
    if (run.length) segs.push(run);
    return segs.map((seg) => seg.length === 1
      ? `<circle cx="${seg[0][0].toFixed(1)}" cy="${seg[0][1].toFixed(1)}" r="3" fill="${s.color}"/>`
      : `<polyline fill="none" stroke="${s.color}" stroke-width="${s.width}" points="${seg.map((p) => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ")}" stroke-linejoin="round" stroke-linecap="round"/>`).join("");
  };
  const xlab = (i) => `<text x="${x(i).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="9" fill="var(--ink-3)">${esc(dates[i].slice(5))}</text>`;
  const xticks = dates.length === 1 ? xlab(0) : [xlab(0), xlab(Math.floor(dates.length / 2)), xlab(dates.length - 1)].join("");
  const legend = series.map((s) => {
    const nDays = s.disp.filter((v) => v != null).length;
    const hasData = nDays > 0;
    // a rate series the data layer only started recording recently (e.g.
    // mailbox_stats_daily began mid-window) shows as a short fragment — say so
    // in the legend so it reads as "new data source", not "broken empty chart"
    const sparse = hasData && nDays < Math.ceil(dates.length * 0.4);
    return `<span style="display:inline-flex;align-items:center;gap:5px;margin-right:14px;font-size:11px;color:var(--ink-2)" title="${esc((pd.labels || {})[s.axis === "left" ? "sent" : (s.name.startsWith("Reply") ? "reply_rate" : "bounce_rate")] || "")}">`
      + `<span style="width:14px;height:0;border-top:${s.width >= 2.5 ? "3" : "2"}px solid ${s.color};display:inline-block;${hasData ? "" : "opacity:.35"}"></span>`
      + `${esc(s.name)}${hasData ? (sparse ? ` <span class="muted">(last ${nDays} day${nDays === 1 ? "" : "s"} only)</span>` : "") : ' <span class="muted">(no data in this window)</span>'}</span>`;
  }).join("");
  const svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:210px;display:block">${grid}${xticks}${series.map(drawLine).join("")}</svg>`;
  const chart = chartWrap(svg, {
    W, H, padT, padB, maxV: maxSent,
    xs: dates.map((_, i) => +x(i).toFixed(1)),
    labels: dates,
    series: series.map((s) => ({ name: s.name, color: s.color, vals: s.vals, disp: s.disp })),
    suffix: "",
  });
  const anyGap = series.some((s) => s.disp.some((v) => v == null) && s.disp.some((v) => v != null));
  // Plain-English "is it working?" line — the raw multi-line graph answers it
  // for analysts, but non-technical founders asked for the verdict spelled out.
  // Bounce rate is the clear health signal (deliverability); reply rate is shown
  // as context, no verdict (its "good" level is offer/channel-dependent). Only
  // states a verdict when there IS real data — never invents a health call.
  const lastOf = (arr) => { for (let i = arr.length - 1; i >= 0; i--) if (arr[i] != null) return arr[i]; return null; };
  const lastBounce = lastOf(brVals), lastReply = lastOf(rrVals), lastSent = lastOf(sentVals);
  let verdict = "";
  if (lastBounce != null) {
    const tone = lastBounce < 2 ? ["#2F9E44", "healthy"] : lastBounce < 5 ? ["#E8590C", "worth watching"] : ["#E03131", "high — check deliverability"];
    verdict = `<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:${tone[0]};display:inline-block"></span>`
      + `<b>Bounce rate ${lastBounce}%</b> — ${tone[1]}${lastReply != null ? ` · reply rate ${lastReply}%` : ""}${lastSent != null ? ` · ~${fmt(lastSent)} sent on the latest recorded day` : ""}</span>`;
  } else if (lastSent != null) {
    verdict = `<b>~${fmt(lastSent)} sent on the latest recorded day.</b> Reply/bounce rates start showing once the daily deliverability sync has a few days of data.`;
  }
  return `${chart}
    ${verdict ? `<div class="small" style="margin-top:8px;color:var(--ink-2)">${verdict}</div>` : ""}
    <div style="margin-top:8px;display:flex;flex-wrap:wrap;row-gap:4px">${legend}</div>
    ${anyGap ? '<div class="small muted" style="margin-top:6px">Gaps mean no data recorded for that day — nothing here is estimated. Counts on the left axis, rates on the right. Hover a line for its exact value; hover a legend label for where the number comes from.</div>' : '<div class="small muted" style="margin-top:6px">Counts on the left axis, rates on the right. Hover a line for its exact value.</div>'}`;
}

async function sendAllLeads(campaignId) {
  const todo = (window._leadRows || draftProspects(window._drafts || []))
    .filter((x) => !x.verdict && !(Object.keys(x.pushed || {}).length || x.pushed_to) && x._sid != null && (x._idx != null || x.linkedin));
  if (!todo.length) return;
  let sent = 0, failed = 0;
  for (let n = 0; n < todo.length; n++) {
    protoNote(`Sending ${n + 1} of ${todo.length}…`);
    const body = { id: todo[n]._sid, verdict: "keep" };
    if (todo[n]._idx != null) body.index = todo[n]._idx;
    if (todo[n].linkedin) body.linkedin = todo[n].linkedin;
    try {
      const r = await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify(body) })).json();
      if (r.push && Object.values(r.push.tools || {}).some((v) => v.ok)) sent++; else failed++;
    } catch { failed++; }
  }
  protoNote(`Done - ${sent} sent${failed ? `, ${failed} couldn't be sent (see rows)` : ""}`);
  renderDraftCampaign(campaignId);
}

function applyVerdictLocal(sid, idx, verdict, r) {
  const s = (window._drafts || []).find((x) => x.id === sid);
  const pr = s && (s.prospects || [])[idx];
  if (!pr) return null;
  if (verdict === "undo") {
    if (!r || !r.push || r.push.ok !== false) { delete pr.pushed; delete pr.pushed_to; delete pr.push_fail; pr.verdict = null; }
    return pr;
  }
  pr.verdict = verdict;
  const t = (r && r.push && r.push.tools) || {};
  if (t.smartlead && t.smartlead.ok) { pr.pushed = { ...(pr.pushed || {}), smartlead: true }; if (!pr.email) pr.email = "(found)"; }
  if (t.heyreach && t.heyreach.ok) { pr.pushed = { ...(pr.pushed || {}), heyreach: true }; if (!pr.email) pr.email_checked = true; }
  const fails = {};
  for (const k of Object.keys(t)) if (!t[k].ok) fails[k] = t[k].message;
  if (Object.keys(fails).length) pr.push_fail = fails; else delete pr.push_fail;
  return pr;
}

function refreshLeadChrome() {
  const rows = window._leadRows || [];
  if (!rows.length) return;
  const wasSent = (p) => Object.keys(p.pushed || {}).length || p.pushed_to;
  const counts = {
    all: rows.length,
    email: rows.filter((p) => p.email && !wasSent(p)).length,
    linkedin: rows.filter((p) => !p.email && !wasSent(p)).length,
    sent: rows.filter(wasSent).length,
  };
  document.querySelectorAll("[data-chip]").forEach((b) => { b.textContent = `${b.dataset.lab} (${counts[b.dataset.chip]})`; });
  const sa = document.querySelector("[data-sendall]");
  if (sa) {

    if (n < 2) sa.parentElement.style.display = "none";
    else sa.textContent = `Send all ${n} unreviewed…`;
  }
}

async function setVerdict(sid, idx, verdict, campaignId, linkedin) {
  let r = null;

  try { r = await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify(body) })).json(); } catch {}
  pushToast(r, verdict);
  let pr = idx != null ? applyVerdictLocal(sid, idx, verdict, r) : null;
  if (r && r.lead) pr = { ...(pr || {}), ...r.lead, verdict: r.undo ? null : (r.lead.verdict || verdict) };
  const lr = (window._leadRows || []).find((p) => (linkedin && p.linkedin === linkedin) || (idx != null && p._sid === sid && p._idx === idx));
  if (lr && pr) Object.assign(lr, pr, { pushed: pr.pushed || {}, pushed_to: pr.pushed_to || null });

}

/* ── Campaign scorecard helpers (Smartlead-style per-campaign performance) ──
   Every number here comes from /api/campaign-scorecard (live Smartlead) or the
   signal leads count — nothing is invented. `meetings === null` means the
   optimiser cache doesn't cover that campaign, so the tile is GATED (shows "—"),
   never faked. */
function scPct(num, den) { return den > 0 ? (100 * num / den) : 0; }
function scRing(pct, gated) {
  if (gated) return `<div class="sc-ring gated" title="No completion data yet"><span class="pv sc-muted">–</span></div>`;
  const p = Math.max(0, Math.min(100, Math.round(pct)));
  return `<div class="sc-ring" style="--pct:${p}" title="${p}% of leads have finished the sequence"><span class="pv">${p}%</span></div>`;
}
function scRatio(sent, pos) {
  if (!pos || pos <= 0) return `<span class="sc-muted">–</span>`;
  return `1 per ${fmt(Math.round(sent / pos))}`;
}
function scStat(cls, n, label, title) {
  return `<div class="sc-stat"${title ? ` title="${esc(title)}"` : ""}><div class="n ${cls}">${n}</div><div class="l">${esc(label)}</div></div>`;
}
/* Grid cell helpers — same behaviour as the Lists page: emails/URLs become quiet
   links, everything else is escaped text. Kept identical so a campaign's People
   grid renders cells exactly like a saved list's. */
function esc4attr(s) { return esc(s).replace(/'/g, "&#39;"); }
function linkifyCell(raw) {
  const s = String(raw ?? "");
  if (!s) return "";
  const trimmed = s.trim();
  if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmed))
    return `<a class="celllink" href="mailto:${esc4attr(trimmed)}">${esc(s)}</a>`;
  let url = null;
  if (/^https?:\/\//i.test(trimmed)) url = trimmed;
  else if (/^(www\.)?linkedin\.com\//i.test(trimmed)) url = "https://" + trimmed;
  if (url) return `<a class="celllink" href="${esc4attr(url)}" target="_blank" rel="noopener noreferrer">${esc(s)}</a>`;
  return esc(s);
}
/* "Signals Sourced" — the count of people this campaign's SIGNALS surfaced.
   Only shown when it actually has signal-sourced leads; pinned to the far right. */
function signalsTile(leadsSourced) {
  if (!(leadsSourced != null && leadsSourced > 0)) return "";
  return `<div class="sc-stat" style="margin-left:auto;text-align:right" title="People your signals surfaced for this campaign"><div class="n sc-c-leads">${fmt(leadsSourced)}</div><div class="l">Signals Sourced</div></div>`;
}
/* Per-campaign stat strip: completion ring + coloured columns. m = the campaign's
   Smartlead metrics (or null when it has no email destination); leadsSourced = the
   signal leads count for this campaign (or null when unknown). */
function scRowHtml(m, leadsSourced) {
  const hasSL = !!(m && (m.total > 0 || m.sent > 0 || m.status));
  const ring = scRing(m ? scPct(m.completed, m.total) : 0, !hasSL || !m.total);
  const pcNum = (num, den) => (m && den) ? `${scPct(num, den).toFixed(1)}<span class="pc">%</span>` : (m ? `0<span class="pc">%</span>` : "–");
  const sent = m ? fmt(m.sent) : "–";
  const ratio = m ? scRatio(m.sent, m.positives) : "–";
  // "Leads" = everyone currently in the campaign (Smartlead's own total), NOT the
  // signals-sourced count (that's the far-right Signals Sourced tile).
  const leadsIn = (m && m.total != null) ? fmt(m.total) : "–";
  const pos = (m && m.positives != null) ? fmt(m.positives) : "–";
  const meet = (m && m.meetings != null) ? fmt(m.meetings)
    : `<span class="sc-muted" title="Meetings source not connected for this campaign">–</span>`;
  return `<div class="sc-row">
    ${ring}

      ${scStat("sc-c-sent", sent, "Emails sent")}

      ${scStat("sc-c-pos", pos, "Positives", "Positive replies")}
      ${scStat("sc-c-sent", ratio, "Sends / positive", "Emails sent per positive reply")}
      ${scStat("sc-c-bounce", pcNum(m && m.bounced, m && m.sent), "Bounce rate")}

}
/* HeyReach campaigns have no email metrics — show their real LinkedIn progress
   instead (people / in-progress / finished / failed), same row shape so the list
   stays visually consistent. Tiles are labelled, so it's clear which is which. */
function scRowHtmlHeyReach(hr, leadsSourced) {

/* Collective strip: the same six metrics aggregated across every campaign, plus
   total leads sourced. Rates are recomputed from summed numerators/denominators
   (never averaged-of-averages). Meetings + leads gate to "—" when unknown. */
function scCollectiveHtml(sc, leadCounts, drafts) {
  const camps = (sc && sc.campaigns) || {};
  let sent = 0, replied = 0, positives = 0, bounced = 0, total = 0;
  let meetings = 0, meetingsCovered = false;
  // Top line across the WHOLE Smartlead account — every campaign the scorecard
  // caches from Supabase, not just the ones managed in this tool. (Smartlead
  // only for now; HeyReach has no comparable email funnel.)
  Object.keys(camps).forEach((k) => {
    const m = camps[k];
    if (!m) return;
    sent += m.sent || 0; replied += m.replied || 0; positives += m.positives || 0;
    bounced += m.bounced || 0; total += m.total || 0;
    if (m.meetings != null) { meetings += m.meetings; meetingsCovered = true; }
  });
  // "Signals Sourced" stays scoped to campaigns run in this tool — that's what a
  // signal-sourced lead means — summed from the managed drafts' lead counts.
  let leads = 0, leadsKnown = false;
  (drafts || []).forEach((dc) => {
    const lc = leadCounts && leadCounts[String(dc.id)];
    if (lc && typeof lc.leads === "number") { leads += lc.leads; leadsKnown = true; }
  });
  const tile = (lab, val, sub) => `<div class="sc-tile"><div class="lab">${esc(lab)}</div><div class="val">${val}</div>${sub ? `<div class="sub">${esc(sub)}</div>` : ""}</div>`;
  const ratio = positives > 0 ? `1 per ${fmt(Math.round(sent / positives))}` : `<span class="sc-muted">–</span>`;
  const replyPct = sent ? `${(100 * replied / sent).toFixed(1)}%` : "–";
  return `<div class="sc-tiles">
    ${tile("Leads", fmt(total), "people across all campaigns")}
    ${tile("Emails sent", fmt(sent), "all-time")}
    ${tile("Reply rate", replyPct, `${fmt(replied)} replies`)}
    ${tile("Positives", fmt(positives), "positive replies")}
    ${tile("Sends / positive", ratio, "lower is better")}
    ${tile("Meetings", meetingsCovered ? fmt(meetings) : `<span class="sc-muted">–</span>`, meetingsCovered ? "booked" : "source not connected")}
    ${tile("Signals Sourced", leadsKnown ? fmt(leads) : "–", "found by your signals")}
  </div>`;
}
/* Collective trend lines: how the aggregate metrics move over time. Real numbers
   from Smartlead's own day-wise-overall-stats (via /api/deliverability-trends) —
   the same fleet series the deliverability page trends. Reuses activityChart
   (the list's existing chart helper). Only days with real sends are plotted, so
   weekend zero-send gaps don't draw a misleading dip to zero. */
function scTrendHtml(tr) {
  const s = tr && tr.series;
  if (!s || !Array.isArray(s.days) || !s.days.length)
    return '<div class="small muted" style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)">Trends build as your daily sends accumulate.</div>';
  const idx = s.days.map((_, i) => i).filter((i) => (s.sent[i] || 0) > 0);
  if (!idx.length)
    return '<div class="small muted" style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)">Trends build as your daily sends accumulate.</div>';
  const days = idx.map((i) => s.days[i]);

  const reply = idx.map((i) => (s.reply_pct[i] == null ? 0 : s.reply_pct[i]));
  const bounce = idx.map((i) => (s.bounce_pct[i] == null ? 0 : s.bounce_pct[i]));
  const sentChart = activityChart(days, [{ name: "Emails sent", color: "#1971C2", width: 2.5, vals: sent }]);
  const rateChart = activityChart(days, [
    { name: "Reply rate %", color: "#2F9E44", width: 2, vals: reply },
    { name: "Bounce rate %", color: "#E03131", width: 2, vals: bounce },
  ]);
  return `<div style="margin-top:14px;padding-top:12px;border-top:1px dashed var(--line)">
    <div class="small muted" style="margin-bottom:8px">How your whole Smartlead account is trending, day by day.</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px">
      <div><div class="small" style="font-weight:600;margin-bottom:4px">Emails sent per day</div>${sentChart}</div>
      <div><div class="small" style="font-weight:600;margin-bottom:4px">Reply &amp; bounce rate</div>${rateChart}</div>
    </div>

}

async function renderList() {
  // Paint the skeleton frame first so the list feels instant, then hydrate. The list can paint
  // as soon as the CRITICAL group resolves (campaign-drafts + clients + lead-counts + dests) —
  // /api/sources is the slowest call and only feeds per-row decorations (destination badges,
  // "sources removed" chip), so it's fetched in parallel but NOT awaited before the first paint;
  // its result patches those decorations in once it lands (see sourcesP.then(...) below).
  if (!window._swrRepaint) main.innerHTML = listSkeleton();  // keep current view during a background refresh
  // getActiveClient() (shell.js) migrates a legacy alias id (navreo/amplifyy/arnic) to its
  // canonical client-N id and returns "" for "All clients" — never null/undefined, so the
  // `!activeClient ||` pass-through below always fires for "All clients" (no silent zero-results).
  // Guard: getActiveClient ships with the client-switcher shell.js, which deploys
  // separately — fall back to "" (All clients) when this page lands ahead of it.
  const activeClient = typeof getActiveClient === "function" ? getActiveClient() : "";
  // Server-side client_id filtering (step 5 perf pass, extended in retry 2 to the
  // 3 remaining heavy GETs): when a client is active, scope each call to just that
  // client's rows instead of fetching the whole table and filtering in the browser.
  // The URL (including client_id) IS the cache key, so switching clients never
  // serves a stale cross-client cached list; "All clients" keeps the exact same
  // unfiltered URL as before, so that path is byte-for-byte unchanged.
  const draftsUrl = "/api/campaign-drafts" + (activeClient ? `?client_id=${encodeURIComponent(activeClient)}` : "");
  const sourcesUrl = "/api/sources?slim=1" + (activeClient ? `&client_id=${encodeURIComponent(activeClient)}` : "");
  const leadCountsUrl = "/api/lead-counts" + (activeClient ? `?client_id=${encodeURIComponent(activeClient)}` : "");
  // Fired alongside the critical group, patched in later — deliberately NOT in the awaited
  // Promise.all below so a slow/degraded sources fetch can't hold up the list paint.
  const sourcesP = cachedGet(sourcesUrl).catch(() => ({ error: "fetch_failed" }));
  // S2: /api/outreach-destinations only feeds destination badges/pickers (via destBadges()
  // inside the sourcesP.then() patch-in below), never the headline counts/rows painted in this
  // first render — it doesn't belong in the critical group either. Fetched here in the background
  // exactly like sources, and joined with sourcesP below so DB.dests is set before badges render.
  // /api/outreach-destinations is fleet-wide (Smartlead campaigns + HeyReach lists available
  // account-wide as picker options) — genuinely no client dimension, so it stays
  // unfiltered/uncached-per-client on purpose (see server.py comment).
  const destsP = cachedGet("/api/outreach-destinations", SESSION_TTL).catch(() => (DB.dests || { smartlead: [], heyreach: [] }));
  const [drafts0, clients0, leadCounts0, uni0] = await Promise.all([
    cachedGet(draftsUrl, SESSION_TTL).catch(() => ({ error: "fetch_failed" })),
    cachedGet("/api/clients", SESSION_TTL).catch(() => (window._clients || [])),
    cachedGet(leadCountsUrl).catch(() => ({})),
    // the unified account-wide mirror: EVERY Smartlead + HeyReach campaign,
    // app-managed or not (external rows render read-only)
    cachedGet("/api/campaigns-unified", SESSION_TTL).catch(() => null),
  ]);
  // A 503 (Supabase unreachable AND no file fallback - see server.py /api/campaign-drafts)
  // comes back as a JSON error object, not an array: fetch() doesn't throw on non-2xx, so this
  // is the honest signal, not a silent 200-[] that would otherwise read as "no campaigns yet".
  if (!Array.isArray(drafts0)) {
    main.innerHTML = `
      <div class="pagehead"><div><div class="eyebrow">Campaigns</div><h1>Campaigns.</h1></div></div>
      <div class="card panel" style="margin-top:16px">
        <div class="empty">Couldn't load campaigns — the database didn't respond.
          <div style="margin-top:12px"><button class="btn sm" onclick="bustCache('/api/campaign-drafts');bustCache('/api/sources');renderList()">Retry</button></div>
        </div>
      </div>`;
    hydrateFade(main);
    return;
  }
  DB.campaignDrafts = drafts0;
  window._clients = Array.isArray(clients0) ? clients0 : [];
  // DB.dests is patched in by the destsP/sourcesP join below once outreach-destinations lands
  // (deferred, S2) — keep whatever's already cached (or an empty shape) as the placeholder so
  // any synchronous read before that (e.g. opening the wizard) doesn't throw.
  DB.dests = DB.dests || { smartlead: [], heyreach: [] };
  const leadCounts = leadCounts0 || {};
  const leadCountsDegraded = !!leadCounts._degraded;  // Supabase fetch failed server-side - don't show stale/zero numbers
  // Safety net: a no-op when the server already scoped draftsUrl to activeClient (every
  // remaining row's client_id already matches) — still protects correctness if server-side
  // filtering is ever wrong, absent, or activeClient changes between fetch and this line.
  const forClient = (DB.campaignDrafts || []).filter((d) => !activeClient || d.client_id === activeClient);
  const drafts = forClient.filter((d) => !d.deleted_at);
  const deleted = forClient.filter((d) => d.deleted_at);
  // ── Unified account-wide list: every Smartlead + HeyReach campaign, plus
  // app-managed docs joined in by the server. External (unmanaged) rows are
  // READ-ONLY here — they're run in the platform itself; this page is the
  // single pane that shows them all. Sources-dependent decorations on managed
  // rows still patch in from sourcesP below.
  const uniRows = (uni0 && Array.isArray(uni0.rows)) ? uni0.rows : null;
  const draftById = {}; drafts.forEach((d) => { draftById[d.id] = d; });
  const bucketOf = (st) => {
    const s = String(st || "").toUpperCase();
    if (s === "UNLINKED") return "setup";
    if (["ACTIVE", "IN_PROGRESS", "IN PROGRESS", "STARTED", "RUNNING"].includes(s)) return "active";
    if (s === "PAUSED") return "paused";
    if (["DRAFTED", "DRAFT"].includes(s)) return "draft";
    return "done";  // COMPLETED / STOPPED / FINISHED / CANCELED / ARCHIVED…
  };
  // fall back to managed-drafts-only rows if the mirror endpoint is down —
  // never a blank page, and the degradation is labelled in the banner below
  const rows = uniRows ? uniRows.map((r) => ({ ...r, doc: r.draft_id ? draftById[r.draft_id] : null }))
    : drafts.map((d) => ({ key: d.id, platform: (d.id.startsWith("camp-hr") ? "heyreach" : "smartlead"),
                           name: d.name, status: d.paused ? "PAUSED" : "ACTIVE", managed: true, draft_id: d.id, client_id: d.client_id, created_at: d.created_at, doc: d }));
  // client scope: managed rows filter by client; external rows have no client
  // dimension, so they only show under "All clients" (said out loud below)
  const scoped = rows.filter((r) => !activeClient || (r.managed && r.client_id === activeClient));
  window._campFilter = window._campFilter || "active";
  window._campSearch = window._campSearch || "";
  const buckets = { all: scoped.length, active: 0, paused: 0, draft: 0, done: 0, setup: 0 };
  scoped.forEach((r) => { buckets[bucketOf(r.status)]++; });
  // search matches BOTH the campaign's own title (the draft doc name) and the
  // platform-side name — a user searches whichever name they last saw.
  // EVERY scoped row is rendered; the status pill + search box are pure DOM
  // visibility toggles (filterCampRows), so typing never re-renders the page.
  const searchable = (r) => `${r.name || ""} ${(r.doc && r.doc.name) || ""}`.toLowerCase();
  let visible = scoped.slice();
  // Newest first, by the date the campaign was launched (platform created_at, or
  // the draft's created_at for tool-built ones). Undated rows sink to the bottom.
  const launchedAt = (r) => r.created_at || (r.doc && r.doc.created_at) || "";
  visible.sort((a, b) => {
    const da = launchedAt(a), db = launchedAt(b);
    if (da && db) return db < da ? -1 : db > da ? 1 : 0;  // desc
    if (da) return -1;
    if (db) return 1;
    return String(a.name).localeCompare(String(b.name));
  });
  const ROW_CAP = 1000;  // all rows stay in the DOM so the search box can filter
                         // them live (display toggle) without re-rendering the page
  const overflow = Math.max(0, visible.length - ROW_CAP);
  visible = visible.slice(0, ROW_CAP);
  const statusPill = (st) => {
    const b = bucketOf(st);
    return b === "active" ? '<span class="pill g">● Active</span>'
      : b === "paused" ? '<span class="pill o">⏸ Paused</span>'
      : b === "draft" ? '<span class="pill n">Draft</span>'
      : b === "setup" ? '<span class="pill n" title="Created in this tool but not linked to a live Smartlead/HeyReach campaign yet">Needs setup</span>'
      : `<span class="pill" style="opacity:.7">${esc(String(st || "").toLowerCase() || "done")}</span>`;
  };
  const rowSearchAttr = (r) => ` data-search="${esc(searchable(r))}" data-bucket="${bucketOf(r.status)}"`;
  const managedRow = (r) => {
    const dc = r.doc;
    const lc = leadCounts[String(dc.id)];
    const countUnavailable = leadCountsDegraded || !lc;
    const nLeads = countUnavailable ? null : lc.leads;
    const nSent = countUnavailable ? null : lc.sent;
    const notSending = bucketOf(r.status) === "active" && nLeads != null && nLeads > 0 && nSent === 0;
    return `
    <div class="srcrow click" style="padding:14px 16px;cursor:pointer"${rowSearchAttr(r)} onclick="location.hash='${dc.id}'">
      <div class="ictile">${destLogo(r.platform)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:500">${esc(dc.name || r.name)}${r.name && dc.name && r.name !== dc.name ? ` <span class="small muted" style="font-weight:400" title="The ${r.platform === "heyreach" ? "HeyReach" : "Smartlead"} campaign this sends into">→ ${esc(r.name)}</span>` : ""}</div>
        <div class="small muted">${countUnavailable ? '<span title="Live count unavailable — showing no number rather than a stale one">—</span> <span class="muted" style="font-size:10px">(couldn\'t load)</span>' : (nLeads ? `${fmt(nLeads)} lead${nLeads === 1 ? "" : "s"} sourced${nSent ? ` · ${nSent} sent to outreach` : ""}` : "No sourced leads yet")} · ${esc((dc.created_at || "").slice(0, 10))}</div>
        <div id="srcdeco-${dc.id}" class="small muted" style="margin-top:6px" title="Source-level details still loading">checking sources…</div>
        <div id="sc-${r.key}" class="sc-row-holder" onclick="event.stopPropagation()"></div>
      </div>
      ${statusPill(r.status)}
      ${notSending ? `<span class="pill n" title="This campaign is running and has leads, but none have gone out yet - check its destination/outreach setup">not sending</span>` : ""}
      <span id="srcpill-${dc.id}"></span>
      <button class="btn sm" title="Copy this campaign and all its targeting into a new one" onclick="duplicateCampaign('${dc.id}', event)">Duplicate</button>
      <button class="btn sm" onclick="removeCampaign('${dc.id}', event)">Remove</button>
    </div>`;
  };
  const externalRow = (r) => `
    <div class="srcrow click" style="padding:14px 16px;cursor:pointer"${rowSearchAttr(r)} title="Open ${esc(r.name)} — see its performance and leads, and add sources to feed it" onclick="location.hash='${r.key}'">
      <div class="ictile">${destLogo(r.platform)}</div>
      <div style="flex:1;min-width:0">
        <div style="font-weight:500">${esc(r.name)}</div>
        <div class="small muted">Sends via ${r.platform === "heyreach" ? "HeyReach" : "Smartlead"} · open to view leads &amp; add sources</div>
        <div id="sc-${r.key}" class="sc-row-holder" onclick="event.stopPropagation()"><div class="skel" style="height:44px;width:100%;margin-top:8px"></div></div>
      </div>
      ${statusPill(r.status)}
    </div>`;
  const listRows = visible.length
    ? visible.map((r) => (r.managed && r.doc) ? managedRow(r) : externalRow(r)).join("")
      + (overflow ? `<div class="small muted" style="padding:12px 16px">…and ${fmt(overflow)} more — use the search box to narrow down.</div>` : "")
    : `<div class="empty">${scoped.length ? "No campaigns match this filter — " + `<a href="#" onclick="window._campFilter='all';renderList();return false">show all ${fmt(buckets.all)}</a>` : "No campaigns yet - hit New campaign"}</div>`;
  const pill = (key, label) => `<button class="btn sm${window._campFilter === key ? " primary" : ""}" onclick="window._campFilter='${key}';renderList()">${label} <span class="muted">${fmt(buckets[key])}</span></button>`;
  const mirrorBanner = !uniRows
    ? `<div class="small" style="color:var(--orange-700);margin-top:8px">⚠ Couldn't reach the live Smartlead/HeyReach mirror — showing only the campaigns managed in this tool. <a href="#" onclick="bustCache('/api/campaigns-unified');renderList();return false">Retry</a></div>`
    : (uni0.smartlead_error || uni0.heyreach_error)
      ? `<div class="small" style="color:var(--orange-700);margin-top:8px">⚠ ${esc(uni0.smartlead_error || uni0.heyreach_error)} — showing the last good sync.</div>`
      : "";
  main.innerHTML = `
    <div class="pagehead">
      <div>
        <div class="eyebrow">Campaigns</div>
        <h1>Campaigns.</h1>
        <div class="small muted" style="margin-top:4px">Every outbound campaign — Smartlead + HeyReach — in one place. Signals feed campaigns as <b>sources</b>; open a campaign to see its sources.</div>
      </div>
      <div style="display:flex;gap:10px;align-items:center">
        <!-- Client switcher now lives once, globally, in the shared rail (shell.js
             renderRail / #rail-client-select) — this page just reads the shared
             localStorage["navreo_client"] value and re-renders on "navreo:client-changed". -->
        <button class="btn primary" onclick="openWizard()">${ic8("idea")} New campaign</button>
      </div>
    </div>
    <div class="card panel" style="margin-top:16px">
      <h2 style="font-size:15px;margin-bottom:2px">Performance</h2>
      <div class="small muted" style="margin-bottom:10px">Emails sent, reply rate and bounce rate per day across <b>every</b> campaign in the account — straight from the data layer.</div>
      <div id="perf-chart" style="min-height:240px"><div class="skel" style="height:210px"></div></div>
      <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--line)">
        <div class="small muted" style="margin-bottom:8px">Top line across every Smartlead campaign in the account</div>
        <div id="sc-collective"><div class="skel" style="height:70px"></div></div>
      </div>
    </div>
    <div style="margin-top:16px">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px">
        ${pill("active", "Active")}${pill("paused", "Paused")}${pill("draft", "Draft")}${pill("done", "Done")}${pill("setup", "Needs setup")}${pill("all", "All")}
        <input id="camp-search" type="search" placeholder="Search ${fmt(buckets.all)} campaigns…" value="${esc(window._campSearch || "")}" style="margin-left:auto;padding:6px 10px;border:1px solid var(--line);border-radius:8px;font:inherit;font-size:12.5px;min-width:220px" oninput="window._campSearch=this.value;filterCampRows(this.value)">
      </div>
      ${activeClient ? '<div class="small muted" style="margin-bottom:8px">Client filter on — external (read-only) campaigns are hidden because they don\'t belong to a client in this tool. Switch to All clients to see everything.</div>' : ""}
      ${mirrorBanner}
      <div class="card" id="camp-rows">${listRows}</div>
      <div class="empty" id="camp-nomatch" style="display:none">Nothing matches — clear the search or try another status pill.</div>
      ${deleted.length ? `
      <details class="card" style="margin-top:16px" ${window._showDeleted ? "open" : ""} ontoggle="window._showDeleted=this.open">
        <summary style="cursor:pointer;padding:12px 16px;font-weight:500;color:var(--ink-2)">Recently deleted (${deleted.length})</summary>
        ${deleted.map((dc) => `
          <div class="srcrow" style="padding:14px 16px;opacity:.75">
            <div class="ictile">${ic8("signal")}</div>
            <div style="flex:1">
              <div style="font-weight:500">${esc(dc.name)}</div>
              <div class="small muted">Deleted ${esc(String(dc.deleted_at || "").slice(0, 16).replace("T", " "))} · restore keeps all leads & monitoring</div>
            </div>
            <button class="btn sm" onclick="restoreCampaign('${dc.id}', event)">Restore</button>
            <button class="btn sm danger" onclick="purgeCampaign('${dc.id}', event)">Delete permanently</button>
          </div>`).join("")}
      </details>` : ""}
    </div>`;
  hydrateFade(main);  // ease the real list in over the skeleton
  filterCampRows(window._campSearch);  // apply status-pill + any persisted search visibility
  // Campaign scorecard: live Smartlead per-campaign performance. Fetched in the
  // background (like sources) and patched into the collective strip + each row.
  // leadCounts (already fetched above) supplies "leads sourced" per campaign, so
  // that number paints even if the Smartlead fetch is slow/degraded.
  (async () => {
    // leads-sourced for a row: only managed campaigns have app-sourced leads
    const rowLeads = (r) => (r.doc && !leadCountsDegraded && leadCounts[String(r.doc.id)]) ? leadCounts[String(r.doc.id)].leads : (r.managed ? 0 : null);
    const drawFromLeadsOnly = () => {
      const collEl = document.getElementById("sc-collective");
      if (collEl) collEl.innerHTML = scCollectiveHtml(null, leadCounts, drafts);
      visible.forEach((r) => {
        const el = document.getElementById(`sc-${r.key}`);
        if (el) el.innerHTML = r.platform === "heyreach" ? scRowHtmlHeyReach(null, rowLeads(r)) : scRowHtml(null, rowLeads(r));
      });
    };
    // The single performance graph (sent/day + reply rate + bounce rate) —
    // per-day numbers from the Supabase data layer via /api/perf-daily.
    // Fetched independently so it paints even if the scorecard fetch is slow.
    (async () => {
      let pd = null;
      try { pd = await cachedGet("/api/perf-daily?days=30"); } catch { pd = null; }
      const tEl = document.getElementById("perf-chart");
      if (!tEl) return;
      tEl.innerHTML = (pd && Array.isArray(pd.days) && !pd.error)
        ? perfChart(pd)
        : '<div class="small muted" style="padding:16px 0">Couldn\'t read the data layer for the daily performance series — nothing is estimated, so the graph stays empty. Retry shortly.</div>';
      hydrateFade(tEl); hydrateCharts(tEl);
    })();
    let sc;
    try { sc = await cachedGet("/api/campaign-scorecard"); } catch { sc = null; }
    if (!sc || !sc.campaigns) { drawFromLeadsOnly(); return; }
    const camps = sc.campaigns;         // {smartlead_campaign_id: {sent,replied,…}}
    const hrmap = sc.heyreach || {};    // {hr-<campaignid>: {people,in_progress,…}}
    const collEl = document.getElementById("sc-collective");
    if (collEl) collEl.innerHTML = scCollectiveHtml(sc, leadCounts, drafts);
    // EVERY campaign row gets its real numbers — Smartlead campaigns keyed by
    // their campaign id, HeyReach campaigns by their LinkedIn progress.
    visible.forEach((r) => {
      const el = document.getElementById(`sc-${r.key}`);
      if (!el) return;
      const leadsSourced = rowLeads(r);
      el.innerHTML = r.platform === "heyreach"
        ? scRowHtmlHeyReach(hrmap[`hr-${r.platform_id}`] || null, leadsSourced)
        : scRowHtml(camps[String(r.platform_id)] || null, leadsSourced);
    });
  })();
  // Patch in the sources-dependent decorations (destination badges, "sources removed" chip)
  // once the slower /api/sources call lands - the list above already painted without it.
  // Joined with destsP (S2) so DB.dests is populated before destBadges() reads it.
  Promise.all([sourcesP, destsP]).then(([srcAll0, dests0]) => {
    DB.dests = dests0 || DB.dests || { smartlead: [], heyreach: [] };
    const srcFailed = !Array.isArray(srcAll0);
    const srcAll = srcFailed ? [] : srcAll0;
    drafts.forEach((dc) => {
      const srcs = srcAll.filter((s) => String(s.campaign_id) === String(dc.id));
      const decoEl = document.getElementById(`srcdeco-${dc.id}`);
      if (decoEl) decoEl.outerHTML = srcFailed
        ? `<div id="srcdeco-${dc.id}" class="small muted" style="margin-top:6px" title="Source-level details unavailable right now">— sources unavailable</div>`
        : destBadges(dc, srcs).replace("<div", `<div id="srcdeco-${dc.id}"`);
      const pillEl = document.getElementById(`srcpill-${dc.id}`);
      if (pillEl) pillEl.outerHTML = (!srcFailed && srcs.length && !srcs.some((s) => !s.deleted_at))
        ? `<span id="srcpill-${dc.id}" class="pill n" title="Every source on this campaign was deleted - it can't find or send anyone until you add one back">sources removed</span>`
        : `<span id="srcpill-${dc.id}"></span>`;
    });
  });
}

/* ══ DETAIL ══ */
let tab = "overview";
function renderDetail(id) {
  const c = (DB.campaigns || []).find((x) => x.id === id);
  // S5c: same null-guard pattern as renderDraftCampaign()'s `if (!dc) { location.hash = ""; return; }`
  // - DB.campaigns is always [] on the Supabase-backed deploy (see init()'s comment), so this path
  // is effectively dead, but a null `c` would otherwise throw on `c.analytics` below.
  if (!c) { location.hash = ""; return; }
  const d = DB.campaign_details?.[String(id)];
  const a = c.analytics || {};

  const tabs = ["overview", "leads", "sources", "copy", "qa"];
  if (!tabs.includes(tab)) tab = "overview";

  main.innerHTML = `
    <button style="border:none;background:none;font-family:inherit;font-size:13px;color:var(--ink-3);cursor:pointer;padding:0" onclick="location.hash=''">&larr; Campaigns</button>
    <div class="pagehead" style="margin-top:8px">
      <div class="dethead">
        <h1 style="font-size:24px">${esc(c.name)}</h1>
        ${statusPill(c.status)}
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="protoNote()">${c.status === "ACTIVE" ? "Pause" : "Resume"}</button>
        <button class="btn primary" onclick="openQAGate(${id})">${ic8("rocket")} Launch changes</button>
      </div>
    </div>
    <div class="tabs">${tabs.map((t) =>
      `<button class="tab ${tab === t ? "on" : ""}" onclick="tab='${t}';renderDetail(${id})">${t === "qa" ? "Checks" : t[0].toUpperCase() + t.slice(1)}</button>`).join("")}
    </div>
    <div id="tabbody"></div>`;

  const el = document.getElementById("tabbody");
  if (!d && tab !== "overview" && tab !== "sources") {
    el.innerHTML = `<div class="card panel"><div class="empty">Not in the snapshot's detail set.<br><span class="small">Re-run the snapshot with a higher detail cap to include it.</span></div></div>`;
    return;
  }
  ({ overview: tabOverview, leads: tabLeads, sources: tabSources, copy: tabCopy, qa: tabQA })[tab](el, c, d, a);
}

function tabOverview(el, c, d, a) {
  const stages = [
    ["Leads", a.total_leads, "people"], ["Contacted", a.sent, "send"],
    ["Replied", a.replies, "reply"], ["Positive", a.positives, "thumbsup"],
  ];
  el.innerHTML = `
    <div class="funnel">${stages.map(([lab, val, icon], i) => {
      const prev = stages[i - 1]?.[1];
      return `<div class="fstage"><div class="ictile">${ic8(icon)}</div><div class="lab">${lab}</div><div class="num-hero" style="font-size:28px;margin:6px 0 2px">${fmt(val)}</div>
        <div class="conv">${i && prev ? pct(val, prev) : "&nbsp;"}</div></div>`;
    }).join("")}</div>
    <div class="card panel">
      <h2>Last 30 days</h2>
      <div id="dchart" style="margin-top:10px"></div>
    </div>
    ${d?.step_stats?.length ? `<div class="card panel">
      <h2>Steps</h2>
      <table class="tbl" style="margin-top:8px">
        <tr><th>Step</th><th>Sent</th><th>Replies</th><th>Positives</th><th>Bounces</th></tr>
        ${d.step_stats.map((s) => `<tr>
          <td style="font-weight:500">Email ${s.seq_number}</td><td>${fmt(s.sent)}</td>
          <td>${fmt(s.replies)} <span class="small muted">(${pct(s.replies, s.sent)})</span></td>
          <td style="font-weight:600">${fmt(s.positives)}</td><td>${fmt(s.bounces)}</td>
        </tr>`).join("")}
      </table></div>` : ""}`;
  const daily = d?.daily || [];
  if (daily.length) {
    const label = (dt) => new Date(dt).toLocaleDateString("en-GB", { day: "numeric", month: "short" });
    lineChart(document.getElementById("dchart"), [
      { name: "Sent", color: "#14110E", points: daily.map((r) => ({ y: r.sent, label: label(r.date) })) },
      // replies are plotted ×20 so they read on the same axis as sends; `raw` keeps the
      // true reply count for the tooltip.
      { name: "Replies", color: "#FF4D00", points: daily.map((r) => ({ y: r.replies * 20, raw: r.replies, label: label(r.date) })) },
    ]);
  } else document.getElementById("dchart").innerHTML = '<div class="empty">No daily data</div>';
}

function tabLeads(el, c, d) {
  const campaignSources = sourcesFor(c.id);
  const defaultSource = campaignSources.length === 1 ? campaignSources[0].signal_type + " signal" : "";
  const link = (url, label) => {
    if (!url) return '<span class="muted">–</span>';
    const href = /^https?:/.test(url) ? url : "https://" + url;
    return `<a href="${esc(href)}" target="_blank" style="color:var(--orange-700);text-decoration:none" onclick="event.stopPropagation()">${label}</a>`;
  };
  el.innerHTML = `
    <div class="card panel">
      <h2>Lead sample</h2>
      <div class="sub" style="margin:2px 0 8px">First ${(d.leads_sample || []).length} of ${fmt(d.lead_sample_size)} sampled</div>
      <table class="tbl">
        <tr><th>Lead</th><th>Title</th><th>Company</th><th>Size</th><th>LinkedIn</th><th>Source</th><th>Status</th></tr>
        ${(d.leads_sample || []).map((l) => `<tr>
          <td style="font-weight:500;white-space:nowrap">${esc(l.first_name)} ${esc(l.last_name)}<div class="small muted">${esc(l.email)}</div></td>
          <td style="max-width:170px">${esc(l.title) || '<span class="muted">–</span>'}</td>
          <td style="max-width:180px">${esc(l.company)}<div class="small">${link(l.website, esc((l.website || "").replace(/^https?:\/\//, "").replace(/\/$/, "")))}</div></td>
          <td>${esc(String(l.size || "")) || '<span class="muted">–</span>'}</td>
          <td>${l.linkedin ? link(l.linkedin, ic8("linkedin")) : '<span class="muted">–</span>'}</td>
          <td class="small">${esc(l.source || defaultSource) || '<span class="muted">–</span>'}</td>
          <td>${esc(l.status || "–")}</td>
        </tr>`).join("")}
      </table>
    </div>`;
}

function tabSources(el, c) {
  const srcs = sourcesFor(c.id);
  el.innerHTML = `
    <div class="card panel">
      <h2>Sources</h2>
      <div class="sub" style="margin:2px 0 4px">One campaign, one copy, many sources.</div>
      ${srcs.length ? srcs.map((s) => `
        <div class="srcrow">
          <div class="ictile">${ic8(SIG_ICON[s.signal_type] || "signal")}</div>
          <div style="flex:1">
            <div style="font-weight:500">${esc(s.name)}</div>
            <div class="filterchips">${Object.entries(s.filter || {}).slice(0, 4).map(([k, v]) =>
              `<span class="fchip">${esc(Array.isArray(v) ? v.slice(0, 3).join(", ") + (v.length > 3 ? "…" : "") : String(v))}</span>`).join("")}</div>
          </div>
          <span class="pill ${s.schedule_cron ? "g" : "n"}">${s.schedule_cron ? "daily" : "manual"}</span>
        </div>`).join("") : `<div class="empty">No source connected yet</div>`}
    </div>
    <div class="card panel">
      <h2>Add a source</h2>
      <div class="srctypes">${SOURCE_TYPES.map(([t, dsc, icon, wiz]) => `
        <div class="srctype" onclick="${wiz ? `openSourceWizard('${wiz}', ${c.id})` : "protoNote('Coming soon')"}">
          <div class="ictile">${ic8(icon)}</div>
          <div><div class="t">${t}</div><div class="d">${dsc}</div></div>
        </div>`).join("")}
      </div>
    </div>
    <div id="draftlist"></div>`;
  renderDrafts(c.id);
}

async function renderDrafts(campaignId) {
  let drafts = [];
  try {
    const j = await (await fetch("/api/sources", { cache: "no-store" })).json();
    drafts = Array.isArray(j) ? j : [];  // a 503 error body isn't an array - degrade to empty rather than throw
  } catch {}
  drafts = drafts.filter((s) => String(s.campaign_id) === String(campaignId));
  const el = document.getElementById("draftlist");
  if (!el) return;
  if (!drafts.length) { el.innerHTML = '<div class="card panel"><div class="empty">No sources yet</div></div>'; return; }
  window._drafts = drafts;
  if (drafts.length === 1 && window._openSource === undefined) window._openSource = drafts[0].id;
  el.innerHTML = `<h2 style="font-size:16px;margin:2px 0 10px 2px">Sources <span class="small muted" style="font-weight:400">· ${drafts.length}</span></h2>
    ${drafts.map((s, di) => {
      const meta = MECH_META[s.mechanism || s.type] || ["signal", s.type, ""];
      const off = s.active === false;
      const openId = window._openSource === s.id;
      return `<div class="card panel" style="margin-bottom:12px"><div class="srcrow" style="${off ? "opacity:.45;" : ""}flex-wrap:wrap;border-bottom:none;padding-bottom:0">
        <div class="ictile">${ic8(meta[0])}</div>
        <div style="flex:1;min-width:200px;cursor:pointer" onclick="window._openSource=window._openSource==='${s.id}'?null:'${s.id}';renderDrafts('${campaignId}')">
          <div style="font-weight:500">${esc(s.name)}${off ? ' <span class="pill n">excluded</span>' : ""}</div>

// tags the pull actually fills, per mechanism — used to catch dangling {{merge}} tags
function fillableTags(src) {
  const base = ["company", "first_name", "firstName", "name", "Title", "title"];
  const mech = (src.mechanism || src.type || "").toLowerCase();
  if (mech === "engagement") {
    const copyRef = ((src.config || {}).engagement || {}).copy_reference;
    return copyRef ? base.concat(["Topic", "WhosePost"]) : base;  // only filled when "mention the post" is on
  }
  if (mech === "hiring") return base.concat(["job_title", "jobTitle", "role"]);  // the role the company is hiring for
  return base;
}
async function saveIce(id, campaignId) {
  const v = document.getElementById("ice-" + id).value;
  const src = (window._drafts || []).find((x) => x.id === id) || {};
  // hiring openers must always keep the two variables that personalise them per
  // company - {{company}} and {{job_title}} (the role that company is hiring for).
  // Drop one and every prospect gets the same hardcoded role, so block the save.
  if ((src.mechanism || src.type) === "hiring") {
    const missing = [];
    if (!/\{\{\s*company\s*\}\}/i.test(v)) missing.push("{{company}}");
    if (!/\{\{\s*(job_title|jobtitle|role|title)\s*\}\}/i.test(v)) missing.push("{{job_title}}");
    if (missing.length) {
      await uiConfirm(
        `A hiring opener has to keep ${missing.join(" and ")} so each email names the real company and the exact role they're hiring for. Put ${missing.length > 1 ? "them" : "it"} back - you can write any words around the variables.`,
        { title: "Keep the variables", confirmLabel: "Got it", danger: false }
      );
      return;
    }
  }
  const allowed = new Set(fillableTags(src).map((t) => t.toLowerCase()));
  const used = [...v.matchAll(/\{\{\s*(\w+)\s*\}\}/g)].map((m) => m[1]);
  const dangling = [...new Set(used.filter((t) => !allowed.has(t.toLowerCase())))];
  if (dangling.length) {
    const eng = (src.mechanism || src.type) === "engagement";
    const extra = eng && !((src.config || {}).engagement || {}).copy_reference && dangling.some((t) => /topic|whosepost/i.test(t))
      ? ` (turn on "Mention the post in copy" to fill {{Topic}}/{{WhosePost}})` : "";
    if (!(await uiConfirm(
      `This icebreaker uses ${dangling.map((t) => "{{" + t + "}}").join(", ")}, which this source won't fill — those spots will come out blank${extra}. Save anyway?`,
      { title: "Blank merge tag?", confirmLabel: "Save anyway" }
    ))) return;
  }
  await fetch("/api/sources/update", { method: "POST", body: JSON.stringify({ id, icebreaker: v }) });
  protoNote("Saved - applied to every prospect below and all future pulls");
  renderDrafts(campaignId);
}

async function pullProspects(id, campaignId, btn, afterRetarget) {
  const restore = busyBtn(btn, "Finding people…");
  if (restore === null) return;  // a pull for this source is already running — ignore the extra click
  // sticky so the message stays up for the whole call (a live pull can run 10–30s, well past the toast's auto-hide)
  protoNote("Finding people… this can take up to a minute", { sticky: true });
  window._openSource = id;
  try {
    const r = await (await fetch("/api/sources/pull", { method: "POST", body: JSON.stringify({ id, after_retarget: !!afterRetarget }) })).json();
    const base = r.ok ? (r.note || `${r.prospects.length} decision maker${r.prospects.length === 1 ? "" : "s"} found`) : (r.message || "Pull failed");
    protoNote(r.notice ? `${base} · ${r.notice}` : base);
  } catch (e) { protoNote(`Couldn't reach the server (${e && e.message ? e.message : "connection failed"}) - is it running?`); }
  finally { restore(); }
  renderDrafts(campaignId);
}
// classify one push result into the receipt buckets
function pushOutcome(r) {
  const t = (r && r.push && r.push.tools) || {};
  const vals = Object.values(t);
  if (r && r.push && r.push.suppressed) return "suppressed";
  if (vals.some((v) => v && v.suppressed)) return "suppressed";
  if (vals.some((v) => v && v.ok && /already/i.test(v.message || ""))) return "duplicate";
  if (vals.some((v) => v && v.ok)) return "pushed";
  if (vals.length) return "failed";
  return "noDest";  // kept, but no destination set yet
}
async function bulkVerdict(id, verdict, campaignId) {
  const draftsJson = await (await fetch("/api/sources", { cache: "no-store" })).json();
  const drafts = Array.isArray(draftsJson) ? draftsJson : [];  // a 503 error body isn't an array - degrade to empty rather than throw
  const s = drafts.find((x) => x.id === id);
  if (verdict === "keep") protoNote("Sending…");
  const tally = { pushed: 0, duplicate: 0, suppressed: 0, failed: 0, noDest: 0 };
  for (let i = 0; i < (s?.prospects || []).length; i++) {
    if (verdict === "keep" || !s.prospects[i].verdict) {
      let r = null;
      try { r = await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify({ id, index: i, verdict }) })).json(); } catch {}
      if (verdict === "keep") tally[pushOutcome(r)]++;
    }
  }
  if (verdict === "keep") {
    const bits = [];
    if (tally.pushed) bits.push(`${tally.pushed} sent`);
    if (tally.duplicate) bits.push(`${tally.duplicate} already there`);
    if (tally.suppressed) bits.push(`${tally.suppressed} skipped (already contacted)`);
    if (tally.failed) bits.push(`${tally.failed} couldn't send`);
    if (tally.noDest) bits.push(`${tally.noDest} kept - set a destination to send`);
    protoNote(bits.length ? bits.join(" · ") : "Nothing to send");
  } else {
    protoNote("Rejected the rest");
  }
  renderDrafts(campaignId);
}

function highlightBody(html) {
  let text = html
    .replace(/<br\s*\/?>/gi, "\n").replace(/<\/div>/gi, "\n").replace(/<[^>]+>/g, "")

  return esc(text)
    .replace(/\{\{(\w+)\}\}/g, '<span class="var">{{$1}}</span>')
    .replace(/\{([^{}|]+\|[^{}]+)\}/g, '<span class="spin">{$1}</span>')
    .replace(/\n/g, "<br>");
}

/* The standard checklist — every run records these categories */
function computeChecks(c, d) {
  const checks = [];
  const fills = d.fill_rates || {};
  const usedVars = new Set();
  (d.sequences || []).forEach((s) => s.variants.forEach((v) =>
    (v.body.match(/\{\{(\w+)\}\}/g) || []).forEach((m) => usedVars.add(m.slice(2, -2)))));
  usedVars.delete("first_name"); usedVars.delete("company_name"); usedVars.delete("sl_date");

  const fillLevels = [...usedVars].map((k) => fills[k] >= 95 ? "pass" : fills[k] >= 60 ? "warn" : "fail");
  checks.push([
    fillLevels.includes("fail") ? "fail" : fillLevels.includes("warn") ? "warn" : "pass",
    "Personalisation filled",
    usedVars.size ? `${[...usedVars].map((k) => `{{${k}}} ${fills[k] ?? 0}%`).join(" · ")} (target 95%)` : "No custom variables in copy",
  ]);

  let spintaxFail = 0, emdash = 0, subjectWarn = 0;
  (d.sequences || []).forEach((s) => s.variants.forEach((v) => {
    const plain = v.body.replace(/<[^>]+>/g, "").trim();
    if (plain.startsWith("{") && !plain.startsWith("{{")) spintaxFail++;
    if (/—/.test(v.body)) emdash++;
    if (s.seq_number > 1 && v.subject) subjectWarn++;
  }));
  checks.push([spintaxFail ? "fail" : "pass", "Spintax placement",
    spintaxFail ? `${spintaxFail} variant(s) open with spintax - body gets dropped` : "No variant opens with spintax"]);
  checks.push([emdash ? "warn" : "pass", "No em-dashes",
    emdash ? `${emdash} variant(s) contain an em-dash` : "Copy is clean"]);
  checks.push([subjectWarn ? "warn" : "pass", "Follow-ups thread",
    subjectWarn ? `${subjectWarn} follow-up variant(s) have a subject set` : "All follow-up subjects blank"]);

  let distWarn = 0;
  (d.sequences || []).forEach((s) => {
    const dist = s.variants.map((v) => v.distribution_pct).filter((x) => x !== null && x !== undefined);
    if (dist.length && dist.reduce((a, b) => a + b, 0) !== 100) distWarn++;
  });
  checks.push([distWarn ? "warn" : "pass", "Traffic split sums to 100%",
    distWarn ? `${distWarn} step(s) off` : "All steps balanced"]);

  const audit = DB.audit?.by_campaign?.[String(c.id)];
  checks.push([audit ? "warn" : "pass", "Lead hygiene",
    audit ? `${fmt(audit)} name/icebreaker fixes pending` : "No pending fixes"]);
  return checks;
}

async function recordQARun(id) {

    fails: checks.filter((x) => x[0] === "fail").length,
    warns: checks.filter((x) => x[0] === "warn").length,
  }) });
  protoNote("Checks recorded");
  renderDetail(id);
}

/* ── Gojiberry-style targeting chips (wizard step 4) ── */
/* the server self-heals (launchd KeepAlive) - one retry bridges a restart */
async function fetchJsonRetry(url, body) {
  for (let i = 0; i < 2; i++) {
    try { return await (await fetch(url, { method: "POST", body: JSON.stringify(body) })).json(); }
    catch { if (i === 0) await new Promise((r) => setTimeout(r, 2500)); }
  }
  return { ok: false, message: "Couldn't reach the engine - it restarts itself within seconds, hit Back and try again" };
}

/* strategy runs are async jobs server-side (2-4 min): start, then poll.
   Cached briefs come back instantly with rows; fresh ones return a job id. */
async function strategyCall(payload) {
  const start = await fetchJsonRetry("/api/strategy-map", payload);
  if (!start || !start.job) return start;  // cached rows, sync result, or error
  for (let i = 0; i < 120; i++) {          // up to ~6 min
    await new Promise((r) => setTimeout(r, 3000));
    let res;
    try { res = await (await fetch(`/api/strategy-result?job=${start.job}`, { cache: "no-store" })).json(); }
    catch { continue; }  // transient network blip - keep polling
    if (res && res.status !== "running") return res;
  }
  return { ok: false, rows: [], message: "The run is taking unusually long. Hit Try again." };
}

/* Give a wizard choice-card an instant "you picked this" cue (orange press +
   ✓) BEFORE its action fires — several of the step's actions re-render or kick
   off a multi-second live search, and without this the click reads as dead
   (tester feedback, non-technical + power users both). Paint the pressed state,
   then run the action on the next frame so the cue is visible first. */
function wizPick(el, action) {
  try {
    el.parentElement.querySelectorAll(".srctype").forEach((x) => x.classList.remove("picking"));
    el.classList.add("picking");
  } catch (_) {}
  // linger ~170ms so the orange press + ✓ is actually SEEN before the step
  // advances — 2 frames (~32ms) read as an instant jump with no confirmation
  // (tester feedback). Short enough not to feel sluggish to a power user.
  setTimeout(() => { try { action(); } catch (e) { console.error(e); } }, 170);
}

function drawWiz() {
  hideNote();  // clear any stale validation toast when the step re-renders
  document.getElementById("wdots").innerHTML = [1, 2, 3, 4, 5, 6].map((n) =>
    `<div class="wdot ${n === Math.min(wiz.step, 6) ? "on" : n < wiz.step ? "done" : ""}">${n < wiz.step ? "✓" : n}</div>`).join("");
  const body = document.getElementById("wiz-body");
  const next = document.getElementById("wiz-next");
  const back = document.getElementById("wiz-back");
  back.style.visibility = (wiz.step === 1 || wiz.step === 7) ? "hidden" : "visible";
  const nextHint = document.getElementById("wiz-next-hint");
  next.style.visibility = wiz.step === 1 ? "hidden" : "visible";  // step 1 (client pick) acts on click only
  // Step 2 ("How do you want to start?") also acts on click (idea card / signal buttons) rather
  // than a tracked selection + Next — but leaving Next fully hidden there read as "nothing
  // happens" to anyone who clicked where Next normally sits. Show it in a disabled state with an
  // inline nudge pointing back at the option cards instead of a silent no-op.
  next.disabled = wiz.step === 2;
  if (nextHint) nextHint.style.display = wiz.step === 2 ? "" : "none";
  next.innerHTML = { 2: "Next", 3: "Next", 4: "Next", 5: "Next", 6: "Preview my first leads (runs one live search)", 7: "Save draft campaign" }[wiz.step] || "Next";

  if (wiz.step === 1) {
    if (wiz.newClient) {
      const nc = wiz.newClient;
      body.innerHTML = `
        <h2>Tell me about the client.</h2>
        <div class="lead">Website first - the rest prefills. Adjust anything.</div>
        <div class="wfield">

            <button class="btn" onclick="analyseClientSite()">Analyse</button>

          <label>The offer / problems they solve for customers</label><textarea id="nc-offer" rows="2" placeholder="e.g. helps product brands capture Amazon demand on a performance basis">${esc(nc.offer)}</textarea>
        </div>

          <button class="btn primary" onclick="saveNewClient()">Save client &amp; continue</button></div>`;
      return;
    }
    const clients = wiz.clients || [];
    body.innerHTML = `
      <h2>Who are we selling for?</h2>
      <div class="lead">Every campaign anchors on a client. Pick one or add one.</div>

        ${clients.map((c) => `

          </div>`).join("")}

          <div class="ictile">${ic8("idea")}</div>
          <div><div class="t">New client</div><div class="d">From their website</div></div>
        </div>

  }

  else if (wiz.step === 2) body.innerHTML = `
    <h2>How do you want to start?</h2>
    <div class="lead">${wiz.client ? esc(wiz.client.name) + " · " : ""}pick a ready-made idea, or set up a signal yourself. No goal needed.</div>
    <div class="wfield" style="max-width:560px;margin:0 auto">
      <label>Anything to avoid? <span class="muted" style="font-weight:400">· optional · people you've contacted are excluded automatically</span></label>

      </div>
      <div class="srctype" onclick="wizPick(this,()=>{wiz.avoid=document.getElementById('wiz-avoid')?.value??wiz.avoid;directRoute('hiring')})">
        <div class="ictile">${ic8("briefcase")}</div>
        <div><div class="t">Set up a Hiring signal</div><div class="d">Companies hiring your buyer - you pick the roles</div></div>
      </div>
      <div class="srctype" onclick="wizPick(this,()=>{wiz.avoid=document.getElementById('wiz-avoid')?.value??wiz.avoid;directRoute('engagement')})">
        <div class="ictile">${ic8("linkedin")}</div>
        <div><div class="t">Set up an Engagement signal</div><div class="d">Warm leads engaging with LinkedIn profiles you pick</div></div>
      </div>
    </div>`;

  else if (wiz.step === 3) body.innerHTML = `

    ${wiz.titles.length && wiz.client?.icp?.titles?.length ? `<div style="text-align:center;margin-bottom:8px"><span class="ai-pill">✨ Ticked from ${esc(wiz.client.name)}'s last campaign - untick anything that doesn't fit this one</span> <span class="tchip" onclick="wiz.titles=[];drawWiz()">Clear all</span></div>` : ""}
    <div class="chips-center">${wchips("titles", TITLE_SUGGESTIONS)}

    </div>
    <div style="text-align:center;margin-top:10px"><button class="btn sm" onclick="wizGen('titles')" ${wiz._gen ? "disabled" : ""} title="${wiz.titles.length ? "Suggests more roles like the ones you've picked" : "Suggests roles to email from this client's profile"}">${wiz._gen === "titles" ? "🪄 Thinking…" : "🪄 Generate more"}</button></div>`;

  else if (wiz.step === 4) {
    const kws = kwList();
    body.innerHTML = `
    <div style="max-width:560px;margin:0 auto;text-align:left">
      ${wiz.client ? `<span class="ai-pill">✨ Prefilled from ${esc(wiz.client.website || wiz.client.name)}</span>` : ""}

    <div style="max-width:560px;margin:6px auto 0;text-align:left">
      <div class="tsec">Industry</div>

        ${tAddChip("industries", "e.g. Logistics", "Add industry")}
        <button class="btn sm" style="margin-left:4px" onclick="wizGen('industries')" ${wiz._gen ? "disabled" : ""} title="${wiz.industries.length ? "Suggests more industries like the ones you've picked" : "Suggests industries from this client's profile"}">${wiz._gen === "industries" ? "🪄 Thinking…" : "🪄 Suggest more"}</button>
      </div>
      <div class="tsec">Company type <span style="text-transform:none;letter-spacing:0;font-weight:400">· what they ARE, sharper than industry</span></div>
      <div class="tgrid">
        <span class="tchip ${kws.length ? "" : "on"}" onclick="wiz.keywords='';wiz.strat=null;drawWiz()">All company types</span>
        ${kws.map((k) => `<span class="tchip on" title="Click to remove" onclick="kwRemove('${esc(k).replace(/'/g, "\\'")}')">${esc(k)}</span>`).join("")}
        ${tAddChip("keywords", "e.g. software development agency", "Add company type")}
        <button class="btn sm" style="margin-left:4px" onclick="wizGen('keywords')" ${wiz._gen ? "disabled" : ""} title="${kws.length ? "Suggests more company types like the ones you've picked" : "Suggests company types from this client's profile"}">${wiz._gen === "keywords" ? "🪄 Thinking…" : "🪄 Generate more"}</button>
      </div>
      <div class="tsec">Location</div>
      <div class="tgrid">
        <span class="tchip ${wiz.geos.length ? "" : "on"}" onclick="wiz.geos=[];wiz.strat=null;drawWiz()">All locations</span>
        ${tchips("geos", GEO_OPTIONS)}
        ${tAddChip("geos", "Anywhere, e.g. Jamaica", "Add location")}
        <button class="btn sm" style="margin-left:4px" onclick="wizGen('geos')" ${wiz._gen ? "disabled" : ""} title="${wiz.geos.length ? "Suggests more locations like the ones you've picked" : "Suggests locations from this client's profile"}">${wiz._gen === "geos" ? "🪄 Thinking…" : "🪄 Generate more"}</button>
      </div>
      <div class="small muted" id="geo-hint" style="margin-top:6px"></div>
      <div class="tsec">Company size</div>
      <div class="tgrid">
        <span class="tchip ${wiz.sizes.length ? "" : "on"}" onclick="wiz.sizes=[];wiz.strat=null;drawWiz()">All company sizes</span>
        ${tchips("sizes", SIZE_BUCKETS, (b) => b + " employees")}
      </div>
      <div class="tsec">Always include these companies <span style="text-transform:none;letter-spacing:0;font-weight:400">· optional</span></div>
      <div class="tgrid">
        ${wiz.domains.map((d) => `<span class="tchip on" title="Click to remove" onclick="wizToggle('domains','${esc(d).replace(/'/g, "\\'")}')">${esc(d)}</span>`).join("")}
        ${tAddChip("domains", "acme.com", "Add company")}
      </div>
    </div>`;
    const ta = document.getElementById("tadd-input");
    if (ta) ta.focus();
  }

  else if (wiz.step === 5) {
    if (wiz.mode === "direct") {  // direct NEVER ideates: this step is only the signal picker
      body.innerHTML = `
        <h2>Which signal did you mean?</h2>
        <div class="lead">You said: "${esc(wiz.goal)}". Pick one - we build exactly that.</div>
        <div class="srcpick">${[["hiring", "Hiring", "Companies hiring certain roles right now", "briefcase"], ["engagement", "Engagement", "People engaging with your topics online", "linkedin"]].map(([k, nm, d2, ic]) => `
          <div class="srctype" onclick="directRoute('${k}')">
            <div class="ictile">${ic8(ic)}</div>
            <div><div class="t">${nm}</div><div class="d">${d2}</div></div>
          </div>`).join("")}
        </div>`;
      next.disabled = true;
      return;
    }
    const strat = wiz.strat;
    if (!strat) {
      const stages = wiz.mode === "direct"
        ? ["Reading your goal…", "Turning it into exact search settings…", "Nearly there - writing the opener…", "Still working - almost done…"]

      body.innerHTML = `<h2>${wiz.mode === "direct" ? "Building exactly what you described." : "Finding the best ways in."}</h2>
        <div class="lead">${wiz.mode === "direct" ? "Usually under a minute. Nothing runs and nothing is spent - this just writes the settings." : "Usually 2-3 minutes. Every idea gets checked against real data before you see it."}</div>
        <div class="empty" style="padding:30px 0">${ic8("idea", "xl")}
          <div class="bar-track" style="max-width:280px;margin:16px auto 8px"><div class="bar-fill" id="stage-bar" style="width:4%;transition:width 1s linear"></div></div>
          <div id="stage-line" class="small muted">${stages[0]}</div></div>`;
      next.disabled = true;
      clearInterval(window._stageTimer);
      let si = 0;
      let tick = 0;
      window._stageTimer = setInterval(() => {
        const el2 = document.getElementById("stage-line");
        const bar = document.getElementById("stage-bar");
        if (!el2) { clearInterval(window._stageTimer); return; }
        tick++;
        // never fake completion: crawl to 60% in the first minute, then inch
        // toward (but never reach) 95% for as long as the run actually takes
        const pct = tick <= 60 ? 4 + tick * 0.95 : Math.min(62 + (tick - 60) * 0.18, 95);
        if (bar) bar.style.width = pct + "%";
        if (tick % 35 === 0 && si < stages.length - 1) { si++; el2.textContent = stages[si]; }
      }, 1000);
      if (!wiz._stratLoading) loadStrategyMap();
      return;
    }
    clearInterval(window._stageTimer);
    if (strat.ok === false) {
      body.innerHTML = `<h2>That didn't finish.</h2>
        <div class="lead">${esc(strat.message || "The idea engine didn't answer - it may have restarted mid-run.")}</div>

    }

    if (rows.length === 1 && !wiz.sources.length) wiz.sources = [rows[0].id];  // one idea = pre-picked, no dead "pick one" step
    body.innerHTML = `
      <h2>${wiz.client ? "Ways into " + esc(wiz.client.name) + "'s market." : "Ways into this market."}</h2>
      <div class="lead">Fresh ideas for this offer, sized against live data. <b>Tap a row to select it</b> (a checkbox fills in) - pick one or more, then hit Next. You approve every person before anything sends.</div>
      <div class="small" style="margin:-8px 0 12px"><span class="pill g">goal applied</span> <span class="muted">"${esc(wiz.goal)}"${wiz.mechanism ? ` · you meant the ${wiz.mechanism.replace("_", " ")} signal, so that is all we built` : ""}${wiz.avoid ? ` · avoiding: ${esc(wiz.avoid)}` : ""}</span></div>
      <div style="display:flex;gap:8px;align-items:center;margin:0 0 14px;justify-content:center">
        <input id="wiz-steer" value="${esc(wiz.goal || "")}" placeholder="Change the goal and redo"
          style="flex:1;max-width:440px;border:1px solid var(--line-2);border-radius:999px;padding:7px 14px;font:400 12.5px var(--font-sans);color:var(--ink);background:transparent">
        <button class="btn sm" onclick="wiz.goal=document.getElementById('wiz-steer').value;loadStrategyMap(true)">Redo with new goal</button>
      </div>

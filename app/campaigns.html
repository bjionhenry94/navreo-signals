<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaigns · Navreo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="navreo.css">
<style>
.toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 18px 0 14px; }
.toolbar .search {
  border: 1px solid var(--line-2); border-radius: 999px; padding: 7px 15px;
  font: 400 13px var(--font-sans); width: 220px; background: transparent; color: var(--ink);
}
.toolbar .search:focus { outline: none; box-shadow: var(--focus); }
.progress-cell { min-width: 110px; }
.progress-cell .lab { font-size: 11px; color: var(--ink-3); margin-bottom: 4px; }
.marker { position: relative; }
.marker::after { content: ""; position: absolute; left: 75%; top: -2px; bottom: -2px; width: 1.5px; background: var(--line-2); }
.srcic { display: inline-flex; gap: 4px; }
.srcic .ictile { width: 26px; height: 26px; border-radius: 7px; }
.srcic .ictile .ic8 { width: 13px; height: 13px; }

/* detail */
.dethead { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.funnel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 16px 0; }
.fstage { border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; position: relative; }
.fstage .ictile { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; }
.fstage .lab { font-size: 11.5px; color: var(--ink-3); font-weight: 500; }
.fstage .conv { font-size: 11px; color: var(--brown-400); margin-top: 4px; }
.panel { padding: 18px 20px; margin-bottom: 14px; }
.step-card { border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
.step-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg-sunken); border-bottom: 1px solid var(--line); font-size: 13px; }
.step-head .n { width: 26px; height: 26px; border-radius: 999px; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
.variant { padding: 13px 16px; border-bottom: 1px solid var(--line); }
.variant:last-child { border-bottom: none; }
.v-top { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 6px; font-size: 12.5px; }
.v-label { font-weight: 600; }
.v-body { font-size: 12.5px; color: var(--ink-2); line-height: 1.65; background: var(--bg-sunken); border: 1px solid var(--line); border-radius: 8px; padding: 11px 13px; max-height: 150px; overflow: hidden; position: relative; cursor: pointer; }
.v-body.open { max-height: none; }
.v-body:not(.open)::after { content: "expand"; position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 0 6px; text-align: center; font-size: 11px; color: var(--ink-3); background: linear-gradient(transparent, var(--bg-sunken) 65%); }
.v-body .var { background: var(--orange-100); color: var(--orange-700); border-radius: 4px; padding: 0 4px; font-family: var(--font-mono); font-size: 11px; }
.v-body .spin { background: #F0F0EE; color: var(--ink-2); border-radius: 4px; padding: 0 4px; font-family: var(--font-mono); font-size: 11px; }
.qa-row { display: flex; align-items: flex-start; gap: 11px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
.qa-row:last-child { border-bottom: none; }
.qa-row .t { font-weight: 500; }
.qa-row .d { font-size: 12px; color: var(--ink-2); margin-top: 1px; }
.fillrow { margin-bottom: 10px; font-size: 12.5px; }
.fillrow .top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.srcrow { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--line); }
.srcrow:last-child { border-bottom: none; }
.filterchips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.fchip { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--bg-sunken); color: var(--ink-2); }
.srctypes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
.srctype { border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 15px; cursor: pointer; display: flex; align-items: center; gap: 11px; }
.srctype:hover { border-color: var(--line-2); background: var(--bg-sunken); }
.srctype .t { font-weight: 500; font-size: 13px; }
.srctype .d { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }

/* wizard + QA gate overlays — Gojiberry-style: centered, minimal, chips */
.overlay { position: fixed; inset: 0; background: rgba(20,17,14,0.45); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.overlay.on { display: flex; }
.modal { background: #fff; border-radius: 20px; width: 720px; max-width: 100%; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.wdots { display: flex; gap: 8px; justify-content: center; padding-top: 26px; }
.wdot { width: 26px; height: 26px; border-radius: 999px; background: var(--bg-sunken); color: var(--ink-3); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.wdot.on { background: var(--ink); color: #fff; }
.wdot.done { background: var(--green-bg); color: var(--green); }
.modal-b { padding: 10px 40px 20px; overflow-y: auto; text-align: center; }
.modal-b h2 { font-family: var(--font-display); font-weight: 400; font-size: 24px; letter-spacing: -0.02em; margin: 18px 0 6px; }
.modal-b .lead { font-size: 13px; color: var(--ink-3); margin-bottom: 20px; }
.modal-f { padding: 16px 26px 20px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.chips-center { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; margin: 8px 0 4px; }
.wfield { text-align: left; max-width: 520px; margin: 0 auto; }
.wfield label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-2); margin: 12px 0 5px; }
.wfield input, .wfield textarea {
  width: 100%; border: 1px solid var(--line-2); border-radius: 10px; padding: 9px 12px;
  font: 400 13px var(--font-sans); color: var(--ink); background: transparent; resize: vertical;
}
.ideas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
.idea { border: 1px solid var(--line); border-radius: var(--radius); padding: 15px 16px; cursor: pointer; }
.idea:hover { background: var(--bg-sunken); }
.idea.sel { border-color: var(--orange); box-shadow: 0 0 0 1px var(--orange); }
.idea .top { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
.idea .t { font-weight: 600; font-size: 13.5px; }
.idea .tam { font-family: var(--font-display); font-size: 26px; line-height: 1; }
.idea .tamlab { font-size: 10.5px; color: var(--ink-3); margin-top: 3px; }
.idea .nums { display: flex; gap: 22px; margin-top: 4px; }
/* strategy table (step 5) */
.stratbl { text-align: left; font-size: 12.5px; }
.stratbl td { vertical-align: middle; }
.stratbl tr.sel td { background: var(--orange-100); }
.stratbl tr.sel td:first-child { box-shadow: inset 3px 0 0 var(--orange); }

/* Gojiberry-style people preview rows */
.lead-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 8px; text-align: left; }
.lead-row.rejected { opacity: 0.4; }
.lead-row .ini { width: 36px; height: 36px; border-radius: 999px; background: var(--bg-sunken); color: var(--ink-2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.lead-row .nm { font-weight: 600; font-size: 13.5px; }
.lead-row .nm a { color: inherit; text-decoration: none; }
.lead-row .nm a:hover { color: var(--orange-700); }
.lead-row .tt { font-size: 12px; color: var(--ink-2); }
.lead-row .cc { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.addchip { position: relative; display: inline-flex; align-items: center; }
.addchip input { border: 1px solid var(--line-2); border-radius: 999px; padding: 5px 38px 5px 12px; font: 400 12.5px var(--font-sans); width: 165px; background: transparent; color: var(--ink); }
.addchip input:focus { outline: none; box-shadow: var(--focus); }
.addchip .plus { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 26px; height: 26px; padding: 0; border: none; border-radius: 999px; background: var(--ink); color: var(--paper, #fff); font-size: 17px; line-height: 1; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
.addchip .plus:hover { opacity: .82; }
.addchip .plus:disabled { opacity: .35; cursor: default; }
.sumrow { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
.sumrow:last-child { border-bottom: none; }
.sumrow .k { width: 110px; flex-shrink: 0; color: var(--ink-3); font-size: 11.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; padding-top: 2px; }
.srcpick { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
.srcpick .srctype.on { border-color: var(--orange); box-shadow: 0 0 0 1px var(--orange); }
/* Gojiberry-style targeting page — chips match the wizard's standard .chip */
.tsec { font: 600 11px var(--font-sans); letter-spacing: .08em; text-transform: uppercase; color: var(--ink-2); margin: 16px 0 7px; text-align: left; }
.tgrid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; }
.tchip { border: 1px solid var(--line-2); background: transparent; border-radius: 999px; padding: 5px 13px; font: 500 12.5px var(--font-sans); color: var(--ink-2); cursor: pointer; display: inline-flex; align-items: center; }
.tchip:hover { background: var(--bg-sunken); }
.tchip.on { background: var(--ink); border-color: var(--ink); color: var(--cream); }
.tchip.add { border-style: dashed; }
.tchip.add:hover { background: transparent; border-color: var(--ink-2); }
.tchip.add input { border: none; outline: none; font: inherit; width: 190px; background: transparent; color: var(--ink); }
.ai-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--orange-100); color: var(--orange-700); border-radius: 999px; padding: 5px 13px; font: 600 11.5px var(--font-sans); }
.hpipe { display: flex; align-items: flex-start; justify-content: center; gap: 0; margin-top: 22px; flex-wrap: wrap; }
.hstep { display: flex; flex-direction: column; align-items: center; width: 72px; }
.hstep .ictile { width: 40px; height: 40px; border-radius: 12px; }
.hstep .ictile .ic8 { width: 19px; height: 19px; }
.hstep.gate .ictile { background: var(--orange-100); }
.hstep.gate .ictile .ic8 { color: var(--orange-700); }
.hstep .hl { font-size: 10.5px; font-weight: 500; margin-top: 7px; line-height: 1.25; }
.harrow { color: var(--line-2); font-size: 14px; margin-top: 13px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">
  <div id="rail"></div>
  <main class="main" id="main"></main>
</div>

<!-- New Campaign wizard (Gojiberry flow) -->
<div class="overlay" id="wizard">
  <div class="modal" style="width:760px">
    <div class="wdots" id="wdots"></div>
    <div class="modal-b" id="wiz-body"></div>
    <div class="modal-f">
      <button class="btn" id="wiz-back" onclick="wizBack()">Back</button>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="closeWizard()">Cancel</button>
        <button class="btn primary" id="wiz-next" onclick="wizNext()">Next</button>
      </div>
    </div>
  </div>
</div>

<!-- Add-a-source wizard -->
<div class="overlay" id="srcwiz">
  <div class="modal">
    <div class="wdots"><div class="wdot on" id="sd1">1</div><div class="wdot" id="sd2">2</div><div class="wdot" id="sd3">3</div></div>
    <div class="modal-b" id="src-body"></div>
    <div class="modal-f">
      <button class="btn" onclick="srcBack()">Back</button>
      <div class="small" id="sw-hint" style="flex:1;text-align:left;margin:0 12px;color:var(--orange-700)"></div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="srcSaveForLater()">💾 Save for later</button>
        <button class="btn" onclick="srcwiz.classList.remove('on');hideNote()">Cancel</button>
        <button class="btn primary" id="src-next" onclick="srcNext()">Next</button>
      </div>
    </div>
  </div>
</div>

<!-- Launch gate -->
<div class="overlay" id="qagate">
  <div class="modal" style="width:620px">
    <div class="modal-b" style="text-align:left;padding-top:24px">
      <div class="eyebrow">Launch gate</div>
      <h2 style="text-align:left;margin:8px 0 4px">Checks before anything goes live</h2>
      <div id="qagate-body"></div>
    </div>
    <div class="modal-f">
      <span class="small muted">A failed check blocks the launch</span>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="qagate.classList.remove('on')">Close</button>
        <button class="btn primary" onclick="protoNote()">Launch</button>
      </div>
    </div>
  </div>
</div>

<!-- Reusable styled confirm dialog (replaces native confirm() so it can't freeze the page) -->
<div class="overlay" id="confirmdlg">
  <div class="modal" style="width:440px">
    <div class="modal-b" style="text-align:left;padding-top:24px">
      <h2 id="confirm-title" style="text-align:left;margin:8px 0 6px">Are you sure?</h2>
      <div class="lead" id="confirm-msg" style="text-align:left"></div>
    </div>
    <div class="modal-f" style="justify-content:flex-end">
      <button class="btn" id="confirm-cancel">Cancel</button>
      <button class="btn primary" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<script src="shell.js"></script>
<script>
document.getElementById("rail").outerHTML = renderRail("campaigns");

let DB = {};
const main = document.getElementById("main");
const wizard = document.getElementById("wizard");
const qagate = document.getElementById("qagate");

/* ══ perf: request cache + mutation-bust + skeletons  (campaigns-perf-loadspeed skill) ══
   cachedGet() memoises a GET's parsed-JSON promise so the same endpoint isn't refetched
   multiple times within one navigation (short TTL) or the session (long TTL for near-static
   data). ANY non-GET fetch clears the cache so the next read is always fresh — one choke
   point that keeps data correct without touching every mutation call-site. */
const _nativeFetch = window.fetch.bind(window);
const _getCache = new Map();   // url -> { t, v, p }   (t=Date.now ms, v=last value, p=promise)
const GET_TTL = 8000;          // in-memory dedupe window; past it we still show cache + revalidate (SWR)
const SESSION_TTL = 600000;    // ~"once per session" for /api/clients, /api/outreach-destinations, /api/campaign-drafts

// Persist snapshots to sessionStorage so a full reload / revisit paints the last-known
// data instantly instead of waiting on the network. Big payloads are skipped, quota errors swallowed.
function _lsGet(url) { try { const s = sessionStorage.getItem("gc:" + url); return s ? JSON.parse(s) : null; } catch (_) { return null; } }
function _lsSet(url, v) { try { const s = JSON.stringify(v); if (s.length < 2000000) sessionStorage.setItem("gc:" + url, s); } catch (_) {} }
function _lsDel(sub) { try { for (let i = sessionStorage.length - 1; i >= 0; i--) { const k = sessionStorage.key(i); if (k && k.startsWith("gc:") && (!sub || k.includes(sub))) sessionStorage.removeItem(k); } } catch (_) {} }

let _refreshQueued = false;
function _emitRefreshed() {  // debounced: coalesce several background updates into one repaint
  if (_refreshQueued) return; _refreshQueued = true;
  setTimeout(() => { _refreshQueued = false; window.dispatchEvent(new CustomEvent("signals:refreshed")); }, 60);
}

/* Stale-while-revalidate: return the last-known value INSTANTLY (memory or this session's
   sessionStorage), then refetch in the background and repaint only if the data actually
   changed. Any write (non-GET fetch) wipes memory + persisted cache, so reads taken right
   after an action are always fresh — SWR staleness only ever shows when nothing was written. */
function cachedGet(url, ttl = GET_TTL) {
  const now = Date.now();
  const mem = _getCache.get(url);
  if (mem && mem.p && (now - mem.t) < ttl) return mem.p;           // fresh enough in memory
  const fetchP = _nativeFetch(url).then((r) => r.json()).then((v) => {
    _getCache.set(url, { t: Date.now(), v, p: Promise.resolve(v) });
    _lsSet(url, v);
    return v;
  });
  fetchP.catch(() => { const m = _getCache.get(url); if (m && m.p === fetchP) _getCache.delete(url); });
  const persisted = _lsGet(url);
  const stale = (mem && mem.v !== undefined) ? mem.v : (persisted === null ? undefined : persisted);
  if (stale !== undefined && stale !== null) {                     // SWR: show cache now, revalidate behind
    fetchP.then((v) => { if (JSON.stringify(v) !== JSON.stringify(stale)) _emitRefreshed(); }).catch(() => {});
    _getCache.set(url, { t: now, v: stale, p: Promise.resolve(stale) });
    return Promise.resolve(stale);
  }
  _getCache.set(url, { t: now, v: undefined, p: fetchP });         // cold: nothing cached, must wait
  return fetchP;
}
function bustCache(sub) {
  for (const k of [..._getCache.keys()]) if (!sub || k.includes(sub)) _getCache.delete(k);
  _lsDel(sub);                                                     // a write invalidates persisted cache too
}
window.fetch = (input, init) => {
  if ((((init && init.method) || "GET")).toUpperCase() !== "GET") bustCache();  // a write happened -> reads must refetch
  return _nativeFetch(input, init);
};
// Seamless background repaint when SWR finds fresher data: re-render the current view with
// NO skeleton and NO fade (window._swrRepaint) so only the numbers change, nothing flashes.
window.addEventListener("signals:refreshed", () => {
  window._swrRepaint = true;
  try { Promise.resolve(route()).finally(() => { window._swrRepaint = false; }); }
  catch (_) { window._swrRepaint = false; }
});

/* Skeletons: paint the page frame with the RIGHT box sizes before data arrives, so real
   content swaps in place instead of popping in and shoving the layout around. */
(function injectSkelCss() {
  const s = document.createElement("style");
  s.textContent = ".skel{background:linear-gradient(90deg,var(--bg-sunken,#eef0f2) 25%,var(--line,#f6f7f8) 37%,var(--bg-sunken,#eef0f2) 63%);background-size:400% 100%;animation:skel 1.2s ease infinite;border-radius:6px;display:block}@keyframes skel{0%{background-position:100% 0}100%{background-position:-100% 0}}";
  document.head.appendChild(s);
})();
function listSkeleton() {
  const row = `<div class="srcrow" style="padding:14px 16px"><div class="ictile skel" style="width:34px;height:34px"></div><div style="flex:1"><div class="skel" style="width:42%;height:13px"></div><div class="skel" style="width:26%;height:10px;margin-top:7px"></div></div><div class="skel" style="width:74px;height:22px;border-radius:999px"></div></div>`;
  return `
    <div class="pagehead"><div><div class="eyebrow">Campaigns</div><h1>Signal campaigns.</h1></div></div>
    <div class="card panel" style="margin-top:16px"><h2 style="font-size:15px;margin-bottom:2px">Lead activity</h2><div class="small muted" style="margin-bottom:8px">People found and sent to outreach each day, across all your campaigns.</div><div class="skel" style="height:260px"></div></div>
    <div style="display:flex;gap:16px;align-items:flex-start;margin-top:16px">
      <div style="flex:1;min-width:0"><div class="card">${row.repeat(3)}</div></div>
      <div class="card panel" style="width:290px;flex-shrink:0"><h2 style="font-size:15px;margin-bottom:6px">Status</h2><div class="skel" style="height:236px"></div></div>
    </div>`;
}
function detailSkeleton(dc) {
  const title = dc ? esc(String(dc.name).split(" · ")[0]) : "&nbsp;";
  return `
    <button style="border:none;background:none;font-family:inherit;font-size:13px;color:var(--ink-3);cursor:pointer;padding:0" onclick="location.hash=''">&larr; Campaigns</button>
    <div class="pagehead" style="margin-top:8px;align-items:flex-start"><div style="flex:1;min-width:0"><h1 style="font-size:22px;line-height:1.3;font-weight:600">${title}</h1><div class="skel" style="width:240px;height:24px;margin-top:10px;border-radius:999px"></div></div><div class="skel" style="width:260px;height:30px;border-radius:999px"></div></div>
    <div class="tabs"><div class="skel" style="width:280px;height:28px"></div></div>
    <div id="dtabbody"><div class="skel" style="height:280px;margin-top:14px"></div></div>`;
}
/* Lazy-load fade: when real content swaps in over a skeleton (or a "Loading…" placeholder),
   ease it in instead of popping. Opacity-only + a 4px rise so it never shifts reserved layout,
   and it restarts on every call (Web Animations API), so each navigation re-animates. */
function hydrateFade(el) {
  if (!el || window._swrRepaint) return;  // background refresh updates in place — no fade
  try { el.animate([{ opacity: 0.35, transform: "translateY(4px)" }, { opacity: 1, transform: "none" }], { duration: 260, easing: "cubic-bezier(.2,.6,.2,1)" }); } catch (_) {}
}

const SOURCE_TYPES = [
  ["Hiring signal", "Companies hiring your buyer", "briefcase", "hiring"],
  ["Engagement signal", "Warm leads engaging with LinkedIn profiles", "linkedin", "engagement"],
];

init();
async function init() {
  // Signals-tab data comes from /api/* (campaign-drafts, outreach-destinations, lead-counts),
  // loaded lazily below. The old static data/*.json prototype files are no longer served on the
  // Supabase-backed deploy — fetching them just produced 404 noise, so we start from an empty DB.
  // Every legacy DB.* read (campaigns / campaign_details / signals / audit) is already guarded with
  // `|| []` / optional chaining, so an empty object is behaviourally identical minus the 404s.
  DB = {};
  route();
  window.addEventListener("hashchange", route);
}

function route() {
  const note = document.querySelector(".proto-note");
  if (note) note.classList.remove("on");
  // a background (SWR) repaint must not clobber transient UI state or yank the scroll position
  if (!window._swrRepaint) { window._editDest = false; window._confirmAll = false; }
  const id = location.hash.replace("#", "");
  let r;
  if (id.startsWith("cdraft-")) r = renderDraftCampaign(id);
  else if (id && (DB.campaigns || []).some((c) => String(c.id) === id)) r = renderDetail(Number(id));
  else r = renderList();
  if (!window._swrRepaint) window.scrollTo(0, 0);
  return r;
}

let dtab = sessionStorage.getItem("cdtab") || "overview";
async function renderDraftCampaign(id) {

async function openMoreLeads(campaignId, mech) {
  const dc = (DB.campaignDrafts || []).find((x) => x.id === campaignId) || {};
  const box = document.getElementById("moreleads");
  if (dc.goal) {
    box.innerHTML = `<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:14px">
      <div class="small" style="margin-bottom:8px"><span class="pill g">using your campaign goal</span> <span class="muted">"${esc(dc.goal)}"</span></div>
      <div id="ml-out" class="small muted">Thinking through ideas that get you there - about a minute…</div>
      <input id="ml-goal" type="hidden" value="${esc(dc.goal)}"></div>`;

    <div style="display:flex;gap:8px">
      <input id="ml-goal" style="flex:1;border:1px solid var(--line-2);border-radius:10px;padding:9px 12px;font:400 13px var(--font-sans);color:var(--ink);background:transparent"

    </div>
    <div id="ml-out" class="small muted" style="margin-top:8px"></div>
  </div>`;

}
async function runMoreLeads(campaignId, mech) {
  const dc = (DB.campaignDrafts || []).find((x) => x.id === campaignId) || {};
  const icp = dc.icp || {};
  const goal = document.getElementById("ml-goal").value.trim();
  if (!goal) { protoNote("Say the goal first"); return; }
  document.getElementById("ml-out").innerHTML = "Thinking through ideas that get you there - usually 2-3 minutes…";
  let existingSrcs = [];
  try { existingSrcs = (await (await fetch("/api/sources", { cache: "no-store" })).json()).filter((s) => String(s.campaign_id) === String(campaignId)); } catch {}
  const existing = existingSrcs.map((s) => `${s.mechanism || s.type}: ${s.name}`);
  const payload = { titles: icp.titles || ["Founder", "CEO"], keywords: icp.keywords ? [icp.keywords] : [],
    headcount: icp.sizes || ["11-20", "21-50", "51-100", "101-200"], countries: icp.geos || ["United States"],
    goal, mode: mech ? "direct" : "ai", mechanism: mech || "", existing, force: true };
  const r = await strategyCall(payload);
  if (!r || r.ok === false) {
    document.getElementById("ml-out").innerHTML = `${esc((r && r.message) || "Could not generate")} <button class="btn sm" onclick="runMoreLeads('${campaignId}','${mech}')">Try again</button>`;
    return;
  }
  const stop = new Set(["the", "a", "an", "of", "for", "with", "and", "your", "their", "brands", "companies", "signal"]);
  const words = (s) => new Set((s || "").toLowerCase().split(/[^a-z]+/).filter((w) => w.length > 2 && !stop.has(w)));
  const isDupe = (x) => existingSrcs.some((e) => {
    if ((e.mechanism || e.type) !== x.mechanism) return false;
    const a = words(e.name), b = words(x.idea);
    const shared = [...a].filter((w) => b.has(w)).length;
    return shared >= 2 || (shared >= 1 && Math.min(a.size, b.size) <= 2);
  });
  const rows = (r.rows || []).filter((x) => (x.estimated || (x.dms && x.dms > 0)) && !isDupe(x));
  const dropped = (r.rows || []).length - (r.rows || []).filter((x) => !isDupe(x)).length;
  document.getElementById("ml-out").innerHTML = rows.length ? `<div class="small" style="color:var(--ink);font-weight:600;margin-bottom:4px">Pick one to add${dropped ? ` <span class="muted" style="font-weight:400">· ${dropped} idea${dropped > 1 ? "s" : ""} skipped - already running in this campaign</span>` : ""}:</div>` +
    rows.map((x, i) => `<div class="srcrow click" style="cursor:pointer;padding:10px 0" onclick='addIdeaSource("${campaignId}", ${i})'>
      <div class="ictile">${ic8((MECH_META[x.mechanism] || [])[0] || "signal")}</div>
      <div style="flex:1"><b>${esc(x.idea)}</b><div class="small muted" style="font-style:italic">"${esc(x.icebreaker || "")}"</div></div>
      <span class="small"><b>${x.estimated ? "live" : fmt(x.dms)}</b>${x.estimated ? "" : '<span class="muted"> /month</span>'}</span>
    </div>`).join("") : (dropped ? `Everything it suggested is already running in this campaign (${dropped} skipped) - try a different goal wording.` : "No sized ideas came back - try different wording.");
  window._mlRows = rows;
}
async function addIdeaSource(campaignId, i) {
  const x = (window._mlRows || [])[i];
  if (!x) return;
  const dc = (DB.campaignDrafts || []).find((c) => c.id === campaignId) || {};
  const icp = dc.icp || {};
  let dmTitles = icp.titles || [];
  if (!dmTitles.length && dc.client_id) {
    try {
      const cl = (await (await fetch("/api/clients")).json()).find((c) => c.id === dc.client_id);
      dmTitles = ((cl || {}).icp || {}).titles || [];
    } catch {}
  }
  if (!dmTitles.length) { protoNote("Set who we email first - add decision-maker roles in the campaign targeting"); return; }
  await fetch("/api/sources", { method: "POST", body: JSON.stringify({
    type: x.mechanism, mechanism: x.mechanism, name: x.idea, campaign_id: campaignId,
    icebreaker: x.icebreaker || "", titles: dmTitles, params: x.params || {},
    config: { keywords: icp.keywords || "", headcount: icp.sizes, countries: icp.geos } }) });
  protoNote("Source added - it pulls on the next run");
  renderDraftCampaign(campaignId);
}
function renameCampaign(id) {
  const h = document.getElementById("camp-title");
  if (!h || h.isContentEditable) return;
  const orig = h.textContent;
  try { h.contentEditable = "plaintext-only"; } catch { h.contentEditable = "true"; }
  h.style.outline = "2px solid var(--orange-700)";
  h.style.borderRadius = "6px";
  h.focus();
  document.getSelection().selectAllChildren(h);
  const finish = async (save) => {
    h.onblur = null;
    h.onkeydown = null;
    h.contentEditable = "false";
    h.style.outline = "";
    const name = h.textContent.trim().replace(/\s+/g, " ");
    if (!save || !name || name === orig) { h.textContent = orig; return; }
    await fetch("/api/campaign-drafts/update", { method: "POST", body: JSON.stringify({ id, name }) });
    h.textContent = name;
    const dc = (DB.campaignDrafts || []).find((x) => x.id === id);
    if (dc) dc.name = name;
    protoNote("Renamed ✓");
  };
  h.onblur = () => finish(true);
  h.onkeydown = (e) => {
    if (e.key === "Enter") { e.preventDefault(); finish(true); }
    if (e.key === "Escape") { e.preventDefault(); finish(false); }
  };
}

async function toggleCampPaused(id, paused) {
  // Optimistic: flip + repaint immediately so the button responds the instant
  // it's clicked, even when the server is slow to wake (Render cold-start) or
  // the request fails. Persist in the background; roll back only on error.
  const dc = (DB.campaignDrafts || []).find((x) => x.id === id);
  const prev = dc ? dc.paused : undefined;
  if (dc) dc.paused = paused;
  protoNote(paused ? "Paused - this campaign stops looking for new people until you resume it" : "Running - this campaign looks for new people every day");
  renderDraftCampaign(id);
  try {
    const r = await fetch("/api/campaign-drafts/update", { method: "POST", body: JSON.stringify({ id, paused }) });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.ok === false) throw new Error(j.message || ("HTTP " + r.status));
  } catch (e) {
    if (dc) dc.paused = prev;  // save failed - undo the optimistic flip
    protoNote("Couldn't save - " + (e.message || "network error") + ". Nothing changed, try again.");
    renderDraftCampaign(id);
  }
}

function resolveDestName(pool, typed) {
  // typed text -> destination: exact name match first, else a UNIQUE substring match
  const q = typed.trim().toLowerCase();
  if (!q) return { hit: null };
  const exact = pool.find((x) => String(x.name || "").toLowerCase() === q);
  if (exact) return { hit: exact };
  const subs = pool.filter((x) => String(x.name || "").toLowerCase().includes(q));
  if (subs.length === 1) return { hit: subs[0] };
  return { hit: null, ambiguous: subs.length > 1, none: subs.length === 0 };
}

/* Opening the destination editor is exactly the moment the picker lists must be
   fresh: a HeyReach list or Smartlead campaign created since page-load isn't in the

   cache) at open time, then patch just the <datalist> options in place — no full
   re-render, so in-progress typing and focus are never clobbered. */

async function openDestEditor(id) {

async function saveCampDest(id, close) {
  const slTyped = (document.getElementById("dest-email") || {}).value || "";
  const hrTyped = (document.getElementById("dest-li") || {}).value || "";
  const slR = resolveDestName((DB.dests || {}).smartlead || [], slTyped);
  const hrR = resolveDestName((DB.dests || {}).heyreach || [], hrTyped);
  if (slTyped.trim() && !slR.hit) { protoNote(slR.ambiguous ? `Several email campaigns match “${slTyped.trim()}” - keep typing` : `No email campaign called “${slTyped.trim()}” - pick one from the list`); return; }
  if (hrTyped.trim() && !hrR.hit) { protoNote(hrR.ambiguous ? `Several LinkedIn lists match “${hrTyped.trim()}” - keep typing` : `No LinkedIn list called “${hrTyped.trim()}” - pick one from the list`); return; }
  const dest = {};
  if (slR.hit) dest.smartlead_campaign_id = String(slR.hit.id);
  if (hrR.hit) { dest.heyreach_list_id = Number(hrR.hit.id); dest.heyreach_list_name = hrR.hit.name || ""; }

  await fetch("/api/campaign-drafts/update", { method: "POST", body: JSON.stringify({ id, destination: dest }) });
  DB.campaignDrafts = null;
  protoNote(slR.hit || hrR.hit ? "Saved - routing updated" : "Destinations cleared");
  renderDraftCampaign(id);
}

/* brand logo for a lead's destination: Smartlead (email) / HeyReach (LinkedIn) */
function destLogo(kind) {
  const src = kind === "smartlead" ? "icons/smartlead.png" : "icons/heyreach.png";

/* Every outreach destination a campaign's leads route to — the campaign-level
   destination plus any per-source overrides — resolved to human names. Mirrors
   the server's resolve_destination (campaign default + source fallback). */
function campaignDests(dc, srcs, pool) {
  pool = pool || DB.dests || { smartlead: [], heyreach: [] };
  const slName = (id) => (((pool.smartlead || []).find((c) => String(c.id) === String(id)) || {}).name) || `email campaign #${id}`;
  const hrName = (id, fb) => (((pool.heyreach || []).find((l) => String(l.id) === String(id)) || {}).name) || fb || `LinkedIn list #${id}`;
  const sl = new Map(), hr = new Map();
  [dc.destination || {}, ...(srcs || []).map((s) => s.destination || {})].forEach((d) => {
    const slId = d.smartlead_campaign_id || (d.type === "smartlead" ? d.campaign_id : "");
    if (slId) sl.set(String(slId), slName(slId));
    if (d.heyreach_list_id) hr.set(String(d.heyreach_list_id), hrName(d.heyreach_list_id, d.heyreach_list_name));
    else if (d.heyreach_list_name) hr.set("n:" + d.heyreach_list_name, d.heyreach_list_name);
  });
  return { smartlead: [...sl.values()], heyreach: [...hr.values()] };
}

/* "Sending to" logo badges under a campaign card — shows which real Smartlead
   campaign(s) / HeyReach list(s) this signal's leads flow into, with each
   platform's logo. Warns in-line when no destination is wired yet. */

function routeNote(pr) {
  if (Object.keys(pr.pushed || {}).length || pr.verdict === "reject") return "";
  const nm = window._destNames || {};
  if (!nm.smartlead && !nm.heyreach) return "";
  const pill = (body) => `<span style="display:inline-flex;align-items:center;gap:6px;margin-top:5px;padding:3px 10px;border-radius:999px;background:var(--bg-sunken);font-size:11px;color:var(--ink-2)"><span style="color:var(--green);font-weight:600">✓ Send</span><span style="color:var(--ink-3)">→</span>${body}</span>`;
  const to = (kind, name) => `${destLogo(kind)} <span style="font-weight:500;color:var(--ink)">${esc(name)}</span>`;
  if (pr.email) return pill(to("smartlead", nm.smartlead || "your email campaign"));
  if (pr.email_checked) return pill(to("heyreach", nm.heyreach || "your LinkedIn list"));
  return pill(`${to("smartlead", nm.smartlead || "email")}<span style="color:var(--ink-3)">if found, else</span>${to("heyreach", nm.heyreach || "LinkedIn")}`);
}

function pushChips(pr) {
  const keys = Object.keys(pr.pushed || {});
  const nm = window._destNames || {};
  const bits = [];
  if (keys.some((k) => k.startsWith("smartlead")) || /smartlead/.test(pr.pushed_to || "")) bits.push(`${destLogo("smartlead")} email campaign${nm.smartlead ? ` “${esc(nm.smartlead)}”` : ""}`);
  if (keys.some((k) => k.startsWith("heyreach")) || /heyreach/.test(pr.pushed_to || "")) bits.push(`${destLogo("heyreach")} LinkedIn list${nm.heyreach ? ` “${esc(nm.heyreach)}”` : ""}`);
  let out = bits.length ? `<div class="small" style="display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap;color:var(--green);margin-top:2px">✓ sent - in your ${bits.join(" + ")}</div>` : "";
  const flab = { smartlead: "email", heyreach: "LinkedIn" };
  const fb = Object.entries(pr.push_fail || {}).map(([k, m]) =>
    `${flab[k] || k} skipped - ${esc(m || "didn't go through")}`);
  if (fb.length) out += `<div class="small" style="color:var(--orange-700);margin-top:2px">△ ${fb.join(" · ")}</div>`;
  return out;
}

function pushToast(r, verdict) {
  if (verdict === "undo") {
    protoNote(r && r.push && r.push.ok ? "Undone - removed from your email campaign and LinkedIn list" : "Couldn't undo everything - check the row");
    return;
  }
  if (verdict !== "keep") return;
  const t = r && r.push && r.push.tools;
  if (!t || !Object.keys(t).length) { protoNote("Kept ✓ - now pick where people go (top of the page), then tick ✓ again to send"); return; }
  if ((r.push && r.push.suppressed) || Object.values(t).some((v) => v && v.suppressed)) {
    protoNote("Skipped - this person was already contacted for this client"); return;
  }
  const lab = { smartlead: "email campaign", heyreach: "LinkedIn list" };
  const ok = Object.keys(t).filter((k) => t[k].ok).map((k) => lab[k]);
  const bad = Object.keys(t).filter((k) => !t[k].ok).map((k) => `${lab[k] || k} (${t[k].message})`);
  if (!bad.length) protoNote(`Sent ✓ - now in your ${ok.join(" and ")}`);
  else protoNote(`${ok.length ? `In your ${ok.join(" and ")} ✓ · ` : ""}couldn't send to ${bad.join(" · ")}`);
}
/* Promise-based styled confirm — replaces window.confirm (which freezes the tab under automation
   and is off-brand). Resolves true on Confirm, false on Cancel / overlay click / Escape. */
function uiConfirm(msg, { title = "Are you sure?", confirmLabel = "Confirm", danger = true } = {}) {
  return new Promise((resolve) => {
    const dlg = document.getElementById("confirmdlg");
    document.getElementById("confirm-title").textContent = title;
    document.getElementById("confirm-msg").textContent = msg;
    const ok = document.getElementById("confirm-ok");
    const cancel = document.getElementById("confirm-cancel");
    ok.textContent = confirmLabel;
    ok.classList.toggle("danger", !!danger);
    const close = (val) => {
      dlg.classList.remove("on");
      ok.onclick = cancel.onclick = dlg.onclick = null;
      document.removeEventListener("keydown", onKey);
      resolve(val);
    };
    const onKey = (e) => { if (e.key === "Escape") close(false); if (e.key === "Enter") close(true); };
    ok.onclick = () => close(true);
    cancel.onclick = () => close(false);
    dlg.onclick = (e) => { if (e.target === dlg) close(false); };
    document.addEventListener("keydown", onKey);
    dlg.classList.add("on");
    requestAnimationFrame(() => ok.focus());
  });
}

/* Signal-velocity line chart: new people found per day, one line per source + a bold "All" line.
   Buckets whatever lead rows we have by pulled_at date. Degrades to dots when there's only one day. */
function velocityChart(rows, srcs) {
  const days = {};  // "YYYY-MM-DD" -> { [sid]: count, __all: count }
  (rows || []).forEach((r) => {
    const d = String(r.pulled_at || "").slice(0, 10);
    if (!d) return;
    const sid = r._sid == null ? "unknown" : r._sid;
    const bucket = (days[d] = days[d] || {});
    bucket[sid] = (bucket[sid] || 0) + 1;
    bucket.__all = (bucket.__all || 0) + 1;
  });
  const dates = Object.keys(days).sort();
  if (!dates.length) return '<div class="small muted" style="padding:16px 0">No signals yet - the velocity graph builds as daily pulls come in.</div>';
  const srcList = (srcs || []).filter((s) => days[dates[dates.length - 1]] && dates.some((d) => days[d][s.id]));
  const palette = ["#E8590C", "#1971C2", "#2F9E44", "#9C36B5", "#F08C00", "#0C8599", "#C2255C"];
  const series = [{ name: "All", color: "#111", width: 2.5, vals: dates.map((d) => days[d].__all || 0) }];
  srcList.forEach((s, i) => series.push({ name: s.name, color: palette[i % palette.length], width: 1.5, vals: dates.map((d) => days[d][s.id] || 0) }));
  const W = 640, H = 190, padL = 30, padR = 12, padT = 12, padB = 26;
  const maxV = Math.max(1, ...dates.map((d) => days[d].__all || 0));
  const x = (i) => dates.length === 1 ? (padL + (W - padL - padR) / 2) : padL + i * (W - padL - padR) / (dates.length - 1);
  const y = (v) => padT + (1 - v / maxV) * (H - padT - padB);
  const grid = [0, 0.5, 1].map((f) => { const v = maxV * f; const yy = y(v); return `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W - padR}" y2="${yy.toFixed(1)}" stroke="var(--line)" stroke-width="1"/><text x="${padL - 6}" y="${(yy + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--ink-3)">${Math.round(v)}</text>`; }).join("");
  const drawLine = (s) => {
    if (s.vals.length === 1) return `<circle cx="${x(0).toFixed(1)}" cy="${y(s.vals[0]).toFixed(1)}" r="4" fill="${s.color}"/>`;
    const pts = s.vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    return `<polyline fill="none" stroke="${s.color}" stroke-width="${s.width}" points="${pts}" stroke-linejoin="round" stroke-linecap="round"/>`;
  };
  const xlab = (i) => `<text x="${x(i).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="9" fill="var(--ink-3)">${esc(dates[i].slice(5))}</text>`;
  const xticks = dates.length === 1 ? xlab(0) : [xlab(0), xlab(dates.length - 1)].join("");
  const legend = series.map((s) => `<span style="display:inline-flex;align-items:center;gap:5px;margin-right:12px;font-size:11px;color:var(--ink-2)"><span style="width:14px;height:0;border-top:${s.width >= 2 ? "3" : "2"}px solid ${s.color};display:inline-block"></span>${esc(String(s.name).length > 34 ? String(s.name).slice(0, 33) + "…" : s.name)}</span>`).join("");
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-width:${W}px;display:block">${grid}${xticks}${series.map(drawLine).join("")}</svg>
    <div style="margin-top:8px;display:flex;flex-wrap:wrap;row-gap:4px">${legend}</div>
    ${dates.length === 1 ? '<div class="small muted" style="margin-top:6px">One day of data so far - the lines fill in as the daily run keeps pulling.</div>' : ""}`;
}

/* Cross-campaign activity chart for the list page: named daily lines (Found / Sent).
   `dates` = sorted YYYY-MM-DD list, `series` = [{name, color, vals[]}] aligned to dates. */
function activityChart(dates, series) {
  if (!dates.length) return '<div class="small muted" style="padding:16px 0">No leads yet - this fills in as your daily run finds and sends people.</div>';
  const W = 640, H = 190, padL = 30, padR = 12, padT = 12, padB = 26;
  const maxV = Math.max(1, ...series.flatMap((s) => s.vals));
  const x = (i) => dates.length === 1 ? (padL + (W - padL - padR) / 2) : padL + i * (W - padL - padR) / (dates.length - 1);
  const y = (v) => padT + (1 - v / maxV) * (H - padT - padB);
  const grid = [0, 0.5, 1].map((f) => { const v = maxV * f; const yy = y(v); return `<line x1="${padL}" y1="${yy.toFixed(1)}" x2="${W - padR}" y2="${yy.toFixed(1)}" stroke="var(--line)" stroke-width="1"/><text x="${padL - 6}" y="${(yy + 3).toFixed(1)}" text-anchor="end" font-size="9" fill="var(--ink-3)">${Math.round(v)}</text>`; }).join("");
  const drawLine = (s) => {
    if (s.vals.length === 1) return `<circle cx="${x(0).toFixed(1)}" cy="${y(s.vals[0]).toFixed(1)}" r="4" fill="${s.color}"/>`;
    const pts = s.vals.map((v, i) => `${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
    return `<polyline fill="none" stroke="${s.color}" stroke-width="${s.width || 2}" points="${pts}" stroke-linejoin="round" stroke-linecap="round"/>`;
  };
  const xlab = (i) => `<text x="${x(i).toFixed(1)}" y="${H - 8}" text-anchor="middle" font-size="9" fill="var(--ink-3)">${esc(dates[i].slice(5))}</text>`;

async function sendAllLeads(campaignId) {
  const todo = (window._leadRows || draftProspects(window._drafts || []))
    .filter((x) => !x.verdict && !(Object.keys(x.pushed || {}).length || x.pushed_to) && x._sid != null && (x._idx != null || x.linkedin));
  if (!todo.length) return;
  let sent = 0, failed = 0;
  for (let n = 0; n < todo.length; n++) {
    protoNote(`Sending ${n + 1} of ${todo.length}…`);
    const body = { id: todo[n]._sid, verdict: "keep" };
    if (todo[n]._idx != null) body.index = todo[n]._idx;
    if (todo[n].linkedin) body.linkedin = todo[n].linkedin;
    try {
      const r = await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify(body) })).json();
      if (r.push && Object.values(r.push.tools || {}).some((v) => v.ok)) sent++; else failed++;
    } catch { failed++; }
  }
  protoNote(`Done - ${sent} sent${failed ? `, ${failed} couldn't be sent (see rows)` : ""}`);
  renderDraftCampaign(campaignId);
}

function applyVerdictLocal(sid, idx, verdict, r) {
  const s = (window._drafts || []).find((x) => x.id === sid);
  const pr = s && (s.prospects || [])[idx];
  if (!pr) return null;
  if (verdict === "undo") {
    if (!r || !r.push || r.push.ok !== false) { delete pr.pushed; delete pr.pushed_to; delete pr.push_fail; pr.verdict = null; }
    return pr;
  }
  pr.verdict = verdict;
  const t = (r && r.push && r.push.tools) || {};
  if (t.smartlead && t.smartlead.ok) { pr.pushed = { ...(pr.pushed || {}), smartlead: true }; if (!pr.email) pr.email = "(found)"; }
  if (t.heyreach && t.heyreach.ok) { pr.pushed = { ...(pr.pushed || {}), heyreach: true }; if (!pr.email) pr.email_checked = true; }
  const fails = {};
  for (const k of Object.keys(t)) if (!t[k].ok) fails[k] = t[k].message;
  if (Object.keys(fails).length) pr.push_fail = fails; else delete pr.push_fail;
  return pr;
}

function refreshLeadChrome() {
  const rows = window._leadRows || [];
  if (!rows.length) return;
  const wasSent = (p) => Object.keys(p.pushed || {}).length || p.pushed_to;
  const counts = {
    all: rows.length,
    email: rows.filter((p) => p.email && !wasSent(p)).length,
    linkedin: rows.filter((p) => !p.email && !wasSent(p)).length,
    sent: rows.filter(wasSent).length,
  };
  document.querySelectorAll("[data-chip]").forEach((b) => { b.textContent = `${b.dataset.lab} (${counts[b.dataset.chip]})`; });
  const sa = document.querySelector("[data-sendall]");
  if (sa) {
    const n = rows.filter((p) => !p.verdict && !wasSent(p)).length;
    if (n < 2) sa.parentElement.style.display = "none";
    else sa.textContent = `Send all ${n} unreviewed…`;
  }
}

async function setVerdict(sid, idx, verdict, campaignId, linkedin) {
  let r = null;
  const body = { id: sid, verdict };
  if (idx != null) body.index = idx;
  if (linkedin) body.linkedin = linkedin;
  try { r = await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify(body) })).json(); } catch {}
  pushToast(r, verdict);
  let pr = idx != null ? applyVerdictLocal(sid, idx, verdict, r) : null;
  if (r && r.lead) pr = { ...(pr || {}), ...r.lead, verdict: r.undo ? null : (r.lead.verdict || verdict) };
  const lr = (window._leadRows || []).find((p) => (linkedin && p.linkedin === linkedin) || (idx != null && p._sid === sid && p._idx === idx));
  if (lr && pr) Object.assign(lr, pr, { pushed: pr.pushed || {}, pushed_to: pr.pushed_to || null });
  const key = idx != null ? idx : (linkedin || "").replace(/[^a-z0-9]/gi, "").slice(-24);
  const row = document.getElementById(`lr-${sid}-${key}`);
  if (row && pr) {  // patch the one row in place - other rows keep their DOM nodes
    row.style.opacity = pr.verdict === "reject" ? ".4" : "";
    row.innerHTML = leadRowInner({ ...pr, _sid: sid, _idx: idx }, campaignId);
    refreshLeadChrome();
  } else {
    renderDraftCampaign(campaignId);
  }
}

// tags the pull actually fills, per mechanism — used to catch dangling {{merge}} tags
function fillableTags(src) {
  const base = ["company", "first_name", "firstName", "name", "Title", "title"];
  const mech = (src.mechanism || src.type || "").toLowerCase();
  if (mech === "engagement") {
    const copyRef = ((src.config || {}).engagement || {}).copy_reference;
    return copyRef ? base.concat(["Topic", "WhosePost"]) : base;  // only filled when "mention the post" is on
  }
  return base;
}
async function saveIce(id, campaignId) {
  const v = document.getElementById("ice-" + id).value;
  const src = (window._drafts || []).find((x) => x.id === id) || {};
  const allowed = new Set(fillableTags(src).map((t) => t.toLowerCase()));
  const used = [...v.matchAll(/\{\{\s*(\w+)\s*\}\}/g)].map((m) => m[1]);
  const dangling = [...new Set(used.filter((t) => !allowed.has(t.toLowerCase())))];
  if (dangling.length) {
    const eng = (src.mechanism || src.type) === "engagement";
    const extra = eng && !((src.config || {}).engagement || {}).copy_reference && dangling.some((t) => /topic|whosepost/i.test(t))
      ? ` (turn on "Mention the post in copy" to fill {{Topic}}/{{WhosePost}})` : "";
    if (!(await uiConfirm(
      `This icebreaker uses ${dangling.map((t) => "{{" + t + "}}").join(", ")}, which this source won't fill — those spots will come out blank${extra}. Save anyway?`,
      { title: "Blank merge tag?", confirmLabel: "Save anyway" }
    ))) return;
  }
  await fetch("/api/sources/update", { method: "POST", body: JSON.stringify({ id, icebreaker: v }) });
  protoNote("Saved - applied to every prospect below and all future pulls");
  renderDrafts(campaignId);
}

async function pullProspects(id, campaignId, btn, afterRetarget) {
  const restore = busyBtn(btn, "Finding people…");
  if (restore === null) return;  // a pull for this source is already running — ignore the extra click
  // sticky so the message stays up for the whole call (a live pull can run 10–30s, well past the toast's auto-hide)
  protoNote("Finding people… this can take up to a minute", { sticky: true });
  window._openSource = id;
  try {
    const r = await (await fetch("/api/sources/pull", { method: "POST", body: JSON.stringify({ id, after_retarget: !!afterRetarget }) })).json();
    const base = r.ok ? (r.note || `${r.prospects.length} decision maker${r.prospects.length === 1 ? "" : "s"} found`) : (r.message || "Pull failed");
    protoNote(r.notice ? `${base} · ${r.notice}` : base);
  } catch (e) { protoNote(`Couldn't reach the server (${e && e.message ? e.message : "connection failed"}) - is it running?`); }
  finally { restore(); }
  renderDrafts(campaignId);
}
// classify one push result into the receipt buckets
function pushOutcome(r) {
  const t = (r && r.push && r.push.tools) || {};
  const vals = Object.values(t);
  if (r && r.push && r.push.suppressed) return "suppressed";
  if (vals.some((v) => v && v.suppressed)) return "suppressed";
  if (vals.some((v) => v && v.ok && /already/i.test(v.message || ""))) return "duplicate";
  if (vals.some((v) => v && v.ok)) return "pushed";
  if (vals.length) return "failed";
  return "noDest";  // kept, but no destination set yet
}
async function bulkVerdict(id, verdict, campaignId) {
  const drafts = await (await fetch("/api/sources", { cache: "no-store" })).json();
  const s = drafts.find((x) => x.id === id);
  if (verdict === "keep") protoNote("Sending…");
  const tally = { pushed: 0, duplicate: 0, suppressed: 0, failed: 0, noDest: 0 };
  for (let i = 0; i < (s?.prospects || []).length; i++) {
    if (verdict === "keep" || !s.prospects[i].verdict) {
      let r = null;
      try { r = await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify({ id, index: i, verdict }) })).json(); } catch {}
      if (verdict === "keep") tally[pushOutcome(r)]++;
    }
  }
  if (verdict === "keep") {
    const bits = [];
    if (tally.pushed) bits.push(`${tally.pushed} sent`);
    if (tally.duplicate) bits.push(`${tally.duplicate} already there`);
    if (tally.suppressed) bits.push(`${tally.suppressed} skipped (already contacted)`);
    if (tally.failed) bits.push(`${tally.failed} couldn't send`);
    if (tally.noDest) bits.push(`${tally.noDest} kept - set a destination to send`);
    protoNote(bits.length ? bits.join(" · ") : "Nothing to send");
  } else {
    protoNote("Rejected the rest");
  }
  renderDrafts(campaignId);
}
async function verdictProspect(id, i, verdict, campaignId) {
  if (verdict === "keep") protoNote("Sending…");
  let r = null;
  try { r = await (await fetch("/api/sources/update", { method: "POST", body: JSON.stringify({ id, index: i, verdict }) })).json(); } catch {}
  pushToast(r, verdict);
  renderDrafts(campaignId);
}
async function duplicateSource(id, campaignId, btn) {
  const restore = busyBtn(btn, "Duplicating…");
  if (restore === null) return;
  protoNote("Duplicating source…", { sticky: true });
  let r;

    .replace(/\{([^{}|]+\|[^{}]+)\}/g, '<span class="spin">{$1}</span>')
    .replace(/\n/g, "<br>");

/* The standard checklist — every run records these categories */
function computeChecks(c, d) {
  const checks = [];
  const fills = d.fill_rates || {};
  const usedVars = new Set();
  (d.sequences || []).forEach((s) => s.variants.forEach((v) =>
    (v.body.match(/\{\{(\w+)\}\}/g) || []).forEach((m) => usedVars.add(m.slice(2, -2)))));
  usedVars.delete("first_name"); usedVars.delete("company_name"); usedVars.delete("sl_date");

  const fillLevels = [...usedVars].map((k) => fills[k] >= 95 ? "pass" : fills[k] >= 60 ? "warn" : "fail");
  checks.push([
    fillLevels.includes("fail") ? "fail" : fillLevels.includes("warn") ? "warn" : "pass",
    "Personalisation filled",
    usedVars.size ? `${[...usedVars].map((k) => `{{${k}}} ${fills[k] ?? 0}%`).join(" · ")} (target 95%)` : "No custom variables in copy",
  ]);

  let spintaxFail = 0, emdash = 0, subjectWarn = 0;
  (d.sequences || []).forEach((s) => s.variants.forEach((v) => {
    const plain = v.body.replace(/<[^>]+>/g, "").trim();
    if (plain.startsWith("{") && !plain.startsWith("{{")) spintaxFail++;
    if (/—/.test(v.body)) emdash++;
    if (s.seq_number > 1 && v.subject) subjectWarn++;
  }));
  checks.push([spintaxFail ? "fail" : "pass", "Spintax placement",
    spintaxFail ? `${spintaxFail} variant(s) open with spintax - body gets dropped` : "No variant opens with spintax"]);
  checks.push([emdash ? "warn" : "pass", "No em-dashes",
    emdash ? `${emdash} variant(s) contain an em-dash` : "Copy is clean"]);
  checks.push([subjectWarn ? "warn" : "pass", "Follow-ups thread",
    subjectWarn ? `${subjectWarn} follow-up variant(s) have a subject set` : "All follow-up subjects blank"]);

  let distWarn = 0;
  (d.sequences || []).forEach((s) => {
    const dist = s.variants.map((v) => v.distribution_pct).filter((x) => x !== null && x !== undefined);
    if (dist.length && dist.reduce((a, b) => a + b, 0) !== 100) distWarn++;
  });
  checks.push([distWarn ? "warn" : "pass", "Traffic split sums to 100%",
    distWarn ? `${distWarn} step(s) off` : "All steps balanced"]);

  const audit = DB.audit?.by_campaign?.[String(c.id)];
  checks.push([audit ? "warn" : "pass", "Lead hygiene",
    audit ? `${fmt(audit)} name/icebreaker fixes pending` : "No pending fixes"]);
  return checks;
}

/* ── Gojiberry-style targeting chips (wizard step 4) ── */
/* the server self-heals (launchd KeepAlive) - one retry bridges a restart */
async function fetchJsonRetry(url, body) {
  for (let i = 0; i < 2; i++) {
    try { return await (await fetch(url, { method: "POST", body: JSON.stringify(body) })).json(); }
    catch { if (i === 0) await new Promise((r) => setTimeout(r, 2500)); }
  }
  return { ok: false, message: "Couldn't reach the engine - it restarts itself within seconds, hit Back and try again" };
}

/* strategy runs are async jobs server-side (2-4 min): start, then poll.
   Cached briefs come back instantly with rows; fresh ones return a job id. */
async function strategyCall(payload) {
  const start = await fetchJsonRetry("/api/strategy-map", payload);
  if (!start || !start.job) return start;  // cached rows, sync result, or error
  for (let i = 0; i < 120; i++) {          // up to ~6 min
    await new Promise((r) => setTimeout(r, 3000));
    let res;
    try { res = await (await fetch(`/api/strategy-result?job=${start.job}`, { cache: "no-store" })).json(); }
    catch { continue; }  // transient network blip - keep polling
    if (res && res.status !== "running") return res;
  }
  return { ok: false, rows: [], message: "The run is taking unusually long. Hit Try again." };
}

      const r = await (await fetch("/api/suggest-location", { method: "POST", body: JSON.stringify({ q: v }) })).json();
      const s = (r.suggestions || [])[0];
      if (s && s.name) { if (!wiz.geos.includes(s.name)) wiz.geos.push(s.name); }
      else { drawWiz(); const h = document.getElementById("geo-hint"); if (h) h.textContent = `No location matched "${v}" - try the full name`; return; }
    } catch { drawWiz(); return; }
  } else if (field === "keywords") {
    const kws = kwList();
    if (!kws.includes(v)) kws.push(v);
    wiz.keywords = kws.join(", ");
  } else if (!wiz[field].includes(v)) {
    wiz[field].push(v);
  }
  wiz.strat = null; wiz._stratLoading = false;
  drawWiz();
}

/* ── client step helpers ── */
function pickClient(id) {
  const c = (wiz.clients || []).find((x) => x.id === id);
  if (!c) return;
  wiz.client = c;
  const icp = c.icp || {};
  if (icp.titles?.length) wiz.titles = [...icp.titles];
  if (icp.keywords) wiz.keywords = icp.keywords;
  if (icp.industries?.length) wiz.industries = [...icp.industries];
  if (icp.sizes?.length) wiz.sizes = [...icp.sizes];
  if (icp.geos?.length) wiz.geos = [...icp.geos];
  wiz.strat = null; wiz._stratLoading = false;
  wiz.step = 2;
  drawWiz();
}
function startNewClient() { wiz.newClient = { website: "", name: "", description: "", offer: "" }; drawWiz(); }
async function analyseClientSite() {
  const site = document.getElementById("nc-website").value.trim();
  if (!site) { protoNote("Enter the website first"); return; }
  wiz.newClient.website = site;
  document.getElementById("nc-hint").textContent = "Reading the site…";
  try {
    const r = await (await fetch("/api/client-prefill", { method: "POST", body: JSON.stringify({ website: site }) })).json();
    wiz.newClient.domain = r.domain || site;
    wiz.newClient.name = r.name || "";
    wiz.newClient.description = r.description || "";
    wiz.newClient._analysed = true;
    drawWiz();
  } catch { document.getElementById("nc-hint").textContent = "Could not reach the site"; }
}
async function saveNewClient() {
  const nc = wiz.newClient;
  nc.name = document.getElementById("nc-name").value.trim();
  nc.description = document.getElementById("nc-desc").value.trim();
  nc.offer = document.getElementById("nc-offer").value.trim();
  if (!nc.name) { protoNote("Name the client"); return; }
  const r = await (await fetch("/api/clients", { method: "POST", body: JSON.stringify(nc) })).json();
  await loadClients();
  window._clients = null;
  localStorage.setItem("navreo_client", r.id);
  wiz.newClient = null;
  pickClient(r.id);
}

const FRICTION_PILL = { "Easy": "g", "Med": "a", "Med (setup)": "a", "Hard": "r" };

function guessMechanism(goal) {
  const g = (goal || "").toLowerCase();
  if (/hir|recruit|job post|vacan/.test(g)) return "hiring";
  if (/engag|post|comment|linkedin content/.test(g)) return "engagement";
  return "";
}

const DIRECT_SRC_TYPE = { hiring: "hiring", engagement: "engagement", company_filter: "companies", lookalike: "lookalike" };
const DIRECT_LABEL = { hiring: "Hiring signal", engagement: "Engagement signal",
  company_filter: "Company filter", lookalike: "Lookalike companies" };

function directRoute(mech) {
  // defer campaign creation until the source wizard is completed (user rule):
  // no campaign row is written on cancel/back-out. openSourceWizard runs against
  // a "__pending__" campaign; ensureCampaign() creates it the moment we save.
  wiz.mechanism = mech;
  const pending = {
    name: `${wiz.client?.name || "New"} · ${(wiz.goal || "").trim().slice(0, 48) || DIRECT_LABEL[mech]}`,
    client_id: wiz.client?.id || null, goal: wiz.goal || "",
    icp: { titles: wiz.titles, industries: wiz.industries, keywords: wiz.keywords, sizes: wiz.sizes, geos: wiz.geos },
    paused: true,
  };
  const clientId = wiz.client?.id || null;

  openSourceWizard(DIRECT_SRC_TYPE[mech] || "companies", "__pending__");
  sw._pendingCampaign = pending;
  sw._clientId = clientId;
  protoNote("Set up the signal - the campaign is created when you save it");

async function wizNext() {
  if (wiz.step === 2) { wizStartIdeas(); return; }  // step 2 is click-driven; Next = start ideas
  if (wiz.step === 3 && !wiz.titles.length) { protoNote("Pick at least one title"); return; }
  if (wiz.step === 4 && wiz.mode !== "direct" && !wiz.strat && !wiz._stratLoading) loadStrategyMap();  // prefetch for AI mode only - direct re-runs once the mechanism is confirmed
  if (wiz.step === 5 && !wiz.sources.length) { protoNote("Pick at least one angle"); return; }

  if (wiz.step < 6) { wiz.step++; drawWiz(); return; }

  if (wiz.step === 6) {
    wiz.sources.forEach((k) => {
      const row = (wiz.strat?.rows || []).find((r) => r.id === k);
      const el = document.getElementById("ck-ice-" + k);
      if (row && el) row.icebreaker = el.value;
    });
    wiz.step = 7; wiz.result = null; wiz.rejected = {}; drawWiz();
    const payload = {
      titles: wiz.titles,
      keywords: wiz.keywords.trim() ? [wiz.keywords.trim()] : [],
      industries: wiz.keywords.trim() ? [] : wiz.industries,
      headcount: wiz.sizes,
      countries: wiz.geos,
      exclude_keywords: wiz.excludes,
      domains: wiz.domains,
    };
    wiz.result = await fetchJsonRetry("/api/preview/people", payload);
    drawWiz(); return;
  }

  await saveWizCampaign((wiz.result?.sample || []).filter((_, i) => !wiz.rejected[i]));
}

// kept === null means "save for later" from step 6: no preview search ran, nothing spent
async function saveWizCampaign(kept) {
  if (wiz._saving) return;
  wiz._saving = true;
  if (wiz.step === 6) {  // capture any opener edits made on the summary
    wiz.sources.forEach((k) => {
      const row = (wiz.strat?.rows || []).find((r) => r.id === k);
      const el = document.getElementById("ck-ice-" + k);
      if (row && el) row.icebreaker = el.value;
    });
  }
  const chosen = wiz.sources.map((k) => (wiz.strat?.rows || []).find((r) => r.id === k)).filter(Boolean)
    .map((r) => ({ mechanism: r.mechanism, idea: r.idea, params: r.params || {}, dms: r.dms ?? null, icebreaker: r.icebreaker || "" }));
  const topAngle = chosen[0]?.idea || "Campaign";
  const saveResp = await (await fetch("/api/campaign-drafts", { method: "POST", body: JSON.stringify({
    name: `${wiz.client?.name || "New"} · ${topAngle} · ${(wiz.keywords || wiz.industries[0] || "audience").slice(0, 32)}`,
    client_id: wiz.client?.id || null,
    goal: wiz.goal || "",
    icp: { titles: wiz.titles, industries: wiz.industries, keywords: wiz.keywords, sizes: wiz.sizes, geos: wiz.geos, excludes: wiz.excludes, domains: wiz.domains },
    sources: chosen,
    strategy: wiz.strat?.rows || null,
    total_matched: wiz.result?.total_people || 0,
    preview_kept: kept || [],
    paused: kept === null,  // "run it later" means exactly that - saved paused, nothing moves until resumed
  }) })).json();
  const createdSources = [];
  for (const src of chosen) {
    const resp = await (await fetch("/api/sources", { method: "POST", body: JSON.stringify({
      type: src.mechanism, mechanism: src.mechanism, name: src.idea,
      campaign_id: saveResp.id, icebreaker: src.icebreaker || "",
      titles: wiz.titles, params: src.params || {},
      config: { keywords: wiz.keywords, industries: wiz.industries, headcount: wiz.sizes, countries: wiz.geos },
      total: src.dms,
    }) })).json();
    createdSources.push({ mechanism: src.mechanism, idea: src.idea, id: resp.id });
  }
  if (wiz.client?.id) {
    fetch("/api/clients", { method: "POST", body: JSON.stringify({ id: wiz.client.id,
      icp: { titles: wiz.titles, keywords: wiz.keywords, industries: wiz.industries, sizes: wiz.sizes, geos: wiz.geos } }) }).catch(() => {});
  }
  closeWizard();
  DB.campaignDrafts = null;
  location.hash = saveResp.id;
  // engagement sources need their own questions (profiles to monitor, topics,
  // copy mode) - hand straight off to the engagement wizard in edit mode
  const engSrc = createdSources.find((s) => s.mechanism === "engagement" && s.id);
  if (engSrc) {
    const engRow = chosen.find((s) => s.mechanism === "engagement") || {};
    protoNote("Draft saved - now tell us whose LinkedIn to watch");
    setTimeout(() => openSourceWizard("engagement", saveResp.id, {
      id: engSrc.id, name: engSrc.idea, titles: wiz.titles,
      config: { countries: [], headcount: wiz.sizes,
        engagement: { include_topics: ((engRow.params || {}).keywords || []).slice(0, 6) } },  // topics from THIS campaign's goal, not generic seeds
    }), 500);
  } else {
    protoNote(kept === null ? "Saved and paused - nothing runs or spends until you switch it to ● Running" : "Draft saved - here it is, pull prospects when ready");
  }
}

function parseEngUrls(text) {
  const lines = (text || "").split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
  const valid = [], bad = [];
  for (const l of lines) {
    const clean = l.replace(/\?.*$/, "").replace(/\/+$/, "");
    if (/^https?:\/\/(www\.)?linkedin\.com\/(in|company)\/[^/]+$/i.test(clean)) {
      if (!valid.includes(clean)) valid.push(clean);
    } else bad.push(l);
  }
  return { valid, bad };
}
function swUrlHint() {
  const el = document.getElementById("sw-url-hint");
  if (!el) return;
  const { valid, bad } = parseEngUrls(document.getElementById("sw-urls").value);
  el.textContent = `${valid.length} profile${valid.length === 1 ? "" : "s"} to monitor` +
    (bad.length ? ` · ${bad.length} line${bad.length === 1 ? "" : "s"} not a LinkedIn profile URL` : "");
}

function openSourceWizard(type, campaignId, editSrc) {
  sw = { type, campaignId, step: 1, hc: ["11-20", "21-50", "51-100", "101-200"], geo: ["United States", "United Kingdom"], tier: "T2", result: null, csv: null, industries: [] };
  if (type === "engagement") {

      geo: [...ENG_COUNTRIES], dm_titles: ENG_TITLE_SEED, avoid_rules: "",
      copy_ref: true, leads_per_day: 25,
    });
    if (editSrc) {  // finish-setup / edit an existing source (e.g. created by the campaign wizard)
      const eng = (editSrc.config || {}).engagement || {};

      Object.assign(sw, {
        editId: editSrc.id, name: editSrc.name,
        urls: (eng.linkedin_urls || []).join("\n"),
        inc: eng.include_topics?.length ? [...eng.include_topics] : sw.inc,
        avd: eng.avoid_topics?.length ? [...eng.avoid_topics] : sw.avd,
        wild: eng.wildcard || "",
        avoid_companies: eng.avoid_companies?.length ? [...eng.avoid_companies] : [],
        dm_titles: (eng.engager_titles || editSrc.titles || []).join(", ") || sw.dm_titles,
        geo: cfg.countries?.length ? [...cfg.countries] : sw.geo,
        hc: cfg.headcount?.length ? [...cfg.headcount] : sw.hc,
        avoid_rules: eng.avoid_rules || "",
        copy_ref: eng.copy_reference !== false,
        leads_per_day: eng.leads_per_day || 25,
      });
    }
  } else if (editSrc) {  // ✎ Edit targeting for hiring / companies / lookalike: prefill from the source, edit in place
    const cfg = { ...(editSrc.config || {}), ...(editSrc.params || {}) };
    sw.editId = editSrc.id;
    sw.name = editSrc.name;
    if (cfg.countries?.length) sw.geo = [...cfg.countries];
    if (cfg.headcount?.length) sw.hc = [...cfg.headcount];
    if (cfg.tier) sw.tier = cfg.tier;
    sw._touched = {};
    if (type === "hiring") {
      const jt = cfg.job_titles?.length ? cfg.job_titles : (typeof cfg.titles === "string" ? cfg.titles.split(",") : []);
      sw.titles = jt.map((x) => String(x).trim()).filter(Boolean).join(", ");
      sw.dm_titles = (cfg.dm_titles?.length ? cfg.dm_titles : (editSrc.titles || [])).join(", ");
      sw.negatives = (cfg.negative_keywords || []).join(", ");
      sw.industries = Array.isArray(cfg.industry_or) ? [...cfg.industry_or] : [];  // prefill the industry filter (AI-idea path or a prior edit)
      sw.leads_per_day = cfg.leads_per_day || 20;
      sw._touched = { titles: true, dm_titles: true };
    } else if (type === "companies") {
      sw.keywords = typeof cfg.keywords === "string" ? cfg.keywords : (cfg.keywords || []).join(", ");
      sw._touched = { keywords: true };
    } else if (type === "lookalike") {
      sw.icp = cfg.icp || cfg.icp_text || "";

  }
  srcwiz.classList.add("on");
  drawSrc();
  if (type === "hiring" && !editSrc) { sw.titles = sw.titles || "Head of Sales, VP Sales"; prefillHiringRoles(campaignId); }  // async, redraws when found

async function prefillEngagement(campaignId) {

      (await fetch("/api/clients")).json(),

    const cl = (clients || []).find((c) => c.id === dc.client_id) || {};

    if (t.length) sw.dm_titles = t.join(", ");

    if (typeof kw === "string" && kw.trim() && !sw.inc.includes(kw.trim())) sw.inc.push(kw.trim());
    if (sw.step === 1) drawSrc();

async function prefillDmTitles(campaignId) {

/* auto-suggest both role lists from the client's ICP - user edits always win */

/* removable role chips backed by the comma-string sw fields the rest of the wizard reads */
function roleList(field) { return (sw[field] || "").split(",").map((t) => t.trim()).filter(Boolean); }
function roleChipRow(field, placeholder) {

  return `<div class="chips-center" style="justify-content:flex-start;max-width:520px;margin:4px 0 0">

/* POST /api/role-suggest with a hard timeout so a slow model can never lock
   the wizard - always resolves or throws within ~35s */
async function suggestFetch(body) {
  if (sw._clientId && body && !body.client_id) body.client_id = sw._clientId;  // pre-creation wizard: no campaign yet
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 35000);
  try {
    const res = await fetch("/api/role-suggest", { method: "POST", body: JSON.stringify(body), signal: ctrl.signal });
    return await res.json();
  } finally { clearTimeout(t); }
}

/* append ~10 fresh suggestions to one field - current chips + everything this
   client ever declined are the exclusion set, kept history steers the flavour */
const FIELD_FB = { titles: "trigger", dm_titles: "dm", keywords: "keywords", inc: "topics", negatives: "exclusions" };
async function roleGenMore(field) {
  if (sw._genbusy) return;
  sw._genbusy = field;
  sw._touched = { ...(sw._touched || {}), [field]: true };  // a manual generate counts as a touch, so a late auto-fill can't clobber it
  drawSrc();
  try {
    const d = sw._declined || {};
    const isRoles = field === "titles" || field === "dm_titles";
    const body = isRoles
      ? { campaign_id: sw.campaignId, count: 10,
          exclude_trigger: roleList("titles"), exclude_dm: roleList("dm_titles"),
          declined_trigger: d.titles || [], declined_dm: d.dm_titles || [] }
      : { campaign_id: sw.campaignId, count: 10, kind: FIELD_FB[field],
          exclude: field === "inc" ? [...sw.inc, ...sw.avd] : roleList(field),
          declined: d[field] || [] };
    const r = await suggestFetch(body);
    if (r.ok === false) protoNote(`Couldn't generate: ${r.message || "try again in a moment"}`);
    else {
      const cur = field === "inc" ? [...sw.inc] : roleList(field);
      const have = new Set(cur.map((t) => t.toLowerCase()));
      for (const t of (isRoles ? (field === "titles" ? r.trigger_roles : r.dm_titles) : r.suggestions) || []) {
        if (!have.has(t.toLowerCase()) && cur.length < 40) { cur.push(t); have.add(t.toLowerCase()); }
      }
      if (field === "inc") sw.inc = cur; else sw[field] = cur.join(", ");
    }
  } catch (e) { protoNote(e.name === "AbortError" ? "That took too long - try again" : "Couldn't generate right now - try again in a moment"); }
  sw._genbusy = null;
  if (sw.step === 1) drawSrc();
}

/* fire-and-forget feedback so suggestions learn per client */
function roleFeedback(body) {
  try { fetch("/api/role-feedback", { method: "POST", body: JSON.stringify({ campaign_id: sw.campaignId, ...body }) }); } catch {}
}

/* auto-fill a non-hiring ideation field on wizard open - user edits always win */
async function prefillSuggest(field, kind) {
  sw._suggesting = true;
  if (sw.step === 1) drawSrc();
  try {
    const r = await suggestFetch({ campaign_id: sw.campaignId, kind, count: kind === "icp_text" ? 1 : 6 });
    if (r.ok !== false && sw.step === 1 && (r.suggestions || []).length) {
      sw._basedOn = r.based_on;
      if (field === "keywords" && !(sw._touched || {}).keywords) sw.keywords = r.suggestions.join(", ");
      if (field === "icp" && !(sw.icp || "").trim()) sw.icp = r.suggestions[0];
    }
  } catch {}
  sw._suggesting = false;
  if (sw.step === 1) drawSrc();
}

/* lookalike: rewrite the ideal-company description - the one being replaced is a decline */
async function icpRewrite() {
  if (sw._genbusy) return;
  const el = document.getElementById("sw-icp");
  if (el) sw.icp = el.value;  // capture any manual edits first
  const old = (sw.icp || "").trim();
  sw._genbusy = "icp"; drawSrc();
  try {
    sw._declined = sw._declined || {};
    if (old) { (sw._declined.icp = sw._declined.icp || []).push(old); roleFeedback({ declined_icp: [old] }); }
    const r = await suggestFetch({ campaign_id: sw.campaignId, kind: "icp_text", count: 1,
      exclude: old ? [old] : [], declined: sw._declined.icp || [] });
    if (r.ok === false) protoNote(`Couldn't write one: ${r.message || "try again in a moment"}`);
    else if ((r.suggestions || []).length) { sw.icp = r.suggestions[0]; sw._basedOn = r.based_on; }
  } catch (e) { protoNote(e.name === "AbortError" ? "That took too long - try again" : "Couldn't write one right now - try again in a moment"); }
  sw._genbusy = null;
  if (sw.step === 1) drawSrc();
}
function roleChipDel(field, i) {
  const a = roleList(field);
  const gone = a.splice(i, 1)[0];
  sw[field] = a.join(", "); sw._touched = { ...(sw._touched || {}), [field]: true };
  sw._declined = sw._declined || {}; (sw._declined[field] = sw._declined[field] || []).push(gone);
  roleFeedback({ ["declined_" + FIELD_FB[field]]: [gone] });
  drawSrc();
}
function roleChipAdd(field) {
  const el = document.getElementById("add-" + field);
  const v = (el && el.value || "").trim();
  if (!v) return;
  const a = roleList(field);
  if (!a.some((x) => x.toLowerCase() === v.toLowerCase())) a.push(v);
  sw[field] = a.join(", "); sw._touched = { ...(sw._touched || {}), [field]: true }; drawSrc();
}
function srcBack() {  // step back through the wizard (targeting ⇆ preview ⇆ name); only close from the first step

}

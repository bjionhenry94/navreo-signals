<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campaigns · Navreo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="navreo.css">
<style>
.toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 18px 0 14px; }
.toolbar .search {
  border: 1px solid var(--line-2); border-radius: 999px; padding: 7px 15px;
  font: 400 13px var(--font-sans); width: 220px; background: transparent; color: var(--ink);
}
.toolbar .search:focus { outline: none; box-shadow: var(--focus); }
.progress-cell { min-width: 110px; }
.progress-cell .lab { font-size: 11px; color: var(--ink-3); margin-bottom: 4px; }
.marker { position: relative; }
.marker::after { content: ""; position: absolute; left: 75%; top: -2px; bottom: -2px; width: 1.5px; background: var(--line-2); }
.srcic { display: inline-flex; gap: 4px; }
.srcic .ictile { width: 26px; height: 26px; border-radius: 7px; }
.srcic .ictile .ic8 { width: 13px; height: 13px; }

/* ── Campaign scorecard (Smartlead-style performance) ─────────────────── */
/* Collective tiles across the top of the list. */
.sc-tiles { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
@media (max-width: 900px) { .sc-tiles { grid-template-columns: repeat(3, 1fr); } }
.sc-tile { border: 1px solid var(--line); border-radius: var(--radius); padding: 12px 14px; background: var(--card); }
.sc-tile .lab { font-size: 11px; color: var(--ink-3); font-weight: 500; display: flex; align-items: center; gap: 5px; }
.sc-tile .val { font-size: 22px; font-weight: 700; margin-top: 5px; line-height: 1; letter-spacing: -.02em; }
.sc-tile .sub { font-size: 10.5px; color: var(--ink-3); margin-top: 4px; }
/* Per-campaign stat strip: ring on the left, coloured columns to the right. */
.sc-row { display: flex; align-items: center; gap: 18px; margin-top: 10px; padding-top: 11px; border-top: 1px dashed var(--line); flex-wrap: wrap; }
.sc-cols { display: flex; gap: 20px; flex-wrap: wrap; align-items: baseline; }
.sc-stat { min-width: 62px; }
.sc-stat .n { font-size: 16px; font-weight: 700; line-height: 1; letter-spacing: -.01em; }
.sc-stat .n .pc { font-size: 11px; font-weight: 500; color: var(--ink-3); margin-left: 3px; }
.sc-stat .l { font-size: 10.5px; color: var(--ink-3); margin-top: 3px; }
.sc-c-sent { color: var(--ink); } .sc-c-reply { color: var(--blue-600, #1971c2); }
.sc-c-pos { color: var(--green, #2f9e44); } .sc-c-bounce { color: var(--red, #e03131); }
.sc-c-meet { color: var(--ink); } .sc-c-leads { color: var(--orange-600, #f08c00); }
.sc-ring { --pct: 0; width: 48px; height: 48px; border-radius: 999px; flex-shrink: 0;
  background: conic-gradient(var(--green, #2f9e44) calc(var(--pct) * 1%), var(--line) 0);
  display: flex; align-items: center; justify-content: center; position: relative; }
.sc-ring::before { content: ""; position: absolute; inset: 5px; border-radius: 999px; background: var(--card); }
.sc-ring .pv { position: relative; font-size: 12px; font-weight: 700; color: var(--ink); }
.sc-ring.gated { background: var(--line); }
.sc-muted { color: var(--ink-3); font-weight: 500; }
/* Data grid — same look as the Lists page people grid (ported verbatim from
   lists.html) so a campaign's "People" reads identically to a saved list. */
.gridwrap { position: relative; border: 1px solid var(--line); border-radius: var(--radius); overflow: auto; max-width: 100%; max-height: 68vh; }
table.datagrid { border-collapse: collapse; font-size: 12.5px; width: max-content; min-width: 100%; }
.datagrid th { position: sticky; top: 0; background: var(--bg-sunken); z-index: 5; text-align: left; padding: 0; border-bottom: 1px solid var(--line-2); }
.datagrid th .thwrap { display: flex; align-items: center; gap: 5px; padding: 8px 10px; white-space: nowrap; }
.datagrid th .thlbl { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3); }
.datagrid th.gutter, .datagrid td.gutter { position: sticky; left: 0; background: var(--bg-sunken); color: var(--ink-3); text-align: right; padding: 6px 10px; font-family: var(--font-mono); font-size: 11px; z-index: 4; }
.datagrid th.gutter { z-index: 6; }
.datagrid tr:hover td.gutter { background: var(--bg-sunken); }
/* horizontal borders only — no vertical lines between data cells */
.datagrid td { padding: 7px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; max-width: 320px; overflow: hidden; text-overflow: ellipsis; color: var(--ink-2); }
.datagrid tr:hover td { background: var(--bg-sunken); }
.datagrid td .celllink { color: inherit; text-decoration: none; }
.datagrid td .celllink:hover { text-decoration: underline; }
.datagrid td .pill { font-size: 10.5px; }

/* detail */
.dethead { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.funnel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 16px 0; }
.fstage { border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 16px; position: relative; }
.fstage .ictile { position: absolute; top: 12px; right: 12px; width: 30px; height: 30px; }
.fstage .lab { font-size: 11.5px; color: var(--ink-3); font-weight: 500; }
.fstage .conv { font-size: 11px; color: var(--brown-400); margin-top: 4px; }
.panel { padding: 18px 20px; margin-bottom: 14px; }
.step-card { border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 14px; overflow: hidden; }
.step-head { display: flex; align-items: center; gap: 10px; padding: 12px 16px; background: var(--bg-sunken); border-bottom: 1px solid var(--line); font-size: 13px; }
.step-head .n { width: 26px; height: 26px; border-radius: 999px; background: var(--ink); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
.variant { padding: 13px 16px; border-bottom: 1px solid var(--line); }
.variant:last-child { border-bottom: none; }
.v-top { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 6px; font-size: 12.5px; }
.v-label { font-weight: 600; }
.v-body { font-size: 12.5px; color: var(--ink-2); line-height: 1.65; background: var(--bg-sunken); border: 1px solid var(--line); border-radius: 8px; padding: 11px 13px; max-height: 150px; overflow: hidden; position: relative; cursor: pointer; }
.v-body.open { max-height: none; }
.v-body:not(.open)::after { content: "expand"; position: absolute; bottom: 0; left: 0; right: 0; padding: 18px 0 6px; text-align: center; font-size: 11px; color: var(--ink-3); background: linear-gradient(transparent, var(--bg-sunken) 65%); }
.v-body .var { background: var(--orange-100); color: var(--orange-700); border-radius: 4px; padding: 0 4px; font-family: var(--font-mono); font-size: 11px; }
.v-body .spin { background: #F0F0EE; color: var(--ink-2); border-radius: 4px; padding: 0 4px; font-family: var(--font-mono); font-size: 11px; }
.qa-row { display: flex; align-items: flex-start; gap: 11px; padding: 12px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
.qa-row:last-child { border-bottom: none; }
.qa-row .t { font-weight: 500; }
.qa-row .d { font-size: 12px; color: var(--ink-2); margin-top: 1px; }
.fillrow { margin-bottom: 10px; font-size: 12.5px; }
.fillrow .top { display: flex; justify-content: space-between; margin-bottom: 4px; }
.srcrow { display: flex; align-items: center; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--line); }
.srcrow:last-child { border-bottom: none; }
.filterchips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.fchip { font-size: 11px; padding: 2px 9px; border-radius: 999px; background: var(--bg-sunken); color: var(--ink-2); }
.srctypes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
.srctype { border: 1px solid var(--line); border-radius: var(--radius); padding: 14px 15px; cursor: pointer; display: flex; align-items: center; gap: 11px; }
.srctype:hover { border-color: var(--line-2); background: var(--bg-sunken); }
.srctype .t { font-weight: 500; font-size: 13px; }
.srctype .d { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }

/* destination picker — click a platform chip to search & choose its campaign/list */
.destbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.destchip { display: inline-flex; align-items: center; gap: 8px; padding: 7px 11px 7px 12px; border: 1px solid var(--line-2); border-radius: 999px; background: var(--card, #fff); cursor: pointer; font: 500 12.5px var(--font-sans); color: var(--ink); max-width: 300px; transition: border-color .12s, background .12s, box-shadow .12s; }
.destchip:hover { background: var(--bg-sunken); border-color: var(--ink-3); }
.destchip.open { border-color: var(--orange); box-shadow: var(--focus); }
/* unset = still an obvious solid button (not a faded/dashed placeholder), just tagged "Choose…" */
.destchip.unset { background: var(--bg-sunken); color: var(--ink); }
.destchip.unset .dc-name { color: var(--ink-3); }
.destchip img { width: 17px; height: 17px; border-radius: 5px; flex-shrink: 0; }
.destchip .dc-ch { font-size: 10.5px; font-weight: 700; letter-spacing: .02em; padding: 1px 6px; border-radius: 6px; flex-shrink: 0; }
/* colour-code the channel so the two sides read pre-attentively: Email = brand orange, LinkedIn = LinkedIn blue */
.destchip .dc-ch.email { color: var(--orange-700); background: var(--orange-100); }
.destchip .dc-ch.li { color: #285E8C; background: #E4EEF6; }
.destchip .dc-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.destchip .dc-cx { color: var(--ink-3); font-size: 11px; flex-shrink: 0; transition: transform .12s; }
.destchip.open .dc-cx { transform: rotate(180deg); }
.destchip.saving { opacity: .72; pointer-events: none; }
.dc-spin { width: 11px; height: 11px; border: 2px solid var(--line-2); border-top-color: var(--ink-3); border-radius: 50%; flex-shrink: 0; display: inline-block; animation: dc-spin .6s linear infinite; }
@keyframes dc-spin { to { transform: rotate(360deg); } }

.destpop { position: fixed; z-index: 200; width: 304px; max-width: calc(100vw - 24px); background: #fff; border: 1px solid var(--line-2); border-radius: 14px; box-shadow: 0 14px 38px rgba(20,17,14,.18); overflow: hidden; display: flex; flex-direction: column; animation: destpop-in .11s ease-out; }
@keyframes destpop-in { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.destpop-h { display: flex; align-items: center; gap: 8px; padding: 11px 13px 9px; }
.destpop-h img { width: 18px; height: 18px; border-radius: 5px; }
.destpop-h .t { font-weight: 600; font-size: 12.5px; }
.destpop-h .cv { font-size: 11px; color: var(--ink-3); }
.destpop-search { border: none; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); padding: 10px 13px; font: 400 13px var(--font-sans); color: var(--ink); background: transparent; }
.destpop-search:focus { outline: none; background: var(--bg-sunken); }
.destpop-list { max-height: 264px; overflow-y: auto; padding: 5px; }
.destopt { display: flex; align-items: center; gap: 9px; padding: 9px 10px; border-radius: 9px; cursor: pointer; font-size: 13px; color: var(--ink); line-height: 1.35; }
.destopt:hover, .destopt.hi { background: var(--bg-sunken); }
.destopt.sel { color: var(--orange-700); font-weight: 600; }
.destopt .tick { margin-left: auto; color: var(--orange-700); flex-shrink: 0; }
.destopt .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.destopt.clear { color: var(--ink-3); margin-top: 4px; border-top: 1px solid var(--line); border-radius: 0 0 9px 9px; }
.destpop-empty { padding: 18px 12px; text-align: center; color: var(--ink-3); font-size: 12.5px; }

/* wizard + QA gate overlays — Gojiberry-style: centered, minimal, chips */
.overlay { position: fixed; inset: 0; background: rgba(20,17,14,0.45); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.overlay.on { display: flex; }
.modal { background: #fff; border-radius: 20px; width: 720px; max-width: 100%; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.wdots { display: flex; gap: 8px; justify-content: center; padding-top: 26px; }
.wdot { width: 26px; height: 26px; border-radius: 999px; background: var(--bg-sunken); color: var(--ink-3); font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; }
.wdot.on { background: var(--ink); color: #fff; }
.wdot.done { background: var(--green-bg); color: var(--green); }
.modal-b { padding: 10px 40px 20px; overflow-y: auto; text-align: center; }
.modal-b h2 { font-family: var(--font-display); font-weight: 400; font-size: 24px; letter-spacing: -0.02em; margin: 18px 0 6px; }
.modal-b .lead { font-size: 13px; color: var(--ink-3); margin-bottom: 20px; }
.modal-f { padding: 16px 26px 20px; border-top: 1px solid var(--line); display: flex; justify-content: space-between; align-items: center; gap: 10px; }
.chips-center { display: flex; gap: 7px; flex-wrap: wrap; justify-content: center; margin: 8px 0 4px; }
.wfield { text-align: left; max-width: 520px; margin: 0 auto; }
.wfield label { display: block; font-size: 12px; font-weight: 500; color: var(--ink-2); margin: 12px 0 5px; }
.wfield input, .wfield textarea {
  width: 100%; border: 1px solid var(--line-2); border-radius: 10px; padding: 9px 12px;
  font: 400 13px var(--font-sans); color: var(--ink); background: transparent; resize: vertical;
}
.ideas { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
.idea { border: 1px solid var(--line); border-radius: var(--radius); padding: 15px 16px; cursor: pointer; }
.idea:hover { background: var(--bg-sunken); }
.idea.sel { border-color: var(--orange); box-shadow: 0 0 0 1px var(--orange); }
.idea .top { display: flex; align-items: center; gap: 9px; margin-bottom: 8px; }
.idea .t { font-weight: 600; font-size: 13.5px; }
.idea .tam { font-family: var(--font-display); font-size: 26px; line-height: 1; }
.idea .tamlab { font-size: 10.5px; color: var(--ink-3); margin-top: 3px; }
.idea .nums { display: flex; gap: 22px; margin-top: 4px; }
/* strategy table (step 5) */
.stratbl { text-align: left; font-size: 12.5px; }
.stratbl td { vertical-align: middle; }
.stratbl tr.sel td { background: var(--orange-100); }
.stratbl tr.sel td:first-child { box-shadow: inset 3px 0 0 var(--orange); }
.wizck { width: 20px; height: 20px; flex-shrink: 0; border: 2px solid var(--line-2); border-radius: 6px;
         display: inline-flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700;
         color: #fff; background: transparent; transition: background .12s, border-color .12s; }
.wizck.on { background: var(--orange); border-color: var(--orange); }

/* Gojiberry-style people preview rows */
.lead-row { display: flex; align-items: center; gap: 12px; padding: 11px 14px; border: 1px solid var(--line); border-radius: var(--radius); margin-bottom: 8px; text-align: left; }
.lead-row.rejected { opacity: 0.4; }
.lead-row .ini { width: 36px; height: 36px; border-radius: 999px; background: var(--bg-sunken); color: var(--ink-2); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.lead-row .nm { font-weight: 600; font-size: 13.5px; }
.lead-row .nm a { color: inherit; text-decoration: none; }
.lead-row .nm a:hover { color: var(--orange-700); }
.lead-row .tt { font-size: 12px; color: var(--ink-2); }
.lead-row .cc { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }
.addchip { position: relative; display: inline-flex; align-items: center; }
.addchip input { border: 1px solid var(--line-2); border-radius: 999px; padding: 5px 38px 5px 12px; font: 400 12.5px var(--font-sans); width: 165px; background: transparent; color: var(--ink); }
.addchip input:focus { outline: none; box-shadow: var(--focus); }
.addchip .plus { position: absolute; right: 4px; top: 50%; transform: translateY(-50%); width: 26px; height: 26px; padding: 0; border: none; border-radius: 999px; background: var(--ink); color: var(--paper, #fff); font-size: 17px; line-height: 1; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
.addchip .plus:hover { opacity: .82; }
.addchip .plus:disabled { opacity: .35; cursor: default; }
.sumrow { display: flex; gap: 12px; align-items: flex-start; padding: 10px 0; border-bottom: 1px solid var(--line); text-align: left; font-size: 13px; }
.sumrow:last-child { border-bottom: none; }
.sumrow .k { width: 110px; flex-shrink: 0; color: var(--ink-3); font-size: 11.5px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; padding-top: 2px; }
.srcpick { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; text-align: left; }
.srcpick .srctype.on { border-color: var(--orange); box-shadow: 0 0 0 1px var(--orange); }
.srcpick .srctype.picking { border-color: var(--orange); box-shadow: 0 0 0 2px var(--orange); background: var(--orange-100); }
.srcpick .srctype.picking::after { content: "✓"; margin-left: auto; color: var(--orange); font-weight: 800; font-size: 15px; }
/* Gojiberry-style targeting page — chips match the wizard's standard .chip */
.tsec { font: 600 11px var(--font-sans); letter-spacing: .08em; text-transform: uppercase; color: var(--ink-2); margin: 16px 0 7px; text-align: left; }
.tgrid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: flex-start; }
.tchip { border: 1px solid var(--line-2); background: transparent; border-radius: 999px; padding: 5px 13px; font: 500 12.5px var(--font-sans); color: var(--ink-2); cursor: pointer; display: inline-flex; align-items: center; }
.tchip:hover { background: var(--bg-sunken); }
.tchip.on { background: var(--ink); border-color: var(--ink); color: var(--cream); }
.tchip.add { border-style: dashed; }
.tchip.add:hover { background: transparent; border-color: var(--ink-2); }
.tchip.add input { border: none; outline: none; font: inherit; width: 190px; background: transparent; color: var(--ink); }
.ai-pill { display: inline-flex; align-items: center; gap: 6px; background: var(--orange-100); color: var(--orange-700); border-radius: 999px; padding: 5px 13px; font: 600 11.5px var(--font-sans); }
.hpipe { display: flex; align-items: flex-start; justify-content: center; gap: 0; margin-top: 22px; flex-wrap: wrap; }
.hstep { display: flex; flex-direction: column; align-items: center; width: 72px; }
.hstep .ictile { width: 40px; height: 40px; border-radius: 12px; }
.hstep .ictile .ic8 { width: 19px; height: 19px; }
.hstep.gate .ictile { background: var(--orange-100); }
.hstep.gate .ictile .ic8 { color: var(--orange-700); }
.hstep .hl { font-size: 10.5px; font-weight: 500; margin-top: 7px; line-height: 1.25; }
.harrow { color: var(--line-2); font-size: 14px; margin-top: 13px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="app">
  <div id="rail"></div>
  <main class="main" id="main"></main>
</div>

<!-- New Campaign wizard (Gojiberry flow) -->
<div class="overlay" id="wizard">
  <div class="modal" style="width:760px">
    <div class="wdots" id="wdots"></div>
    <div class="modal-b" id="wiz-body"></div>
    <div class="modal-f">
      <button class="btn" id="wiz-back" onclick="wizBack()">Back</button>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="wiz-next-hint" class="small muted" style="display:none">Pick an option above to continue</span>
        <button class="btn" onclick="closeWizard()">Cancel</button>
        <button class="btn primary" id="wiz-next" onclick="wizNext()">Next</button>
      </div>
    </div>
  </div>
</div>

<!-- Add-a-source wizard -->
<div class="overlay" id="srcwiz">
  <div class="modal">
    <div class="wdots"><div class="wdot on" id="sd1">1</div><div class="wdot" id="sd2">2</div><div class="wdot" id="sd3">3</div></div>
    <div class="modal-b" id="src-body"></div>
    <div class="modal-f">
      <button class="btn" onclick="srcBack()">Back</button>
      <div class="small" id="sw-hint" style="flex:1;text-align:left;margin:0 12px;color:var(--orange-700)"></div>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="srcSaveForLater()">💾 Save for later</button>
        <button class="btn" onclick="srcwiz.classList.remove('on');hideNote()">Cancel</button>
        <button class="btn primary" id="src-next" onclick="srcNext()">Next</button>
      </div>
    </div>
  </div>
</div>

<!-- Launch gate -->
<div class="overlay" id="qagate">
  <div class="modal" style="width:620px">
    <div class="modal-b" style="text-align:left;padding-top:24px">
      <div class="eyebrow">Launch gate</div>
      <h2 style="text-align:left;margin:8px 0 4px">Checks before anything goes live</h2>
      <div id="qagate-body"></div>
    </div>
    <div class="modal-f">
      <span class="small muted">A failed check blocks the launch</span>
      <div style="display:flex;gap:8px">
        <button class="btn" onclick="qagate.classList.remove('on')">Close</button>
        <button class="btn primary" onclick="protoNote()">Launch</button>
      </div>
    </div>
  </div>
</div>

<!-- Reusable styled confirm dialog (replaces native confirm() so it can't freeze the page) -->
<div class="overlay" id="confirmdlg">
  <div class="modal" style="width:440px">
    <div class="modal-b" style="text-align:left;padding-top:24px">
      <h2 id="confirm-title" style="text-align:left;margin:8px 0 6px">Are you sure?</h2>
      <div class="lead" id="confirm-msg" style="text-align:left"></div>
    </div>
    <div class="modal-f" style="justify-content:flex-end">
      <button class="btn" id="confirm-cancel">Cancel</button>
      <button class="btn primary" id="confirm-ok">Confirm</button>
    </div>
  </div>
</div>

<script src="shell.js"></script>
<script>

let DB = {};
const main = document.getElementById("main");
const wizard = document.getElementById("wizard");
const qagate = document.getElementById("qagate");

/* ══ perf: request cache + mutation-bust + skeletons  (campaigns-perf-loadspeed skill) ══
   cachedGet() memoises a GET's parsed-JSON promise so the same endpoint isn't refetched
   multiple times within one navigation (short TTL) or the session (long TTL for near-static
   data). ANY non-GET fetch clears the cache so the next read is always fresh — one choke
   point that keeps data correct without touching every mutation call-site. */
const _nativeFetch = window.fetch.bind(window);
const _getCache = new Map();   // url -> { t, v, p }   (t=Date.now ms, v=last value, p=promise)
const GET_TTL = 8000;          // in-memory dedupe window; past it we still show cache + revalidate (SWR)
const SESSION_TTL = 600000;    // ~"once per session" for /api/clients, /api/outreach-destinations, /api/campaign-drafts
const LEADS_TTL = 30000;       // matches the server's 30s in-process cache for /api/leads[-batch] - tab switches shouldn't refire a multi-second query

// Persist snapshots to sessionStorage so a full reload / revisit paints the last-known
// data instantly instead of waiting on the network. Big payloads are skipped, quota errors swallowed.
function _lsGet(url) { try { const s = sessionStorage.getItem("gc:" + url); return s ? JSON.parse(s) : null; } catch (_) { return null; } }
function _lsSet(url, v) { try { const s = JSON.stringify(v); if (s.length < 2000000) sessionStorage.setItem("gc:" + url, s); } catch (_) {} }
function _lsDel(sub) { try { for (let i = sessionStorage.length - 1; i >= 0; i--) { const k = sessionStorage.key(i); if (k && k.startsWith("gc:") && (!sub || k.includes(sub))) sessionStorage.removeItem(k); } } catch (_) {} }

let _refreshQueued = false;
function _emitRefreshed() {  // debounced: coalesce several background updates into one repaint
  if (_refreshQueued) return; _refreshQueued = true;
  setTimeout(() => { _refreshQueued = false; window.dispatchEvent(new CustomEvent("signals:refreshed")); }, 60);
}

/* Stale-while-revalidate: return the last-known value INSTANTLY (memory or this session's
   sessionStorage), then refetch in the background and repaint only if the data actually
   changed. Any write (non-GET fetch) wipes memory + persisted cache, so reads taken right
   after an action are always fresh — SWR staleness only ever shows when nothing was written. */
/* Fallback: fetchJsonWithRetry normally ships with the client-switcher shell.js,
   which deploys separately — define the same helper here when that build hasn't
   landed yet, so this page never depends on shell.js's deploy timing. */
if (typeof fetchJsonWithRetry === "undefined") {
  window.fetchJsonWithRetry = async function (url, opts = {}, fallback = null) {
    const attempt = async () => {
      const r = await fetch(url, opts);
      if (!r.ok) { const err = new Error(`HTTP ${r.status}`); err.status = r.status; throw err; }
      return await r.json();
    };
    try {
      return await attempt();
    } catch (e1) {
      const retryable = !e1 || !e1.status || e1.status >= 500;  // network throw or 5xx
      if (!retryable) return fallback;
      await new Promise((res) => setTimeout(res, 800));
      try { return await attempt(); } catch (e2) { console.warn("fetchJsonWithRetry failed", url, e2); return fallback; }
    }
  };
}
/* Same deploy-timing fallback as fetchJsonWithRetry above: pulledAgo is the
   shared "last pulled 3 days ago" formatter in shell.js. Every source card calls
   it during render, so a stale cached shell.js without it would throw and blank
   the Sources list. Define an identical copy here when that build hasn't landed. */
if (typeof pulledAgo === "undefined") {
  window.pulledAgo = function (iso) {
    if (!iso) return "";
    let s = String(iso).trim().replace(" ", "T");
    if (!/(?:[zZ]|[+-]\d\d:?\d\d)$/.test(s)) s += "Z";
    const then = new Date(s);
    if (isNaN(then.getTime())) return esc(String(iso));
    const secs = Math.max(0, (Date.now() - then.getTime()) / 1000);
    const plur = (n, w) => `${n} ${w}${n === 1 ? "" : "s"} ago`;
    let rel;
    if (secs < 45) rel = "just now";
    else if (secs < 3600) rel = plur(Math.round(secs / 60) || 1, "min");
    else if (secs < 86400) rel = plur(Math.floor(secs / 3600), "hour");
    else if (secs < 86400 * 7) rel = plur(Math.floor(secs / 86400), "day");
    else {
      const sameYear = then.getFullYear() === new Date().getFullYear();
      rel = "on " + then.toLocaleDateString("en-GB",
        sameYear ? { day: "numeric", month: "short" } : { day: "numeric", month: "short", year: "numeric" });
    }
    const full = then.toLocaleString("en-GB", { weekday: "short", day: "numeric", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
    return `<span title="${esc(full)} (your local time)">${esc(rel)}</span>`;
  };
}
function cachedGet(url, ttl = GET_TTL) {
  const now = Date.now();
  const mem = _getCache.get(url);
  if (mem && mem.p && (now - mem.t) < ttl) return mem.p;           // fresh enough in memory
  // fetchJsonWithRetry (shell.js): response.ok check + one 800ms-delayed retry
  // on a network throw or 5xx, so a transient blip doesn't sink this GET.
  // It resolves `null` (never rejects) on failure, so re-throw here to keep
  // cachedGet's existing reject-on-failure contract (every call site does
  // `cachedGet(...).catch(() => fallback)`).
  const fetchP = fetchJsonWithRetry(url, {}, null).then((v) => {
    if (v === null) throw new Error(`fetch failed: ${url}`);
    _getCache.set(url, { t: Date.now(), v, p: Promise.resolve(v) });
    _lsSet(url, v);
    return v;
  });
  fetchP.catch(() => { const m = _getCache.get(url); if (m && m.p === fetchP) _getCache.delete(url); });
  const persisted = _lsGet(url);
  const stale = (mem && mem.v !== undefined) ? mem.v : (persisted === null ? undefined : persisted);
  if (stale !== undefined && stale !== null) {                     // SWR: show cache now, revalidate behind
    fetchP.then((v) => { if (JSON.stringify(v) !== JSON.stringify(stale)) _emitRefreshed(); }).catch(() => {});
    _getCache.set(url, { t: now, v: stale, p: Promise.resolve(stale) });
    return Promise.resolve(stale);
  }
  _getCache.set(url, { t: now, v: undefined, p: fetchP });         // cold: nothing cached, must wait
  return fetchP;
}
function bustCache(sub) {
  for (const k of [..._getCache.keys()]) if (!sub || k.includes(sub)) _getCache.delete(k);
  _lsDel(sub);                                                     // a write invalidates persisted cache too
}
window.fetch = (input, init) => {
  if ((((init && init.method) || "GET")).toUpperCase() !== "GET") bustCache();  // a write happened -> reads must refetch
  return _nativeFetch(input, init);
};
// Seamless background repaint when SWR finds fresher data: re-render the current view with
// NO skeleton and NO fade (window._swrRepaint) so only the numbers change, nothing flashes.
window.addEventListener("signals:refreshed", () => {
  window._swrRepaint = true;
  try { Promise.resolve(route()).finally(() => { window._swrRepaint = false; }); }
  catch (_) { window._swrRepaint = false; }
});

/* Skeletons: paint the page frame with the RIGHT box sizes before data arrives, so real
   content swaps in place instead of popping in and shoving the layout around. */
(function injectSkelCss() {
  const s = document.createElement("style");
  s.textContent = ".skel{background:linear-gradient(90deg,var(--bg-sunken,#eef0f2) 25%,var(--line,#f6f7f8) 37%,var(--bg-sunken,#eef0f2) 63%);background-size:400% 100%;animation:skel 1.2s ease infinite;border-radius:6px;display:block}@keyframes skel{0%{background-position:100% 0}100%{background-position:-100% 0}}";
  document.head.appendChild(s);
})();

    <div style="margin-top:16px"><div class="card">${row.repeat(4)}</div></div>`;
}

/* Lazy-load fade: when real content swaps in over a skeleton (or a "Loading…" placeholder),
   ease it in instead of popping. Opacity-only + a 4px rise so it never shifts reserved layout,
   and it restarts on every call (Web Animations API), so each navigation re-animates. */
function hydrateFade(el) {
  if (!el || window._swrRepaint) return;  // background refresh updates in place — no fade
  try { el.animate([{ opacity: 0.35, transform: "translateY(4px)" }, { opacity: 1, transform: "none" }], { duration: 260, easing: "cubic-bezier(.2,.6,.2,1)" }); } catch (_) {}
}

const SOURCE_TYPES = [

// Defer to a macrotask so every module-level `let`/`const` below (dtab, the
// TTL consts, …) is initialised before init()→route() can reach a detail view.
// Running init() inline here left renderDraftCampaign hitting `dtab` in its
// temporal dead zone on a fresh load that lands directly on a campaign hash
// (deep link / refresh) — the page came up blank. renderList (homepage) never
// touches dtab, which is why only campaign URLs broke.
setTimeout(init, 0);
async function init() {
  // Signals-tab data comes from /api/* (campaign-drafts, outreach-destinations, lead-counts),
  // loaded lazily below. The old static data/*.json prototype files are no longer served on the
  // Supabase-backed deploy — fetching them just produced 404 noise, so we start from an empty DB.
  // Every legacy DB.* read (campaigns / campaign_details / signals / audit) is already guarded with
  // `|| []` / optional chaining, so an empty object is behaviourally identical minus the 404s.
  DB = {};
  // "+ Add new client" in the shared rail switcher lands here with ?newclient=1 (it can't
  // open the wizard itself since the wizard only exists on this page) — open it once, then
  // scrub the param so a refresh/back-nav doesn't reopen it.
  if (new URLSearchParams(location.search).get("newclient")) {
    history.replaceState(null, "", location.pathname + location.hash);
    addClientFromSwitcher();
  }
  route();
  window.addEventListener("hashchange", route);

  // two controls (rail + this page) always agree. renderList() recomputes draftsUrl from
  // the NEW activeClient, which is a different cache key, so this naturally re-fetches
  // (now server-side client_id-scoped) rather than reusing the old client's cached read.
  window.addEventListener("navreo:client-changed", () => {
    if (!location.hash.replace("#", "")) { DB.campaignDrafts = null; renderList(); }

}

function route() {
  const note = document.querySelector(".proto-note");
  if (note) note.classList.remove("on");
  // a background (SWR) repaint must not clobber transient UI state or yank the scroll position
  if (!window._swrRepaint) { window._editDest = false; window._confirmAll = false; }

  if (id.startsWith("cdraft-") || id.startsWith("camp-")) r = renderDraftCampaign(id);  // camp-sl-*/camp-hr-* are the platform-keyed drafts (249d321 migration)

  else if (id && (DB.campaigns || []).some((c) => String(c.id) === id)) r = renderDetail(Number(id));
  else r = renderList();
  if (!window._swrRepaint) window.scrollTo(0, 0);
  return r;
}

let dtab = sessionStorage.getItem("cdtab") || "overview";

  {

  if (!sessionStorage.getItem("cdtab") && dtab === "overview" && people.some((x) => !x.verdict)) dtab = "leads";  // land where the work is
  main.innerHTML = `
    <button style="border:none;background:none;font-family:inherit;font-size:13px;color:var(--ink-3);cursor:pointer;padding:0" onclick="location.hash=''">&larr; Campaigns</button>

  hydrateFade(main);  // ease the real detail view in over the skeleton

  if (platMeta && countsUnavailable) (async () => {

    const tileMeta = [["People found", "people"], ["Approved by you", "thumbsup"], ["Skipped", "error"], ["Sent to outreach", "send"]];
    const pullFeed = [];
    srcs.forEach((s) => {
      if (s.last_pull) pullFeed.push({ t: s.last_pull, msg: `${(s.prospects || []).length} new people found · ${s.name}` });
    });

      <div class="sc-tiles" id="ov-perf-tiles"><div class="skel" style="height:70px;width:100%"></div></div>
    </div>` : ""}
    <div style="display:flex;gap:14px;align-items:flex-start">
      <div style="flex:1;min-width:0">
        ${external ? `<div class="small muted" style="margin:0 0 8px 2px">Signals feeding this campaign — add a source to start finding new people for it.</div>` : ""}
        <div class="funnel" style="grid-template-columns:repeat(4,1fr)">
          ${tileMeta.map(([lab, ic], i) =>
            `<div class="fstage"><div class="ictile">${ic8(ic)}</div><div class="lab">${lab}</div><div class="num-hero" id="ov-num-${i}" style="font-size:26px;margin:6px 0 2px" title="loading">…</div><div class="conv" id="ov-cv-${i}">&nbsp;</div></div>`).join("")}
        </div>
        <div class="card panel" style="margin-bottom:0">
          <h2 style="font-size:14px;margin-bottom:2px">Signal velocity</h2>
          <div class="small muted" style="margin-bottom:8px">New people found per day, per source - and everything together.</div>
          <div id="velchart" style="min-height:210px"><div class="skel" style="height:180px"></div></div>
        </div>
      </div>
      <div class="card panel" style="width:260px;flex-shrink:0;margin-bottom:0">
        <h2 style="font-size:14px">Activity</h2>
        <div id="ov-feed">${pullFeed.length ? pullFeed.map((f) => `<div class="small" style="padding:8px 0;border-bottom:1px solid var(--line)">${esc(f.msg)}${f.t ? `<div class="muted">${pulledAgo(f.t)}</div>` : ""}</div>`).join("") : '<div class="small muted" style="padding:8px 0">Nothing yet - pulls and approvals show here</div>'}</div>
      </div>
    </div>`;
    if (platMeta) (async () => {
      // Live performance tiles — real Smartlead/HeyReach numbers for this campaign.
      let d = null;
      try { d = await cachedGet(`/api/campaign-readonly?platform=${platMeta.platform}&id=${encodeURIComponent(platMeta.id)}`, SESSION_TTL); } catch {}
      const holder = document.getElementById("ov-perf-tiles");
      if (!holder) return;
      const pctv = (n, dv) => (dv ? `${(100 * n / dv).toFixed(2)}%` : "0%");
      const t = (lab, val, sub) => `<div class="sc-tile"><div class="lab">${esc(lab)}</div><div class="val">${val}</div>${sub ? `<div class="sub">${esc(sub)}</div>` : ""}</div>`;
      if (!d || d.error) { holder.innerHTML = `<div class="small muted" style="padding:8px 0">Couldn't load live ${platMeta.platform === "heyreach" ? "HeyReach" : "Smartlead"} numbers right now.</div>`; return; }
      holder.innerHTML = platMeta.platform === "smartlead"
        ? [t("Emails sent", fmt(d.sent)), t("Replies", fmt(d.replied), pctv(d.replied, d.sent) + " reply rate"),
           t("Positive replies", fmt(d.positives)), t("Bounced", fmt(d.bounced), pctv(d.bounced, d.sent) + " bounce rate"),
           t("Leads", fmt(d.total), d.completed ? `${fmt(d.completed)} finished` : "")].join("")
        : [t("People", fmt(d.total)), t("In progress", fmt(d.in_progress)), t("Finished", fmt(d.completed)), t("Failed", fmt(d.failed))].join("");

    })();
    (async () => {

      if (rows === null) {

        // pattern used elsewhere on this page. NEVER fall back to `people` here;

        tileMeta.forEach((_, i) => {
          const e = document.getElementById(`ov-num-${i}`);
          if (e) { e.textContent = "—"; e.title = "Live count unavailable — showing no number rather than a stale one"; }
        });
        return;
      }
      // Same wasSent/toolOf split as the dashboard list view and lead-counts
      // endpoint, so "Sent to outreach" here == lead-counts.sent exactly.
      const wasSent = (r) => !!(r.pushed_to || r.status === "pushed" || (r.pushed && Object.keys(r.pushed).length));
      const toolOf = (r) => { const p = (r.pushed_to || "") + Object.keys(r.pushed || {}).join(","); return /heyreach/i.test(p) ? "heyreach" : /smartlead/i.test(p) ? "smartlead" : (r.email ? "smartlead" : "heyreach"); };
      const found = rows.length;
      const kept = rows.filter((r) => r.verdict === "keep").length;
      const rej = rows.filter((r) => r.verdict === "reject").length;
      let slN = 0, hrN = 0;
      rows.forEach((r) => { if (wasSent(r)) { if (toolOf(r) === "heyreach") hrN++; else slN++; } });
      const pushed = slN + hrN;
      [found, kept, rej, pushed].forEach((v, i) => {
        const e = document.getElementById(`ov-num-${i}`);
        if (e) { e.textContent = fmt(v); e.removeAttribute("title"); }
      });
      const cv3 = document.getElementById("ov-cv-3");
      if (cv3) cv3.innerHTML = pushed ? `email ${slN} · LinkedIn ${hrN}` : "&nbsp;";
      // Append the derived summary lines after the (already-rendered, time-sorted)

      const feedTail = [];
      if (pushed) feedTail.push(`${slN} in your email campaign · ${hrN} in your LinkedIn list`);
      if (kept) feedTail.push(`${kept} qualified by you`);
      const feedEl = document.getElementById("ov-feed");
      if (feedEl && feedTail.length) {
        const extra = feedTail.map((msg) => `<div class="small" style="padding:8px 0;border-bottom:1px solid var(--line)">${esc(msg)}</div>`).join("");

  } else if (dtab === "leads" && external && platMeta) {
    // External campaign: the "leads" are the real people already in its

    window._extLeadsOffset = window._extLeadsOffset || 0;
    el.innerHTML = '<div style="display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin:2px 0 10px"><h2 style="font-size:15px;margin:0">People in this campaign</h2><span class="small muted" id="ext-leads-sub">Loading from ' + (platMeta.platform === "heyreach" ? "HeyReach" : "Smartlead") + '…</span></div><div id="ext-leads-body"><div class="skel" style="height:200px"></div></div>';
    (async () => {
      const off = window._extLeadsOffset, lim = 50;
      let d = null;
      try { d = await cachedGet(`/api/campaign-platform-leads?platform=${platMeta.platform}&id=${encodeURIComponent(platMeta.id)}&offset=${off}&limit=${lim}`); } catch {}
      const body = document.getElementById("ext-leads-body"), sub = document.getElementById("ext-leads-sub");
      if (!body) return;
      if (!d || d.error || !Array.isArray(d.leads)) { body.innerHTML = `<div class="small muted" style="padding:16px 4px">Couldn't load the people list${d && d.error ? ` — ${esc(d.error)}` : ""}. <button class="btn sm" onclick="bustCache('/api/campaign-platform-leads?platform=${platMeta.platform}&id=${encodeURIComponent(platMeta.id)}&offset=${off}&limit=${lim}');renderDraftCampaign('${id}')">Retry</button></div>`; return; }
      const total = d.total;
      if (sub) sub.textContent = (total != null ? `${fmt(total)} people` : `${fmt(d.leads.length)} people`) + ` · already in this ${platMeta.platform === "heyreach" ? "HeyReach" : "Smartlead"} campaign (read-only)`;
      const statusCell = (s, replied) => replied ? '<span class="pill g">replied</span>'

        : s === "STARTED" ? '<span class="pill n">queued</span>'
        : s ? `<span class="pill" style="opacity:.7">${esc(String(s).toLowerCase())}</span>` : "";
      // Same datagrid as the Lists page: sticky uppercase headers, monospace #

      const contactCol = platMeta.platform === "heyreach" ? "LinkedIn" : "Email";
      const cols = ["Name", contactCol, "Company", "Title", "Status"];
      const thead = `<thead><tr>
        <th class="gutter">#</th>
        ${cols.map((c) => `<th><div class="thwrap"><span class="thlbl">${esc(c)}</span></div></th>`).join("")}
      </tr></thead>`;
      const tbody = `<tbody>${d.leads.map((l, idx) => {
        const link = l.email || l.linkedin || "";
        return `<tr>
          <td class="gutter" title="position in this campaign">${fmt(off + idx + 1)}</td>
          <td title="${esc4attr(l.name || "")}" style="color:var(--ink);font-weight:500">${esc(l.name || "—")}</td>
          <td title="${esc4attr(link)}">${linkifyCell(link)}</td>
          <td title="${esc4attr(l.company || "")}">${esc(l.company || "")}</td>
          <td title="${esc4attr(l.title || "")}">${esc(l.title || "")}</td>
          <td>${statusCell(l.status, l.replied)}</td>
        </tr>`;
      }).join("")}</tbody>`;
      const gridHtml = d.leads.length
        ? `<div class="gridwrap"><table class="datagrid">${thead}${tbody}</table></div>`
        : '<div class="empty" style="padding:24px;text-align:center;color:var(--ink-3)">No people in this campaign yet.</div>';
      const nextOff = off + lim, hasMore = total != null ? nextOff < total : d.leads.length === lim;
      const prevOff = Math.max(0, off - lim);
      body.innerHTML = gridHtml +
        ((off > 0 || hasMore) ? `<div style="display:flex;gap:8px;align-items:center;margin-top:10px">
          <button class="btn sm" ${off === 0 ? "disabled" : ""} onclick="window._extLeadsOffset=${prevOff};renderDraftCampaign('${id}')">← Prev</button>
          <span class="small muted">${fmt(off + 1)}–${fmt(off + d.leads.length)}${total != null ? ` of ${fmt(total)}` : ""}</span>
          <button class="btn sm" ${hasMore ? "" : "disabled"} onclick="window._extLeadsOffset=${nextOff};renderDraftCampaign('${id}')">Next →</button>
        </div>` : "");
      hydrateFade(body);
    })();
  } else if (dtab === "leads") {
    el.innerHTML = '<div class="card panel"><h2>People</h2><div class="sub">Loading your leads…</div></div>';
    (async () => {
      // Authoritative rows (every pull ever, from signal_leads) - NOT `people`/draftProspects,
      // which is only the last pull's local snapshot per source (e.g. 6 vs the DB's real 254).
      // Routed through cachedGet (30s TTL, matches the server-side cache) so switching tabs
      // doesn't refire a multi-second query, with a manual "Retry" escape hatch below.
      let rows = null;
      try {
        const fetched = await cachedGet(`/api/leads?campaign_id=${id}`, LEADS_TTL);
        if (Array.isArray(fetched)) rows = fetched;
      } catch {}
      // Never silently swap in the local snapshot when the authoritative fetch fails or
      // comes back thinner than the tab header's own count (a transient Supabase hiccup) -
      // that's exactly how "Leads (254)" ends up showing 6 rows. Only treat a genuinely
      // empty result as "no pulls yet" when no source here has ever actually been pulled.
      const neverPulled = srcs.every((s) => !s.last_pull);
      const looksIncomplete = rows === null
        || (leadCount != null && rows.length < leadCount)
        || (leadCount == null && !neverPulled && rows.length === 0);
      if (looksIncomplete) {
        el.innerHTML = `<div class="card panel"><h2>People</h2>
          <div class="small muted" style="padding:20px 4px" title="Live leads list unavailable — showing nothing rather than a short/stale list">

            <button class="btn sm" onclick="renderDraftCampaign('${id}')">Retry</button>
          </div></div>`;
        return;
      }
      rows = rows.map((pr) => {
        const local = pr._sid != null ? ((srcs || []).find((s) => s.id === pr._sid)?.prospects || [])[pr._idx] : null;
        return local ? { ...pr, ...local, _sid: pr._sid, _idx: pr._idx } : pr;
      });

        all: rows.length,

      const q = (window._leadSearch || "").trim().toLowerCase();

      const slice = shown.slice(pg * 10, pg * 10 + 10);
      const chip = (key, label) => `<button class="btn sm ${F === key ? "primary" : ""}" data-chip="${key}" data-lab="${label}" onclick="window._leadFilter='${key}';window._leadsPage=0;renderDraftCampaign('${id}')">${label} (${counts[key]})</button>`;
      const leadRow = (merged) => `
        <div class="srcrow" id="lr-${merged._sid}-${rowKey(merged)}" style="${merged.verdict === "reject" ? "opacity:.4" : ""}">${leadRowInner(merged, id)}</div>`;
      const tabBtn = [...document.querySelectorAll(".tab")].find((b) => b.textContent.startsWith("Leads"));
      if (tabBtn && rows.length) tabBtn.textContent = `Leads (${rows.length})`;
      el.innerHTML = `<div class="card panel">
      <h2>People</h2>
      ${rows.length ? `<div style="display:flex;gap:8px;margin:2px 0 12px;flex-wrap:wrap;align-items:center">
        <div style="display:flex;gap:6px;flex-wrap:wrap">${chip("all", "All")}${chip("email", "→ Email")}${chip("linkedin", "→ LinkedIn")}${chip("sent", "✓ Sent")}</div>
        <input id="leads-search" class="input sm" placeholder="Search name, company, title, email…" value="${esc(window._leadSearch || "")}"
          style="flex:1;min-width:160px;max-width:260px;border:1px solid var(--line-2);border-radius:8px;padding:6px 10px;font:400 12.5px var(--font-sans);color:var(--ink);background:transparent"
          oninput="window._leadSearch=this.value;window._leadsPage=0;renderDraftCampaign('${id}')" autocomplete="off">
        ${(() => {
          const n = rows.filter((x) => !x.verdict && !wasSent(x)).length;
          if (n < 2) return "";
          return `<div style="margin-left:auto;display:flex;align-items:center;gap:8px">${window._confirmAll
            ? `<span class="small" style="font-weight:600">Send all ${n}?</span>
               <button class="btn sm primary" onclick="window._confirmAll=false;sendAllLeads('${id}')">Yes, send all ${n}</button>
               <button class="btn sm" onclick="window._confirmAll=false;renderDraftCampaign('${id}')">Cancel</button>`
            : `<button class="btn sm" style="opacity:.75" data-sendall onclick="window._confirmAll=true;renderDraftCampaign('${id}')">Send all ${n} unreviewed…</button>`}</div>`;
        })()}
      </div>` : '<div class="sub" style="margin:2px 0 8px">No pulls yet - run one from Sources.</div>'}
      ${slice.length ? slice.map(leadRow).join("") : (q ? `<div class="sub" style="margin:2px 0 8px">No people match “${esc(window._leadSearch)}”.</div>` : "")}
      ${pages > 1 ? `<div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-top:12px">
        <button class="btn sm" ${pg === 0 ? "disabled" : ""} onclick="window._leadsPage=${pg - 1};renderDraftCampaign('${id}')">← Prev</button>
        <span class="small muted">Page ${pg + 1} of ${pages} · ${shown.length} people</span>
        <button class="btn sm" ${pg >= pages - 1 ? "disabled" : ""} onclick="window._leadsPage=${pg + 1};renderDraftCampaign('${id}')">Next →</button>
      </div>` : ""}
    </div>`;
      hydrateFade(el);  // ease the leads list in once fetched
      // Re-render replaces #leads-search wholesale on every keystroke (same pattern as the
      // destination-picker search at destpop-search) - refocus + restore caret so typing
      // doesn't lose focus after each oninput-triggered rebuild.
      const sEl = document.getElementById("leads-search");
      if (sEl && document.activeElement !== sEl) { sEl.focus(); const v = sEl.value; try { sEl.setSelectionRange(v.length, v.length); } catch (_) {} }
    })();
  } else if (dtab === "sources") {
    el.innerHTML = `<div id="draftlist"></div>
      <div class="card panel"><h2>Add a source</h2>
      <div class="srctypes">
        ${SOURCE_TYPES.map(([tt, dsc, icon, wizk]) => `
        <div class="srctype" onclick="${wizk ? `openSourceWizard('${wizk}', '${id}')` : "protoNote('Coming soon')"}">
          <div class="ictile">${ic8(icon)}</div>
          <div><div class="t">${tt}</div><div class="d">${dsc}</div></div>
        </div>`).join("")}</div>
      </div>`;
    await renderDrafts(id);
    const bare = srcs.length === 1 && !srcs[0].prospects;
    if (bare) pullProspects(srcs[0].id, id);
  } else {
    renderCopyPreview(el, dc, srcs, people);
  }
}

async function openMoreLeads(campaignId, mech) {
  const dc = (DB.campaignDrafts || []).find((x) => x.id === campaignId) || {};
  const box = document.getElementById("moreleads");
  if (dc.goal) {
    box.innerHTML = `<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:14px">
      <div class="small" style="margin-bottom:8px"><span class="pill g">using your campaign goal</span> <span class="muted">"${esc(dc.goal)}"</span></div>
      <div id="ml-out" class="small muted">Thinking through ideas that get you there - about a minute…</div>
      <input id="ml-goal" type="hidden" value="${esc(dc.goal)}"></div>`;
    box.scrollIntoView({ behavior: "smooth" });
    runMoreLeads(campaignId, mech);
    return;
  }
  box.innerHTML = `<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:14px">
    <div class="small" style="font-weight:600;margin-bottom:6px">${mech === "hiring" ? "What should the hiring signal achieve?" : "What's the goal?"}</div>
    <div style="display:flex;gap:8px">
      <input id="ml-goal" style="flex:1;border:1px solid var(--line-2);border-radius:10px;padding:9px 12px;font:400 13px var(--font-sans);color:var(--ink);background:transparent"
        placeholder="${mech === "hiring" ? "e.g. companies hiring sales enablement leads" : "e.g. more warm buyers for this offer"}">
      <button class="btn primary sm" onclick="runMoreLeads('${campaignId}', '${mech}')">Suggest</button>
    </div>
    <div id="ml-out" class="small muted" style="margin-top:8px"></div>
  </div>`;
  box.scrollIntoView({ behavior: "smooth" });
}
async function runMoreLeads(campaignId, mech) {
  const dc = (DB.campaignDrafts || []).find((x) => x.id === campaignId) || {};
  const icp = dc.icp || {};
  const goal = document.getElementById("ml-goal").value.trim();
  if (!goal) { protoNote("Say the goal first"); return; }
  document.getElementById("ml-out").innerHTML = "Thinking through ideas that get you there - usually 2-3 minutes…";
  let existingSrcs = [];
  try { existingSrcs = (await (await fetch("/api/sources", { cache: "no-store" })).json()).filter((s) => String(s.campaign_id) === String(campaignId)); } catch {}
  const existing = existingSrcs.map((s) => `${s.mechanism || s.type}: ${s.name}`);
  const payload = { titles: icp.titles || ["Founder", "CEO"], keywords: icp.keywords ? [icp.keywords] : [],
    headcount: icp.sizes || ["11-20", "21-50", "51-100", "101-200"], countries: icp.geos || ["United States"],
    goal, mode: mech ? "direct" : "ai", mechanism: mech || "", existing, force: true };
  const r = await strategyCall(payload);
  if (!r || r.ok === false) {
    document.getElementById("ml-out").innerHTML = `${esc((r && r.message) || "Could not generate")} <button class="btn sm" onclick="runMoreLeads('${campaignId}','${mech}')">Try again</button>`;
    return;
  }
  const stop = new Set(["the", "a", "an", "of", "for", "with", "and", "your", "their", "brands", "companies", "signal"]);
  const words = (s) => new Set((s || "").toLowerCase().split(/[^a-z]+/).filter((w) => w.length > 2 && !stop.has(w)));
  const isDupe = (x) => existingSrcs.some((e) => {
    if ((e.mechanism || e.type) !== x.mechanism) return false;
    const a = words(e.name), b = words(x.idea);
    const shared = [...a].filter((w) => b.has(w)).length;
    return shared >= 2 || (shared >= 1 && Math.min(a.size, b.size) <= 2);
  });
  const rows = (r.rows || []).filter((x) => (x.estimated || (x.dms && x.dms > 0)) && !isDupe(x));
  const dropped = (r.rows || []).length - (r.rows || []).filter((x) => !isDupe(x)).length;
  document.getElementById("ml-out").innerHTML = rows.length ? `<div class="small" style="color:var(--ink);font-weight:600;margin-bottom:4px">Pick one to add${dropped ? ` <span class="muted" style="font-weight:400">· ${dropped} idea${dropped > 1 ? "s" : ""} skipped - already running in this campaign</span>` : ""}:</div>` +
    rows.map((x, i) => `<div class="srcrow click" style="cursor:pointer;padding:10px 0" onclick='addIdeaSource("${campaignId}", ${i})'>
      <div class="ictile">${ic8((MECH_META[x.mechanism] || [])[0] || "signal")}</div>
      <div style="flex:1"><b>${esc(x.idea)}</b><div class="small muted" style="font-style:italic">"${esc(x.icebreaker || "")}"</div></div>
      <span class="small"><b>${x.estimated ? "live" : fmt(x.dms)}</b>${x.estimated ? "" : '<span class="muted"> /month</span>'}</span>
    </div>`).join("") : (dropped ? `Everything it suggested is already running in this campaign (${dropped} skipped) - try a different goal wording.` : "No sized ideas came back - try different wording.");
  window._mlRows = rows;
}
async function addIdeaSource(campaignId, i) {
  const x = (window._mlRows || [])[i];
  if (!x) return;
  const dc = (DB.campaignDrafts || []).find((c) => c.id === campaignId) || {};
  const icp = dc.icp || {};
  let dmTitles = icp.titles || [];
  if (!dmTitles.length && dc.client_id) {
    try {
      const cl = (await (await fetch("/api/clients")).json()).find((c) => c.id === dc.client_id);
      dmTitles = ((cl || {}).icp || {}).titles || [];
    } catch {}
  }
  if (!dmTitles.length) { protoNote("Set who we email first - add decision-maker roles in the campaign targeting"); return; }
  await fetch("/api/sources", { method: "POST", body: JSON.stringify({
    type: x.mechanism, mechanism: x.mechanism, name: x.idea, campaign_id: campaignId,
    icebreaker: x.icebreaker || "", titles: dmTitles, params: x.params || {},
    config: { keywords: icp.keywords || "", headcount: icp.sizes, countries: icp.geos } }) });
  protoNote("Source added - it pulls on the next run");
  renderDraftCampaign(campaignId);
}
function renameCampaign(id) {
  const h = document.getElementById("camp-title");
  if (!h || h.isContentEditable) return;
  const orig = h.textContent;
  try { h.contentEditable = "plaintext-only"; } catch { h.contentEditable = "true"; }
  h.style.outline = "2px solid var(--orange-700)";
  h.style.borderRadius = "6px";
  h.focus();
  document.getSelection().selectAllChildren(h);
  const finish = async (save) => {
    h.onblur = null;
    h.onkeydown = null;
    h.contentEditable = "false";
    h.style.outline = "";
    const name = h.textContent.trim().replace(/\s+/g, " ");
    if (!save || !name || name === orig) { h.textContent = orig; return; }
    await fetch("/api/campaign-drafts/update", { method: "POST", body: JSON.stringify({ id, name }) });
    h.textContent = name;
    const dc = (DB.campaignDrafts || []).find((x) => x.id === id);
    if (dc) dc.name = name;
    protoNote("Renamed ✓");
  };
  h.onblur = () => finish(true);
  h.onkeydown = (e) => {
    if (e.key === "Enter") { e.preventDefault(); finish(true); }
    if (e.key === "Escape") { e.preventDefault(); finish(false); }
  };
}

async function toggleCampPaused(id, paused) {
  // Optimistic: flip + repaint immediately so the button responds the instant
  // it's clicked, even when the server is slow to wake (Render cold-start) or
  // the request fails. Persist in the background; roll back only on error.
  const dc = (DB.campaignDrafts || []).find((x) => x.id === id);
  const prev = dc ? dc.paused : undefined;
  if (dc) dc.paused = paused;
  protoNote(paused ? "Paused - this campaign stops looking for new people until you resume it" : "Running - this campaign looks for new people every day");
  renderDraftCampaign(id);
  try {
    const r = await fetch("/api/campaign-drafts/update", { method: "POST", body: JSON.stringify({ id, paused }) });
    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.ok === false) throw new Error(j.message || ("HTTP " + r.status));
  } catch (e) {
    if (dc) dc.paused = prev;  // save failed - undo the optimistic flip
    protoNote("Couldn't save - " + (e.message || "network error") + ". Nothing changed, try again.");
    renderDraftCampaign(id);
  }
}

async function toggleAutopilot(id, on) {
  const dc = (DB.campaignDrafts || []).find((c) => c.id === id);
  const prev = dc ? dc.autopilot : undefined;
  if (dc) dc.autopilot = on;

  renderDraftCampaign(id);
  try {

    const j = await r.json().catch(() => ({}));
    if (!r.ok || j.ok === false) throw new Error(j.message || ("HTTP " + r.status));
  } catch (e) {
    if (dc) dc.autopilot = prev;
    protoNote("Couldn't save - " + (e.message || "network error") + ". Nothing changed, try again.");
    renderDraftCampaign(id);
  }
}

/* ── Destination picker ───────────────────────────────────────────────
   Two clickable brand chips: Smartlead (people we found an email for) and
   HeyReach (everyone else). Each chip shows its current pick; clicking it
   opens a searchable popover of that platform's real campaigns / lists.
   Pick one and it saves. Replaces the old pair of type-to-match text boxes:
   the choice is always visible and you never have to type an exact name. */

/* current selection ids off a draft's destination (normalising legacy shapes) */
function _destSel(dc) {
  const d = (dc && dc.destination) || {};
  const sl = d.smartlead_campaign_id || (d.type === "smartlead" ? d.campaign_id : "") || "";
  const hr = d.heyreach_list_id || "";
  return { sl: sl ? String(sl) : "", hr: hr ? String(hr) : "" };
}

function destBar(dc, id) {
  window._destCid = id;
  const { sl, hr } = _destSel(dc);
  const slName = (((DB.dests || {}).smartlead || []).find((c) => String(c.id) === sl) || {}).name || "";
  const hrName = (((DB.dests || {}).heyreach || []).find((l) => String(l.id) === hr) || {}).name || (dc.destination || {}).heyreach_list_name || "";
  const chip = (kind, selId, name) => {
    const set = !!selId;
    const logo = kind === "smartlead" ? "icons/smartlead.png" : "icons/heyreach.png";
    const brand = kind === "smartlead" ? "Smartlead" : "HeyReach";
    const channel = kind === "smartlead" ? "Email" : "LinkedIn";   // plain-word channel, legible without knowing the logos
    const kindWord = kind === "smartlead" ? "email campaign" : "LinkedIn list";
    const label = set ? esc(name || brand) : "Choose…";
    const tip = set ? `${channel} leads go to the ${brand} ${kindWord} “${esc(name)}”. Click to change or clear.`
                    : `Pick the ${brand} ${kindWord} that ${channel.toLowerCase()} leads go into.`;
    return `<button class="destchip ${set ? "on" : "unset"}" data-kind="${kind}" title="${tip}" onclick="openDestPop('${kind}', event)">
      <img src="${logo}" alt="${brand}" onerror="this.style.display='none'">
      <span class="dc-ch ${kind === "smartlead" ? "email" : "li"}">${channel}</span>
      <span class="dc-name">${label}</span>
      <span class="dc-cx" aria-hidden="true">▾</span>
    </button>`;
  };
  return `<span class="small muted" style="flex-shrink:0">Sends to</span>${chip("smartlead", sl, slName)}${chip("heyreach", hr, hrName)}`;
}

/* live re-pull so a campaign / list created since page-load shows up in the picker */
async function _refreshDests() {
  try {
    const fresh = await _nativeFetch("/api/outreach-destinations?refresh=1").then((r) => r.json());
    if (fresh && (fresh.smartlead || fresh.heyreach)) {
      _getCache.set("/api/outreach-destinations", { t: Date.now(), v: fresh, p: Promise.resolve(fresh) });
      _lsSet("/api/outreach-destinations", fresh);
      DB.dests = fresh;
      return true;
    }
  } catch (_) {}
  return false;
}

function closeDestPop() {
  const p = document.getElementById("destpop");
  if (p) p.remove();
  document.querySelectorAll(".destchip.open").forEach((c) => c.classList.remove("open"));
  window._destPop = null;
  document.removeEventListener("keydown", _destKeydown, true);
  document.removeEventListener("click", _destOutside, true);
}

function _destOutside(e) {
  if (!e.target.closest("#destpop") && !e.target.closest(".destchip")) closeDestPop();
}

function openDestPop(kind, ev) {
  ev && ev.stopPropagation();
  if (window._destPop === kind) { closeDestPop(); return; }   // second click on the same chip closes it
  closeDestPop();
  window._destPop = kind;
  window._destQ = "";
  window._destHi = -1;
  const anchor = (ev && ev.currentTarget) || document.querySelector(`.destchip[data-kind="${kind}"]`);
  if (anchor) anchor.classList.add("open");
  _paintDestPop(anchor);
  document.addEventListener("keydown", _destKeydown, true);
  setTimeout(() => document.addEventListener("click", _destOutside, true), 0);
  // freshen the underlying lists in the background, then repaint if still open
  _refreshDests().then((ok) => { if (ok && window._destPop === kind) _paintDestPop(); });
}

function _paintDestPop(anchor) {
  const kind = window._destPop;
  if (!kind) return;
  anchor = anchor || document.querySelector(".destchip.open") || document.querySelector(`.destchip[data-kind="${kind}"]`);
  const dc = (DB.campaignDrafts || []).find((x) => x.id === window._destCid) || {};
  const sel = _destSel(dc);
  const selId = kind === "smartlead" ? sel.sl : sel.hr;
  const pool = ((DB.dests || {})[kind] || []);
  const brand = kind === "smartlead" ? "Smartlead" : "HeyReach";
  const kindWord = kind === "smartlead" ? "email campaign" : "LinkedIn list";
  const cv = kind === "smartlead" ? "People we found an email for" : "People without an email (LinkedIn)";
  const logo = kind === "smartlead" ? "icons/smartlead.png" : "icons/heyreach.png";
  const q = (window._destQ || "").trim().toLowerCase();
  const opts = pool.filter((o) => !q || String(o.name || "").toLowerCase().includes(q));
  window._destOpts = opts;
  // while filtering, keep the top match highlighted so Enter always picks it (deterministic)
  if (q && (window._destHi == null || window._destHi < 0 || window._destHi >= opts.length)) window._destHi = opts.length ? 0 : -1;
  if (window._destHi >= opts.length) window._destHi = opts.length - 1;

  const rows = opts.map((o, i) => {
    const isSel = String(o.id) === String(selId);
    return `<div class="destopt ${isSel ? "sel" : ""} ${i === window._destHi ? "hi" : ""}" data-i="${i}"
      onmouseenter="window._destHi=${i}" onclick="pickDest('${kind}','${esc(String(o.id))}')">
      <span class="nm">${esc(String(o.name || ("#" + o.id)))}</span>${isSel ? '<span class="tick">✓</span>' : ""}
    </div>`;
  }).join("");
  const body = opts.length ? rows
    : `<div class="destpop-empty">${pool.length ? `Nothing matches “${esc(window._destQ)}”` : `No ${brand} ${kindWord}s found`}</div>`;
  const clear = selId ? `<div class="destopt clear" title="Unset this destination — the campaign keeps running, these people just won’t be sent until you pick again" onclick="pickDest('${kind}','')">✕ Clear this destination</div>` : "";

  let pop = document.getElementById("destpop");
  if (!pop) { pop = document.createElement("div"); pop.id = "destpop"; pop.className = "destpop"; pop.onclick = (e) => e.stopPropagation(); document.body.appendChild(pop); }
  pop.innerHTML = `
    <div class="destpop-h"><img src="${logo}" alt="${brand}" onerror="this.style.display='none'"><div><div class="t">${brand} ${kindWord}</div><div class="cv">${cv}</div></div></div>
    <input class="destpop-search" id="destpop-search" placeholder="Search ${pool.length} ${kindWord}${pool.length === 1 ? "" : "s"}…" value="${esc(window._destQ || "")}"
      oninput="window._destQ=this.value;window._destHi=this.value.trim()?0:-1;_paintDestPop()" autocomplete="off">
    <div class="destpop-list" id="destpop-list">${body}${clear}</div>`;
  _positionDestPop(anchor, pop);
  const s = document.getElementById("destpop-search");
  if (s && document.activeElement !== s) { s.focus(); const v = s.value; try { s.setSelectionRange(v.length, v.length); } catch (_) {} }
}

function _positionDestPop(anchor, pop) {
  const r = anchor ? anchor.getBoundingClientRect() : { left: 20, right: 320, bottom: 80, top: 60 };
  const pw = pop.offsetWidth || 304;
  let left = Math.max(12, Math.min(r.left, window.innerWidth - pw - 12));
  pop.style.left = left + "px";
  const ph = pop.offsetHeight || 300;
  if (r.bottom + 6 + ph > window.innerHeight - 8 && r.top - 6 - ph > 8) pop.style.top = (r.top - 6 - ph) + "px";
  else pop.style.top = (r.bottom + 6) + "px";
}

function _destKeydown(e) {
  if (!window._destPop) return;
  const opts = window._destOpts || [];
  if (e.key === "Escape") { e.preventDefault(); closeDestPop(); return; }
  if (e.key === "ArrowDown" || e.key === "ArrowUp") {
    e.preventDefault();
    if (!opts.length) return;
    window._destHi = e.key === "ArrowDown"
      ? Math.min(opts.length - 1, (window._destHi < 0 ? -1 : window._destHi) + 1)
      : Math.max(0, (window._destHi < 0 ? 1 : window._destHi) - 1);
    _paintDestPop();
    const hi = document.querySelector(".destopt.hi"); if (hi) hi.scrollIntoView({ block: "nearest" });
  }
  if (e.key === "Enter") {
    e.preventDefault();
    const o = opts[window._destHi] || (opts.length === 1 ? opts[0] : null);
    if (o) pickDest(window._destPop, String(o.id));
  }
}

async function pickDest(kind, valId) {
  const id = window._destCid;
  const dc = (DB.campaignDrafts || []).find((x) => x.id === id);
  if (!dc) { closeDestPop(); return; }
  const dest = { ...(dc.destination || {}) };
  delete dest.type; delete dest.campaign_id;                 // drop legacy shape
  if (kind === "smartlead") {
    if (valId) dest.smartlead_campaign_id = String(valId); else delete dest.smartlead_campaign_id;
  } else {
    if (valId) {
      const l = ((DB.dests || {}).heyreach || []).find((x) => String(x.id) === String(valId)) || {};
      dest.heyreach_list_id = Number(valId);
      dest.heyreach_list_name = l.name || "";
    } else { delete dest.heyreach_list_id; delete dest.heyreach_list_name; }
  }
  const name = valId ? (((DB.dests || {})[kind] || []).find((x) => String(x.id) === String(valId)) || {}).name || "" : "";
  const prevDest = dc.destination;                            // keep the pre-save value so we can roll back on failure
  closeDestPop();
  // optimistic repaint: update the in-memory draft + the chip bar so the pick shows at once
  dc.destination = dest;
  window._destNames = window._destNames || {};
  window._destNames[kind] = name;
  const repaintBar = () => { const b = document.querySelector(".destbar"); if (b) b.innerHTML = destBar(dc, id); };
  repaintBar();
  // brief in-flight "saving" state on the affected chip: swap its chevron for a spinner
  const savingChip = document.querySelector(`.destchip[data-kind="${kind}"]`);
  if (savingChip) { savingChip.classList.add("saving"); const cx = savingChip.querySelector(".dc-cx"); if (cx) { cx.className = "dc-spin"; cx.textContent = ""; } }
  const who = kind === "smartlead" ? "emailed people" : "LinkedIn people";
  try {
    const r = await fetch("/api/campaign-drafts/update", { method: "POST", body: JSON.stringify({ id, destination: dest }) });
    if (!r.ok) throw new Error("save failed");
    DB.campaignDrafts = null;                                 // next navigation re-reads from the server
    protoNote(valId ? `Saved — ${who} now go to “${name}”` : `Cleared — ${who} won’t be sent`);
    // quiet in-place re-render so per-lead "Sending to" hints + overview pick up the change
    // (_swrRepaint keeps the current view painted — no skeleton flash, no scroll jump)
    if (window._destCid === id) {
      window._swrRepaint = true;
      try { await renderDraftCampaign(id); } finally { window._swrRepaint = false; }
    }
  } catch (e) {
    // save failed — roll the chip back to what it actually is, so the UI never claims an unsaved state
    dc.destination = prevDest;
    window._destNames[kind] = prevDest ? ((((DB.dests || {})[kind] || []).find((x) => String(x.id) === String(kind === "smartlead" ? _destSel(dc).sl : _destSel(dc).hr)) || {}).name || "") : "";
    repaintBar();
    protoNote("Couldn’t save — nothing changed. Check your connection and try again");
  }
}

/* brand logo for a lead's destination: Smartlead (email) / HeyReach (LinkedIn) */
function destLogo(kind) {
  const src = kind === "smartlead" ? "icons/smartlead.png" : "icons/heyreach.png";
  const alt = kind === "smartlead" ? "Smartlead" : "HeyReach";
  return `<img src="${src}" alt="${alt}" title="${alt}" style="width:15px;height:15px;border-radius:4px;vertical-align:-3px;flex-shrink:0">`;
}

/* Every outreach destination a campaign's leads route to — the campaign-level
   destination plus any per-source overrides — resolved to human names. Mirrors
   the server's resolve_destination (campaign default + source fallback). */
function campaignDests(dc, srcs, pool) {
  pool = pool || DB.dests || { smartlead: [], heyreach: [] };
  const slName = (id) => (((pool.smartlead || []).find((c) => String(c.id) === String(id)) || {}).name) || `email campaign #${id}`;
  const hrName = (id, fb) => (((pool.heyreach || []).find((l) => String(l.id) === String(id)) || {}).name) || fb || `LinkedIn list #${id}`;
  const sl = new Map(), hr = new Map();
  [dc.destination || {}, ...(srcs || []).map((s) => s.destination || {})].forEach((d) => {
    const slId = d.smartlead_campaign_id || (d.type === "smartlead" ? d.campaign_id : "");
    if (slId) sl.set(String(slId), slName(slId));
    if (d.heyreach_list_id) hr.set(String(d.heyreach_list_id), hrName(d.heyreach_list_id, d.heyreach_list_name));
    else if (d.heyreach_list_name) hr.set("n:" + d.heyreach_list_name, d.heyreach_list_name);
  });
  return { smartlead: [...sl.values()], heyreach: [...hr.values()] };
}

/* "Sending to" logo badges under a campaign card — shows which real Smartlead
   campaign(s) / HeyReach list(s) this signal's leads flow into, with each
   platform's logo. Warns in-line when no destination is wired yet. */
function destBadges(dc, srcs) {
  const d = campaignDests(dc, srcs);
  const chip = (kind, name) => `<span style="display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;background:var(--bg-sunken);font-size:11px;max-width:220px">${destLogo(kind)}<span style="color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</span></span>`;
  const chips = d.smartlead.map((n) => chip("smartlead", n)).concat(d.heyreach.map((n) => chip("heyreach", n)));
  const body = chips.length
    ? `<span class="small muted" style="flex-shrink:0">Sending to</span>${chips.join("")}`
    : `<span class="small" style="color:var(--orange-700)">⚠ No destination set — nothing can be sent</span>`;
  return `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px">${body}</div>`;
}

function routeNote(pr) {
  if (Object.keys(pr.pushed || {}).length || pr.verdict === "reject") return "";
  const nm = window._destNames || {};
  if (!nm.smartlead && !nm.heyreach) return "";
  const chip = (kind, name) => `<span style="display:inline-flex;align-items:center;gap:5px;padding:2px 9px;border-radius:999px;background:var(--bg-sunken);font-size:11px;max-width:220px">${destLogo(kind)}<span style="color:var(--ink);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(name)}</span></span>`;
  const wrap = (body) => `<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:6px"><span class="small muted" style="flex-shrink:0">Sending to</span>${body}</div>`;
  if (pr.email) return wrap(chip("smartlead", nm.smartlead || "your email campaign"));
  if (pr.email_checked) return wrap(chip("heyreach", nm.heyreach || "your LinkedIn list"));
  return wrap(`${chip("smartlead", nm.smartlead || "email")}${chip("heyreach", nm.heyreach || "LinkedIn")}`);
}

function pushChips(pr) {
  const keys = Object.keys(pr.pushed || {});
  const nm = window._destNames || {};
  const bits = [];
  if (keys.some((k) => k.startsWith("smartlead")) || /smartlead/.test(pr.pushed_to || "")) bits.push(`${destLogo("smartlead")} email campaign${nm.smartlead ? ` “${esc(nm.smartlead)}”` : ""}`);
  if (keys.some((k) => k.startsWith("heyreach")) || /heyreach/.test(pr.pushed_to || "")) bits.push(`${destLogo("heyreach")} LinkedIn list${nm.heyreach ? ` “${esc(nm.heyreach)}”` : ""}`);
  let out = bits.length ? `<div class="small" style="display:inline-flex;align-items:center;gap:4px;flex-wrap:wrap;color:var(--green);margin-top:2px">✓ sent - in your ${bits.join(" + ")}</div>` : "";
  const flab = { smartlead: "email", heyreach: "LinkedIn" };
  const fb = Object.entries(pr.push_fail || {}).map(([k, m]) =>
    `${flab[k] || k} skipped - ${esc(m || "didn't go through")}`);
  if (fb.length) out += `<div class="small" style="color:var(--orange-700);margin-top:2px">△ ${fb.join(" · ")}</div>`;
  return out;
}

function pushToast(r, verdict) {
  if (verdict === "undo") {
    protoNote(r && r.push && r.push.ok ? "Undone - removed from your email campaign and LinkedIn list" : "Couldn't undo everything - check the row");
    return;
  }
  if (verdict !== "keep") return;
  const t = r && r.push && r.push.tools;
  if (!t || !Object.keys(t).length) { protoNote("Kept ✓ - now pick where people go (top of the page), then tick ✓ again to send"); return; }
  if ((r.push && r.push.suppressed) || Object.values(t).some((v) => v && v.suppressed)) {
    protoNote("Skipped - this person was already contacted for this client"); return;
  }
  const lab = { smartlead: "email campaign", heyreach: "LinkedIn list" };
  const ok = Object.keys(t).filter((k) => t[k].ok).map((k) => lab[k]);
  const bad = Object.keys(t).filter((k) => !t[k].ok).map((k) => `${lab[k] || k} (${t[k].message})`);
  if (!bad.length) protoNote(`Sent ✓ - now in your ${ok.join(" and ")}`);
  else protoNote(`${ok.length ? `In your ${ok.join(" and ")} ✓ · ` : ""}couldn't send to ${bad.join(" · ")}`);
}
/* Promise-based styled confirm — replaces window.confirm (which freezes the tab under automation
   and is off-brand). Resolves true on Confirm, false on Cancel / overlay click / Escape. */
function uiConfirm(msg, { title = "Are you sure?", confirmLabel = "Confirm", danger = true } = {}) {
  return new Promise((resolve) => {
    const dlg = document.getElementById("confirmdlg");
    document.getElementById("confirm-title").textContent = title;
    document.getElementById("confirm-msg").textContent = msg;
    const ok = document.getElementById("confirm-ok");
    const cancel = document.getElementById("confirm-cancel");
    ok.textContent = confirmLabel;
    ok.classList.toggle("danger", !!danger);
    const close = (val) => {
      dlg.classList.remove("on");
      ok.onclick = cancel.onclick = dlg.onclick = null;
      document.removeEventListener("keydown", onKey);
      resolve(val);
    };
    const onKey = (e) => { if (e.key === "Escape") close(false); if (e.key === "Enter") close(true); };
    ok.onclick = () => close(true);
    cancel.onclick = () => close(false);
    dlg.onclick = (e) => { if (e.target === dlg) close(false); };
    document.addEventListener("keydown", onKey);
    dlg.classList.add("on");
    requestAnimationFrame(() => ok.focus());
  });
}

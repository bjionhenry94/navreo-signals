<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lists · Navreo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="navreo.css">
<style>
/* ── File browser ──────────────────────────────────────── */
.toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 18px 0 14px; }
.toolbar .search {
  border: 1px solid var(--line-2); border-radius: 999px; padding: 7px 15px;
  font: 400 13px var(--font-sans); width: 240px; background: transparent; color: var(--ink);
}
.toolbar .search:focus { outline: none; box-shadow: var(--focus); }
.toolbar .spacer { flex: 1; }

table.lists-tbl { table-layout: fixed; }
table.lists-tbl col.c-name { width: 34%; }
table.lists-tbl col.c-fav { width: 7%; }
table.lists-tbl col.c-client { width: 14%; }
table.lists-tbl col.c-created { width: 13%; }
table.lists-tbl col.c-opened { width: 15%; }
table.lists-tbl col.c-owner { width: 9%; }
table.lists-tbl col.c-access { width: 8%; }
table.lists-tbl col.c-menu { width: 32px; }
.lists-tbl td, .lists-tbl th { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lists-tbl tr.row-folder td { font-weight: 500; }
.lists-tbl tr.row-folder:hover td { background: var(--bg-sunken); }
.row-name { display: flex; align-items: center; gap: 8px; min-width: 0; }
.row-name .indent { flex-shrink: 0; }
.row-name .lbl { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.row-name .rc { color: var(--ink-3); font-weight: 400; font-size: 11.5px; margin-left: 6px; flex-shrink: 0; }
.chev { display: inline-flex; width: 14px; height: 14px; color: var(--ink-3); transition: transform .12s; flex-shrink: 0; cursor: pointer; }
.chev.open { transform: rotate(90deg); }
.ic-folder, .ic-sheet { width: 15px; height: 15px; color: var(--brown-400); flex-shrink: 0; }
.ic-sheet { color: var(--ink-3); }
a.sheet-link { color: var(--ink); text-decoration: none; }
a.sheet-link:hover { color: var(--orange-700); text-decoration: underline; }
.star-btn { background: none; border: none; cursor: pointer; padding: 2px; display: inline-flex; color: var(--line-2); }
.star-btn.on { color: var(--orange); }
.star-btn:hover { color: var(--orange-600); }
.kebab-btn { background: none; border: none; cursor: pointer; padding: 3px; border-radius: 6px; color: var(--ink-3); display: inline-flex; }
.kebab-btn:hover { background: var(--bg-sunken); color: var(--ink-2); }
.popover { position: absolute; z-index: 60; background: var(--card); border: 1px solid var(--line); border-radius: 10px; box-shadow: 0 8px 24px rgba(20,17,14,.14); min-width: 200px; padding: 6px; }
.popover .p-lab { font-size: 11px; color: var(--ink-3); padding: 6px 8px 4px; text-transform: uppercase; letter-spacing: .06em; }
.popover button.p-item { display: block; width: 100%; text-align: left; background: none; border: none; padding: 7px 8px; font-size: 13px; border-radius: 7px; cursor: pointer; color: var(--ink); }
.popover button.p-item:hover { background: var(--bg-sunken); }
.popover button.p-item.on { color: var(--orange-700); font-weight: 500; }

/* ── Grid viewer ───────────────────────────────────────── */
.back-link { color: var(--ink-3); text-decoration: none; font-size: 13px; display: inline-flex; align-items: center; gap: 5px; }
.back-link:hover { color: var(--ink); }

/* header bar: back-link + title + client chip + row count on the left,
   the two primary actions (Download / Share) + overflow menu on the right */
.gridheader { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin: 6px 0 14px; }
.gh-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex-wrap: wrap; }
.gh-sep { color: var(--line-2); font-size: 13px; }
h1#gridName { font-family: var(--font-sans); font-weight: 600; font-size: 17px; letter-spacing: -0.01em; max-width: 420px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.gh-rows { font-size: 12.5px; }
.gh-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.gh-right .btn .dlicon { font-size: 14px; line-height: 1; }
.share-btn.copied { background: var(--green-bg); border-color: var(--green-line); color: #195C3F; }
.share-btn.copied.primary { background: var(--green-bg); border-color: var(--green-line); color: #195C3F; }
.ov-kebab { width: 32px; height: 32px; justify-content: center; border: 1px solid var(--line-2); }

/* controls row: search + filter chips, spacer, columns + pagination cluster */
.controlsrow { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin: 0 0 10px; }
.searchwrap { position: relative; display: flex; align-items: center; }
.searchwrap .search-ic { position: absolute; left: 12px; color: var(--ink-3); display: inline-flex; pointer-events: none; }
.searchwrap .searchinput { padding-left: 30px; width: 220px; }
.filterbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.filterbar .fchip { display: inline-flex; align-items: center; gap: 6px; background: var(--bg-sunken); border-radius: 999px; padding: 4px 6px 4px 11px; font-size: 12px; color: var(--ink-2); }
.filterbar .fchip button { background: none; border: none; cursor: pointer; color: var(--ink-3); display: inline-flex; padding: 2px; border-radius: 999px; }
.filterbar .fchip button:hover { color: var(--ink); background: var(--line); }
.controlsrow .spacer { flex: 1; }
.numinput {
  border: 1px solid var(--line-2); border-radius: 8px; padding: 6px 10px;
  font: 500 12.5px var(--font-mono); width: 84px; color: var(--ink); background: transparent;
}
.numinput:focus { outline: none; box-shadow: var(--focus); }

/* pagination cluster: ‹ range(popover-trigger) › */
.pagecluster { display: flex; align-items: center; gap: 2px; }
.pagebtn {
  background: none; border: 1px solid var(--line-2); border-radius: 7px; width: 26px; height: 26px;
  display: inline-flex; align-items: center; justify-content: center; cursor: pointer; color: var(--ink-2); font-size: 14px;
}
.pagebtn:hover { background: var(--bg-sunken); }
.pagebtn[disabled] { opacity: .4; cursor: not-allowed; }
.pagerange {
  background: none; border: none; font-size: 12px; color: var(--ink-3); padding: 5px 9px; cursor: pointer;
  border-radius: 7px; font-variant-numeric: tabular-nums; white-space: nowrap;
}
.pagerange:hover { background: var(--bg-sunken); color: var(--ink-2); }
.pagepop { width: 220px; padding: 10px; }
.pagepop .p-field { margin-bottom: 10px; }
.pagepop .p-field:last-child { margin-bottom: 0; }
.pagepop label { display: block; font-size: 11px; color: var(--ink-3); font-weight: 500; margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; }
.pagepop .p-row { display: flex; gap: 6px; }
.pagepop .p-row .numinput { width: auto; flex: 1; }

/* selection contextual bar */
.selectbar {
  display: flex; align-items: center; gap: 12px; background: var(--cream-50); border: 1px solid var(--light-200);
  border-radius: 10px; padding: 9px 14px; margin: 0 0 10px; font-size: 13px; color: var(--ink-2); font-weight: 500;
  animation: selectbarIn .15s ease;
}
@keyframes selectbarIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
.selectbar .spacer { flex: 1; }
.btn.danger-outline { border-color: var(--red-line); color: var(--red); background: transparent; }
.btn.danger-outline:hover { background: var(--red-bg); }

.gridwrap { border: 1px solid var(--line); border-radius: var(--radius); overflow: auto; max-width: 100%; max-height: 68vh; }
table.datagrid { border-collapse: collapse; font-size: 12.5px; width: max-content; min-width: 100%; }
.datagrid th { position: sticky; top: 0; background: var(--bg-sunken); z-index: 5; text-align: left; padding: 0; border-bottom: 1px solid var(--line-2); }
.datagrid th .thwrap { display: flex; align-items: center; gap: 5px; padding: 8px 10px; cursor: pointer; user-select: none; white-space: nowrap; }
.datagrid th .thwrap:hover { background: var(--line); }
.datagrid th .thlbl { font-size: 11px; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3); }
.datagrid th .sortarrow { font-size: 10px; color: var(--orange-700); opacity: 0; transition: opacity .12s; }
.datagrid th .thwrap:hover .sortarrow, .datagrid th .thwrap.sort-active .sortarrow { opacity: 1; }
.datagrid th .filt-btn { background: none; border: none; cursor: pointer; color: var(--ink-3); display: inline-flex; padding: 2px; border-radius: 5px; margin-left: auto; }
.datagrid th .filt-btn:hover { background: var(--line-2); color: var(--ink); }
.datagrid th .filt-btn.active { color: var(--orange-700); }
/* leading checkbox column, then the 1-indexed view-position gutter — both sticky-left */
.datagrid th.chkcol, .datagrid td.chkcol { position: sticky; left: 0; background: var(--bg-sunken); text-align: center; padding: 6px 4px; width: 32px; z-index: 6; }
.datagrid td.chkcol { background: var(--card); z-index: 4; }
.datagrid tr:hover td.chkcol { background: var(--bg-sunken); }
.datagrid td.chkcol input, .datagrid th.chkcol input { cursor: pointer; }
.datagrid td.chkcol input { opacity: 0; }
.datagrid tr:hover td.chkcol input, .datagrid tr.row-selected td.chkcol input { opacity: 1; }
.datagrid th.gutter, .datagrid td.gutter { position: sticky; left: 32px; background: var(--bg-sunken); color: var(--ink-3); text-align: right; padding: 6px 10px; font-family: var(--font-mono); font-size: 11px; z-index: 4; }
.datagrid th.gutter { z-index: 6; }
.datagrid tr:hover td.gutter { background: var(--bg-sunken); }
.datagrid tr.row-selected td.gutter, .datagrid tr.row-selected td.chkcol { background: var(--cream); }
.datagrid tr.row-selected td { background: var(--cream); }
/* horizontal borders only — no vertical lines between data cells */
.datagrid td { padding: 7px 10px; border-bottom: 1px solid var(--line); white-space: nowrap; max-width: 320px; overflow: hidden; text-overflow: ellipsis; color: var(--ink-2); }
.datagrid tr:hover td { background: var(--bg-sunken); }
.datagrid td .celllink { color: inherit; text-decoration: none; }
.datagrid td .celllink:hover { text-decoration: underline; }
.colpop { max-height: 320px; overflow-y: auto; }
.colpop label { display: flex; align-items: center; gap: 8px; padding: 6px 8px; font-size: 13px; border-radius: 7px; cursor: pointer; }
.colpop label:hover { background: var(--bg-sunken); }
.filtinput-pop { padding: 8px; }
.filtinput-pop input { width: 180px; border: 1px solid var(--line-2); border-radius: 7px; padding: 6px 9px; font-size: 12.5px; font-family: inherit; }
.filtinput-pop .row { display: flex; gap: 6px; margin-top: 8px; }
/* value-picker (Sheets/Clay-style column filter) */
.valpicker { width: 260px; }
.valpicker .vp-search { width: 100%; border: 1px solid var(--line-2); border-radius: 7px; padding: 6px 9px; font: 400 12.5px var(--font-sans); color: var(--ink); background: transparent; margin-bottom: 6px; }
.valpicker .vp-search:focus { outline: none; box-shadow: var(--focus); }
.valpicker .colpop { max-height: 170px; margin-bottom: 4px; }
.valpicker .vp-cnt { color: var(--ink-3); font-size: 11px; flex-shrink: 0; margin-left: 8px; }
.valpicker .vp-lbl { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
.valpicker .vp-sep { border-top: 1px solid var(--line); margin: 10px 0 8px; }
.valpicker .vp-empty { font-size: 12px; color: var(--ink-3); padding: 8px 4px; }

/* ── New folder / move modal ──────────────────────────── */
.overlay { position: fixed; inset: 0; background: rgba(20,17,14,0.45); display: none; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.overlay.on { display: flex; }
.modal { background: var(--card); border-radius: 18px; width: 420px; max-width: 100%; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-h { padding: 20px 22px 4px; }
.modal-h h3 { font-size: 16.5px; font-weight: 600; }
.modal-b { padding: 12px 22px 4px; }
.modal-b .field { margin-bottom: 14px; }
.modal-b label { display: block; font-size: 12px; color: var(--ink-3); font-weight: 500; margin-bottom: 6px; }
.modal-b select, .modal-b input[type=text] {
  width: 100%; border: 1px solid var(--line-2); border-radius: 8px; padding: 8px 11px;
  font: 400 13px var(--font-sans); color: var(--ink); background: transparent;
}
.modal-b select:focus, .modal-b input[type=text]:focus { outline: none; box-shadow: var(--focus); }
.modal-err { font-size: 12px; color: var(--red); background: var(--red-bg); border: 1px solid var(--red-line); border-radius: 8px; padding: 8px 10px; margin-top: 4px; }
.modal-f { padding: 14px 22px 20px; border-top: 1px solid var(--line); display: flex; justify-content: flex-end; gap: 10px; }
</style>
</head>
<body>
<div class="app">
  <div id="rail"></div>
  <main class="main">

    <!-- ═══ VIEW 1: FILE BROWSER ═══ -->
    <div id="view-files">
      <div class="pagehead">
        <div>
          <div class="eyebrow">Lists</div>
          <h1>All Files</h1>
        </div>
      </div>
      <div class="toolbar">
        <input class="search" id="fbSearch" placeholder="Search lists or clients…">
        <div class="spacer"></div>
        <button class="btn primary" id="newFolderBtn">+ New Folder</button>
      </div>
      <div id="filesBody-wrap">
        <table class="tbl lists-tbl">
          <colgroup>
            <col class="c-name"><col class="c-fav"><col class="c-client"><col class="c-created">
            <col class="c-opened"><col class="c-owner"><col class="c-access"><col class="c-menu">
          </colgroup>
          <thead>
            <tr>
              <th>Name</th><th>Favorite</th><th>Clients</th><th>Created at</th>
              <th>Last opened</th><th>Owner</th><th>Access</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="filesBody"></tbody>
        </table>
      </div>
    </div>

    <!-- ═══ VIEW 2: GRID VIEWER ═══ -->
    <div id="view-grid" style="display:none">
      <div class="gridheader">
        <div class="gh-left">
          <a class="back-link" href="lists.html">&larr; All files</a>
          <span class="gh-sep">/</span>
          <h1 id="gridName">–</h1>
          <span class="chip" id="gridClientChip" style="cursor:default"></span>
          <span class="muted gh-rows" id="gridCountChip"></span>
        </div>
        <div class="gh-right">
          <button class="btn" id="downloadBtn" title="Download the current view as CSV">
            <span class="dlicon">&#11123;</span> Download
          </button>
          <button class="btn primary share-btn" id="shareBtn">Share</button>
          <div class="popwrap" style="position:relative">
            <button class="kebab-btn ov-kebab" id="gridOverflowBtn" data-popover-trigger title="More"></button>
          </div>
        </div>
      </div>

      <div class="controlsrow">
        <div class="searchwrap">
          <span class="search-ic" id="gridSearchIc"></span>
          <input class="toolbar search searchinput" id="gridSearch" placeholder="Search rows…">
        </div>
        <div class="filterbar" id="filterBar"></div>
        <div class="spacer"></div>
        <button class="btn sm" id="colBtn" data-popover-trigger>columns</button>
        <div class="pagecluster">
          <button class="pagebtn" id="pagePrev" title="Previous page">&#8249;</button>
          <button class="pagerange" id="pageRangeBtn" data-popover-trigger></button>
          <button class="pagebtn" id="pageNext" title="Next page">&#8250;</button>
        </div>
      </div>

      <div class="selectbar" id="selectBar" style="display:none">
        <span id="selectCount">0 selected</span>
        <div class="spacer"></div>
        <button class="btn sm danger-outline" id="delRowsBtn">Delete rows</button>
        <button class="btn sm" id="clearSelBtn">Clear</button>
      </div>

      <div id="gridStatus"></div>
      <div class="gridwrap" id="gridWrap" style="display:none">
        <table class="datagrid" id="datagrid"></table>
      </div>
    </div>

  </main>
</div>

<div class="overlay" id="folderOverlay"><div class="modal">
  <div class="modal-h"><h3>New folder</h3></div>
  <div class="modal-b">
    <div class="field">
      <label>Client</label>
      <select id="nfClient"></select>
    </div>
    <div class="field">
      <label>Folder name (optional — leave blank to just create the client's root folder)</label>
      <input type="text" id="nfName" placeholder="e.g. Q3 Outbound">
    </div>
    <div id="nfErr"></div>
  </div>
  <div class="modal-f">
    <button class="btn" id="nfCancel">Cancel</button>
    <button class="btn primary" id="nfCreate">Create</button>
  </div>
</div></div>

<!-- generic styled confirm modal: replaces every native confirm()/alert()/prompt() in this file -->
<div class="overlay" id="confirmOverlay"><div class="modal" style="width:400px">
  <div class="modal-h"><h3 id="confirmTitle">Confirm</h3></div>
  <div class="modal-b">
    <div class="consequence" id="confirmBody"></div>
    <div id="confirmErr"></div>
  </div>
  <div class="modal-f">
    <button class="btn" id="confirmCancelBtn">Cancel</button>
    <button class="btn primary" id="confirmOkBtn">Confirm</button>
  </div>
</div></div>

<div class="overlay" id="moveOverlay"><div class="modal" style="width:360px">
  <div class="modal-h"><h3>Move to folder</h3></div>
  <div class="modal-b">
    <div class="field">
      <label>Destination</label>
      <select id="mvFolder"></select>
    </div>
    <div id="mvErr"></div>
  </div>
  <div class="modal-f">
    <button class="btn" id="mvCancel">Cancel</button>
    <button class="btn primary" id="mvConfirm">Move</button>
  </div>
</div></div>

<div class="overlay" id="renameFolderOverlay"><div class="modal" style="width:360px">
  <div class="modal-h"><h3>Rename folder</h3></div>
  <div class="modal-b">
    <div class="field">
      <label>Folder name</label>
      <input type="text" id="rfName" placeholder="e.g. Q3 Outbound">
    </div>
    <div id="rfErr"></div>
  </div>
  <div class="modal-f">
    <button class="btn" id="rfCancel">Cancel</button>
    <button class="btn primary" id="rfSave">Save</button>
  </div>
</div></div>

<script src="shell.js"></script>
<script>
document.getElementById("rail").outerHTML = renderRail("lists");

/* ── small inline icon set (thin-stroke, currentColor — matches the rest of the app) ── */
const svgChevron = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%"><path d="M9 6l6 6-6 6"/></svg>`;
const svgFolder = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>`;
const svgSheet = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="100%" height="100%"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M9 9v11"/></svg>`;
const svgStar = (on) => `<svg viewBox="0 0 24 24" fill="${on ? "currentColor" : "none"}" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="15" height="15"><path d="m12 2 3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>`;
const svgKebab = `<svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15"><circle cx="12" cy="5" r="1.8"/><circle cx="12" cy="12" r="1.8"/><circle cx="12" cy="19" r="1.8"/></svg>`;
const svgFilt = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12"><path d="M3 4h18l-7 8v6l-4 2v-8z"/></svg>`;
const svgSearch = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.35-4.35"/></svg>`;
document.querySelectorAll(".search-ic").forEach((el) => { el.innerHTML = svgSearch; });
const gridOverflowBtnEl = document.getElementById("gridOverflowBtn");
if (gridOverflowBtnEl) gridOverflowBtnEl.innerHTML = svgKebab;

/* ═══════════════════════════ shared state ═══════════════════════════ */
let LISTS_DATA = null;          // { folders, lists } from /api/lists
const openFolders = new Set();  // ids of expanded folder/client-group rows, keyed "client:<name>" or folder.id

function closeAnyPopover() {
  document.querySelectorAll(".popover").forEach((el) => el.remove());
}
document.addEventListener("click", (e) => {
  if (!e.target.closest(".popover") && !e.target.closest("[data-popover-trigger]")) closeAnyPopover();
});

/* ── generic styled confirm modal — replaces every native confirm()/alert()/
   prompt() in this file. `onConfirm` is an async fn; throw an Error with a
   user-facing message to show it inline and re-enable the button, or call
   closeModal() (+ whatever follow-up) on success. */
function showModal({ title, bodyHtml, confirmLabel = "Confirm", danger = false, onConfirm }) {
  document.getElementById("confirmTitle").textContent = title;
  document.getElementById("confirmBody").innerHTML = bodyHtml;
  document.getElementById("confirmErr").innerHTML = "";
  const okBtn = document.getElementById("confirmOkBtn");
  okBtn.textContent = confirmLabel;
  okBtn.className = "btn " + (danger ? "danger" : "primary");
  okBtn.onclick = async () => {
    const restore = busyBtn(okBtn, "Working…");
    if (!restore) return; // already mid-click
    try {
      await onConfirm();
    } catch (e) {
      document.getElementById("confirmErr").innerHTML =
        `<div class="modal-err">${esc(friendlyListsError((e && e.message) || "Something went wrong"))}</div>`;
      restore();
    }
  };
  document.getElementById("confirmOverlay").classList.add("on");
}
function closeModal() { document.getElementById("confirmOverlay").classList.remove("on"); }
document.getElementById("confirmCancelBtn").onclick = closeModal;

/* Raw DB-trigger messages ("max depth exceeded" and the like) aren't
   user-facing copy — remap the ones we know about to plain English here
   rather than showing the trigger's own wording. */
function friendlyListsError(msg) {
  if (!msg) return msg;
  if (/depth|nesting level/i.test(msg)) return "Folders only go two levels deep (client, then theme).";
  return msg;
}

async function loadListsIndex(force) {
  if (LISTS_DATA && !force) return LISTS_DATA;
  const r = await fetch("/api/lists", { cache: "no-store" });
  const j = await r.json().catch(() => null);
  LISTS_DATA = (j && j.folders && j.lists) ? j : { folders: [], lists: [] };
  return LISTS_DATA;
}

/* ═══════════════════════════ VIEW 1: file browser ═══════════════════════════ */

function clientNames(data) {
  const s = new Set();
  (data.folders || []).forEach((f) => s.add(f.client));
  (data.lists || []).forEach((l) => s.add(l.client));
  return [...s].filter(Boolean).sort((a, b) => a.localeCompare(b));
}

function buildTree(data) {
  // per client: root folder row (or null), sub-folders under it, sheets under root/subfolders
  const clients = clientNames(data);
  return clients.map((client) => {
    const cFolders = (data.folders || []).filter((f) => f.client === client);
    const root = cFolders.find((f) => f.name === null) || null;
    const subs = cFolders.filter((f) => f.name !== null)
      .sort((a, b) => a.name.localeCompare(b.name));
    const cLists = (data.lists || []).filter((l) => l.client === client);
    const rootId = root ? root.id : null;
    const directSheets = cLists.filter((l) => !l.folder_id || l.folder_id === rootId)
      .sort((a, b) => (b.created_at || "").localeCompare(a.created_at || ""));
    const subGroups = subs.map((sf) => ({
      folder: sf,
      sheets: cLists.filter((l) => l.folder_id === sf.id)
        .sort((a, b) => (b.created_at || "").localeCompare(a.created_at || "")),
    }));
    return { client, root, subGroups, directSheets };
  });
}

function fmtShortDate(iso) {
  if (!iso) return "–";
  return pulledAgo(iso) || "–";
}

function sheetMatches(l, q) {
  if (!q) return true;
  const hay = `${l.name || ""} ${l.client || ""}`.toLowerCase();
  return hay.includes(q);
}

function renderFileBrowser() {
  const q = (document.getElementById("fbSearch").value || "").trim().toLowerCase();
  const tree = buildTree(LISTS_DATA);
  const rows = [];

  const sheetRow = (l, depth) => `
    <tr class="row-sheet" data-list-row="${esc(l.id)}">
      <td>
        <div class="row-name" style="padding-left:${depth * 22}px">
          <span class="ic-sheet indent">${svgSheet}</span>
          <a class="sheet-link lbl" href="#${esc(l.id)}" title="${esc(l.name)}">${esc(l.name)}</a>
          <span class="rc">${fmt(l.row_count)} rows</span>
        </div>
      </td>
      <td><button class="star-btn ${l.favourite ? "on" : ""}" title="${l.favourite ? "Unfavourite" : "Favourite"}" onclick="toggleFavourite('${esc(l.id)}', ${!l.favourite})">${svgStar(l.favourite)}</button></td>
      <td>${esc(l.client || "–")}</td>
      <td>${fmtShortDate(l.created_at)}</td>
      <td>${l.last_opened_at ? `${pulledAgo(l.last_opened_at)}${l.last_opened_by ? ` <span class="muted small">by ${esc(l.last_opened_by)}</span>` : ""}` : "–"}</td>
      <td>${esc(l.owner || "–")}</td>
      <td>${esc(l.access || "–")}</td>
      <td><button class="kebab-btn" data-popover-trigger title="Options" onclick="openRowMenu(event,'${esc(l.id)}')">${svgKebab}</button></td>
    </tr>`;

  const folderRow = (key, label, depth, folderObj) => {
    // folderObj is null for the top-level client grouping row (not a real,
    // renameable/deleteable list_folders record on its own) and the actual
    // folder row for a themed sub-folder — only the latter gets a kebab menu.
    const isOpen = openFolders.has(key) || !!q;
    const kebab = folderObj ? `<button class="kebab-btn" data-popover-trigger title="Options" onclick="openFolderMenu(event,'${esc(folderObj.id)}')">${svgKebab}</button>` : "";
    return { html: `
    <tr class="row-folder" data-folder-key="${esc(key)}">
      <td>
        <div class="row-name" style="padding-left:${depth * 22}px">
          <span class="chev ${isOpen ? "open" : ""}" onclick="toggleFolder('${esc(key)}')">${svgChevron}</span>
          <span class="ic-folder indent">${svgFolder}</span>
          <span class="lbl">${esc(label)}</span>
        </div>
      </td>
      <td>–</td><td>–</td><td>–</td><td>–</td><td>–</td><td>–</td><td>${kebab}</td>
    </tr>`, isOpen };
  };

  tree.forEach((grp) => {
    const allSheets = [...grp.directSheets, ...grp.subGroups.flatMap((g) => g.sheets)];
    const anyMatch = !q || allSheets.some((l) => sheetMatches(l, q));
    if (!anyMatch) return;

    const rootKey = `client:${grp.client}`;
    const { html: rootHtml, isOpen: rootOpen } = folderRow(rootKey, grp.client, 0, null);
    rows.push(rootHtml);
    if (!rootOpen) return;

    grp.directSheets.filter((l) => sheetMatches(l, q)).forEach((l) => rows.push(sheetRow(l, 1)));

    grp.subGroups.forEach((sg) => {
      const sheetsHere = sg.sheets.filter((l) => sheetMatches(l, q));
      if (q && !sheetsHere.length) return;
      const subKey = sg.folder.id;
      const { html: subHtml, isOpen: subOpen } = folderRow(subKey, sg.folder.name, 1, sg.folder);
      rows.push(subHtml);
      if (subOpen) sheetsHere.forEach((l) => rows.push(sheetRow(l, 2)));
    });
  });

  document.getElementById("filesBody").innerHTML = rows.length ? rows.join("") :
    `<tr><td colspan="8"><div class="empty">${q ? "No lists match your search" : "No lists yet"}</div></td></tr>`;
}

/* ═══════════════════════════ VIEW 2: grid viewer ═══════════════════════════ */

const grid = {
  id: null, meta: null, columns: [], visible: null /* Set */,
  sort: "", dir: "", filters: {}, search: "", offset: 0, limit: 500,
  total: 0, filtered: 0, loading: false,
  selected: new Set(), // row_num of every checked row on the CURRENT page
};
let gridSearchDebounce = null;

function esc4attr(s) { return esc(s).replace(/'/g, "&#39;"); }

/* Whole-cell URLs (incl. bare linkedin.com/... without a scheme) and emails
   render as quiet links — same ink color, underline only on hover, opening
   in a new tab for URLs. Anything else is escaped text as before. */
function linkifyCell(raw) {
  const s = String(raw ?? "");
  if (!s) return "";
  const trimmed = s.trim();
  if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(trimmed)) {
    return `<a class="celllink" href="mailto:${esc4attr(trimmed)}">${esc(s)}</a>`;
  }
  let url = null;
  if (/^https?:\/\//i.test(trimmed)) url = trimmed;
  else if (/^(www\.)?linkedin\.com\//i.test(trimmed)) url = "https://" + trimmed;
  if (url) {
    return `<a class="celllink" href="${esc4attr(url)}" target="_blank" rel="noopener noreferrer">${esc(s)}</a>`;
  }
  return esc(s);
}

async function openGrid(listId) {
  grid.id = listId; grid.meta = null; grid.columns = []; grid.visible = null;
  grid.sort = ""; grid.dir = ""; grid.filters = {}; grid.search = ""; grid.offset = 0; grid.limit = 500;
  grid.selected.clear();
  document.getElementById("gridSearch").value = "";
  document.getElementById("gridName").textContent = "Loading…";
  document.getElementById("gridClientChip").textContent = "";
  document.getElementById("gridCountChip").textContent = "";
  document.getElementById("gridWrap").style.display = "none";
  document.getElementById("filterBar").innerHTML = "";
  document.getElementById("gridStatus").innerHTML = `<div class="empty">Loading…</div>`;
  document.getElementById("pageRangeBtn").textContent = "";
  document.getElementById("pagePrev").disabled = true;
  document.getElementById("pageNext").disabled = true;
  updateSelectBar();
  // fire-and-forget touch
  fetch("/api/lists/touch", { method: "POST", body: JSON.stringify({ list_id: listId, by: "Bjion" }) }).catch(() => {});
  await fetchGridRows();
}

async function fetchGridRows() {
  if (grid.loading) return;
  grid.loading = true;
  grid.selected.clear();  // a new page/search/sort/filter invalidates the old selection
  updateSelectBar();
  const params = new URLSearchParams({
    id: grid.id, offset: String(grid.offset), limit: String(grid.limit),
    search: grid.search, sort: grid.sort, dir: grid.dir,
    filters: JSON.stringify(grid.filters),
  });
  let r, j;
  try {
    r = await fetch(`/api/lists/rows?${params.toString()}`, { cache: "no-store" });
    j = await r.json().catch(() => null);
  } catch {
    grid.loading = false;
    document.getElementById("gridStatus").innerHTML = `<div class="empty">Couldn't reach the server — try again</div>`;
    document.getElementById("gridWrap").style.display = "none";
    return;
  }
  grid.loading = false;
  if (!r.ok) {
    if (r.status === 404) {
      document.getElementById("gridName").textContent = "List not found";
      document.getElementById("gridStatus").innerHTML = `<div class="empty">This list doesn't exist or was removed.</div>`;
    } else {
      document.getElementById("gridStatus").innerHTML = `<div class="empty">${esc((j && j.message) || "Something went wrong")}</div>`;
    }
    document.getElementById("gridWrap").style.display = "none";
    updatePageRange(0);
    return;
  }
  grid.meta = j;
  grid.columns = j.columns || [];
  if (!grid.visible) grid.visible = new Set(grid.columns);
  grid.total = j.total || 0;
  grid.filtered = j.filtered != null ? j.filtered : j.total || 0;

  document.getElementById("gridName").textContent = j.name || "Untitled list";
  document.title = `${j.name || "List"} · Navreo`;
  document.getElementById("gridClientChip").innerHTML = esc(j.client || "");
  document.getElementById("gridCountChip").textContent = `${fmt(grid.filtered)} rows`;
  renderFilterBar();
  updateDownloadTitle();

  const rows = j.rows || [];
  updatePageRange(rows.length);
  if (!rows.length) {
    document.getElementById("gridStatus").innerHTML = `<div class="empty">${
      grid.search || Object.keys(grid.filters).length ? "No rows match your search/filters" : "This list is empty"
    }</div>`;
    document.getElementById("gridWrap").style.display = "none";
    return;
  }
  document.getElementById("gridStatus").innerHTML = "";
  document.getElementById("gridWrap").style.display = "block";
  renderDataGrid(rows);
}

/* "1–500 of 15,953" (1-indexed) on the pagination-cluster's range button,
   plus the ‹ › enabled state, stepping offset by the current limit. */
function updatePageRange(rowsLen) {
  const btn = document.getElementById("pageRangeBtn");
  const prevBtn = document.getElementById("pagePrev");
  const nextBtn = document.getElementById("pageNext");
  if (!grid.filtered) {
    btn.textContent = "No rows";
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }
  const from = grid.offset + 1;
  const to = grid.offset + rowsLen;
  btn.textContent = `${fmt(from)}–${fmt(to)} of ${fmt(grid.filtered)}`;
  prevBtn.disabled = grid.offset <= 0;
  nextBtn.disabled = (grid.offset + grid.limit) >= grid.filtered;
}

/* Download hits the CURRENT search/sort/filters — what-you-see-is-what-you-
   download — so the button's title spells that out whenever a view is active. */
function updateDownloadTitle() {
  const btn = document.getElementById("downloadBtn");
  if (!btn) return;
  const hasView = grid.search || grid.sort || Object.keys(grid.filters).length;
  btn.title = hasView ? "Download the current view (search/sort/filters applied)" : "Download this list as CSV";
}

function renderFilterBar() {
  const cols = Object.keys(grid.filters);
  document.getElementById("filterBar").innerHTML = cols.length ? cols.map((c) => {
    const v = grid.filters[c];
    const label = Array.isArray(v)
      ? (v.length === 1 ? `“${esc(v[0])}”` : `${v.length} selected`)
      : `“${esc(v)}”`;
    return `<span class="fchip">${esc(c)}: ${label}<button title="Clear filter" onclick="clearColFilter('${esc4attr(c)}')">&times;</button></span>`;
  }).join("") : "";
}

function clearColFilter(col) {
  delete grid.filters[col];
  grid.offset = 0;
  fetchGridRows();
}

function renderDataGrid(rows) {
  const visibleCols = grid.columns.filter((c) => grid.visible.has(c));
  const thead = `<thead><tr>
    <th class="chkcol"><input type="checkbox" id="selectAllChk" title="Select all visible rows"></th>
    <th class="gutter">#</th>
    ${visibleCols.map((c) => `
      <th>
        <div class="thwrap ${grid.sort === c ? "sort-active" : ""}" onclick="cycleSort('${esc4attr(c)}')">
          <span class="thlbl">${esc(c)}</span>
          <span class="sortarrow">${grid.sort === c ? (grid.dir === "desc" ? "&#9660;" : "&#9650;") : "&#9650;"}</span>
          <button class="filt-btn ${grid.filters[c] ? "active" : ""}" title="Filter" onclick="event.stopPropagation();openColFilter(event,'${esc4attr(c)}')" data-popover-trigger>${svgFilt}</button>
        </div>
      </th>`).join("")}
  </tr></thead>`;
  // gutter shows the row's position in the current filtered/sorted VIEW
  // (offset+1, offset+2, …) so you can confirm you're looking at "rows
  // 100–200"; the source row_num (used to show ids from the raw sheet,
  // confusing against the view position) moves to a hover tooltip, and
  // doubles as the stable key for row selection/deletion.
  const tbody = `<tbody>${rows.map((row, idx) => {
    const checked = row.row_num != null && grid.selected.has(row.row_num);
    return `
    <tr class="${checked ? "row-selected" : ""}">
      <td class="chkcol">${row.row_num != null ? `<input type="checkbox" class="rowchk" data-rownum="${row.row_num}" ${checked ? "checked" : ""}>` : ""}</td>
      <td class="gutter" title="${row.row_num != null ? esc4attr(`source row ${fmt(row.row_num)}`) : ""}">${fmt(grid.offset + idx + 1)}</td>
      ${visibleCols.map((c) => {
        const val = row.data ? row.data[c] : "";
        return `<td title="${esc4attr(String(val ?? ""))}">${linkifyCell(val)}</td>`;
      }).join("")}
    </tr>`;
  }).join("")}</tbody>`;
  document.getElementById("datagrid").innerHTML = thead + tbody;
  wireGridSelectionHandlers(rows);
}

/* ── row selection: header checkbox = select-all-VISIBLE (indeterminate when
   partial), per-row checkboxes toggle membership in grid.selected keyed by
   row_num, contextual bar reacts to grid.selected.size. ── */
function wireGridSelectionHandlers(rows) {
  const selectAllChk = document.getElementById("selectAllChk");
  const visibleNums = rows.map((r) => r.row_num).filter((n) => n != null);
  const updateSelectAllState = () => {
    const selectedVisible = visibleNums.filter((n) => grid.selected.has(n));
    if (!selectAllChk) return;
    selectAllChk.checked = visibleNums.length > 0 && selectedVisible.length === visibleNums.length;
    selectAllChk.indeterminate = selectedVisible.length > 0 && selectedVisible.length < visibleNums.length;
  };
  updateSelectAllState();
  if (selectAllChk) {
    selectAllChk.onchange = () => {
      if (selectAllChk.checked) visibleNums.forEach((n) => grid.selected.add(n));
      else visibleNums.forEach((n) => grid.selected.delete(n));
      renderDataGrid(rows);
      updateSelectBar();
    };
  }
  document.querySelectorAll(".rowchk").forEach((cb) => {
    cb.onchange = () => {
      const n = parseInt(cb.getAttribute("data-rownum"), 10);
      if (cb.checked) grid.selected.add(n); else grid.selected.delete(n);
      const tr = cb.closest("tr");
      if (tr) tr.classList.toggle("row-selected", cb.checked);
      updateSelectAllState();
      updateSelectBar();
    };
  });
}

function updateSelectBar() {
  const bar = document.getElementById("selectBar");
  const n = grid.selected.size;
  document.getElementById("selectCount").textContent = `${fmt(n)} selected`;
  bar.style.display = n > 0 ? "flex" : "none";
}

function cycleSort(col) {
  if (grid.sort !== col) { grid.sort = col; grid.dir = "asc"; }
  else if (grid.dir === "asc") { grid.dir = "desc"; }
  else { grid.sort = ""; grid.dir = ""; }
  grid.offset = 0;
  fetchGridRows();
}

/* Sheets/Clay-style value-picker: checked values -> exact array filter
   (via /api/lists/distinct), "contains text…" underneath -> substring
   filter — substring-only filtering used to make row counts untrustworthy
   (a "CEO" contains-filter also matched "CEO/Founder" or "GM & CEO"). */
async function fetchDistinctValues(col, search) {
  const params = new URLSearchParams({ id: grid.id, col, search: search || "", limit: "100" });
  try {
    const r = await fetch(`/api/lists/distinct?${params.toString()}`, { cache: "no-store" });
    const j = await r.json().catch(() => null);
    if (!r.ok || !j || !Array.isArray(j.values)) return null;
    return j.values;
  } catch { return null; }
}

function openColFilter(ev, col) {
  closeAnyPopover();
  const btn = ev.currentTarget;
  const cur = grid.filters[col];
  const checked = new Set(Array.isArray(cur) ? cur : []);
  const containsInit = typeof cur === "string" ? cur : "";

  const pop = document.createElement("div");
  pop.className = "popover filtinput-pop valpicker";
  pop.innerHTML = `
    <div style="font-size:12px;color:var(--ink-3);margin-bottom:6px">Filter “${esc(col)}”</div>
    <input type="text" class="vp-search" id="colValSearch" placeholder="Search values…">
    <div class="colpop" id="colValList"><div class="vp-empty">Loading values…</div></div>
    <div class="row">
      <button class="btn sm primary" id="colValApply">Apply</button>
      <button class="btn sm" id="colValClear">Clear</button>
    </div>
    <div class="vp-sep"></div>
    <div style="font-size:12px;color:var(--ink-3);margin-bottom:6px">…or contains text</div>
    <input type="text" value="${esc4attr(containsInit)}" id="colFiltInput" placeholder="contains…">
    <div class="row">
      <button class="btn sm" id="colFiltApply">Apply text filter</button>
    </div>`;
  document.body.appendChild(pop);
  const r = btn.getBoundingClientRect();
  pop.style.top = (window.scrollY + r.bottom + 4) + "px";
  pop.style.left = (window.scrollX + r.left - 140) + "px";
  requestAnimationFrame(() => {
    const pr = pop.getBoundingClientRect();
    if (pr.right > window.innerWidth - 8) pop.style.left = (window.scrollX + window.innerWidth - pr.width - 8) + "px";
  });

  const listEl = pop.querySelector("#colValList");
  const renderValueList = (values) => {
    if (!values) {
      listEl.innerHTML = `<div class="vp-empty">Couldn't load values — use the contains filter below</div>`;
      return;
    }
    if (!values.length) {
      listEl.innerHTML = `<div class="vp-empty">No values found</div>`;
      return;
    }
    listEl.innerHTML = values.map((v) => `
      <label style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px;min-width:0">
          <input type="checkbox" value="${esc4attr(v.value)}" ${checked.has(v.value) ? "checked" : ""}>
          <span class="vp-lbl">${esc(v.value)}</span>
        </span>
        <span class="vp-cnt">${fmt(v.count)}</span>
      </label>`).join("");
    listEl.querySelectorAll("input[type=checkbox]").forEach((cb) => {
      cb.addEventListener("change", () => {
        if (cb.checked) checked.add(cb.value); else checked.delete(cb.value);
      });
    });
  };

  let valSearchDebounce = null;
  const loadValues = async (term) => {
    listEl.innerHTML = `<div class="vp-empty">Loading values…</div>`;
    renderValueList(await fetchDistinctValues(col, term));
  };
  loadValues("");
  pop.querySelector("#colValSearch").addEventListener("input", (e) => {
    clearTimeout(valSearchDebounce);
    const v = e.target.value;
    valSearchDebounce = setTimeout(() => loadValues(v), 300);
  });

  const applyValues = () => {
    if (checked.size) grid.filters[col] = [...checked]; else delete grid.filters[col];
    closeAnyPopover();
    grid.offset = 0;
    fetchGridRows();
  };
  pop.querySelector("#colValApply").onclick = applyValues;
  pop.querySelector("#colValClear").onclick = () => {
    delete grid.filters[col];
    closeAnyPopover();
    grid.offset = 0;
    fetchGridRows();
  };

  const input = pop.querySelector("#colFiltInput");
  const applyText = () => {
    const v = input.value.trim();
    if (v) grid.filters[col] = v; else delete grid.filters[col];
    closeAnyPopover();
    grid.offset = 0;
    fetchGridRows();
  };
  input.addEventListener("keydown", (e) => { if (e.key === "Enter") applyText(); if (e.key === "Escape") closeAnyPopover(); });
  pop.querySelector("#colFiltApply").onclick = applyText;
}

document.getElementById("colBtn").onclick = (ev) => {
  closeAnyPopover();
  const pop = document.createElement("div");
  pop.className = "popover colpop";
  const n = grid.columns.filter((c) => grid.visible.has(c)).length;
  pop.innerHTML = `<div class="p-lab">${n}/${grid.columns.length} columns</div>` +
    grid.columns.map((c) => `<label><input type="checkbox" data-col="${esc4attr(c)}" ${grid.visible.has(c) ? "checked" : ""}> ${esc(c)}</label>`).join("");
  document.body.appendChild(pop);
  const r = ev.currentTarget.getBoundingClientRect();
  pop.style.top = (window.scrollY + r.bottom + 4) + "px";
  pop.style.left = (window.scrollX + r.left) + "px";
  pop.querySelectorAll("input[type=checkbox]").forEach((cb) => {
    cb.addEventListener("change", () => {
      const c = cb.getAttribute("data-col");
      if (cb.checked) grid.visible.add(c); else grid.visible.delete(c);
      document.getElementById("colBtn").textContent = `${grid.columns.filter((x) => grid.visible.has(x)).length}/${grid.columns.length} columns`;
      pop.querySelector(".p-lab").textContent = `${grid.columns.filter((x) => grid.visible.has(x)).length}/${grid.columns.length} columns`;
      if (grid.meta) renderDataGrid(_lastRows || []);
    });
  });
};
let _lastRows = [];
const _origRenderDataGrid = renderDataGrid;
renderDataGrid = function (rows) { _lastRows = rows; _origRenderDataGrid(rows); };

document.getElementById("gridSearch").addEventListener("input", (e) => {
  clearTimeout(gridSearchDebounce);
  const v = e.target.value;
  gridSearchDebounce = setTimeout(() => {
    grid.search = v; grid.offset = 0;
    fetchGridRows();
  }, 350);
});

document.getElementById("pagePrev").addEventListener("click", () => {
  grid.offset = Math.max(0, grid.offset - grid.limit);
  fetchGridRows();
});
document.getElementById("pageNext").addEventListener("click", () => {
  grid.offset = grid.offset + grid.limit;
  fetchGridRows();
});

/* pagination popover: 1-indexed "Go to row" + rows-per-page, tucked behind
   the range label instead of two always-visible number boxes in the toolbar */
document.getElementById("pageRangeBtn").addEventListener("click", (ev) => {
  ev.stopPropagation();
  closeAnyPopover();
  const pop = document.createElement("div");
  pop.className = "popover pagepop";
  pop.innerHTML = `
    <div class="p-field">
      <label>Go to row</label>
      <div class="p-row">
        <input type="number" min="1" class="numinput" id="popGoRow" value="${grid.offset + 1}">
        <button class="btn sm" id="popGoBtn">Go</button>
      </div>
    </div>
    <div class="p-field">
      <label>Rows per page</label>
      <input type="number" min="1" class="numinput" id="popLimit" value="${grid.limit}" style="width:100%">
    </div>`;
  document.body.appendChild(pop);
  const r = ev.currentTarget.getBoundingClientRect();
  pop.style.top = (window.scrollY + r.bottom + 4) + "px";
  pop.style.left = (window.scrollX + r.right - pop.offsetWidth) + "px";
  requestAnimationFrame(() => {
    const pr = pop.getBoundingClientRect();
    if (pr.right > window.innerWidth - 8) pop.style.left = (window.scrollX + window.innerWidth - pr.width - 8) + "px";
  });

  const goRowInput = pop.querySelector("#popGoRow");
  const goToRow = () => {
    const wantRow = Math.max(1, parseInt(goRowInput.value, 10) || 1); // 1-indexed, user-facing
    grid.offset = Math.max(0, Math.min(wantRow - 1, Math.max(0, grid.filtered - 1)));
    closeAnyPopover();
    fetchGridRows();
  };
  pop.querySelector("#popGoBtn").onclick = goToRow;
  goRowInput.addEventListener("keydown", (e) => { if (e.key === "Enter") goToRow(); });

  const limitInput = pop.querySelector("#popLimit");
  const applyLimit = () => {
    const v = Math.max(1, parseInt(limitInput.value, 10) || 500);
    if (v === grid.limit) return;
    grid.limit = v; grid.offset = 0;
    fetchGridRows();
  };
  limitInput.addEventListener("keydown", (e) => { if (e.key === "Enter") { applyLimit(); closeAnyPopover(); } });
  limitInput.addEventListener("change", applyLimit);
});

/* ── selection contextual bar ── */
document.getElementById("clearSelBtn").addEventListener("click", () => {
  grid.selected.clear();
  updateSelectBar();
  renderDataGrid(_lastRows || []);
});
document.getElementById("delRowsBtn").addEventListener("click", () => confirmDeleteRows());

function confirmDeleteRows() {
  const nums = [...grid.selected];
  if (!nums.length) return;
  const name = grid.meta ? grid.meta.name : "this list";
  showModal({
    title: "Delete rows",
    bodyHtml: `Delete ${fmt(nums.length)} row${nums.length === 1 ? "" : "s"} from "${esc(name)}"? This can't be undone.`,
    confirmLabel: `Delete ${fmt(nums.length)} row${nums.length === 1 ? "" : "s"}`,
    danger: true,
    onConfirm: async () => {
      const r = await fetch("/api/lists/rows/delete", { method: "POST", body: JSON.stringify({ list_id: grid.id, row_nums: nums }) });
      const j = await r.json().catch(() => ({}));
      if (!r.ok || j.ok === false) throw new Error(j.message || "Couldn't delete these rows");
      closeModal();
      grid.selected.clear();
      updateSelectBar();
      protoNote(`${fmt(j.deleted)} row${j.deleted === 1 ? "" : "s"} deleted`);
      await fetchGridRows();
    },
  });
}

/* ── grid-view overflow menu: Move to folder… / Delete list… ── */
document.getElementById("gridOverflowBtn").addEventListener("click", (ev) => {
  ev.stopPropagation();
  closeAnyPopover();
  const pop = document.createElement("div");
  pop.className = "popover";
  pop.innerHTML = `
    <button class="p-item" onclick="closeAnyPopover();openMoveModal(grid.id)">Move to folder…</button>
    <button class="p-item" onclick="closeAnyPopover();confirmDeleteList()">Delete list…</button>`;
  document.body.appendChild(pop);
  const r = ev.currentTarget.getBoundingClientRect();
  pop.style.top = (window.scrollY + r.bottom + 4) + "px";
  pop.style.left = (window.scrollX + r.right - pop.offsetWidth) + "px";
  requestAnimationFrame(() => {
    const pr = pop.getBoundingClientRect();
    if (pr.right > window.innerWidth - 8) pop.style.left = (window.scrollX + window.innerWidth - pr.width - 8) + "px";
  });
});

function confirmDeleteList() {
  const name = grid.meta ? grid.meta.name : "this list";
  const rows = grid.total || 0;
  showModal({
    title: "Delete list",
    bodyHtml: `Delete "<b>${esc(name)}</b>"? This list has ${fmt(rows)} row${rows === 1 ? "" : "s"}. This can't be undone.`,
    confirmLabel: "Delete list",
    danger: true,
    onConfirm: async () => {
      const r = await fetch("/api/lists/delete", { method: "POST", body: JSON.stringify({ list_id: grid.id }) });
      const j = await r.json().catch(() => ({}));
      if (!r.ok || j.ok === false) throw new Error(j.message || "Couldn't delete this list");
      closeModal();
      await loadListsIndex(true);
      location.hash = "";
      protoNote("List deleted");
    },
  });
}

/* ── Download: hits /api/lists/export with the CURRENT search/sort/filters,
   so what-you-see-is-what-you-download. Fetched as a blob (rather than a
   plain navigation) so the button can show a "Preparing…" state and surface
   a friendly error instead of a broken-looking blank navigation. ── */
document.getElementById("downloadBtn").addEventListener("click", async () => {
  const btn = document.getElementById("downloadBtn");
  const restore = busyBtn(btn, "Preparing…");
  if (!restore) return;
  try {
    const params = new URLSearchParams({
      id: grid.id, search: grid.search, sort: grid.sort, dir: grid.dir,
      filters: JSON.stringify(grid.filters),
    });
    const r = await fetch(`/api/lists/export?${params.toString()}`);
    if (!r.ok) {
      const j = await r.json().catch(() => ({}));
      throw new Error(j.message || "Couldn't prepare the download");
    }
    const blob = await r.blob();
    const cd = r.headers.get("Content-Disposition") || "";
    const m = /filename="([^"]+)"/.exec(cd);
    const filename = m ? m[1] : "list.csv";
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch (e) {
    protoNote(e.message || "Couldn't reach the server — try again", { ms: 4200 });
  } finally {
    restore();
  }
});

document.getElementById("shareBtn").addEventListener("click", async () => {
  const url = `https://navreo-signals.onrender.com/app/lists.html#${grid.id}`;
  const btn = document.getElementById("shareBtn");
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(url);
    } else {
      const ta = document.createElement("textarea");
      ta.value = url; ta.style.position = "fixed"; ta.style.opacity = "0";
      document.body.appendChild(ta); ta.select();
      document.execCommand("copy");
      document.body.removeChild(ta);
    }
    const orig = btn.textContent;
    btn.textContent = "Copied ✓"; btn.classList.add("copied");
    setTimeout(() => { btn.textContent = orig; btn.classList.remove("copied"); }, 2000);
  } catch {
    protoNote("Couldn't copy — copy the URL from the address bar's # instead");
  }
});

/* ═══════════════════════════ router ═══════════════════════════ */
function route() {
  const hash = (location.hash || "").replace(/^#/, "").trim();
  closeAnyPopover();
  if (hash) {
    document.getElementById("view-files").style.display = "none";
    document.getElementById("view-grid").style.display = "block";
    openGrid(hash);
  } else {
    document.getElementById("view-grid").style.display = "none";
    document.getElementById("view-files").style.display = "block";
    renderFileBrowser();
  }
}
window.addEventListener("hashchange", route);

(async () => {
  await loadListsIndex();
  route();
})();
</script>
